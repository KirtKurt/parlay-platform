AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: InQsi Bedrock Engineering Agent Action Layer

Parameters:
  InqsiStackName:
    Type: String
    Default: parlay-platform-dev
  GitHubRepository:
    Type: String
    Default: KirtKurt/parlay-platform
  GitHubDeployWorkflow:
    Type: String
    Default: deploy.yml
  GitHubDeployBranch:
    Type: String
    Default: main
  GitHubTokenSecretName:
    Type: String
    Default: ""
  InqsiBedrockFoundationModel:
    Type: String
    Default: amazon.nova-lite-v1:0

Resources:
  InqsiBedrockAgentActionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: inqsi_bedrock_agent_actions.lambda_handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          INQSI_STACK_NAME: !Ref InqsiStackName
          GITHUB_REPOSITORY: !Ref GitHubRepository
          GITHUB_DEPLOY_WORKFLOW: !Ref GitHubDeployWorkflow
          GITHUB_DEPLOY_BRANCH: !Ref GitHubDeployBranch
          GITHUB_TOKEN_SECRET_NAME: !Ref GitHubTokenSecretName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sts:GetCallerIdentity
                - cloudformation:DescribeStacks
                - cloudformation:DescribeStackResources
                - dynamodb:ListTables
                - dynamodb:DescribeTable
                - lambda:ListFunctions
                - apigateway:GET
                - secretsmanager:GetSecretValue
              Resource: "*"

  InqsiBedrockAgentServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InqsiBedrockAgentServicePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt InqsiBedrockAgentActionsFunction.Arn

  InqsiBedrockInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InqsiBedrockAgentActionsFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  InqsiEngineeringBedrockAgent:
    Type: AWS::Bedrock::Agent
    DependsOn:
      - InqsiBedrockInvokePermission
      - InqsiBedrockAgentServiceRole
    Properties:
      AgentName: inqsi-engineering-agent-managed
      Description: InQsi AWS and GitHub engineering agent.
      AgentResourceRoleArn: !GetAtt InqsiBedrockAgentServiceRole.Arn
      FoundationModel: !Ref InqsiBedrockFoundationModel
      AutoPrepare: true
      IdleSessionTTLInSeconds: 900
      Instruction: >-
        You are the InQsi engineering and operations agent. Inspect AWS deployment state,
        DynamoDB tables, Lambda functions, API health targets, and GitHub deployment runs.
        Do not invent deployment state. Do not directly mutate production AWS resources except
        by approved GitHub deployment workflows. No fake data, no default zeros, no pretending
        a build is complete, and no unsafe production changes without owner approval.
      ActionGroups:
        - ActionGroupName: InqsiEngineeringActions
          ActionGroupState: ENABLED
          Description: Safe InQsi AWS and GitHub operations.
          ActionGroupExecutor:
            Lambda: !GetAtt InqsiBedrockAgentActionsFunction.Arn
          ApiSchema:
            Payload: |
              openapi: 3.0.3
              info:
                title: InQsi Agent Actions
                version: 1.0.0
              paths:
                /aws/stack-status:
                  get:
                    operationId: getStackStatus
                    description: Inspect the InQsi CloudFormation stack.
                    parameters:
                      - name: stackName
                        in: query
                        required: false
                        schema:
                          type: string
                    responses:
                      '200':
                        description: Stack status response
                        content:
                          application/json:
                            schema:
                              type: object
                /aws/inqsi-tables:
                  get:
                    operationId: listInqsiTables
                    description: List InQsi DynamoDB tables.
                    responses:
                      '200':
                        description: Table list response
                        content:
                          application/json:
                            schema:
                              type: object
                /aws/backend-health-target:
                  get:
                    operationId: getBackendHealthTarget
                    description: Return InQsi backend health URL.
                    responses:
                      '200':
                        description: Health target response
                        content:
                          application/json:
                            schema:
                              type: object

Outputs:
  InqsiBedrockAgentActionsFunctionArn:
    Value: !GetAtt InqsiBedrockAgentActionsFunction.Arn
  InqsiEngineeringBedrockAgentId:
    Value: !Ref InqsiEngineeringBedrockAgent
  InqsiEngineeringBedrockAgentArn:
    Value: !GetAtt InqsiEngineeringBedrockAgent.AgentArn
  InqsiEngineeringBedrockAgentStatus:
    Value: !GetAtt InqsiEngineeringBedrockAgent.AgentStatus
