AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: External odds feed key
  BbsApiKey:
    Type: String
    NoEcho: true
    Description: Big Balls Sports Data key used only by the MLB shadow-capture Lambda
  InqsiAdminApiToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Owner/admin API token for protected InQsi backend admin routes
  PaymentProvider:
    Type: String
    Default: NONE
    Description: Payment-provider-neutral switch. Use NONE until final provider is selected.

  DeployGitSha:
    Type: String
    Default: unknown
    Description: Exact Git commit deployed to AWS
  DeployTemplateSha256:
    Type: String
    Default: unknown
    Description: SHA-256 of the canonical SAM template deployed to AWS

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey
        INQSI_DEPLOY_TEMPLATE_SHA256: !Ref DeployTemplateSha256
        INQSI_DEPLOY_GIT_SHA: !Ref DeployGitSha
        INQSI_MLB_ALLOW_LOCAL_FILE_CHAMPION: 'false'
        INQSI_MLB_LEGACY_V1_AUTHORITY_ENABLED: 'false'
        INQSI_MLB_ML_AUTO_PROMOTE: 'false'
        MLB_MIN_EV_FOR_PROMOTION: '0.0'
        MLB_PROMOTION_FALLBACK_EDGE_THRESHOLD: '0.0005'
        MLB_PROMOTION_EDGE_THRESHOLD: '0.0015'
        ODDS_PRIMARY_BOOK: 'fanduel'
        MLB_SCHED_INTERVAL_MINUTES: '15'
        MLB_PULL_START_AT_ET: '01:00'
        SIGNAL_LEDGER_TABLE: !Ref SignalLedgerTable
        PREDICTIONS_TABLE: !Ref PredictionsTable
        OUTCOMES_TABLE: !Ref OutcomesTable

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signal_ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_predictions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OutcomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_outcomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  MLBMLArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BbsApiSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Big Balls Sports Data credential for source-honest MLB shadow capture
      SecretString: !Ref BbsApiKey

  InqsiMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_members
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: handle
          AttributeType: S
        - AttributeName: creator_ref
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: HandleIndex
          KeySchema:
            - AttributeName: handle
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: CreatorRefIndex
          KeySchema:
            - AttributeName: creator_ref
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSocialAccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_social_accounts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: provider_account_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: connection_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProviderAccountIndex
          KeySchema:
            - AttributeName: provider_account_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ProviderStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSavedSlipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_saved_slips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: slip_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: visibility
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: slip_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SlipIdIndex
          KeySchema:
            - AttributeName: slip_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: VisibilityIndex
          KeySchema:
            - AttributeName: visibility
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiScoreHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_score_history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: score_id
          AttributeType: S
        - AttributeName: window
          AttributeType: S
        - AttributeName: public_visible_key
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: score_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: WindowIndex
          KeySchema:
            - AttributeName: window
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: PublicScoreIndex
          KeySchema:
            - AttributeName: public_visible_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiCreatorAttributionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_creator_attribution
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: attribution_id
          AttributeType: S
        - AttributeName: creator_ref
          AttributeType: S
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: anonymous_id
          AttributeType: S
      KeySchema:
        - AttributeName: attribution_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatorRefIndex
          KeySchema:
            - AttributeName: creator_ref
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: MemberAttributionIndex
          KeySchema:
            - AttributeName: member_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: AnonymousAttributionIndex
          KeySchema:
            - AttributeName: anonymous_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: subscription_id
          AttributeType: S
        - AttributeName: provider_customer_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: subscription_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProviderCustomerIndex
          KeySchema:
            - AttributeName: provider_customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: SubscriptionStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiAdminAuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_admin_audit_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: target_id
          AttributeType: S
        - AttributeName: audit_id
          AttributeType: S
        - AttributeName: actor_member_id
          AttributeType: S
        - AttributeName: action
          AttributeType: S
      KeySchema:
        - AttributeName: target_id
          KeyType: HASH
        - AttributeName: audit_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ActorIndex
          KeySchema:
            - AttributeName: actor_member_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ActionIndex
          KeySchema:
            - AttributeName: action
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSupportNotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_support_notes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: support_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: support_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SupportStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiFeatureFlagsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_feature_flags
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: flag_key
          AttributeType: S
      KeySchema:
        - AttributeName: flag_key
          KeyType: HASH

  InqsiBackendApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: inqsi_backend_api_wrapper.lambda_handler
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          MEMBERS_TABLE: !Ref InqsiMembersTable
          SOCIAL_ACCOUNTS_TABLE: !Ref InqsiSocialAccountsTable
          SAVED_SLIPS_TABLE: !Ref InqsiSavedSlipsTable
          SCORE_HISTORY_TABLE: !Ref InqsiScoreHistoryTable
          CREATOR_ATTRIBUTION_TABLE: !Ref InqsiCreatorAttributionTable
          SUBSCRIPTIONS_TABLE: !Ref InqsiSubscriptionsTable
          ADMIN_AUDIT_LOGS_TABLE: !Ref InqsiAdminAuditLogsTable
          SUPPORT_NOTES_TABLE: !Ref InqsiSupportNotesTable
          FEATURE_FLAGS_TABLE: !Ref InqsiFeatureFlagsTable
          INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken
          PAYMENT_PROVIDER: !Ref PaymentProvider
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiMembersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSocialAccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSavedSlipsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiScoreHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiCreatorAttributionTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiAdminAuditLogsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSupportNotesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiFeatureFlagsTable
      Events:
        InqsiHealth:
          Type: Api
          Properties:
            Path: /v1/health
            Method: GET
        InqsiMembersRegister:
          Type: Api
          Properties:
            Path: /v1/members/register
            Method: POST
        InqsiMembersProxy:
          Type: Api
          Properties:
            Path: /v1/members/{proxy+}
            Method: ANY
        InqsiSlipsRoot:
          Type: Api
          Properties:
            Path: /v1/slips
            Method: ANY
        InqsiSlipsProxy:
          Type: Api
          Properties:
            Path: /v1/slips/{proxy+}
            Method: ANY
        InqsiScoresProxy:
          Type: Api
          Properties:
            Path: /v1/scores/{proxy+}
            Method: ANY
        InqsiPublicProxy:
          Type: Api
          Properties:
            Path: /v1/public/{proxy+}
            Method: ANY
        InqsiAttributionProxy:
          Type: Api
          Properties:
            Path: /v1/attribution/{proxy+}
            Method: ANY
        InqsiSubscriptionsProxy:
          Type: Api
          Properties:
            Path: /v1/subscriptions/{proxy+}
            Method: ANY
        InqsiAdminProxy:
          Type: Api
          Properties:
            Path: /v1/admin/{proxy+}
            Method: ANY


  MLBV3ReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_v3_read_api.lambda_handler
      Timeout: 60
      MemorySize: 1024
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
      Events:
        MLBV3ModelVersion:
          Type: Api
          Properties:
            Path: /v1/mlb/model/version
            Method: GET
        MLBV3Today:
          Type: Api
          Properties:
            Path: /v1/mlb/today
            Method: GET
        MLBV3GameWinners:
          Type: Api
          Properties:
            Path: /v1/mlb/game-winners
            Method: GET
        MLBV3Predictions:
          Type: Api
          Properties:
            Path: /v1/mlb/predictions
            Method: GET
        MLBV3Games:
          Type: Api
          Properties:
            Path: /v1/mlb/games
            Method: GET

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: frontend_app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  MLBAuditedPullFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 120
      # A missing canonical evidence slot is material, so ingestion keeps one
      # bounded retry. Slot-conditional storage makes that retry idempotent.
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 300
        MaximumRetryAttempts: 1
      Environment:
        Variables:
          INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken
          BBS_API_SECRET_ARN: !Ref BbsApiSecret
          BBS_SHADOW_CAPTURE_ENABLED: 'true'
          BBS_SHADOW_S3_BUCKET: !Ref MLBMLArtifactsBucket
          BBS_SHADOW_SCHEMA_VERSION: 'MLB-BBS-SHADOW-v2-canonical-bound-raw-only'
      CodeUri: hello_world/
      Handler: mlb_manual_pull_protected.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref BbsApiSecret
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub '${MLBMLArtifactsBucket.Arn}/mlb/providers/bbs/*'
      Events:
        MLBManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/mlb
            Method: POST
        MLBHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: cron(0/15 * * * ? *)
            Input: '{"sport":"mlb","t":"HOT","run":"hot_pull_audited","days_ahead":0}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 300
              MaximumRetryAttempts: 1
  MLBSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_date_signal_api.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBReadPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref OutcomesTable
      Events:
        AuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/snapshots
            Method: GET
        AuditGame:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/game
            Method: GET
        SignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/mlb/deltas
            Method: GET
        HotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/mlb/hot-sides
            Method: GET
        ResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/mlb/status
            Method: GET
        SourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/mlb/status
            Method: GET
        FundamentalsStatus:
          Type: Api
          Properties:
            Path: /v1/mlb/fundamentals/status
            Method: GET


  MLBDailyPickLockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_daily_pick_lock_protected.lambda_handler
      # A full-slate lock invocation performs fail-closed, strongly consistent
      # readback of immutable pull manifests before any write.  A large MLB
      # pull history can legitimately exceed the 60-second global default.
      Timeout: 300
      MemorySize: 1024
      # The next one-minute tick is the retry. Lambda/EventBridge retries would
      # overlap a slow full-slate verification and exhaust the shared account.
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 60
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken
          MLB_DAILY_LOCK_MINUTES_BEFORE_FIRST_GAME: '45'
          MLB_REQUIRE_ALL_GAMES_FOR_LOCK: 'true'
          MLB_MIN_PULLS_PER_GAME_FOR_LOCK: '4'
          MLB_MAX_LATEST_PULL_AGE_MINUTES_FOR_LOCK: '20'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref OutcomesTable
      Events:
        MLBDailyPickLockEveryMinute:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Input: '{"sport":"mlb","run":"daily_lock_check","auto_ingest":false}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 60
              MaximumRetryAttempts: 0
        MLBDailyPickLockRun:
          Type: Api
          Properties:
            Path: /v1/mlb/locks/run
            Method: POST
        MLBDailyPickLockStatus:
          Type: Api
          Properties:
            Path: /v1/mlb/locks/status
            Method: GET
        MLBDailyPickLockToday:
          Type: Api
          Properties:
            Path: /v1/mlb/locks/today
            Method: GET


  MLBProductionVerifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_production_verifier.lambda_handler
      Timeout: 30
      MemorySize: 1024
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 300
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          MLB_VERIFY_MAX_PULL_AGE_MINUTES: '20'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
      Events:
        MLBProductionVerifierEvery5Min:
          Type: Schedule
          Properties:
            Schedule: cron(2/5 * * * ? *)
            Enabled: false
            Input: '{"sport":"mlb","mode":"continuous","run":"aws_production_verifier_5m"}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 300
              MaximumRetryAttempts: 0
  MLBResultsSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_results_scheduler.lambda_handler
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 300
        MaximumRetryAttempts: 0
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBFinalScoresGet:
          Type: Api
          Properties:
            Path: /v1/results/mlb/final-scores
            Method: GET
        MLBSettlementGet:
          Type: Api
          Properties:
            Path: /v1/results/mlb/settlement
            Method: GET
        MLBSettlementProofGet:
          Type: Api
          Properties:
            Path: /v1/results/mlb/proof
            Method: GET
        MLBSignalLearningGet:
          Type: Api
          Properties:
            Path: /v1/results/mlb/signal-learning
            Method: GET
        MLBResultSignalsGet:
          Type: Api
          Properties:
            Path: /v1/results/mlb/result-signals
            Method: GET
        MLBResultSignalsPost:
          Type: Api
          Properties:
            Path: /v1/results/mlb/result-signals
            Method: POST
        MLBResultsEvery6Hours:
          Type: Schedule
          Properties:
            Schedule: cron(6/15 * * * ? *)
            Input: '{"sport":"mlb","days_from":3,"run":"results_pull_15m"}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 300
              MaximumRetryAttempts: 0

  MLBMLTrainingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_ml_aws_training_v1.lambda_handler
      Timeout: 900
      MemorySize: 2048
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 300
        MaximumRetryAttempts: 0
      Environment:
        Variables:
          MLB_ML_ARTIFACTS_BUCKET: !Ref MLBMLArtifactsBucket
          MLB_ML_EXPERIMENT_ID: 'mlb-v2-2026-07-22-future-prospective-r3'
          MLB_ML_RELEASE_CONTRACT_ID: 'mlb-v2-2026-07-22-future-prospective-r3'
          MLB_ML_RELEASE_CUTOFF_UTC: '2026-07-22T04:00:00+00:00'
          MLB_ML_FEATURE_VECTOR_VERSION: 'MLB-ML-FROZEN-FEATURE-SNAPSHOT-v2-lock-safe-temporal-missingness'
          MLB_ML_EXECUTION_LEASE_SECONDS: '960'
          INQSI_MLB_ML_AUTO_PROMOTE: 'false'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref OutcomesTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:TransactWriteItems
              Resource: !GetAtt SnapshotsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetBucketVersioning
              Resource: !GetAtt MLBMLArtifactsBucket.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:GetObjectVersion
                - s3:PutObject
              Resource: !Sub '${MLBMLArtifactsBucket.Arn}/mlb/experiments/*'
      Events:
        MLBMLTrainingEvery6Hours:
          Type: Schedule
          Properties:
            Schedule: cron(11 1/6 * * ? *)
            Input: '{"sport":"mlb","mode":"scheduled","run":"aws_native_fixed_prospective_shadow_training"}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 3600
              MaximumRetryAttempts: 0
        MLBMLSelectionCaptureEvery15Minutes:
          Type: Schedule
          Properties:
            Schedule: cron(4/15 * * * ? *)
            Input: '{"sport":"mlb","mode":"selection_capture","run":"aws_native_prospective_selection_capture"}'
            RetryPolicy:
              MaximumEventAgeInSeconds: 300
              MaximumRetryAttempts: 0

