AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: External odds feed key

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey
        SIGNAL_LEDGER_TABLE: !Ref SignalLedgerTable
        PREDICTIONS_TABLE: !Ref PredictionsTable
        OUTCOMES_TABLE: !Ref OutcomesTable

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signal_ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_predictions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OutcomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_outcomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: frontend_app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  MLBAuditedPullFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_manual_pull.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/mlb
            Method: POST
        MLBHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"sport":"mlb","t":"HOT","run":"hot_pull_audited","days_ahead":1}'
        MLBBasePull:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"mlb","t":"T1","run":"base_pull_audited","days_ahead":1}'
        MLBT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)
            Input: '{"sport":"mlb","t":"T2","run":"mid_pull_audited","days_ahead":1}'
        MLBT3:
          Type: Schedule
          Properties:
            Schedule: cron(0 18 * * ? *)
            Input: '{"sport":"mlb","t":"T3","run":"late_pull_audited","days_ahead":1}'
        MLBT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 20 * * ? *)
            Input: '{"sport":"mlb","t":"T4","run":"freeze_pull_audited","days_ahead":1}'

  MLBSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_date_signal_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        AuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/snapshots
            Method: GET
        AuditGame:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/game
            Method: GET
        SignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/mlb/deltas
            Method: GET
        HotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/mlb/hot-sides
            Method: GET
        ResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/mlb/status
            Method: GET
        SourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/mlb/status
            Method: GET

  MLBResultsSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_results_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBResultsEvery6Hours:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Input: '{"sport":"mlb","days_from":3,"run":"results_pull"}'

  SoccerSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        SoccerManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/soccer
            Method: POST
        SoccerHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"sport":"soccer","t":"HOT","run":"hot_pull_audited"}'

  SoccerSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_signal_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerMatchSignals:
          Type: Api
          Properties:
            Path: /v1/soccer/matches/signals
            Method: GET
        SoccerMovement:
          Type: Api
          Properties:
            Path: /v1/soccer/movement
            Method: GET
        SoccerHotSides:
          Type: Api
          Properties:
            Path: /v1/soccer/hot-sides
            Method: GET
        SoccerParlays:
          Type: Api
          Properties:
            Path: /v1/soccer/parlays
            Method: GET
        SoccerLegacySignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/soccer/deltas
            Method: GET
        SoccerLegacyHotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/soccer/hot-sides
            Method: GET
        SoccerAuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/soccer/snapshots
            Method: GET
        SoccerResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/soccer/status
            Method: GET
        SoccerSourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/soccer/status
            Method: GET

  SoccerResultsAuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_results_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerResultsAuditGet:
          Type: Api
          Properties:
            Path: /v1/results/soccer/audit
            Method: GET
        SoccerResultsAuditPost:
          Type: Api
          Properties:
            Path: /v1/results/soccer/audit
            Method: POST

  SoccerAppApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_app_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerAppCards:
          Type: Api
          Properties:
            Path: /v1/soccer/app/cards
            Method: GET
        SoccerAppCardsAlt:
          Type: Api
          Properties:
            Path: /v1/app/soccer/cards
            Method: GET

  InqsiAutopsySchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: inqsi_autopsy_scheduler.lambda_handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        InqsiNightlyAutopsyAt1AM:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Input: '{"sport_key":"all","mode":"grade","run":"nightly_autopsy_1am_et"}'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
