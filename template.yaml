AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: theOddsAPI key (DO NOT COMMIT THIS VALUE)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey
        SIGNAL_LEDGER_TABLE: !Ref SignalLedgerTable

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signal_ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: api.scheduler_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
      Events:
        MLBBasePull:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"mlb","t":"T1","run":"base_pull"}'
        MLBT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)
            Input: '{"sport":"mlb","t":"T2","run":"mid_pull"}'
        MLBT3:
          Type: Schedule
          Properties:
            Schedule: cron(0 18 * * ? *)
            Input: '{"sport":"mlb","t":"T3","run":"late_pull"}'
        MLBT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 20 * * ? *)
            Input: '{"sport":"mlb","t":"T4","run":"freeze_pull"}'
        NCAAMT1:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"ncaam","t":"T1","run":"base_pull"}'
        NCAAMT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)
            Input: '{"sport":"ncaam","t":"T2","run":"mid_pull"}'
        NCAAMT3:
          Type: Schedule
          Properties:
            Schedule: cron(45 15 * * ? *)
            Input: '{"sport":"ncaam","t":"T3","run":"late_pull"}'
        NCAAMT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 16 * * ? *)
            Input: '{"sport":"ncaam","t":"T4","run":"freeze_pull"}'
        NBAT1:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"nba","t":"T1","run":"base_pull"}'
        NBAT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 13 * * ? *)
            Input: '{"sport":"nba","t":"T2","run":"mid_pull"}'
        NBAT3:
          Type: Schedule
          Properties:
            Schedule: cron(0 18 * * ? *)
            Input: '{"sport":"nba","t":"T3","run":"late_pull"}'
        NBAT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 20 * * ? *)
            Input: '{"sport":"nba","t":"T4","run":"freeze_pull"}'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
