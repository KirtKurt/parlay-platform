AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform (NBA-B1.1C.1) - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: theOddsAPI key (DO NOT COMMIT THIS VALUE)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 90
    MemorySize: 2,800
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: api.scheduler_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
      Events:
        Daily1AM:
          Type: Schedule
          Properties:
            Schedule: cron(0 1 * * ? *)
            Input: '{"run":"base_pull"}'
        HotEvery45Min:
          Type: Schedule
          Properties:
            Schedule: rate(45 minutes)
            Input: '{"run":"hot_pull"}'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
