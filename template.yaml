AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: External odds feed key
  InqsiAdminApiToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Owner/admin API token for protected InQsi backend admin routes
  PaymentProvider:
    Type: String
    Default: NONE
    Description: Payment-provider-neutral switch. Use NONE until final provider is selected.

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey
        SIGNAL_LEDGER_TABLE: !Ref SignalLedgerTable
        PREDICTIONS_TABLE: !Ref PredictionsTable
        OUTCOMES_TABLE: !Ref OutcomesTable

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signal_ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_predictions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OutcomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_outcomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  InqsiMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_members
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: handle
          AttributeType: S
        - AttributeName: creator_ref
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: HandleIndex
          KeySchema:
            - AttributeName: handle
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: CreatorRefIndex
          KeySchema:
            - AttributeName: creator_ref
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSocialAccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_social_accounts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: provider_account_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: connection_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProviderAccountIndex
          KeySchema:
            - AttributeName: provider_account_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ProviderStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSavedSlipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_saved_slips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: slip_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: visibility
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: slip_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SlipIdIndex
          KeySchema:
            - AttributeName: slip_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: VisibilityIndex
          KeySchema:
            - AttributeName: visibility
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiScoreHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_score_history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: score_id
          AttributeType: S
        - AttributeName: window
          AttributeType: S
        - AttributeName: public_visible_key
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: score_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: WindowIndex
          KeySchema:
            - AttributeName: window
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: PublicScoreIndex
          KeySchema:
            - AttributeName: public_visible_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiCreatorAttributionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_creator_attribution
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: attribution_id
          AttributeType: S
        - AttributeName: creator_ref
          AttributeType: S
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: anonymous_id
          AttributeType: S
      KeySchema:
        - AttributeName: attribution_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatorRefIndex
          KeySchema:
            - AttributeName: creator_ref
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: MemberAttributionIndex
          KeySchema:
            - AttributeName: member_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: AnonymousAttributionIndex
          KeySchema:
            - AttributeName: anonymous_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: subscription_id
          AttributeType: S
        - AttributeName: provider_customer_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: subscription_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProviderCustomerIndex
          KeySchema:
            - AttributeName: provider_customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: SubscriptionStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiAdminAuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_admin_audit_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: target_id
          AttributeType: S
        - AttributeName: audit_id
          AttributeType: S
        - AttributeName: actor_member_id
          AttributeType: S
        - AttributeName: action
          AttributeType: S
      KeySchema:
        - AttributeName: target_id
          KeyType: HASH
        - AttributeName: audit_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ActorIndex
          KeySchema:
            - AttributeName: actor_member_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ActionIndex
          KeySchema:
            - AttributeName: action
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiSupportNotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_support_notes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: support_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
        - AttributeName: support_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SupportStatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InqsiFeatureFlagsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inqsi_feature_flags
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: flag_key
          AttributeType: S
      KeySchema:
        - AttributeName: flag_key
          KeyType: HASH

  InqsiBackendApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: inqsi_backend_api.lambda_handler
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          MEMBERS_TABLE: !Ref InqsiMembersTable
          SOCIAL_ACCOUNTS_TABLE: !Ref InqsiSocialAccountsTable
          SAVED_SLIPS_TABLE: !Ref InqsiSavedSlipsTable
          SCORE_HISTORY_TABLE: !Ref InqsiScoreHistoryTable
          CREATOR_ATTRIBUTION_TABLE: !Ref InqsiCreatorAttributionTable
          SUBSCRIPTIONS_TABLE: !Ref InqsiSubscriptionsTable
          ADMIN_AUDIT_LOGS_TABLE: !Ref InqsiAdminAuditLogsTable
          SUPPORT_NOTES_TABLE: !Ref InqsiSupportNotesTable
          FEATURE_FLAGS_TABLE: !Ref InqsiFeatureFlagsTable
          INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken
          PAYMENT_PROVIDER: !Ref PaymentProvider
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiMembersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSocialAccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSavedSlipsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiScoreHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiCreatorAttributionTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiAdminAuditLogsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiSupportNotesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InqsiFeatureFlagsTable
      Events:
        InqsiHealth:
          Type: Api
          Properties:
            Path: /v1/health
            Method: GET
        InqsiMembersRegister:
          Type: Api
          Properties:
            Path: /v1/members/register
            Method: POST
        InqsiMembersProxy:
          Type: Api
          Properties:
            Path: /v1/members/{proxy+}
            Method: ANY
        InqsiSlipsRoot:
          Type: Api
          Properties:
            Path: /v1/slips
            Method: ANY
        InqsiSlipsProxy:
          Type: Api
          Properties:
            Path: /v1/slips/{proxy+}
            Method: ANY
        InqsiScoresProxy:
          Type: Api
          Properties:
            Path: /v1/scores/{proxy+}
            Method: ANY
        InqsiPublicProxy:
          Type: Api
          Properties:
            Path: /v1/public/{proxy+}
            Method: ANY
        InqsiAttributionProxy:
          Type: Api
          Properties:
            Path: /v1/attribution/{proxy+}
            Method: ANY
        InqsiSubscriptionsProxy:
          Type: Api
          Properties:
            Path: /v1/subscriptions/{proxy+}
            Method: ANY
        InqsiAdminProxy:
          Type: Api
          Properties:
            Path: /v1/admin/{proxy+}
            Method: ANY

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: frontend_app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  MLBAuditedPullFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_manual_pull.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/mlb
            Method: POST
        MLBHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"sport":"mlb","t":"HOT","run":"hot_pull_audited","days_ahead":1}'
        MLBBasePull:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"mlb","t":"T1","run":"base_pull_audited","days_ahead":1}'
        MLBT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)
            Input: '{"sport":"mlb","t":"T2","run":"mid_pull_audited","days_ahead":1}'
        MLBT3:
          Type: Schedule
          Properties:
            Schedule: cron(0 18 * * ? *)
            Input: '{"sport":"mlb","t":"T3","run":"late_pull_audited","days_ahead":1}'
        MLBT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 20 * * ? *)
            Input: '{"sport":"mlb","t":"T4","run":"freeze_pull_audited","days_ahead":1}'

  MLBSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_date_signal_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        AuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/snapshots
            Method: GET
        AuditGame:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/game
            Method: GET
        SignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/mlb/deltas
            Method: GET
        HotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/mlb/hot-sides
            Method: GET
        ResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/mlb/status
            Method: GET
        SourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/mlb/status
            Method: GET

  MLBResultsSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_results_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBResultsEvery6Hours:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Input: '{"sport":"mlb","days_from":3,"run":"results_pull"}'

  SoccerSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        SoccerManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/soccer
            Method: POST
        SoccerHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"sport":"soccer","t":"HOT","run":"hot_pull_audited"}'

  SoccerSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_signal_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerMatchSignals:
          Type: Api
          Properties:
            Path: /v1/soccer/matches/signals
            Method: GET
        SoccerMovement:
          Type: Api
          Properties:
            Path: /v1/soccer/movement
            Method: GET
        SoccerHotSides:
          Type: Api
          Properties:
            Path: /v1/soccer/hot-sides
            Method: GET
        SoccerParlays:
          Type: Api
          Properties:
            Path: /v1/soccer/parlays
            Method: GET
        SoccerLegacySignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/soccer/deltas
            Method: GET
        SoccerLegacyHotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/soccer/hot-sides
            Method: GET
        SoccerAuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/soccer/snapshots
            Method: GET
        SoccerResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/soccer/status
            Method: GET
        SoccerSourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/soccer/status
            Method: GET

  SoccerResultsAuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_results_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerResultsAuditGet:
          Type: Api
          Properties:
            Path: /v1/results/soccer/audit
            Method: GET
        SoccerResultsAuditPost:
          Type: Api
          Properties:
            Path: /v1/results/soccer/audit
            Method: POST

  SoccerAppApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_app_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        SoccerAppCards:
          Type: Api
          Properties:
            Path: /v1/soccer/app/cards
            Method: GET
        SoccerAppCardsAlt:
          Type: Api
          Properties:
            Path: /v1/app/soccer/cards
            Method: GET

  InqsiAutopsySchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: inqsi_autopsy_scheduler.lambda_handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        InqsiNightlyAutopsyAt1AM:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Input: '{"sport_key":"all","mode":"grade","run":"nightly_autopsy_1am_et"}'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  InqsiBackendApiFunctionArn:
    Description: InQsi backend member/slip/social/admin Lambda function ARN
    Value: !GetAtt InqsiBackendApiFunction.Arn
