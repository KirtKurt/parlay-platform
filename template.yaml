AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Parlay Platform - API + Scheduler + DynamoDB

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Description: External odds feed key

Globals:
  Function:
    Runtime: python3.11
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        ODDS_API_KEY: !Ref OddsApiKey
        SIGNAL_LEDGER_TABLE: !Ref SignalLedgerTable
        PREDICTIONS_TABLE: !Ref PredictionsTable
        OUTCOMES_TABLE: !Ref OutcomesTable

Resources:
  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SignalLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_signal_ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_predictions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  OutcomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: parlay_platform_outcomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        RootAny:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ProxyAny:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  MLBAuditedPullFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_manual_pull.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBManualPull:
          Type: Api
          Properties:
            Path: /v1/pull/mlb
            Method: POST
        MLBHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"sport":"mlb","t":"HOT","run":"hot_pull_audited"}'
        MLBBasePull:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Input: '{"sport":"mlb","t":"T1","run":"base_pull_audited"}'
        MLBT2:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)
            Input: '{"sport":"mlb","t":"T2","run":"mid_pull_audited"}'
        MLBT3:
          Type: Schedule
          Properties:
            Schedule: cron(0 18 * * ? *)
            Input: '{"sport":"mlb","t":"T3","run":"late_pull_audited"}'
        MLBT4:
          Type: Schedule
          Properties:
            Schedule: cron(0 20 * * ? *)
            Input: '{"sport":"mlb","t":"T4","run":"freeze_pull_audited"}'

  MLBSignalApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_signal_api.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalLedgerTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
      Events:
        AuditSnapshots:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/snapshots
            Method: GET
        AuditGame:
          Type: Api
          Properties:
            Path: /v1/audit/mlb/game
            Method: GET
        SignalDeltas:
          Type: Api
          Properties:
            Path: /v1/signals/mlb/deltas
            Method: GET
        HotSides:
          Type: Api
          Properties:
            Path: /v1/predictions/mlb/hot-sides
            Method: GET
        ResultsStatus:
          Type: Api
          Properties:
            Path: /v1/results/mlb/status
            Method: GET
        SourceStatus:
          Type: Api
          Properties:
            Path: /v1/sources/mlb/status
            Method: GET

  MLBResultsSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: mlb_results_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OutcomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
      Events:
        MLBResultsEvery6Hours:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Input: '{"sport":"mlb","days_from":3,"run":"results_pull"}'

  SoccerSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/
      Handler: soccer_scheduler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
      Events:
        SoccerHotEvery15Min:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)

Outputs:
  ApiUrl:
    Description: API Gateway endpoint base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
