AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: InQsi backend API

Parameters:
  OddsApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: The Odds API key used by scheduled ingestion.
  BillingWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional shared secret for external membership webhooks.

Globals:
  Function:
    Timeout: 60
    Runtime: python3.11
    MemorySize: 768
    Architectures:
      - x86_64
    Environment:
      Variables:
        APP_NAME: inqsi
        ODDS_API_KEY: !Ref OddsApiKey
        BILLING_WEBHOOK_SECRET: !Ref BillingWebhookSecret
        GAMES_TABLE: !Ref SilversGamesTable
        SNAPSHOTS_TABLE: !Ref SilversSnapshotsTable
        GAME_STATUS_TABLE: !Ref SilversGameStatusTable
        PARLAY_BUILDS_TABLE: !Ref SilversParlayBuildsTable
        AUDIT_EVENTS_TABLE: !Ref SilversAuditEventsTable
        INGESTION_RUNS_TABLE: !Ref SilversIngestionRunsTable
        CREATORS_TABLE: !Ref InQsiCreatorsTable
        ATTRIBUTION_EVENTS_TABLE: !Ref InQsiAttributionEventsTable
        USER_ATTRIBUTION_TABLE: !Ref InQsiUserAttributionTable
        MEMBERSHIP_TABLE: !Ref InQsiMembershipTable
        CREATOR_METRICS_TABLE: !Ref InQsiCreatorMetricsTable
        MEMBERS_TABLE: !Ref InQsiMembersTable
        MEMBER_SESSIONS_TABLE: !Ref InQsiMemberSessionsTable
        ODDS_REGIONS: us
        ODDS_MARKETS: h2h,spreads,totals
        ODDS_BOOKMAKERS: fanduel,draftkings,fanatics

Resources:
  SilversGamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: S
        - AttributeName: sport
          AttributeType: S
        - AttributeName: commence_date
          AttributeType: S
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SportDateIndex
          KeySchema:
            - AttributeName: sport
              KeyType: HASH
            - AttributeName: commence_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SilversSnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: S
        - AttributeName: captured_at
          AttributeType: S
        - AttributeName: sport
          AttributeType: S
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH
        - AttributeName: captured_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SportCapturedAtIndex
          KeySchema:
            - AttributeName: sport
              KeyType: HASH
            - AttributeName: captured_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SilversGameStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: S
        - AttributeName: status_captured_at
          AttributeType: S
        - AttributeName: sport
          AttributeType: S
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH
        - AttributeName: status_captured_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SportStatusIndex
          KeySchema:
            - AttributeName: sport
              KeyType: HASH
            - AttributeName: status_captured_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SilversParlayBuildsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: build_id
          AttributeType: S
      KeySchema:
        - AttributeName: build_id
          KeyType: HASH

  SilversAuditEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: audit_id
          AttributeType: S
        - AttributeName: entity_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: audit_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EntityAuditIndex
          KeySchema:
            - AttributeName: entity_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SilversIngestionRunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH

  InQsiCreatorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: creator_id
          AttributeType: S
        - AttributeName: referral_code
          AttributeType: S
      KeySchema:
        - AttributeName: creator_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ReferralCodeIndex
          KeySchema:
            - AttributeName: referral_code
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InQsiAttributionEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: creator_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatorCreatedAtIndex
          KeySchema:
            - AttributeName: creator_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  InQsiUserAttributionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: creator_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatorUserIndex
          KeySchema:
            - AttributeName: creator_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InQsiMembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: membership_id
          AttributeType: S
        - AttributeName: creator_id
          AttributeType: S
        - AttributeName: member_status
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: membership_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatorStatusIndex
          KeySchema:
            - AttributeName: creator_id
              KeyType: HASH
            - AttributeName: member_status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UserMembershipIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InQsiCreatorMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: creator_id
          AttributeType: S
        - AttributeName: metric_date
          AttributeType: S
      KeySchema:
        - AttributeName: creator_id
          KeyType: HASH
        - AttributeName: metric_date
          KeyType: RANGE

  InQsiMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: member_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: member_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InQsiMemberSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: member_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: MemberSessionIndex
          KeySchema:
            - AttributeName: member_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  SilversApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: frontend_app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversGamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversSnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversGameStatusTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversParlayBuildsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversAuditEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SilversIngestionRunsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiCreatorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiAttributionEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiUserAttributionTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiCreatorMetricsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiMembersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InQsiMemberSessionsTable
      Events:
        FrontendRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: GET
        FrontendProxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Health:
          Type: HttpApi
          Properties:
            Path: /v1/health
            Method: GET
        ManualIngest:
          Type: HttpApi
          Properties:
            Path: /v1/ingest/odds
            Method: POST
        TodaySlate:
          Type: HttpApi
          Properties:
            Path: /v1/slates/today
            Method: GET
        GameSnapshots:
          Type: HttpApi
          Properties:
            Path: /v1/games/{game_id}/snapshots
            Method: GET
        GameLineMovement:
          Type: HttpApi
          Properties:
            Path: /v1/games/{game_id}/line-movement
            Method: GET
        GameStatus:
          Type: HttpApi
          Properties:
            Path: /v1/games/{game_id}/status
            Method: GET
        GameAudit:
          Type: HttpApi
          Properties:
            Path: /v1/audit/games
            Method: GET
        RecordGameResult:
          Type: HttpApi
          Properties:
            Path: /v1/audit/games/result
            Method: POST
        ParlayAudit:
          Type: HttpApi
          Properties:
            Path: /v1/audit/parlays
            Method: GET
        RecordParlayResult:
          Type: HttpApi
          Properties:
            Path: /v1/audit/parlays/result
            Method: POST
        BuildParlay:
          Type: HttpApi
          Properties:
            Path: /v1/parlays/build
            Method: POST
        GetParlay:
          Type: HttpApi
          Properties:
            Path: /v1/parlays/{build_id}
            Method: GET
        CreatorRoutes:
          Type: HttpApi
          Properties:
            Path: /v1/creators/{proxy+}
            Method: ANY
        CreatorRoot:
          Type: HttpApi
          Properties:
            Path: /v1/creators
            Method: ANY
        AttributionCapture:
          Type: HttpApi
          Properties:
            Path: /v1/attribution/capture
            Method: POST
        AttributionLinkUser:
          Type: HttpApi
          Properties:
            Path: /v1/attribution/link-user
            Method: POST
        MembershipWebhook:
          Type: HttpApi
          Properties:
            Path: /v1/memberships/webhook
            Method: POST
        MemberSession:
          Type: HttpApi
          Properties:
            Path: /v1/member/session
            Method: ANY
        MemberSessionEnd:
          Type: HttpApi
          Properties:
            Path: /v1/member/session/end
            Method: POST
        OpsSummary:
          Type: HttpApi
          Properties:
            Path: /v1/ops/summary
            Method: GET
        FifteenMinuteOddsPull:
          Type: Schedule
          Properties:
            Name: silvers-syndicate-15-minute-pull
            Description: Continuous odds capture heartbeat every 15 minutes.
            Schedule: rate(15 minutes)
            Input: '{"source":"silvers.scheduler","pullLabel":"HOT_15"}'
        T1OddsPull:
          Type: Schedule
          Properties:
            Name: silvers-syndicate-t1-pull
            Description: T1 base market capture, 1:00 AM ET during daylight time.
            Schedule: cron(0 5 * * ? *)
            Input: '{"source":"silvers.scheduler","pullLabel":"T1"}'
        T2OddsPull:
          Type: Schedule
          Properties:
            Name: silvers-syndicate-t2-pull
            Description: T2 market capture, 9:00 AM ET during daylight time.
            Schedule: cron(0 13 * * ? *)
            Input: '{"source":"silvers.scheduler","pullLabel":"T2"}'
        T3OddsPull:
          Type: Schedule
          Properties:
            Name: silvers-syndicate-t3-pull
            Description: T3 market capture, 12:30 PM ET during daylight time.
            Schedule: cron(30 16 * * ? *)
            Input: '{"source":"silvers.scheduler","pullLabel":"T3"}'

Outputs:
  ApiUrl:
    Description: Base URL for the InQsi API
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  GamesTableName:
    Description: DynamoDB games table
    Value: !Ref SilversGamesTable
  SnapshotsTableName:
    Description: DynamoDB snapshots table
    Value: !Ref SilversSnapshotsTable
  GameStatusTableName:
    Description: DynamoDB game status table
    Value: !Ref SilversGameStatusTable
  AuditEventsTableName:
    Description: DynamoDB audit events table
    Value: !Ref SilversAuditEventsTable
  CreatorsTableName:
    Description: DynamoDB creators table
    Value: !Ref InQsiCreatorsTable
  AttributionEventsTableName:
    Description: DynamoDB attribution events table
    Value: !Ref InQsiAttributionEventsTable
  UserAttributionTableName:
    Description: DynamoDB user attribution table
    Value: !Ref InQsiUserAttributionTable
  MembershipTableName:
    Description: DynamoDB membership table
    Value: !Ref InQsiMembershipTable
  MembersTableName:
    Description: DynamoDB members table
    Value: !Ref InQsiMembersTable
  MemberSessionsTableName:
    Description: DynamoDB member sessions table
    Value: !Ref InQsiMemberSessionsTable
