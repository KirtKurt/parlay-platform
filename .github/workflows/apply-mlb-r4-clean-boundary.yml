name: Apply MLB R4 Clean Boundary

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-mlb-r4-clean-boundary.yml'
      - 'scripts/apply_mlb_r4_clean_boundary.py'
      - 'tests/unit/test_mlb_ml_r4_clean_cutover.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reset-mlb-prospective-r4-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: aws-actions/setup-sam@v2

      - name: Install validation runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9' 'PyYAML>=6,<7'

      - name: Apply r4 migration
        run: python scripts/apply_mlb_r4_clean_boundary.py

      - name: Validate r4 boundary and production contracts
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          sam validate --template-file template.yaml
          python -m py_compile \
            hello_world/mlb_ml_experiment_v2.py \
            hello_world/mlb_ml_aws_training_v1.py \
            scripts/verify_mlb_deploy_identity.py \
            scripts/verify_mlb_release_activation_predeploy.py \
            scripts/verify_mlb_trainer_deploy_response.py
          python -m pytest -q \
            tests/unit/test_mlb_ml_r4_clean_cutover.py \
            tests/unit/test_mlb_ml_aws_training_v1.py \
            tests/unit/test_mlb_deploy_identity.py \
            tests/unit/test_run_mlb_ml_v3_audit_report.py
          python scripts/verify_mlb_schedule_invariants.py

      - name: Commit materialized r4 source
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'R4 prospective boundary already materialized.'
          else
            git commit -m 'Reset MLB prospective training at clean July 24 boundary'
            git pull --rebase --autostash origin agent/reset-mlb-prospective-r4-20260723
            git push origin HEAD:agent/reset-mlb-prospective-r4-20260723
          fi
