name: MLB Accuracy Recovery Replay
# Recovery research only: private shadow artifacts and isolated prospective rows; no official pick or model authority changes.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mlb-accuracy-recovery-replay.yml'
      - 'scripts/audit_mlb_aws_scoring_replay.py'
      - 'scripts/train_mlb_recovery_shadow.py'
      - 'scripts/backfill_mlb_recovery_standard_fundamentals.py'
      - 'scripts/train_mlb_recovery_fundamentals_shadow.py'
      - 'scripts/bootstrap_mlb_recovery_shadow_runtime.py'
      - 'scripts/apply_mlb_recovery_shadow_sam.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mlb-accuracy-recovery-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: aws-actions/setup-sam@v2

      - name: Install recovery runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9' 'PyYAML>=6,<7'

      - name: Materialize, isolate, and validate prospective shadow runtime
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/bootstrap_mlb_recovery_shadow_runtime.py
          python scripts/apply_mlb_recovery_shadow_sam.py
          sam validate --template-file template.yaml
          python -m py_compile \
            hello_world/mlb_recovery_v10_engine.py \
            hello_world/mlb_recovery_v11_engine.py \
            hello_world/mlb_recovery_shadow_v1.py \
            scripts/apply_mlb_recovery_shadow_sam.py \
            tests/unit/test_mlb_recovery_shadow_v1.py
          python -m pytest -q tests/unit/test_mlb_recovery_shadow_v1.py
          python - <<'PY'
          from pathlib import Path
          template = Path('template.yaml').read_text(encoding='utf-8')
          block = template.split('  MLBRecoveryShadowFunction:\n', 1)[1].split('\n  SoccerSchedulerFunction:\n', 1)[0]
          for token in ('PredictionsTable', 'SignalLedgerTable', 'PREDICTIONS_TABLE', 'SIGNAL_LEDGER_TABLE'):
              assert token not in block, token
          assert "INQSI_RECOVERY_PRODUCTION_AUTHORITY: 'false'" in block
          assert 'MLBRecoveryShadowCaptureEvery15Minutes' in block
          assert 'MLBRecoveryShadowGradeEvery6Hours' in block
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            template.yaml \
            .github/workflows/mlb-production-source-contract.yml \
            hello_world/mlb_recovery_shadow_v1.py \
            tests/unit/test_mlb_recovery_shadow_v1.py
          if ! git diff --cached --quiet; then
            git commit -m 'Deploy isolated MLB recovery shadow scorer'
            git pull --rebase --autostash origin agent/mlb-accuracy-recovery-20260723
            git push origin HEAD:agent/mlb-accuracy-recovery-20260723
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Compile replay and recovery trainers
        run: |
          python -m py_compile scripts/audit_mlb_aws_scoring_replay.py
          python -m py_compile scripts/train_mlb_recovery_shadow.py
          python -m py_compile scripts/backfill_mlb_recovery_standard_fundamentals.py
          python -m py_compile scripts/train_mlb_recovery_fundamentals_shadow.py

      - name: Replay old and current scoring at T-minus-45
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/audit_mlb_aws_scoring_replay.py \
            --start-date 2026-06-28 \
            --end-date 2026-07-22 \
            --output /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json

      - name: Resolve private MLB ML artifact bucket
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --query "Stacks[0].Outputs[?OutputKey=='MLBMLArtifactsBucketName'].OutputValue | [0]" \
            --output text)
          test -n "$ARTIFACT_BUCKET"
          test "$ARTIFACT_BUCKET" != "None"
          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET" >> "$GITHUB_ENV"

      - name: Train and register signal-only shadow recovery seed
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python scripts/train_mlb_recovery_shadow.py \
            --replay /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json \
            --output /tmp/mlb-accuracy-recovery/mlb_recovery_shadow_seed.json \
            --bucket "$ARTIFACT_BUCKET" \
            --upload

      - name: Backfill official standard baseball fundamentals strictly before each game date
        run: |
          set -euo pipefail
          python scripts/backfill_mlb_recovery_standard_fundamentals.py \
            --replay /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json \
            --output /tmp/mlb-accuracy-recovery/mlb_scoring_replay_with_standard_fundamentals.json

      - name: Train and register fundamentals-aware shadow recovery seed
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python scripts/train_mlb_recovery_fundamentals_shadow.py \
            --replay /tmp/mlb-accuracy-recovery/mlb_scoring_replay_with_standard_fundamentals.json \
            --output /tmp/mlb-accuracy-recovery/mlb_recovery_fundamentals_shadow_seed.json \
            --bucket "$ARTIFACT_BUCKET" \
            --upload

      - name: Upload recovery proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-accuracy-recovery-replay-${{ github.run_id }}
          path: |
            /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json
            /tmp/mlb-accuracy-recovery/mlb_recovery_shadow_seed.json
            /tmp/mlb-accuracy-recovery/mlb_scoring_replay_with_standard_fundamentals.json
            /tmp/mlb-accuracy-recovery/mlb_recovery_fundamentals_shadow_seed.json
          if-no-files-found: error
