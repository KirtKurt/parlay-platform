name: MLB Accuracy Recovery Replay

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mlb-accuracy-recovery-replay.yml'
      - 'scripts/audit_mlb_aws_scoring_replay.py'
      - 'scripts/train_mlb_recovery_shadow.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install recovery runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Compile replay and recovery trainer
        run: |
          python -m py_compile scripts/audit_mlb_aws_scoring_replay.py
          python -m py_compile scripts/train_mlb_recovery_shadow.py

      - name: Replay old and current scoring at T-minus-45
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/audit_mlb_aws_scoring_replay.py \
            --start-date 2026-06-28 \
            --end-date 2026-07-22 \
            --output /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json

      - name: Train and register shadow-only recovery seed
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --query "Stacks[0].Outputs[?OutputKey=='MLBMLArtifactsBucketName'].OutputValue | [0]" \
            --output text)
          test -n "$ARTIFACT_BUCKET"
          test "$ARTIFACT_BUCKET" != "None"
          python scripts/train_mlb_recovery_shadow.py \
            --replay /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json \
            --output /tmp/mlb-accuracy-recovery/mlb_recovery_shadow_seed.json \
            --bucket "$ARTIFACT_BUCKET" \
            --upload

      - name: Upload recovery proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-accuracy-recovery-replay-${{ github.run_id }}
          path: |
            /tmp/mlb-accuracy-recovery/mlb_scoring_replay.json
            /tmp/mlb-accuracy-recovery/mlb_recovery_shadow_seed.json
          if-no-files-found: error
