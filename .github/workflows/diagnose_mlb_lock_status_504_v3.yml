name: Diagnose live MLB lock-status 504 v3

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/diagnose_mlb_lock_status_504_v3.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Measure direct Lambda and warmed HTTP status
        env:
          AWS_MAX_ATTEMPTS: "1"
          TARGET_SHA: 246daecb3960518fb59bb69c6891989d50fb7308
        shell: bash
        run: |
          set -euo pipefail
          region="${{ secrets.AWS_REGION }}"
          stack="parlay-platform-dev"
          api_url=$(aws cloudformation describe-stacks \
            --stack-name "$stack" \
            --region "$region" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue | [0]" \
            --output text)
          API_URL="$api_url" python - <<'PY' >/tmp/api_id.txt
          import os
          from urllib.parse import urlparse
          host = urlparse(os.environ["API_URL"]).hostname or ""
          api_id = host.split(".", 1)[0]
          if not api_id:
              raise SystemExit("Unable to derive API ID from ApiUrl")
          print(api_id)
          PY
          api_id=$(cat /tmp/api_id.txt)
          resource_id=$(aws apigateway get-resources \
            --rest-api-id "$api_id" \
            --region "$region" \
            --limit 500 \
            --query "items[?path=='/v1/mlb/locks/status'].id | [0]" \
            --output text)
          test -n "$resource_id"
          test "$resource_id" != "None"
          integration_uri=$(aws apigateway get-integration \
            --rest-api-id "$api_id" \
            --resource-id "$resource_id" \
            --http-method GET \
            --region "$region" \
            --query uri \
            --output text)
          FUNCTION_ARN="$integration_uri" python - <<'PY' >/tmp/function_name.txt
          import os
          import re
          import urllib.parse
          uri = urllib.parse.unquote(os.environ["FUNCTION_ARN"])
          match = re.search(r"/functions/(arn:[^/]+)/invocations$", uri)
          if not match:
              raise SystemExit("Unable to resolve lock-status Lambda from API integration")
          print(match.group(1).rsplit(":", 1)[-1])
          PY
          function_name=$(cat /tmp/function_name.txt)
          aws lambda get-function-configuration \
            --function-name "$function_name" \
            --region "$region" \
            --query '{FunctionName:FunctionName,Timeout:Timeout,MemorySize:MemorySize,LastModified:LastModified,RevisionId:RevisionId,Runtime:Runtime}' \
            --output json >/tmp/function_configuration.json

          cat >/tmp/lock_status_event.json <<'JSON'
          {
            "resource": "/v1/mlb/locks/status",
            "path": "/v1/mlb/locks/status",
            "httpMethod": "GET",
            "headers": {"accept": "application/json", "user-agent": "inqsi-direct-lock-status-diagnostic/3.0"},
            "multiValueHeaders": {},
            "queryStringParameters": null,
            "multiValueQueryStringParameters": null,
            "pathParameters": null,
            "stageVariables": null,
            "requestContext": {
              "resourcePath": "/v1/mlb/locks/status",
              "httpMethod": "GET",
              "path": "/Prod/v1/mlb/locks/status",
              "stage": "Prod",
              "identity": {"sourceIp": "127.0.0.1", "userAgent": "inqsi-direct-lock-status-diagnostic/3.0"},
              "requestId": "direct-lock-status-diagnostic-v3"
            },
            "body": null,
            "isBase64Encoded": false
          }
          JSON

          direct_start=$(date +%s%3N)
          aws --cli-connect-timeout 10 --cli-read-timeout 360 lambda invoke \
            --function-name "$function_name" \
            --region "$region" \
            --payload fileb:///tmp/lock_status_event.json \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/direct_lambda_response.json \
            >/tmp/direct_lambda_meta.json
          direct_end=$(date +%s%3N)
          direct_elapsed_ms=$((direct_end - direct_start))

          start_ms=$((($(date +%s) - 2400) * 1000))
          aws logs filter-log-events \
            --log-group-name "/aws/lambda/$function_name" \
            --region "$region" \
            --start-time "$start_ms" \
            --limit 10000 \
            --output json >/tmp/log_events.json

          API_URL="$api_url" DIRECT_MS="$direct_elapsed_ms" TARGET_SHA="$TARGET_SHA" python - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          meta = json.loads(Path("/tmp/direct_lambda_meta.json").read_text(encoding="utf-8"))
          raw_response = json.loads(Path("/tmp/direct_lambda_response.json").read_text(encoding="utf-8"))
          direct_body = raw_response.get("body")
          try:
              decoded_body = json.loads(direct_body) if isinstance(direct_body, str) else direct_body
          except json.JSONDecodeError:
              decoded_body = None
          log_tail = base64.b64decode(meta.get("LogResult") or "").decode("utf-8", errors="replace")

          url = os.environ["API_URL"].rstrip("/") + "/v1/mlb/locks/status"
          request = urllib.request.Request(
              url,
              headers={
                  "accept": "application/json",
                  "user-agent": "inqsi-warmed-lock-status-diagnostic/3.0",
              },
          )
          started = time.monotonic()
          http_status = None
          http_error = None
          http_payload = None
          try:
              with urllib.request.urlopen(request, timeout=40) as response:
                  http_status = int(response.getcode())
                  http_payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              http_status = int(exc.code)
              http_error = f"HTTP {exc.code}"
          except Exception as exc:
              http_error = f"{type(exc).__name__}:{exc}"
          http_elapsed_ms = round((time.monotonic() - started) * 1000)

          events = json.loads(Path("/tmp/log_events.json").read_text(encoding="utf-8")).get("events", [])
          selected_events = []
          for event in events:
              message = str(event.get("message") or "").strip()
              if any(token in message for token in ("REPORT RequestId:", "Task timed out", "status batch read", "ERROR")):
                  selected_events.append({
                      "timestamp": event.get("timestamp"),
                      "message": message[-4000:],
                      "logStreamName": event.get("logStreamName"),
                  })
          function_configuration = json.loads(
              Path("/tmp/function_configuration.json").read_text(encoding="utf-8")
          )
          summary_keys = (
              "ok", "sport", "slateDateEt", "gameCount", "pullCount",
              "lockedPredictionCount", "lockedStatusCount", "operationalDefect",
          )
          report = {
              "targetSha": os.environ["TARGET_SHA"],
              "function": function_configuration,
              "directInvoke": {
                  "elapsedMs": int(os.environ["DIRECT_MS"]),
                  "statusCode": raw_response.get("statusCode"),
                  "functionError": meta.get("FunctionError"),
                  "executedVersion": meta.get("ExecutedVersion"),
                  "payloadSummary": {
                      key: decoded_body.get(key)
                      for key in summary_keys
                      if isinstance(decoded_body, dict) and key in decoded_body
                  },
                  "logTail": [
                      line for line in log_tail.splitlines()
                      if any(token in line for token in ("REPORT RequestId:", "Task timed out", "ERROR"))
                  ][-12:],
              },
              "warmedHttp": {
                  "elapsedMs": http_elapsed_ms,
                  "statusCode": http_status,
                  "error": http_error,
                  "payloadSummary": {
                      key: http_payload.get(key)
                      for key in summary_keys
                      if isinstance(http_payload, dict) and key in http_payload
                  },
              },
              "cloudWatchEvents": selected_events[-80:],
          }
          Path("live_lock_status_diagnostic_v3.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish sanitized diagnostic and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          cp live_lock_status_diagnostic_v3.json /tmp/live_lock_status_diagnostic_v3.json
          git fetch origin agent/report-mlb-deploy-246daecb
          git checkout -B agent/report-mlb-deploy-246daecb origin/agent/report-mlb-deploy-246daecb
          cp /tmp/live_lock_status_diagnostic_v3.json live_lock_status_diagnostic_v3.json
          rm -f \
            .github/workflows/diagnose_mlb_lock_status_504.yml \
            .github/workflows/report_mlb_lock_status_cloudwatch.yml \
            .github/workflows/diagnose_mlb_lock_status_504_v2.yml \
            .github/workflows/diagnose_mlb_lock_status_504_v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record live MLB lock-status timing diagnostic v3"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
