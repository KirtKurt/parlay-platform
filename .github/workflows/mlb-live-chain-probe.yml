name: MLB Live Historical Chain Probe

"on":
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-live-chain-probe.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Read live historical chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          curl -fsS "${headers[@]}" "$api/actions/runs?per_page=100" > /tmp/runs.json
          jq -c '[.workflow_runs[] | select(.name == "MLB Historical Recovery and Paid Dispatch" or .name == "MLB Historical Daily Optimizer" or .name == "MLB Historical Accelerated Training Driver")][0:12] | .[] | {id,name,event,status,conclusion,head_sha,created_at,updated_at}' /tmp/runs.json
