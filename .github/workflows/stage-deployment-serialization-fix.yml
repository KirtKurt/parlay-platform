name: Stage deployment serialization fix

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/stage-deployment-serialization-fix.yml'

permissions:
  contents: write

jobs:
  stage:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/serialize-parlay-platform-deployments'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: true

      - name: Materialize serialized production deployment workflow
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet 'PyYAML>=6,<7'
          python - <<'PY'
          from pathlib import Path
          import re
          import yaml

          source = Path('.github/workflows/deploy.yml')
          text = source.read_text(encoding='utf-8')
          block = re.compile(
              r'(concurrency:\n\s+group:\s*parlay-platform-deploy\n\s+cancel-in-progress:)\s*true',
              re.MULTILINE,
          )
          patched, count = block.subn(r'\1 false', text)
          if count != 1:
              raise SystemExit(f'expected one shared deployment concurrency block, changed {count}')
          if 'group: parlay-platform-deploy\n  cancel-in-progress: false' not in patched:
              raise SystemExit('serialized deployment contract missing')
          if 'group: parlay-platform-deploy\n  cancel-in-progress: true' in patched:
              raise SystemExit('cancelling shared deployment contract remains')
          value = yaml.safe_load(patched)
          concurrency = value.get('concurrency') or {}
          assert concurrency.get('group') == 'parlay-platform-deploy', concurrency
          assert concurrency.get('cancel-in-progress') is False, concurrency
          target = Path('runtime_reports/deploy_serialized.staged.yml')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(patched, encoding='utf-8')
          print('SHARED_DEPLOYMENTS_SERIALIZED')
          print(target)
          PY
          test "$(grep -Fc 'cancel-in-progress: false' runtime_reports/deploy_serialized.staged.yml)" -ge 1
          git diff --check -- runtime_reports/deploy_serialized.staged.yml
          sha256sum runtime_reports/deploy_serialized.staged.yml

      - name: Commit staged non-workflow bytes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add runtime_reports/deploy_serialized.staged.yml
          test -n "$(git diff --cached --name-only)"
          git commit -m 'Stage serialized production deployment workflow bytes'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
