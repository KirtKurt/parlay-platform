name: Apply MLB Scheduled V21 Authority Fix V2

on:
  push:
    branches: [agent/fix-mlb-authoritative-persistence-20260723]
    paths:
      - 'scripts/apply_mlb_scheduled_v21_authority_fix_v2.py'
      - '.github/workflows/apply-mlb-scheduled-v21-authority-fix-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-scheduled-v21-authority-fix-v2
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-authoritative-persistence-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply corrected scoped repair
        run: python scripts/apply_mlb_scheduled_v21_authority_fix_v2.py

      - name: Compile and run focused tests
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_manual_pull_protected.py \
            scripts/apply_mlb_scheduled_v21_authority_fix_v2.py \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py
          python -m pytest -q \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py \
            tests/unit/test_mlb_scheduled_persistence_source_order.py

      - name: Verify strict authority boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          target = Path('hello_world/mlb_manual_pull_protected.py').read_text(encoding='utf-8')
          assert target.count('MLB-SCHEDULED-V21-AUTHORITY-COMPAT-v1') == 1
          assert target.count('_predict_all_with_scheduled_v21_authority(mlb_game_winner_engine)') == 1
          assert 'mlb_game_winner_engine.predict_all(store=True)' not in target
          for path in Path('hello_world').glob('*recovery*.py'):
              assert 'MLB-SCHEDULED-V21-AUTHORITY-COMPAT-v1' not in path.read_text(encoding='utf-8', errors='replace')
          PY

      - name: Commit repaired production source and tests
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_manual_pull_protected.py \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py
          if git diff --cached --quiet; then
            echo 'Scoped MLB authority repair already applied.'
          else
            git commit -m 'Fix scheduled MLB v2.1 prediction persistence authority'
            git pull --rebase --autostash origin agent/fix-mlb-authoritative-persistence-20260723
            git push origin HEAD:agent/fix-mlb-authoritative-persistence-20260723
          fi
