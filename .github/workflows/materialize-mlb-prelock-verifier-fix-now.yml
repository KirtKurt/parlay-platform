name: Materialize MLB Prelock Verifier Fix Now

on:
  push:
    branches: [agent/fix-mlb-prelock-verifier-20260723]
    paths:
      - '.github/workflows/materialize-mlb-prelock-verifier-fix-now.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-prelock-verifier-20260723
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'
      - name: Apply and test exact verifier repair
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/apply_mlb_prelock_verifier_fix.py
          python -m py_compile hello_world/mlb_production_verifier.py
          python -m pytest -q \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py \
            tests/unit/test_mlb_production_verifier_per_game.py \
            tests/unit/test_mlb_production_verifier_authority.py
      - name: Commit verified canonical files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_production_verifier.py \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py \
            .github/workflows/mlb-production-source-contract.yml
          git commit -m 'Make MLB verifier cutoff-aware before first lock'
          git pull --rebase --autostash origin agent/fix-mlb-prelock-verifier-20260723
          git push origin HEAD:agent/fix-mlb-prelock-verifier-20260723
