name: Audit MLB Signal Breakdown PR 2026-07-23

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/audit-mlb-signal-breakdown-pr-20260723.yml'
      - 'scripts/audit_mlb_signal_breakdown_temp.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/audit-mlb-signal-breakdown-20260723

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only audit runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Export current persisted MLB signal rows
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          SLATE_DATE: '2026-07-23'
        run: python scripts/audit_mlb_signal_breakdown_temp.py

      - name: Upload read-only MLB signal artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-signal-breakdown-${{ github.run_id }}
          path: /tmp/mlb-signal-breakdown/
          if-no-files-found: error
