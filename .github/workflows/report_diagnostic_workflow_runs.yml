name: Report diagnostic workflow runs

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/report_diagnostic_workflow_runs.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Query branch workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          api = os.environ["GITHUB_API_URL"].rstrip("/")
          query = urllib.parse.urlencode({
              "branch": "agent/report-mlb-deploy-246daecb",
              "event": "push",
              "per_page": 100,
          })
          request = urllib.request.Request(
              f"{api}/repos/{repo}/actions/runs?{query}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "parlay-platform-diagnostic-run-reporter/1.0",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)
          names = {
              "Diagnose live MLB lock-status 504",
              "Report MLB lock-status CloudWatch timing",
          }
          runs = [
              {
                  key: run.get(key)
                  for key in (
                      "id", "name", "status", "conclusion", "head_sha",
                      "run_number", "run_attempt", "html_url", "created_at", "updated_at"
                  )
              }
              for run in payload.get("workflow_runs", [])
              if run.get("name") in names
          ]
          Path("diagnostic_workflow_runs.json").write_text(
              json.dumps({"runs": runs}, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish report and remove reporter
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/report_diagnostic_workflow_runs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record diagnostic workflow run IDs"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
