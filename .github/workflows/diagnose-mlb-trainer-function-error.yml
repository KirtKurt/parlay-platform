name: Diagnose MLB Trainer Function Error

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-mlb-trainer-function-error.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install diagnostic runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read recent trainer errors from CloudWatch
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-trainer-diagnostic
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          import boto3

          region = os.environ['AWS_REGION']
          cfn = boto3.client('cloudformation', region_name=region)
          logs = boto3.client('logs', region_name=region)
          lamb = boto3.client('lambda', region_name=region)
          resource = cfn.describe_stack_resource(
              StackName='parlay-platform-dev',
              LogicalResourceId='MLBMLTrainingFunction',
          )['StackResourceDetail']
          function_name = resource['PhysicalResourceId']
          config = lamb.get_function_configuration(FunctionName=function_name)
          group = f'/aws/lambda/{function_name}'
          now = datetime.now(timezone.utc)
          start = now - timedelta(hours=2)

          events = []
          token = None
          while True:
              args = {
                  'logGroupName': group,
                  'startTime': int(start.timestamp() * 1000),
                  'endTime': int(now.timestamp() * 1000),
                  'interleaved': True,
                  'limit': 10000,
              }
              if token:
                  args['nextToken'] = token
              response = logs.filter_log_events(**args)
              events.extend(response.get('events') or [])
              nxt = response.get('nextToken')
              if not nxt or nxt == token:
                  break
              token = nxt

          pattern = re.compile(
              r'(Traceback|\[ERROR\]|Task timed out|TrainingContractError|ExecutionLease|ConditionalState|Runtime\.|Exception|error|failed|missing|required|mismatch|START RequestId|END RequestId|REPORT RequestId)',
              re.I,
          )
          selected = []
          for event in events:
              message = str(event.get('message') or '').strip()
              if not pattern.search(message):
                  continue
              # Preserve only log/error text. Remove access-key-like tokens and
              # cap each line so no arbitrary payload or credential is published.
              message = re.sub(r'AKIA[0-9A-Z]{16}', '<redacted-access-key>', message)
              message = re.sub(r'(?i)(secret|token|password|authorization|api.?key)\s*[:=]\s*[^,}\s]+', r'\1=<redacted>', message)
              selected.append({
                  'timestampUtc': datetime.fromtimestamp(int(event.get('timestamp') or 0) / 1000, tz=timezone.utc).isoformat(),
                  'message': message[:12000],
              })

          report = {
              'ok': True,
              'readOnly': True,
              'productionWritesPerformed': False,
              'functionName': function_name,
              'handler': config.get('Handler'),
              'runtime': config.get('Runtime'),
              'timeoutSeconds': config.get('Timeout'),
              'memorySizeMb': config.get('MemorySize'),
              'lastModified': config.get('LastModified'),
              'logGroup': group,
              'windowStartUtc': start.isoformat(),
              'windowEndUtc': now.isoformat(),
              'matchedEventCount': len(selected),
              'events': selected[-250:],
              'secretExposed': False,
          }
          path = Path('/tmp/mlb-trainer-diagnostic/mlb_trainer_function_error.json')
          path.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(report['events'][-40:], indent=2))
          PY

      - name: Upload trainer diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-trainer-function-error-${{ github.run_id }}
          path: /tmp/mlb-trainer-diagnostic/
          if-no-files-found: error
