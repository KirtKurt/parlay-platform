name: Finalize MLB Scheduled V21 Authority Fix

on:
  push:
    branches: [agent/fix-mlb-authoritative-persistence-20260723]
    paths:
      - '.github/workflows/finalize-mlb-scheduled-v21-authority-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-mlb-scheduled-v21-authority-fix
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-authoritative-persistence-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Wait for the generated production patch
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            git pull --rebase --autostash origin agent/fix-mlb-authoritative-persistence-20260723
            if grep -q 'MLB-SCHEDULED-V21-AUTHORITY-COMPAT-v1' hello_world/mlb_manual_pull_protected.py \
              && test -f tests/unit/test_mlb_scheduled_v21_authority_scope.py; then
              exit 0
            fi
            sleep 10
          done
          echo 'Generated production patch did not appear in time' >&2
          exit 1

      - name: Install validation runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Re-run focused validation before cleanup
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_manual_pull_protected.py \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py
          python -m pytest -q \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py \
            tests/unit/test_mlb_scheduled_persistence_source_order.py

      - name: Remove branch-only migration machinery
        run: |
          set -euo pipefail
          rm -f \
            scripts/apply_mlb_scheduled_v21_authority_fix.py \
            scripts/apply_mlb_scheduled_v21_authority_fix_v2.py \
            .github/workflows/apply-mlb-scheduled-v21-authority-fix.yml \
            .github/workflows/apply-mlb-scheduled-v21-authority-fix-v2.yml \
            .github/workflows/finalize-mlb-scheduled-v21-authority-fix.yml

      - name: Commit clean production patch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Repair branch already clean.'
          else
            git commit -m 'Finalize scoped MLB scheduled persistence fix'
            git pull --rebase --autostash origin agent/fix-mlb-authoritative-persistence-20260723
            git push origin HEAD:agent/fix-mlb-authoritative-persistence-20260723
          fi
