name: Extract diagnostic failure tails

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/extract_diagnostic_failure_tails.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Download and trim diagnostic logs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="${GITHUB_API_URL%/}"
          repo="$GITHUB_REPOSITORY"
          auth=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer $GH_TOKEN"
            -H "X-GitHub-Api-Version: 2022-11-28"
            -H "User-Agent: parlay-platform-diagnostic-tail-extractor/1.0"
          )
          for spec in \
            "88827790491:direct_diagnostic_failure_tail.txt" \
            "88828065858:cloudwatch_diagnostic_failure_tail.txt"; do
            job_id="${spec%%:*}"
            output="${spec#*:}"
            curl -fsSL "${auth[@]}" \
              "$api/repos/$repo/actions/jobs/$job_id/logs" \
              -o /tmp/job_logs.bin
            if unzip -t /tmp/job_logs.bin >/dev/null 2>&1; then
              unzip -p /tmp/job_logs.bin >/tmp/job_logs.txt
            else
              cp /tmp/job_logs.bin /tmp/job_logs.txt
            fi
            OUTPUT="$output" python - <<'PY'
          import os
          from pathlib import Path

          lines = Path("/tmp/job_logs.txt").read_text(
              encoding="utf-8-sig", errors="replace"
          ).splitlines()
          selected = lines[-180:]
          Path(os.environ["OUTPUT"]).write_text(
              "\n".join(selected) + "\n",
              encoding="utf-8",
          )
          PY
          done
          rm -f /tmp/job_logs.bin /tmp/job_logs.txt

      - name: Publish tails and remove extractor
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extract_diagnostic_failure_tails.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record diagnostic workflow failure tails"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
