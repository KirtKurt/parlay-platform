name: Probe Live MLB Historical Training Chain

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-chain-runs-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/probe-mlb-training-chain-runs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Print exact current chain status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          h=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          curl -fsS "${h[@]}" "$api/actions/runs?per_page=100" > /tmp/runs.json
          jq -c '[.workflow_runs[] | select(.created_at >= "2026-07-24T06:45:00Z") | select(.name == "MLB V15.11.1 Accelerated Historical Training" or .name == "Dispatch Authorized MLB Historical Training" or .name == "MLB Historical Recovery and Paid Dispatch" or .name == "MLB Historical Daily Optimizer" or .name == "MLB Historical Accelerated Training Driver" or .name == "Observe MLB V15.11.1 Historical Training Chain")] | group_by(.name) | map(max_by(.created_at)) | sort_by(.created_at) | .[] | {id,name,event,status,conclusion,head_sha,created_at,updated_at,html_url}' /tmp/runs.json | tee /tmp/current-runs.ndjson
          while read -r id; do curl -fsS "${h[@]}" "$api/actions/runs/$id/jobs?per_page=100" | jq -c --arg id "$id" '.jobs[] | {run_id:($id|tonumber),job_id:.id,job:.name,status,conclusion,active_steps:[.steps[]?|select(.status=="in_progress")|.name],failed_steps:[.steps[]?|select(.conclusion=="failure")|.name]}'; done < <(jq -r '.id' /tmp/current-runs.ndjson)
