name: Probe Live MLB Historical Training Chain

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-chain-runs-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/probe-mlb-training-chain-runs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89426541736'
    steps:
      - name: Print exact zero-paid-call planning failure
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
          | sed -r 's/\x1B\[[0-9;?]*[ -\/]*[@-~]//g' > /tmp/job.log
          grep -n -A 100 -B 20 'Initialize or resume and build the no-paid-history credit plan' /tmp/job.log | tail -n 180
          echo '--- concise errors and state ---'
          grep -Ei 'historical optimizer planning|contract missing|contract mismatch|credit plan|configured date range|authorized ledger|fingerprint|planningError|rejectedDates|PLAN_STATUS|ESTIMATED_CREDITS|MAXIMUM_AUTHORIZED_GAMES|FunctionError|Unhandled|Traceback|errorMessage|errorType|Process completed with exit code' /tmp/job.log | tail -n 100
