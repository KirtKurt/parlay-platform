name: Probe Live MLB Historical Training Chain

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-chain-runs-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/probe-mlb-training-chain-runs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89424142807'
    steps:
      - name: Print exact optimizer deployment failure
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
          | sed -r 's/\x1B\[[0-9;?]*[ -\/]*[@-~]//g' \
          | grep -Ei 'CREATE_FAILED|UPDATE_FAILED|ROLLBACK|ValidationError|AccessDenied|AlreadyExists|Resource handler returned message|Failed to create changeset|Failed to deploy|Error:|NoSuchBucket|InsufficientCapabilities|InvalidRequest|LimitExceeded|ConflictException|Process completed with exit code|EXECUTE_PAID_BACKFILL' \
          | tail -n 40
