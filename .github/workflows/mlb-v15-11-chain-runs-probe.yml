name: Probe Live MLB Historical Training Chain

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-chain-runs-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/probe-mlb-training-chain-runs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89429118420'
    steps:
      - name: Parse compact planner rejection summary
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
          | sed -r 's/\x1B\[[0-9;?]*[ -\/]*[@-~]//g' > /tmp/job.log
          python - <<'PY'
          import json
          from pathlib import Path

          decoder = json.JSONDecoder()
          found = None
          for line in Path('/tmp/job.log').read_text(errors='replace').splitlines():
              if 'PLAN_BLOCKED_INCOMPLETE_LEDGER' not in line:
                  continue
              start = line.find('{')
              if start < 0:
                  continue
              try:
                  value, _ = decoder.raw_decode(line[start:])
              except json.JSONDecodeError:
                  continue
              if (value.get('state') or {}).get('phase') == 'PLAN_BLOCKED_INCOMPLETE_LEDGER':
                  found = value
                  break
          if found is None:
              raise SystemExit('planner JSON not found')
          state = found.get('state') or {}
          plan = state.get('plan') or found.get('plan') or {}
          rejected = plan.get('rejectedDates') or []
          print(json.dumps({
              'phase': state.get('phase'),
              'lastError': state.get('lastError'),
              'plannedOfficialGames': plan.get('plannedOfficialGames'),
              'plannedCompleteSlateDays': plan.get('plannedCompleteSlateDays'),
              'historicalRequestCount': plan.get('historicalRequestCount'),
              'estimatedCredits': plan.get('estimatedCredits'),
              'providerReportedRemainingCredits': plan.get('providerReportedRemainingCredits'),
              'withinConfiguredCreditCap': plan.get('withinConfiguredCreditCap'),
              'providerQuotaAppearsSufficient': plan.get('providerQuotaAppearsSufficient'),
              'planningErrorCount': plan.get('planningErrorCount'),
              'rejectedDates': rejected,
          }, indent=2, sort_keys=True))
          PY
