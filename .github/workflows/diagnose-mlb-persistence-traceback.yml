name: Diagnose MLB Persistence Traceback

on:
  push:
    branches: [agent/fix-mlb-persistence-v2]
    paths:
      - '.github/workflows/diagnose-mlb-persistence-traceback.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-mlb-persistence-traceback.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-persistence-v2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only diagnostics runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Export exact recent MLB scorer failures
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-persistence-diagnostic
          python - <<'PY'
          import json, os, re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          import boto3

          region = os.environ['AWS_REGION']
          cfn = boto3.client('cloudformation', region_name=region)
          logs = boto3.client('logs', region_name=region)
          resource = cfn.describe_stack_resource(
              StackName='parlay-platform-dev',
              LogicalResourceId='MLBAuditedPullFunction',
          )['StackResourceDetail']
          fn = resource['PhysicalResourceId']
          group = f'/aws/lambda/{fn}'
          end = datetime.now(timezone.utc)
          start = end - timedelta(hours=3)
          response = logs.filter_log_events(
              logGroupName=group,
              startTime=int(start.timestamp()*1000),
              endTime=int(end.timestamp()*1000),
              interleaved=True,
              limit=10000,
          )
          events = sorted(response.get('events') or [], key=lambda row: int(row.get('timestamp') or 0))
          sensitive = re.compile(r'(?i)(api[_-]?key|secret|token|authorization|password)(["\'\s:=]+)([^,}\s]+)')
          def clean(text):
              return sensitive.sub(lambda m: m.group(1)+m.group(2)+'[REDACTED]', str(text))[:50000]
          selected=[]
          needles=(
              'Traceback (most recent call last)',
              'MLB_SCHEDULED_PULL_FAILED:',
              'MLB_SCHEDULED_PULL_PREREQUISITE_FAILED:',
              'prelock_storage_incomplete',
              'provider_schedule_manifest_incomplete',
              'ConditionalCheckFailedException',
              'ValidationException',
              'AccessDeniedException',
          )
          for i,row in enumerate(events):
              msg=str(row.get('message') or '')
              if any(token in msg for token in needles):
                  for j in range(max(0,i-8), min(len(events), i+30)):
                      candidate=events[j]
                      selected.append({
                          'timestampUtc': datetime.fromtimestamp(int(candidate.get('timestamp') or 0)/1000, tz=timezone.utc).isoformat(),
                          'logStreamName': candidate.get('logStreamName'),
                          'eventId': candidate.get('eventId'),
                          'message': clean(candidate.get('message') or ''),
                      })
          dedup=[]; seen=set()
          for row in selected:
              key=(row['eventId'],row['message'])
              if key in seen: continue
              seen.add(key); dedup.append(row)
          out={
              'ok': True,
              'readOnly': True,
              'functionName': fn,
              'logGroup': group,
              'windowStartUtc': start.isoformat(),
              'windowEndUtc': end.isoformat(),
              'totalLogEvents': len(events),
              'selectedEventCount': len(dedup),
              'events': dedup[-500:],
          }
          path=Path('/tmp/mlb-persistence-diagnostic/mlb_persistence_traceback.json')
          path.write_text(json.dumps(out, indent=2, default=str)+'\n', encoding='utf-8')
          print(json.dumps({'selectedEventCount':len(dedup),'functionName':fn}, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlb-persistence-traceback-${{ github.run_id }}
          path: /tmp/mlb-persistence-diagnostic/
          if-no-files-found: error
