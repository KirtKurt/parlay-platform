name: Deploy isolated Tennis MLB exact-parity V2

on:
  push:
    branches: [agent/tennis-mlb-exact-parity-v2]
    paths:
      - "tennis_release_v2/**"
      - ".github/workflows/deploy-tennis-v2.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parlay-platform-tennis-v2-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  TENNIS_STACK_NAME: parlay-platform-tennis-ml-prod
  MLB_STACK_NAME: parlay-platform-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Reconstruct, validate, build, deploy, and prove isolation
        env:
          TENNIS_ODDS_API_KEY: ${{ secrets.TENNIS_ODDS_API_KEY || secrets.ODDS_API_KEY }}
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "${TENNIS_ODDS_API_KEY:-}" || { echo "::error::No Tennis/provider odds credential is configured"; exit 1; }
          cat tennis_release_v2/tennis_predictive_platform_v2.tar.xz.b64.part[0-9][0-9] \
            | base64 --decode > tennis_release_v2/tennis_predictive_platform_v2.tar.xz
          sha256sum -c tennis_release_v2/tennis_predictive_platform_v2.tar.xz.sha256
          rm -rf tennis_predictive_platform_v2
          tar -xJf tennis_release_v2/tennis_predictive_platform_v2.tar.xz
          source_sha=$(cat tennis_release_v2/source_tree.sha256)
          actual_sha=$(python - <<'PY'
          from pathlib import Path
          import hashlib
          root=Path('tennis_predictive_platform_v2'); h=hashlib.sha256()
          for p in sorted((x for x in root.rglob('*') if x.is_file()),key=lambda x:x.relative_to(root).as_posix()):
              r=p.relative_to(root).as_posix().encode(); d=p.read_bytes()
              h.update(len(r).to_bytes(8,'big')); h.update(r); h.update(len(d).to_bytes(8,'big')); h.update(d)
          print(h.hexdigest())
          PY
          )
          test "$source_sha" = "$actual_sha"
          cd tennis_predictive_platform_v2
          python -m pip install --quiet -r requirements-dev.txt
          ./scripts/run_all_checks.sh
          python -m compileall -q src tests scripts
          python scripts/validate_template.py
          sam validate --lint --template-file template.yaml
          rm -rf .aws-sam && sam build --no-cached --template-file template.yaml
          template_sha=$(sha256sum template.yaml | awk '{print $1}')
          printf '%s\n' "$GITHUB_SHA" > /tmp/tennis-deploy-git-sha
          printf '%s\n' "$source_sha" > /tmp/tennis-source-sha256
          printf '%s\n' "$template_sha" > /tmp/tennis-template-sha256

          fingerprint_mlb() {
            local phase=$1
            aws cloudformation get-template --stack-name "$MLB_STACK_NAME" --template-stage Processed --output json > "/tmp/mlb-template-${phase}.json"
            aws cloudformation list-stack-resources --stack-name "$MLB_STACK_NAME" --output json > "/tmp/mlb-resources-${phase}.json"
            PHASE="$phase" python - <<'PY'
          import hashlib,json,os
          from pathlib import Path
          p=os.environ['PHASE']; t=json.loads(Path(f'/tmp/mlb-template-{p}.json').read_text()).get('TemplateBody')
          r=json.loads(Path(f'/tmp/mlb-resources-{p}.json').read_text()).get('StackResourceSummaries',[])
          keep=[{k:x.get(k) for k in ('LogicalResourceId','PhysicalResourceId','ResourceType')} for x in r]
          digest=hashlib.sha256(json.dumps({'template':t,'resources':sorted(keep,key=lambda x:str(x['LogicalResourceId']))},sort_keys=True,default=str).encode()).hexdigest()
          Path(f'/tmp/mlb-stack-{p}.sha256').write_text(digest+'\n'); print(digest)
          PY
          }
          mlb_status=$(aws cloudformation describe-stacks --stack-name "$MLB_STACK_NAME" --query 'Stacks[0].StackStatus' --output text)
          [[ "$mlb_status" == CREATE_COMPLETE || "$mlb_status" == UPDATE_COMPLETE ]]
          fingerprint_mlb before

          deploy_tennis() {
            local state=$1
            sam deploy --template-file .aws-sam/build/template.yaml \
              --stack-name "$TENNIS_STACK_NAME" --region "$AWS_REGION" --resolve-s3 \
              --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset \
              --parameter-overrides TennisOddsApiKey="$TENNIS_ODDS_API_KEY" StageName=prod \
              ScheduleState="$state" DeployGitSha="$GITHUB_SHA" \
              DeployTemplateSha256="$template_sha" DeploySourceSha256="$source_sha"
          }
          deploy_tennis DISABLED
          API_URL=$(aws cloudformation describe-stacks --stack-name "$TENNIS_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='TennisApiUrl'].OutputValue | [0]" --output text)
          test -n "$API_URL" && test "$API_URL" != None
          printf '%s\n' "$API_URL" > /tmp/tennis-api-url
          curl -fsS "$API_URL/v1/tennis/model/version" | tee /tmp/tennis-model-version.json
          curl -fsS "$API_URL/v1/tennis/ml/status" | tee /tmp/tennis-ml-status.json
          sigv4=(--aws-sigv4 "aws:amz:${AWS_REGION}:execute-api" --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}")
          [[ -z "${AWS_SESSION_TOKEN:-}" ]] || sigv4+=(-H "x-amz-security-token: ${AWS_SESSION_TOKEN}")
          curl -fsS "${sigv4[@]}" -H 'content-type: application/json' -X POST \
            "$API_URL/v1/pull/tennis" -d '{"run":"deploy_force_live_pull","force":true}' \
            | tee /tmp/tennis-discovery-smoke.json
          API_URL="$API_URL" python - <<'PY'
          import json,os,subprocess
          from pathlib import Path
          v=json.loads(Path('/tmp/tennis-model-version.json').read_text()); s=json.loads(Path('/tmp/tennis-ml-status.json').read_text())
          assert v['ok'] and v['sport']=='tennis' and float(v['collectionLeadHours'])==10
          assert v['data_architecture']['cross_sport_runtime_data'] is False
          assert v['sourceParity']['referenceCommit']=='57a9bf2da314bce8ab6f000fdab73693a67b2500'
          assert s['ok'] and s['sport']=='tennis' and s['trainingPolicy']['crossSportInputsAllowed'] is False
          d=json.loads(Path('/tmp/tennis-discovery-smoke.json').read_text())
          assert d['ok'] and d['sport']=='tennis' and d.get('live_pull_ok') is True and d.get('fallback_used') is False
          rows=d.get('results') or []; assert rows and all(x.get('ok') is True for x in rows)
          assert all((x.get('sport_key_coverage') or {}).get('complete') is True for x in rows)
          assert sum(int(x.get('match_count') or 0) for x in rows)>0
          candidates=[x for x in rows if int(((x.get('game_winner_predictions') or {}).get('count')) or 0)>0]; assert candidates
          slate=str(min(candidates,key=lambda x:(str(x.get('first_match_start_utc') or ''),str(x.get('slate_date') or '')))['slate_date'])
          payload=json.loads(subprocess.check_output(['curl','-fsS',f"{os.environ['API_URL']}/v1/tennis/predictions?date={slate}"],text=True))
          assert payload['ok'] and payload['sport']=='tennis' and int(payload.get('count') or 0)>0
          Path('/tmp/tennis-predictions-smoke.json').write_text(json.dumps(payload,indent=2,sort_keys=True))
          Path('/tmp/tennis-live-summary.json').write_text(json.dumps({'slate':slate,'matchCount':sum(int(x.get('match_count') or 0) for x in rows),'predictionCount':sum(int((x.get('game_winner_predictions') or {}).get('count') or 0) for x in rows),'competitionKeys':sorted({str(x.get('sport_key') or x.get('competition_key') or '') for x in rows if x.get('sport_key') or x.get('competition_key')}),'mode':v['predictionMode']},indent=2,sort_keys=True))
          PY
          deploy_tennis ENABLED
          mapfile -t rules < <(aws cloudformation list-stack-resources --stack-name "$TENNIS_STACK_NAME" \
            --query "StackResourceSummaries[?ResourceType=='AWS::Events::Rule'].PhysicalResourceId" --output text | tr '\t' '\n')
          test "${#rules[@]}" -eq 4
          : > /tmp/tennis-rule-states.txt
          for rule in "${rules[@]}"; do
            state=$(aws events describe-rule --name "$rule" --query State --output text)
            echo "$rule=$state" | tee -a /tmp/tennis-rule-states.txt
            test "$state" = ENABLED
          done
          aws cloudformation describe-stacks --stack-name "$TENNIS_STACK_NAME" --output json > /tmp/tennis-deployed-stack.json
          fingerprint_mlb after
          cmp -s /tmp/mlb-stack-before.sha256 /tmp/mlb-stack-after.sha256 || { echo '::error::MLB stack changed'; exit 1; }

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tennis-v2-exact-parity-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            tennis_release_v2/*.sha256
            tennis_release_v2/SOURCE_TREE_MANIFEST.json
            /tmp/tennis-*.json
            /tmp/tennis-*.txt
            /tmp/tennis-*sha256
            /tmp/mlb-stack-*.sha256
