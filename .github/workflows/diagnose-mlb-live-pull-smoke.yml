name: Diagnose MLB Live Pull Smoke

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-mlb-live-pull-smoke.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read final deployment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 308754468de72c0eec319f54dafddc92b9762cbd
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          run_id=""
          for i in $(seq 1 60); do
            run_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?head_sha=${TARGET_SHA}&event=push&per_page=20" --jq '.workflow_runs[0].id // empty')
            if [ -n "$run_id" ]; then break; fi
            sleep 10
          done
          test -n "$run_id"
          for i in $(seq 1 120); do
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" > /tmp/run.json
            status=$(jq -r '.status' /tmp/run.json)
            if [ "$status" = "completed" ]; then break; fi
            sleep 15
          done
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > /tmp/jobs.json
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          run=json.load(open('/tmp/run.json'))
          jobs=json.load(open('/tmp/jobs.json'))
          result={
              'ok': run.get('conclusion') == 'success',
              'proofType':'MLB_FINAL_DEPLOYMENT_STATUS',
              'createdAtUtc':datetime.now(timezone.utc).isoformat(),
              'targetSha':'308754468de72c0eec319f54dafddc92b9762cbd',
              'runId':run.get('id'),
              'status':run.get('status'),
              'conclusion':run.get('conclusion'),
              'jobs':[{
                  'name':job.get('name'),
                  'status':job.get('status'),
                  'conclusion':job.get('conclusion'),
                  'failedSteps':[step.get('name') for step in job.get('steps',[]) if step.get('conclusion')=='failure'],
              } for job in jobs.get('jobs',[])],
          }
          Path('runtime_reports/mlb_final_deployment_status_latest.json').write_text(json.dumps(result,indent=2,default=str)+'\n')
          print(json.dumps(result,indent=2,default=str))
          PY
      - name: Commit status
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_final_deployment_status_latest.json || true
          git commit -m "Persist final MLB deployment status" || true
          git pull --rebase --autostash origin main || true
          git push || true

# final status check 2026-07-13T00:10Z
