name: MLB Hot Pull Recovery

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/mlb_recover_hot_pull_and_predict.py"
      - ".github/workflows/mlb-hot-pull-recovery.yml"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: mlb-hot-pull-recovery
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Recover MLB HOT pull and predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORTSDATAIO_API_KEY: ${{ secrets.SPORTSDATAIO_API_KEY }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INQSI_REQUIRE_SPORTSDATAIO_FINAL_GATE: "true"
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          mkdir -p runtime_reports
          python scripts/mlb_recover_hot_pull_and_predict.py

      - name: Commit recovery proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_hot_pull_recovery_latest.json || true
          if git diff --cached --quiet; then
            echo "No MLB recovery proof changes to commit."
          else
            git commit -m "Update MLB hot pull recovery proof"
            git pull --rebase --autostash origin main || true
            git push || true
          fi
