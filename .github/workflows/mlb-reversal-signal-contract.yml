name: MLB Reversal Signal Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'hello_world/mlb_temporal_features_v1.py'
      - 'hello_world/mlb_reversal_similarity_v2.py'
      - 'hello_world/mlb_signal_validation_registry_v1.py'
      - 'hello_world/mlb_precision_admission_gate_v1.py'
      - 'hello_world/mlb_reversal_precision_runtime_patch.py'
      - 'hello_world/mlb_official_lock_quality_gate.py'
      - 'hello_world/mlb_accuracy_target_policy_v1.py'
      - 'hello_world/mlb_ml_runtime_install_v3.py'
      - 'tests/unit/test_mlb_temporal_features_v2.py'
      - 'tests/unit/test_mlb_reversal_similarity_v2.py'
      - 'tests/unit/test_mlb_precision_admission_gate_v1.py'
      - 'tests/unit/test_mlb_official_lock_precision_gate_v2.py'
      - 'tests/unit/test_mlb_reversal_precision_runtime_patch.py'
      - '.github/workflows/mlb-reversal-signal-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-reversal-signal-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install focused test runtime
        run: python -m pip install --quiet "pytest>=8,<9"

      - name: Compile reversal and precision modules
        run: |
          python -m py_compile \
            hello_world/mlb_temporal_features_v1.py \
            hello_world/mlb_reversal_similarity_v2.py \
            hello_world/mlb_signal_validation_registry_v1.py \
            hello_world/mlb_precision_admission_gate_v1.py \
            hello_world/mlb_reversal_precision_runtime_patch.py \
            hello_world/mlb_official_lock_quality_gate.py \
            hello_world/mlb_accuracy_target_policy_v1.py \
            hello_world/mlb_ml_runtime_install_v3.py

      - name: Verify reversal measurement, similarity, admission, and live abstention
        run: |
          python -m pytest -q \
            tests/unit/test_mlb_temporal_features_v2.py \
            tests/unit/test_mlb_reversal_similarity_v2.py \
            tests/unit/test_mlb_precision_admission_gate_v1.py \
            tests/unit/test_mlb_official_lock_precision_gate_v2.py \
            tests/unit/test_mlb_reversal_precision_runtime_patch.py

  production-component:
    name: production-component (${{ matrix.script }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - scripts/verify_mlb_complete_slate_coverage.py
          - scripts/verify_mlb_immutable_locked_storage.py
          - scripts/verify_mlb_daily_lock_ml_vector_preservation.py
          - scripts/verify_mlb_accuracy_target_separation.py
          - scripts/verify_mlb_ml_optimization_v3.py
          - scripts/verify_mlb_ml_promotion_safety.py
          - scripts/verify_mlb_ml_feature_integrity.py
          - scripts/verify_mlb_temporal_missingness_features.py
          - scripts/verify_mlb_per_game_lock.py
          - scripts/verify_mlb_locked_storage_finalizer.py
          - scripts/verify_mlb_ml_installation_1_5.py
          - scripts/verify_mlb_ml_training_readiness.py
          - scripts/verify_mlb_yesterday_audit_immutable_source.py
          - scripts/verify_api_function_mlb_v3_import.py
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install invariant runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Run named production component
        run: python "${{ matrix.script }}"
