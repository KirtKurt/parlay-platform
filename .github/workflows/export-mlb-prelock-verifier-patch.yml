name: Export MLB Prelock Verifier Patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/export-mlb-prelock-verifier-patch.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-prelock-verifier-20260723
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'
      - name: Materialize and verify exact files
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/apply_mlb_prelock_verifier_fix.py
          python -m py_compile hello_world/mlb_production_verifier.py
          python -m pytest -q \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py \
            tests/unit/test_mlb_production_verifier_per_game.py \
            tests/unit/test_mlb_production_verifier_authority.py
          mkdir -p /tmp/mlb-prelock-verifier-patch/hello_world
          mkdir -p /tmp/mlb-prelock-verifier-patch/tests/unit
          mkdir -p /tmp/mlb-prelock-verifier-patch/.github/workflows
          cp hello_world/mlb_production_verifier.py /tmp/mlb-prelock-verifier-patch/hello_world/
          cp tests/unit/test_mlb_production_verifier_prelock_quiet.py /tmp/mlb-prelock-verifier-patch/tests/unit/
          cp .github/workflows/mlb-production-source-contract.yml /tmp/mlb-prelock-verifier-patch/.github/workflows/
      - uses: actions/upload-artifact@v4
        with:
          name: mlb-prelock-verifier-patch-${{ github.run_id }}
          path: /tmp/mlb-prelock-verifier-patch/
          if-no-files-found: error
