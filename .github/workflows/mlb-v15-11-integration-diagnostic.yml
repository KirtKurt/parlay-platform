name: MLB V15.11 integration diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - "hello_world/mlb_historical_*"
      - "hello_world/mlb_ranked_primary_v15_10.py"
      - "hello_world/mlb_ml_runtime_install_v3*"
      - "hello_world/mlb_v3_read_api*"
      - "tests/unit/test_mlb_historical_*"
      - "mlb_historical_optimizer/**"
      - ".github/workflows/mlb-v15-11-integration-diagnostic.yml"
  push:
    branches:
      - agent/mlb-v15-11-historical-only-cutover
  workflow_dispatch:

permissions:
  contents: read

env:
  SAM_CLI_TELEMETRY: "0"

jobs:
  focused-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<10"
      - name: Run V15.11 focused tests
        run: |
          set +e
          python -m pytest -q \
            tests/unit/test_mlb_historical_policy_v1.py \
            tests/unit/test_mlb_historical_daily_optimizer_v1.py \
            tests/unit/test_mlb_historical_optimizer_handler.py \
            tests/unit/test_mlb_historical_read_api_contract.py \
            > focused-tests.log 2>&1
          code=$?
          cat focused-tests.log
          exit "$code"
      - name: Upload focused-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-11-focused-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: focused-tests.log
          if-no-files-found: error

  legacy-ranked-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9"
      - name: Run incumbent integration contracts
        run: |
          set +e
          python -m pytest -q \
            tests/unit/test_mlb_ranked_primary_v15_10.py \
            tests/unit/test_mlb_ml_runtime_install_explicit.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_prediction_probability_contract_v1.py \
            tests/unit/test_mlb_probability_actionability_guard.py \
            > legacy-contract.log 2>&1
          code=$?
          cat legacy-contract.log
          exit "$code"
      - name: Upload legacy-contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-11-legacy-contract-${{ github.run_id }}-${{ github.run_attempt }}
          path: legacy-contract.log
          if-no-files-found: error

  source-assertions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile changed Python
        run: |
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py \
            hello_world/mlb_ranked_primary_v15_10.py \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_v3_read_api.py
      - name: Verify constants and wiring
        run: |
          set +e
          {
            PYTHONPATH=hello_world python - <<'PY'
          import mlb_historical_daily_optimizer_v1 as optimizer
          import mlb_historical_policy_v1 as policy
          assert policy.CHAMPION_PK == "MLB_HISTORICAL_CHAMPION#V1"
          assert policy.CUTOVER_PK == "MLB_HISTORICAL_PRODUCTION_CUTOVER#V1"
          assert policy.CUTOVER_SK == "PRODUCTION_CUTOVER"
          assert policy.MIN_TRAINING_GAMES == 1000
          assert policy.MIN_WALK_FORWARD_GAMES == 200
          assert policy.MIN_UNTOUCHED_AUDIT_GAMES == 200
          assert optimizer.PULL_START_ET == "01:00"
          assert optimizer.PULL_INTERVAL_MINUTES == 15
          assert policy.MIN_DAILY_ACCURACY == 0.80
          assert policy.TARGET_DAILY_ACCURACY_HIGH == 0.90
          PY
            grep -Fq "mlb_historical_policy_v1.apply_runtime_authority" hello_world/mlb_ranked_primary_v15_10.py
            grep -Fq "DeleteLeaseOnlyFromOptimizerStatePartition" mlb_historical_optimizer/template.yaml
          } > source-assertions.log 2>&1
          code=$?
          cat source-assertions.log
          exit "$code"
      - name: Upload source-assertion diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-11-source-assertions-${{ github.run_id }}-${{ github.run_attempt }}
          path: source-assertions.log
          if-no-files-found: error

  historical-sam-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - name: Install cfn-lint
        run: python -m pip install --quiet "cfn-lint>=1,<2"
      - name: Validate historical optimizer template with lint
        run: sam validate --lint --template-file mlb_historical_optimizer/template.yaml

  historical-sam-plain-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/setup-sam@v2
      - name: Capture plain SAM validation output
        run: |
          set +e
          sam validate --template-file mlb_historical_optimizer/template.yaml > historical-sam-plain-validate.log 2>&1
          code=$?
          cat historical-sam-plain-validate.log
          exit "$code"
      - name: Upload plain-validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-11-historical-sam-plain-validate-${{ github.run_id }}-${{ github.run_attempt }}
          path: historical-sam-plain-validate.log
          if-no-files-found: error

  root-sam-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - name: Validate root template
        run: sam validate --template-file template.yaml

  historical-sam-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/setup-sam@v2
      - name: Build historical optimizer
        run: |
          set +e
          sam build --no-cached --build-dir .aws-sam-historical --template-file mlb_historical_optimizer/template.yaml > historical-sam-build.log 2>&1
          code=$?
          cat historical-sam-build.log
          exit "$code"
      - name: Upload historical SAM build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-11-historical-sam-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: historical-sam-build.log
          if-no-files-found: error
