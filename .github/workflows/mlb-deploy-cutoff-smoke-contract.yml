name: MLB Deploy Cutoff Smoke Contract

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/mlb-deploy-cutoff-smoke-contract.yml'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/mlb-deploy-cutoff-smoke-contract.yml'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-deploy-cutoff-smoke-contract-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test runtime
        run: python -m pip install --quiet 'pytest>=8,<9'

      - name: Verify cutoff-aware historical lifecycle policy
        run: |
          python -m pytest -q tests/unit/test_mlb_deploy_cutoff_smoke_policy.py
          python -m py_compile scripts/mlb_deploy_cutoff_smoke_policy.py
