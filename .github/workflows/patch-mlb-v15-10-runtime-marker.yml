name: Patch MLB V15.10 runtime authority marker

on:
  push:
    branches: [agent/mlb-ranked-winner-v15-10-production]
    paths:
      - ".github/workflows/patch-mlb-v15-10-runtime-marker.yml"

permissions:
  contents: write

concurrency:
  group: patch-mlb-v15-10-runtime-marker
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mlb-ranked-winner-v15-10-production
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply runtime and exact-test identity update
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          runtime = Path("hello_world/mlb_ml_runtime_install_v3.py")
          text = runtime.read_text(encoding="utf-8")
          old = '    "prelock-persistence-verified-active-model-authority"\n'
          new = (
              '    "prelock-persistence-verified-stage-promotion-authority-"\n'
              '    "verified-active-model-authority"\n'
          )
          if text.count(old) != 1:
              raise SystemExit(
                  f"runtime marker replacement count was {text.count(old)}, expected 1"
              )
          runtime.write_text(text.replace(old, new), encoding="utf-8")

          test_path = Path("tests/unit/test_mlb_ml_runtime_install_explicit.py")
          test_text = test_path.read_text(encoding="utf-8")
          test_old = '            "prelock-persistence-verified-active-model-authority"\n'
          test_new = (
              '            "prelock-persistence-verified-stage-promotion-authority-"\n'
              '            "verified-active-model-authority"\n'
          )
          if test_text.count(test_old) != 1:
              raise SystemExit(
                  f"test marker replacement count was {test_text.count(test_old)}, expected 1"
              )
          test_path.write_text(
              test_text.replace(test_old, test_new), encoding="utf-8"
          )
          PY

      - name: Validate runtime identity and authority contracts
        run: |
          set -euo pipefail
          python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9"
          python -m pytest -q \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_ranked_primary_v15_10.py \
            tests/unit/test_mlb_ml_runtime_install_explicit.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_prediction_probability_contract_v1.py \
            tests/unit/test_mlb_probability_actionability_guard.py
          python -m py_compile hello_world/mlb_ml_runtime_install_v3.py
          git diff --check

      - name: Commit verified runtime files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            hello_world/mlb_ml_runtime_install_v3.py \
            tests/unit/test_mlb_ml_runtime_install_explicit.py
          git diff --cached --exit-code && {
            echo "::error::Expected runtime identity changes were not staged"
            exit 1
          } || true
          git commit -m "Preserve MLB pre-lock authority marker in V15.10 runtime"
          git pull --rebase origin agent/mlb-ranked-winner-v15-10-production
          git push origin HEAD:agent/mlb-ranked-winner-v15-10-production
