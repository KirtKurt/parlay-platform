name: Promote MLB ML Champion

on:
  workflow_dispatch:
    inputs:
      authority:
        description: Production authority to grant after review
        required: true
        type: choice
        options:
          - direction
          - playability
          - both
      confirmation:
        description: Type PROMOTE_REVIEWED_CHALLENGER
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3
      - name: Verify ML v3 architecture
        run: python scripts/verify_mlb_ml_optimization_v3.py
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Promote latest reviewed challenger in DynamoDB
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: python scripts/promote_mlb_ml_champion.py --authority "${{ inputs.authority }}" --confirm "${{ inputs.confirmation }}"
