name: MLB ML Promotion Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-github-cannot-promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify V2 promotion policy remains manual-first
        run: |
          set -euo pipefail
          python -m pip install --quiet "pytest>=8,<9"
          python -m pytest -q tests/unit/test_mlb_ml_promotion_policy_v2.py
      - name: Explain the reviewed AWS-native path
        run: |
          echo "GitHub has no MLB champion write authority."
          echo "The first V2 promotion requires an exact artifact/manifest digest review and an authenticated AWS-native approval record."
