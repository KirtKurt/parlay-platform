name: Promote MLB ML Champion

on:
  workflow_dispatch:
    inputs:
      role:
        description: Challenger role to promote
        required: true
        type: choice
        options:
          - outcome
          - reliability
      confirmation:
        description: Type PROMOTE_REVIEWED_CHALLENGER
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify ML v3 architecture
        run: python scripts/verify_mlb_ml_training_v3.py
      - name: Promote reviewed challenger
        run: python scripts/promote_mlb_ml_champion.py --role "${{ inputs.role }}" --confirm "${{ inputs.confirmation }}"
      - name: Commit champion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_ml_outcome_champion.json runtime_reports/mlb_ml_model_latest.json
          git commit -m "Promote reviewed MLB ML ${{ inputs.role }} champion"
          git pull --rebase --autostash origin main
          git push
