name: Benchmark MLB lock-status snapshot hotpath

on:
  push:
    branches:
      - agent/benchmark-mlb-lock-status-snapshot-hotpath
    paths:
      - .github/workflows/benchmark_mlb_lock_status_snapshot_hotpath.yml

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact benchmark branch
        uses: actions/checkout@v4
        with:
          ref: agent/benchmark-mlb-lock-status-snapshot-hotpath
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install runtime libraries
        shell: bash
        run: python -m pip install --disable-pip-version-check --quiet boto3 requests

      - name: Run read-only exact-payload A/B benchmark
        env:
          AWS_MAX_ATTEMPTS: "1"
          FUNCTION_NAME: parlay-platform-dev-MLBDailyPickLockFunction-BQIhMFw1k5YP
          BASE_SHA: eb0dc7fe964d6d206cf9510d2b1d202246a128ca
          CANDIDATE_SHA: 286cd6ba782366bdf2a3a7c1d7b401f1e9424921
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/baseline "$BASE_SHA"
          git worktree add --detach /tmp/candidate "$CANDIDATE_SHA"
          aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Environment.Variables' \
            --output json >/tmp/function_env.json

          cat >/tmp/run_status.py <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import sys
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          source_root = Path(sys.argv[1]).resolve()
          output_root = Path(sys.argv[2]).resolve()
          label = sys.argv[3]
          function_env = json.loads(
              Path('/tmp/function_env.json').read_text(encoding='utf-8')
          )
          for key, value in function_env.items():
              os.environ[str(key)] = str(value)
          sys.path.insert(0, str(source_root / 'hello_world'))

          import mlb_daily_per_game_lock_patch as patch
          import mlb_daily_pick_lock as module

          patch.apply(module)
          fixed_now = datetime(2026, 7, 22, 4, 30, tzinfo=timezone.utc)
          module._now_utc = lambda: fixed_now

          started = time.perf_counter()
          payload = module._status_payload('2026-07-21')
          elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)
          canonical = json.dumps(
              payload,
              sort_keys=True,
              separators=(',', ':'),
              default=str,
          )
          payload_path = output_root / f'{label}_payload.json'
          payload_path.write_text(canonical + '\n', encoding='utf-8')
          summary_fields = (
              'ok', 'sport', 'slateDateEt', 'pullCount', 'gameCount',
              'stagedGameCount', 'canonicalImmutableGameRowCount',
              'lockedPredictionCount', 'lockedStatusCount',
              'noPredictionDataCount', 'playabilityValidationErrorCount',
              'playabilityLifecycleErrorCount', 'operationalDefect',
              'officialScheduleBacked',
          )
          result = {
              'label': label,
              'elapsedMs': elapsed_ms,
              'payloadBytes': len(canonical.encode('utf-8')),
              'payloadSha256': hashlib.sha256(
                  canonical.encode('utf-8')
              ).hexdigest(),
              'payloadSummary': {
                  key: payload.get(key)
                  for key in summary_fields
                  if isinstance(payload, dict) and key in payload
              },
          }
          (output_root / f'{label}_result.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

          timeout 300 python /tmp/run_status.py /tmp/baseline /tmp baseline
          timeout 180 python /tmp/run_status.py /tmp/candidate /tmp candidate

          BASE_SHA="$BASE_SHA" CANDIDATE_SHA="$CANDIDATE_SHA" python - <<'PY'
          import json
          import os
          from pathlib import Path

          baseline = json.loads(
              Path('/tmp/baseline_result.json').read_text(encoding='utf-8')
          )
          candidate = json.loads(
              Path('/tmp/candidate_result.json').read_text(encoding='utf-8')
          )
          baseline_payload = Path('/tmp/baseline_payload.json').read_text(
              encoding='utf-8'
          )
          candidate_payload = Path('/tmp/candidate_payload.json').read_text(
              encoding='utf-8'
          )
          payload_equal = baseline_payload == candidate_payload
          baseline_ms = float(baseline['elapsedMs'])
          candidate_ms = float(candidate['elapsedMs'])
          report = {
              'readOnly': True,
              'slateDateEt': '2026-07-21',
              'fixedNowUtc': '2026-07-22T04:30:00+00:00',
              'baseSha': os.environ['BASE_SHA'],
              'candidateSha': os.environ['CANDIDATE_SHA'],
              'payloadEqual': payload_equal,
              'baseline': baseline,
              'candidate': candidate,
              'elapsedReductionMs': round(baseline_ms - candidate_ms, 3),
              'speedupX': round(
                  baseline_ms / candidate_ms,
                  3,
              ) if candidate_ms > 0 else None,
              'candidateUnderTwentyFiveSeconds': candidate_ms < 25000.0,
              'gatePassed': bool(
                  payload_equal
                  and candidate_ms < 25000.0
                  and baseline['payloadSha256'] == candidate['payloadSha256']
              ),
          }
          Path('mlb_lock_status_snapshot_hotpath_benchmark.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          Path('/tmp/benchmark_gate.txt').write_text(
              'pass\n' if report['gatePassed'] else 'fail\n',
              encoding='utf-8',
          )
          PY

      - name: Publish sanitized benchmark and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/benchmark_mlb_lock_status_snapshot_hotpath.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record MLB lock-status snapshot hotpath benchmark"
          git push origin HEAD:agent/benchmark-mlb-lock-status-snapshot-hotpath

      - name: Enforce payload and timing benchmark gates
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat /tmp/benchmark_gate.txt)" = "pass"
