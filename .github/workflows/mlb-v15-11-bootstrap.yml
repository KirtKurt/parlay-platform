name: MLB V15.11 Historical Daily Optimizer

"on":
  pull_request:
    branches: [main]
    paths:
      - 'bootstrap/mlb-v15-11.tar.xz.b64.part*'
      - '.github/workflows/mlb-v15-11-bootstrap.yml'
  push:
    branches: [main]
    paths:
      - 'bootstrap/mlb-v15-11.tar.xz.b64.part*'
      - '.github/workflows/mlb-v15-11-bootstrap.yml'
  workflow_dispatch:
    inputs:
      deploy_runtime_and_optimizer:
        description: Deploy the fail-closed runtime guard and historical optimizer stack
        type: boolean
        default: false
      deploy_confirmation:
        description: Type DEPLOY_MLB_V15_11_FAIL_CLOSED
        type: string
        default: ''
      execute_paid_backfill:
        description: Authorize the exact passing ledger and start historical ingestion
        type: boolean
        default: false
      paid_authorization:
        description: Type AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS
        type: string
        default: ''
      retirement_confirmation:
        description: Type RETIRE_V15_10_ONLY_AFTER_DAILY_80_GATE
        type: string
        default: ''
      maximum_credits:
        description: Hard credit cap for the historical program
        type: string
        default: '120000'
      maximum_candidates:
        description: Candidate combinations evaluated per optimization round
        type: string
        default: '25000'

permissions:
  contents: read

concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: false

env:
  SOURCE_ARCHIVE_SHA256: b73576b5d75def32612017bfb14b1c1768eef0ce91a608cc0c9c0cc4d66774a2
  HISTORICAL_START_DATE: '2025-04-01'
  HISTORICAL_END_DATE: '2025-08-31'
  HISTORICAL_TARGET_GAMES: '1600'
  HISTORICAL_MAX_CREDITS: ${{ inputs.maximum_credits || '120000' }}
  HISTORICAL_MAX_CANDIDATES: ${{ inputs.maximum_candidates || '25000' }}
  DEPLOY_AUTHORIZED: ${{ (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_runtime_and_optimizer == true && inputs.deploy_confirmation == 'DEPLOY_MLB_V15_11_FAIL_CLOSED') }}
  PAID_AUTHORIZED: ${{ (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]') && contains(github.event.head_commit.message, '[authorize-mlb-historical-backfill]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_runtime_and_optimizer == true && inputs.execute_paid_backfill == true && inputs.deploy_confirmation == 'DEPLOY_MLB_V15_11_FAIL_CLOSED' && inputs.paid_authorization == 'AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS' && inputs.retirement_confirmation == 'RETIRE_V15_10_ONLY_AFTER_DAILY_80_GATE') }}

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Materialize checksum-verified V15.11 source
        shell: bash
        run: |
          set -euo pipefail
          test "$(find bootstrap -maxdepth 1 -type f -name 'mlb-v15-11.tar.xz.b64.part*' | wc -l)" -eq 5
          cat bootstrap/mlb-v15-11.tar.xz.b64.part* > /tmp/mlb-v15-11.tar.xz.b64
          base64 --decode /tmp/mlb-v15-11.tar.xz.b64 > /tmp/mlb-v15-11.tar.xz
          echo "${SOURCE_ARCHIVE_SHA256}  /tmp/mlb-v15-11.tar.xz" | sha256sum -c -
          tar -tJf /tmp/mlb-v15-11.tar.xz > /tmp/mlb-v15-11-manifest.txt
          test "$(wc -l < /tmp/mlb-v15-11-manifest.txt)" -eq 13
          ! grep -Eq '(^|/)\.\.(/|$)|^/' /tmp/mlb-v15-11-manifest.txt
          tar -xJf /tmp/mlb-v15-11.tar.xz -C .
          cat > /tmp/source-sha256.txt <<'SHA256'
          02723f6b023d6ffe79c675184d7e00d9677959e76cdab08633018033acca1fd2  .github/workflows/mlb-historical-optimizer.yml
          8c41cc94e64bbe7b82667f519a99ef224a78ab31c5b8c30a643d07af49a5ecc6  docs/MLB_HISTORICAL_DAILY_OPTIMIZER_V15_11.md
          01a24fa2f8c03d88b8f8fbb261b270d0f09ddea9bc92c29c0454644cbcabe516  hello_world/mlb_historical_daily_optimizer_v1.py
          b003aa39f049875a614ae27d7bffb689af484488253002040803d01fc1f419c2  hello_world/mlb_historical_optimizer_handler.py
          034f032eefa87dd287784b2fc407eed42fe230cd3ce7d274f9cfa2200d198db6  hello_world/mlb_historical_policy_v1.py
          967a6e5a3a0bb02bd39a7b2fc19ba75f8ab3bb443eb75d93ea7105e364d21d09  hello_world/mlb_ml_runtime_install_v3.py
          64849d2fa859ec946299dffac933e641f58ca31b2861a863513fe22696032e0d  hello_world/mlb_ranked_primary_v15_10.py
          ed6856092a1c6e670f2eb5185a4df47a2c2856e670f54f4339e8badced9a9d9a  hello_world/mlb_v3_read_api.py
          68c2d9d6190d71ae3eedf83a91174357b0ce4c36b0c932136f5002ac2f8d02eb  mlb_historical_optimizer/template.yaml
          ac8a3a1a3acc687ac916389e156abba6f9675f07a1b590b01023d80727bb2910  tests/unit/test_mlb_historical_daily_optimizer_v1.py
          903b77effd233d2167aa3514df96c24eb2b6960dd9b7fe25756602ea2a384adc  tests/unit/test_mlb_historical_optimizer_handler.py
          98aa78eb1c1a8c0eb4ba5d7c3ea1517e99373e1f44e058eaa1ef1d7104713bc4  tests/unit/test_mlb_historical_policy_v1.py
          94f916ef5d6bda06af9b1292985eb243ea95af3d36c00def65e27d844860af90  tests/unit/test_mlb_historical_read_api_contract.py
          SHA256
          sha256sum -c /tmp/source-sha256.txt

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2

      - name: Validate historical, overfit, and authority contracts
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet --disable-pip-version-check \
            'boto3>=1.34,<2' 'requests>=2.31,<3' 'pytest>=8,<9' 'cfn-lint>=1,<2'
          tests=(
            tests/unit/test_mlb_historical_policy_v1.py
            tests/unit/test_mlb_historical_daily_optimizer_v1.py
            tests/unit/test_mlb_historical_optimizer_handler.py
            tests/unit/test_mlb_historical_read_api_contract.py
          )
          [ ! -f tests/unit/test_mlb_ranked_primary_v15_10.py ] || tests+=(tests/unit/test_mlb_ranked_primary_v15_10.py)
          PYTHONPATH=hello_world python -m pytest -q "${tests[@]}"
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py \
            hello_world/mlb_ranked_primary_v15_10.py \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_v3_read_api.py
          grep -Fq 'mlb_historical_policy_v1.apply_runtime_authority' hello_world/mlb_ranked_primary_v15_10.py
          grep -Fq 'MIN_TRAINING_GAMES = 1000' hello_world/mlb_historical_daily_optimizer_v1.py
          grep -Fq 'MIN_DAILY_ACCURACY = 0.80' hello_world/mlb_historical_daily_optimizer_v1.py
          grep -Fq 'legacyFallbackAllowed' hello_world/mlb_historical_policy_v1.py
          sam validate --lint --template-file mlb_historical_optimizer/template.yaml
          sam validate --template-file template.yaml
          rm -rf .aws-sam-historical .aws-sam-runtime
          sam build --no-cached --build-dir .aws-sam-historical --template-file mlb_historical_optimizer/template.yaml
          sam build --no-cached --build-dir .aws-sam-runtime --template-file template.yaml
          INQSI_MLB_LAMBDA_TASK_ROOT=.aws-sam-runtime/MLBV3ReadFunction \
            PYTHONDONTWRITEBYTECODE=1 \
            python scripts/verify_api_function_mlb_v3_import.py

      - uses: aws-actions/configure-aws-credentials@v4
        if: env.DEPLOY_AUTHORIZED == 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify production credentials and explicit release scope
        if: env.DEPLOY_AUTHORIZED == 'true'
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}"
          test -n "${BBS_API_KEY_VALUE:-}"
          test -n "${INQSI_ADMIN_API_TOKEN_VALUE:-}"
          [[ "${HISTORICAL_MAX_CREDITS}" =~ ^[0-9]+$ ]]
          [[ "${HISTORICAL_MAX_CANDIDATES}" =~ ^[0-9]+$ ]]

      - name: Wait for production stack to become updateable
        if: env.DEPLOY_AUTHORIZED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 80); do
            status=$(aws cloudformation describe-stacks \
              --stack-name parlay-platform-dev \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo STACK_NOT_FOUND)
            case "$status" in
              STACK_NOT_FOUND|CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_COMPLETE|IMPORT_ROLLBACK_COMPLETE) exit 0 ;;
              *_IN_PROGRESS) sleep 15 ;;
              *) echo "::error::Production stack is not updateable: $status"; exit 1 ;;
            esac
          done
          echo '::error::Timed out waiting for production stack'; exit 1

      - name: Deploy fail-closed authority loader into production MLB runtime
        if: env.DEPLOY_AUTHORIZED == 'true'
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          template_sha=$(sha256sum template.yaml | awk '{print $1}')
          sam deploy \
            --template-file .aws-sam-runtime/template.yaml \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM --resolve-s3 --force-upload \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OddsApiKey=${ODDS_API_KEY_VALUE}" \
              "BbsApiKey=${BBS_API_KEY_VALUE}" \
              "InqsiAdminApiToken=${INQSI_ADMIN_API_TOKEN_VALUE}" \
              "DeployGitSha=${GITHUB_SHA}" \
              "DeployTemplateSha256=${template_sha}" \
              "DeployRunId=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-mlb-v15-11"

      - name: Prove runtime is coherent and cannot silently restore V15.10 after cutover
        if: env.DEPLOY_AUTHORIZED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          api_url=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          curl --fail --silent --show-error --max-time 60 \
            "${api_url%/}/v1/mlb/model/version" -o /tmp/mlb-runtime.json
          python - <<'PY'
          import json
          from pathlib import Path
          value=json.loads(Path('/tmp/mlb-runtime.json').read_text())
          if value.get('ok') is not True or value.get('historicalAuthorityStateCoherent') is not True:
              raise SystemExit('deployed MLB runtime is unhealthy or incoherent')
          if value.get('legacyFallbackAllowed') is not False or value.get('automaticWagerAllowed') is not False:
              raise SystemExit('forbidden fallback or automatic wagering is enabled')
          if value.get('historicalProductionCutoverActive') is True:
              if value.get('historicalDailyChampionActive') is not True:
                  raise SystemExit('cutover exists without champion')
              if value.get('incumbentProductionAuthorityDestroyed') is not True:
                  raise SystemExit('legacy production authority remains after cutover')
          PY

      - name: Deploy historical optimizer and build free quota plan
        if: env.DEPLOY_AUTHORIZED == 'true'
        id: plan
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          sam deploy \
            --template-file .aws-sam-historical/template.yaml \
            --stack-name parlay-platform-mlb-historical-optimizer \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM --resolve-s3 --force-upload \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OddsApiKey=${ODDS_API_KEY_VALUE}" \
              "TargetSnapshotsTable=parlay_platform_snapshots" \
              "HistoricalStartDate=${HISTORICAL_START_DATE}" \
              "HistoricalEndDate=${HISTORICAL_END_DATE}" \
              "HistoricalTargetGames=${HISTORICAL_TARGET_GAMES}" \
              "HistoricalMaxCredits=${HISTORICAL_MAX_CREDITS}" \
              "HistoricalRequestsPerRun=25" \
              "HistoricalMaxCandidates=${HISTORICAL_MAX_CANDIDATES}" \
              "HistoricalMaxOptimizationRounds=6" \
              "HistoricalFreshAuditIncrementGames=250" \
              "DeployGitSha=${GITHUB_SHA}"
          function_name=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-mlb-historical-optimizer \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='HistoricalOptimizerFunctionName'].OutputValue" \
            --output text)
          test -n "$function_name"; test "$function_name" != None
          echo "function_name=$function_name" >> "$GITHUB_OUTPUT"
          aws lambda invoke --function-name "$function_name" --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"initialize","run":"v15_11_release_initialize"}' \
            /tmp/mlb-historical-initialize.json
          aws lambda invoke --function-name "$function_name" --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"plan","run":"v15_11_free_full_range_plan"}' \
            /tmp/mlb-historical-plan.json
          python - <<'PY'
          import json, os
          from pathlib import Path
          payload=json.loads(Path('/tmp/mlb-historical-plan.json').read_text())
          if payload.get('ok') is not True:
              raise SystemExit('historical planning failed')
          state=payload.get('state') or {}
          plan=payload.get('plan') or state.get('plan') or {}
          expected={
              'targetSettledGames':1600,
              'minimumTrainingGames':1000,
              'minimumWalkForwardGames':200,
              'minimumUntouchedAuditGames':200,
              'snapshotStartAtEt':'01:00',
              'snapshotIntervalMinutes':15,
          }
          for key, wanted in expected.items():
              if state.get(key) != wanted:
                  raise SystemExit(f'{key} mismatch: {state.get(key)!r}')
          if float(state.get('dailyAccuracyRequirement') or 0) < 0.80:
              raise SystemExit('daily 80 percent requirement missing')
          if plan.get('paidHistoricalCallsMadeByPlan') != 0:
              raise SystemExit('free plan made a paid historical call')
          if plan.get('completeDateRangeLedger') is not True or plan.get('rejectedDates'):
              raise SystemExit('historical ledger is incomplete')
          if int(plan.get('maximumAuthorizedOfficialGames') or 0) < 1600:
              raise SystemExit('authorized game ledger is below target')
          if not plan.get('fingerprint'):
              raise SystemExit('plan fingerprint missing')
          phase=str(state.get('phase') or '')
          authorizable=phase == 'READY_FOR_AUTHORIZATION'
          resumable=state.get('paidBackfillAuthorized') is True and phase in {
              'BACKFILLING','OPTIMIZING','PAUSED_QUOTA','CANDIDATE_REJECTED',
              'DATA_RANGE_EXHAUSTED','PROMOTED'
          }
          with open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8') as handle:
              handle.write(f"fingerprint={plan['fingerprint']}\n")
              handle.write(f"authorizable={'true' if authorizable else 'false'}\n")
              handle.write(f"resumable={'true' if resumable else 'false'}\n")
          PY

      - name: Authorize exact ledger and start or resume provider-backed optimization
        if: env.PAID_AUTHORIZED == 'true' && (steps.plan.outputs.authorizable == 'true' || steps.plan.outputs.resumable == 'true')
        env:
          FUNCTION_NAME: ${{ steps.plan.outputs.function_name }}
          PLAN_FINGERPRINT: ${{ steps.plan.outputs.fingerprint }}
          AUTHORIZABLE: ${{ steps.plan.outputs.authorizable }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$AUTHORIZABLE" = true ]; then
            python - <<'PY' > /tmp/mlb-authorize-payload.json
          import json, os
          print(json.dumps({
              'mode':'authorize',
              'run':'v15_11_explicit_paid_authorization',
              'confirm':'AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS',
              'planFingerprint':os.environ['PLAN_FINGERPRINT'],
          }))
          PY
            aws lambda invoke --function-name "$FUNCTION_NAME" --region "${{ secrets.AWS_REGION }}" \
              --cli-read-timeout 900 --cli-binary-format raw-in-base64-out \
              --payload fileb:///tmp/mlb-authorize-payload.json /tmp/mlb-authorize.json
          fi
          aws lambda invoke --function-name "$FUNCTION_NAME" --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"orchestrate","run":"v15_11_first_or_resume_batch"}' \
            /tmp/mlb-first-batch.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.loads(Path('/tmp/mlb-first-batch.json').read_text())
          if payload.get('ok') is not True:
              raise SystemExit('historical batch failed')
          state=payload.get('state') or {}
          if state.get('paidBackfillAuthorized') is not True:
              raise SystemExit('paid authorization was not persisted')
          if state.get('phase') not in {'BACKFILLING','OPTIMIZING','PROMOTED','PAUSED_QUOTA','CANDIDATE_REJECTED','DATA_RANGE_EXHAUSTED'}:
              raise SystemExit(f"unexpected phase: {state.get('phase')}")
          PY

      - name: Capture final optimizer status and verify any completed cutover
        if: always() && env.DEPLOY_AUTHORIZED == 'true'
        env:
          FUNCTION_NAME: ${{ steps.plan.outputs.function_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FUNCTION_NAME:-}" ]; then exit 0; fi
          aws lambda invoke --function-name "$FUNCTION_NAME" --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"status","run":"v15_11_post_release_status"}' \
            /tmp/mlb-historical-status.json
          python - <<'PY'
          import json
          from pathlib import Path
          value=json.loads(Path('/tmp/mlb-historical-status.json').read_text())
          state=value.get('state') or {}
          if state.get('phase') != 'PROMOTED':
              print('Not promoted; V15.10 remains incumbent and automatic wagering remains disabled.')
              raise SystemExit(0)
          checks=[
              (value.get('championValidation') or {}).get('ok') is True,
              (value.get('cutoverValidation') or {}).get('ok') is True,
              (value.get('historicalOnlyCutover') or {}).get('historicalOnly') is True,
              (value.get('historicalOnlyCutover') or {}).get('legacyFallbackAllowed') is False,
              (value.get('productionAuthority') or {}).get('historicalChampionOnly') is True,
              (value.get('productionAuthority') or {}).get('incumbentProductionAuthorityDestroyed') is True,
          ]
          if not all(checks):
              raise SystemExit('PROMOTED state violates historical-only cutover invariants')
          PY

      - uses: actions/upload-artifact@v4
        if: always() && env.DEPLOY_AUTHORIZED == 'true'
        with:
          name: mlb-v15-11-release-${{ github.sha }}
          path: |
            /tmp/mlb-runtime.json
            /tmp/mlb-historical-initialize.json
            /tmp/mlb-historical-plan.json
            /tmp/mlb-authorize.json
            /tmp/mlb-first-batch.json
            /tmp/mlb-historical-status.json
          if-no-files-found: warn
          retention-days: 90
