name: Verify Polymarket Tennis pagination

on:
  push:
    branches: [agent/diagnose-tennis-live-coverage-20260723]
    paths: [".github/workflows/probe-polymarket-pagination.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Verify direct tag 864 offset pagination
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet requests
          mkdir -p evidence
          python - <<'PY'
          import json
          from pathlib import Path
          import requests
          base='https://gamma-api.polymarket.com/events'
          session=requests.Session(); session.headers['user-agent']='inqsi-tennis-pagination-proof/1.0'
          pages=[]; all_ids=[]
          for offset in range(0,2000,100):
              r=session.get(base,params={'tag_id':'864','related_tags':'false','active':'true','closed':'false','limit':100,'offset':offset},timeout=45)
              r.raise_for_status(); rows=r.json()
              ids=[str(x.get('id') or '') for x in rows if isinstance(x,dict)]
              pages.append({'offset':offset,'status':r.status_code,'count':len(rows),'firstIds':ids[:5],'lastIds':ids[-5:]})
              all_ids.extend(ids)
              if len(rows)<100: break
          unique=list(dict.fromkeys(all_ids))
          out={'relatedTags':False,'pages':pages,'rawCount':len(all_ids),'uniqueCount':len(unique),'duplicateCount':len(all_ids)-len(unique),'offsetChangesPage':len(pages)<2 or pages[0]['firstIds']!=pages[1]['firstIds'],'complete':bool(pages and pages[-1]['count']<100)}
          Path('evidence/pagination.json').write_text(json.dumps(out,indent=2,sort_keys=True))
          print(json.dumps(out,indent=2,sort_keys=True))
          assert out['offsetChangesPage'] is True
          assert out['complete'] is True
          assert out['duplicateCount'] == 0
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: polymarket-tennis-pagination-${{ github.run_id }}
          retention-days: 14
          path: evidence/
