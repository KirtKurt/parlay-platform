name: Report exact-main deploy 52b0ee85

on:
  push:
    branches:
      - agent/report-mlb-deploy-52b0ee85
    paths:
      - .github/workflows/report_exact_main_deploy_52b0ee85.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-52b0ee85
          fetch-depth: 0

      - name: Locate exact-main deployment run
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 52b0ee85c5d7e12f8f4e18406c961e6b71d04eb4
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          api = os.environ['GITHUB_API_URL'].rstrip('/')
          token = os.environ['GH_TOKEN']
          target_sha = os.environ['TARGET_SHA']

          def get(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'parlay-platform-exact-deploy-reporter/2.0',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          selected = None
          for _ in range(90):
              query = urllib.parse.urlencode({
                  'head_sha': target_sha,
                  'event': 'push',
                  'per_page': 100,
              })
              payload = get(f'{api}/repos/{repo}/actions/runs?{query}')
              candidates = [
                  run
                  for run in payload.get('workflow_runs', [])
                  if run.get('head_sha') == target_sha
                  and run.get('event') == 'push'
                  and run.get('name') == 'Deploy SAM to AWS'
              ]
              if candidates:
                  selected = max(candidates, key=lambda run: int(run['id']))
                  break
              time.sleep(4)
          if selected is None:
              raise SystemExit('Exact-main Deploy SAM to AWS run was not found')

          jobs = get(selected['jobs_url'] + '?per_page=100').get('jobs', [])
          report = {
              'targetSha': target_sha,
              'run': {
                  key: selected.get(key)
                  for key in (
                      'id', 'name', 'event', 'status', 'conclusion',
                      'head_branch', 'head_sha', 'run_number', 'run_attempt',
                      'html_url', 'created_at', 'updated_at', 'jobs_url',
                      'artifacts_url',
                  )
              },
              'jobs': [
                  {
                      'id': job.get('id'),
                      'name': job.get('name'),
                      'status': job.get('status'),
                      'conclusion': job.get('conclusion'),
                      'html_url': job.get('html_url'),
                      'steps': [
                          {
                              'number': step.get('number'),
                              'name': step.get('name'),
                              'status': step.get('status'),
                              'conclusion': step.get('conclusion'),
                          }
                          for step in job.get('steps', [])
                      ],
                  }
                  for job in jobs
              ],
          }
          Path('exact_main_deploy_52b0ee85.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Publish sanitized report and remove reporter
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/report_exact_main_deploy_52b0ee85.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record exact-main deployment run 52b0ee85"
          git push origin HEAD:agent/report-mlb-deploy-52b0ee85
