name: Apply MLB deploy heavy-read retry policy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/apply-mlb-deploy-probe-policy.yml"
      - "scripts/.mlb_deploy_probe_policy.patch.b64.*"

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Align with current main
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reconstruct exact reviewed patch
        run: |
          set -euo pipefail
          cat scripts/.mlb_deploy_probe_policy.patch.b64.{1,2,3} \
            | tr -d '\n' \
            | base64 -d > /tmp/mlb-deploy-probe-policy.patch
          echo "e71068bee8dc0489ccfd5a65fc732fac8d18fa09232221c260c867ab97d9587a  /tmp/mlb-deploy-probe-policy.patch" \
            | sha256sum --check
          git apply --check /tmp/mlb-deploy-probe-policy.patch
          git apply /tmp/mlb-deploy-probe-policy.patch

      - name: Install focused verification runtime
        run: python -m pip install --quiet "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Verify retry policy and canonical source fixed point
        env:
          PYTHONPATH: "hello_world:."
        run: |
          set -euo pipefail
          python -m py_compile tests/unit/test_mlb_deploy_heavy_read_retry_policy.py
          python - <<'PY'
          from pathlib import Path
          import yaml
          yaml.safe_load(Path('.github/workflows/deploy.yml').read_text(encoding='utf-8'))
          print('deploy workflow YAML is valid')
          PY
          python -m pytest -q \
            tests/unit/test_mlb_deploy_heavy_read_retry_policy.py \
            tests/unit/test_mlb_deploy_http_probe.py \
            tests/unit/test_mlb_workflow_authority.py
          python scripts/verify_mlb_workflow_authority.py
          cp .github/workflows/deploy.yml /tmp/deploy.before
          python scripts/stabilize_mlb_deploy_source.py
          cmp /tmp/deploy.before .github/workflows/deploy.yml
          git diff --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/deploy.yml',
              'tests/unit/test_mlb_deploy_heavy_read_retry_policy.py',
          }
          lines = subprocess.check_output(
              ['git', 'status', '--porcelain=v1'], text=True
          ).splitlines()
          observed = {line[3:] for line in lines if line.strip()}
          if observed != expected:
              raise SystemExit(
                  f'unexpected candidate diff: expected={sorted(expected)} observed={sorted(observed)}'
              )
          PY

      - name: Commit validated two-file policy change only
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/apply-mlb-deploy-probe-policy.yml \
            scripts/.mlb_deploy_probe_policy.patch.b64.1 \
            scripts/.mlb_deploy_probe_policy.patch.b64.2 \
            scripts/.mlb_deploy_probe_policy.patch.b64.3
          git add \
            .github/workflows/deploy.yml \
            tests/unit/test_mlb_deploy_heavy_read_retry_policy.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Fix MLB deploy heavy-read retry policy"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
