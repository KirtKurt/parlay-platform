name: Apply MLB Persistence Fix

on:
  push:
    branches: [agent/fix-mlb-persistence-v2]
    paths:
      - '.github/workflows/apply-mlb-persistence-fix.yml'
      - 'scripts/apply_mlb_signal_policy_persistence_fix.py'
      - 'hello_world/mlb_signal_policy_persistence_bridge_v1.py'
      - 'tests/unit/test_mlb_signal_policy_persistence_bridge_v1.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-persistence-fix
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-persistence-v2
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verification runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply deterministic source repair
        run: python scripts/apply_mlb_signal_policy_persistence_fix.py

      - name: Verify persistence bridge and protected runtime
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_signal_policy_persistence_bridge_v1.py \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_manual_pull_protected.py \
            scripts/apply_mlb_signal_policy_persistence_fix.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_signal_policy_persistence_bridge_v1.py
          python -m pytest -q \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_signal_policy_persistence_bridge_v1.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py

      - name: Commit canonical repair
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_manual_pull_protected.py \
            hello_world/mlb_signal_policy_persistence_bridge_v1.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_signal_policy_persistence_bridge_v1.py \
            .github/workflows/mlb-production-source-contract.yml
          if git diff --cached --quiet; then
            echo 'Canonical MLB persistence repair already applied.'
          else
            git commit -m 'Restore signal policy before MLB prediction persistence'
            git pull --rebase --autostash origin agent/fix-mlb-persistence-v2
            git push origin HEAD:agent/fix-mlb-persistence-v2
          fi
