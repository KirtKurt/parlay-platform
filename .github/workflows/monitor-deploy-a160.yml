name: Monitor Deploy A160

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/monitor-deploy-a160.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture deployment result
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: a160be9fb6bb11e6b323aa3fd102c3a55e314f10
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          RUN_ID=""
          for i in $(seq 1 60); do
            RUN_ID=$(gh api "/repos/${REPO}/actions/runs?head_sha=${TARGET_SHA}&per_page=100" --jq '.workflow_runs[] | select(.path == ".github/workflows/deploy.yml") | .id' | head -n1)
            [ -n "${RUN_ID:-}" ] && break
            sleep 5
          done
          if [ -z "${RUN_ID:-}" ]; then
            echo '{"ok":false,"error":"deploy run not found"}' > runtime_reports/deploy_a160_diagnostic.json
            exit 0
          fi
          for i in $(seq 1 180); do
            STATUS=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}" --jq '.status')
            [ "$STATUS" = "completed" ] && break
            sleep 5
          done
          gh api "/repos/${REPO}/actions/runs/${RUN_ID}" > runtime_reports/deploy_a160_run.json
          gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" > runtime_reports/deploy_a160_jobs.json
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          repo=os.environ['REPO']
          run=json.load(open('runtime_reports/deploy_a160_run.json'))
          jobs=(json.load(open('runtime_reports/deploy_a160_jobs.json')).get('jobs') or [])
          out={'ok':run.get('conclusion')=='success','runId':run.get('id'),'runNumber':run.get('run_number'),'status':run.get('status'),'conclusion':run.get('conclusion'),'headSha':run.get('head_sha'),'htmlUrl':run.get('html_url'),'jobs':[]}
          for job in jobs:
              entry={'id':job.get('id'),'name':job.get('name'),'status':job.get('status'),'conclusion':job.get('conclusion'),'steps':job.get('steps') or []}
              out['jobs'].append(entry)
              if job.get('conclusion')=='failure':
                  p=Path(f"runtime_reports/deploy_a160_job_{job['id']}.log")
                  with p.open('wb') as fh:
                      subprocess.run(['gh','api',f"/repos/{repo}/actions/jobs/{job['id']}/logs"],stdout=fh,stderr=subprocess.STDOUT,check=False)
          Path('runtime_reports/deploy_a160_diagnostic.json').write_text(json.dumps(out,indent=2)+'\n')
          PY
      - name: Commit deployment proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/deploy_a160_* || true
          git commit -m "Persist deploy a160 proof" || true
          git pull --rebase --autostash origin main || true
          git push || true
