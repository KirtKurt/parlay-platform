name: Observe MLB V15.11.1 Historical Training Chain

"on":
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-v15-11-paid-training-observer.yml'

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      TRIGGER_SHA: ae0d348012f4dfc987a373ca870fcb18e2bca832
      REPORT_ISSUE: '111'
    steps:
      - name: Monitor trigger, recovery, paid optimizer, and accelerator
        run: |
          set -euo pipefail
          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          auth=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          fetch_runs() {
            curl --fail --silent --show-error "${auth[@]}" \
              "${api_root}/actions/runs?per_page=100" > /tmp/mlb-chain-runs.json
          }

          run_by_sha() {
            local name="$1"
            local sha="$2"
            jq -c --arg name "$name" --arg sha "$sha" '
              [.workflow_runs[] | select(.name == $name and .head_sha == $sha)]
              | sort_by(.created_at) | last // empty
            ' /tmp/mlb-chain-runs.json
          }

          run_after() {
            local name="$1"
            local event="$2"
            local created="$3"
            jq -c --arg name "$name" --arg event "$event" --arg created "$created" '
              [.workflow_runs[] | select(.name == $name and .event == $event and .created_at >= $created)]
              | sort_by(.created_at) | last // empty
            ' /tmp/mlb-chain-runs.json
          }

          post_comment() {
            local body="$1"
            jq -n --arg body "$body" '{body:$body}' >/tmp/mlb-chain-comment.json
            if [ -z "${comment_id:-}" ]; then
              curl --fail --silent --show-error -X POST "${auth[@]}" \
                "${api_root}/issues/${REPORT_ISSUE}/comments" \
                --data-binary @/tmp/mlb-chain-comment.json > /tmp/mlb-chain-comment-response.json
              comment_id=$(jq -r '.id' /tmp/mlb-chain-comment-response.json)
              test -n "$comment_id"
              test "$comment_id" != null
            else
              curl --fail --silent --show-error -X PATCH "${auth[@]}" \
                "${api_root}/issues/comments/${comment_id}" \
                --data-binary @/tmp/mlb-chain-comment.json > /tmp/mlb-chain-comment-response.json
            fi
          }

          summarize() {
            local label="$1"
            local row="$2"
            if [ -z "$row" ]; then
              printf '%s' "- ${label}: **not located yet**"
              return
            fi
            local id status conclusion url event
            id=$(jq -r '.id' <<<"$row")
            status=$(jq -r '.status' <<<"$row")
            conclusion=$(jq -r '.conclusion // "pending"' <<<"$row")
            url=$(jq -r '.html_url' <<<"$row")
            event=$(jq -r '.event' <<<"$row")
            printf '%s' "- ${label}: [run ${id}](${url}) — **${status}/${conclusion}** (${event})"
          }

          failure_details() {
            local row="$1"
            local id
            id=$(jq -r '.id' <<<"$row")
            curl --fail --silent --show-error "${auth[@]}" \
              "${api_root}/actions/runs/${id}/jobs?per_page=100" > /tmp/mlb-chain-jobs.json
            jq -r '
              [.jobs[]
                | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")
                | "    - job `" + .name + "`: **" + (.conclusion // .status) + "**; failed step `" +
                  (([.steps[]? | select(.conclusion == "failure") | .name][0]) // "unavailable") + "`"
              ] | join("\n")
            ' /tmp/mlb-chain-jobs.json
          }

          comment_id=''
          trigger=''
          recovery=''
          optimizer=''
          accelerator=''

          for attempt in $(seq 1 1440); do
            fetch_runs
            trigger=$(run_by_sha 'MLB V15.11.1 Accelerated Historical Training' "$TRIGGER_SHA")
            if [ -n "$trigger" ]; then
              trigger_created=$(jq -r '.created_at' <<<"$trigger")
              recovery=$(run_after 'MLB Historical Recovery and Paid Dispatch' workflow_dispatch "$trigger_created")
            fi
            if [ -n "$recovery" ]; then
              recovery_created=$(jq -r '.created_at' <<<"$recovery")
              optimizer=$(run_after 'MLB Historical Daily Optimizer' workflow_dispatch "$recovery_created")
            fi
            if [ -n "$optimizer" ]; then
              optimizer_created=$(jq -r '.created_at' <<<"$optimizer")
              accelerator=$(run_after 'MLB Historical Accelerated Training Driver' workflow_run "$optimizer_created")
            fi

            observed=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            body=$(cat <<EOF
          <!-- mlb-v15-11-training-chain-observer -->
          ## MLB V15.11.1 real historical training chain

          $(summarize 'Dispatch trigger' "$trigger")
          $(summarize 'Rollback recovery / paid dispatch' "$recovery")
          $(summarize 'Historical deploy, plan, and authorization' "$optimizer")
          $(summarize 'Backfill, optimization, untouched audit, and cutover' "$accelerator")

          - Exact trigger SHA: \`${TRIGGER_SHA}\`
          - Last observed: ${observed}
          - Required promotion: **1,000 train + 200 walk-forward + 200 untouched audit; exact complete slates; at least 80% on every held-out date**
          - Production cutover: **not assumed unless the accelerator succeeds and the champion/cutover proofs validate**
          - Automatic wagering: **disabled**
          EOF
          )
            post_comment "$body"

            for row in "$trigger" "$recovery" "$optimizer" "$accelerator"; do
              if [ -n "$row" ] && [ "$(jq -r '.status' <<<"$row")" = completed ]; then
                conclusion=$(jq -r '.conclusion // "failure"' <<<"$row")
                if [ "$conclusion" != success ] && [ "$conclusion" != neutral ] && [ "$conclusion" != skipped ]; then
                  details=$(failure_details "$row")
                  post_comment "${body}

          ### Chain failure
          ${details}"
                  exit 1
                fi
              fi
            done

            if [ -n "$accelerator" ] && [ "$(jq -r '.status' <<<"$accelerator")" = completed ]; then
              test "$(jq -r '.conclusion' <<<"$accelerator")" = success
              exit 0
            fi
            sleep 15
          done

          post_comment "${body}

          ### Observer failure
          Timed out before the real historical training chain reached a terminal accelerator result."
          exit 1
