name: Diagnose deployed MLB lock status across slate dates

on:
  push:
    branches:
      - agent/diagnose-mlb-lock-status-52b0ee85
    paths:
      - .github/workflows/diagnose_live_mlb_lock_status.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: agent/diagnose-mlb-lock-status-52b0ee85
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Replay read-only status requests
        env:
          AWS_MAX_ATTEMPTS: "1"
        shell: bash
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --logical-resource-id MLBDailyPickLockFunction \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)
          test -n "$API_URL" && test "$API_URL" != "None"
          test -n "$FUNCTION_NAME" && test "$FUNCTION_NAME" != "None"
          export API_URL FUNCTION_NAME AWS_REGION="${{ secrets.AWS_REGION }}"
          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          import subprocess
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          base = os.environ['API_URL'].rstrip('/')
          function_name = os.environ['FUNCTION_NAME']
          region = os.environ['AWS_REGION']
          dates = [None, '2026-07-21', '2026-07-22']

          def parse_body(raw: bytes):
              text = raw.decode('utf-8', errors='replace')
              try:
                  return json.loads(text), text
              except Exception:
                  return None, text

          def summarize_payload(payload):
              if not isinstance(payload, dict):
                  return {}
              return {
                  key: payload.get(key)
                  for key in (
                      'ok', 'sport', 'error', 'reason', 'slateDateEt',
                      'pullCount', 'gameCount', 'officialScheduleBacked',
                      'officialScheduleAuthorityVersion',
                      'officialScheduleAuthoritativeStartTimes',
                      'lockedPredictionCount', 'lockedStatusCount',
                      'noPredictionDataCount', 'operationalDefect',
                  )
                  if key in payload
              }

          report = {
              'readOnly': True,
              'functionName': function_name,
              'http': [],
              'directLambda': [],
          }

          for slate in dates:
              query = '' if slate is None else '?' + urllib.parse.urlencode({'date': slate})
              url = base + '/v1/mlb/locks/status' + query
              request = urllib.request.Request(
                  url,
                  headers={
                      'accept': 'application/json',
                      'user-agent': 'inqsi-lock-status-diagnostic/1.0',
                  },
              )
              started = time.perf_counter()
              status = None
              headers = {}
              raw = b''
              error = None
              try:
                  with urllib.request.urlopen(request, timeout=55) as response:
                      status = response.status
                      headers = dict(response.headers.items())
                      raw = response.read()
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  headers = dict(exc.headers.items()) if exc.headers else {}
                  raw = exc.read()
                  error = f'HTTPError:{exc.code}'
              except Exception as exc:
                  error = f'{type(exc).__name__}:{exc}'
              elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)
              payload, text = parse_body(raw)
              report['http'].append({
                  'requestedSlateDateEt': slate,
                  'statusCode': status,
                  'elapsedMs': elapsed_ms,
                  'error': error,
                  'requestId': headers.get('x-amzn-requestid') or headers.get('X-Amzn-RequestId'),
                  'payloadSummary': summarize_payload(payload),
                  'body': payload if isinstance(payload, dict) else text[:4000],
              })

          for slate in dates:
              event = {
                  'httpMethod': 'GET',
                  'path': '/v1/mlb/locks/status',
                  'queryStringParameters': ({'date': slate} if slate else None),
                  'headers': {'accept': 'application/json'},
              }
              event_path = Path('/tmp/direct-event.json')
              response_path = Path('/tmp/direct-response.json')
              meta_path = Path('/tmp/direct-meta.json')
              event_path.write_text(json.dumps(event), encoding='utf-8')
              started = time.perf_counter()
              completed = subprocess.run(
                  [
                      'aws', 'lambda', 'invoke',
                      '--function-name', function_name,
                      '--region', region,
                      '--cli-binary-format', 'raw-in-base64-out',
                      '--payload', f'fileb://{event_path}',
                      '--log-type', 'Tail',
                      '--cli-connect-timeout', '10',
                      '--cli-read-timeout', '360',
                      str(response_path),
                  ],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  check=False,
              )
              elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)
              try:
                  meta = json.loads(completed.stdout or '{}')
              except Exception:
                  meta = {'rawStdout': completed.stdout}
              raw_response = response_path.read_text(encoding='utf-8', errors='replace') if response_path.exists() else ''
              try:
                  envelope = json.loads(raw_response)
              except Exception:
                  envelope = None
              body = None
              payload = None
              if isinstance(envelope, dict):
                  body = envelope.get('body')
                  try:
                      payload = json.loads(body) if isinstance(body, str) else body
                  except Exception:
                      payload = None
              log_tail = ''
              if meta.get('LogResult'):
                  try:
                      log_tail = base64.b64decode(meta['LogResult']).decode('utf-8', errors='replace')
                  except Exception:
                      log_tail = 'LOG_RESULT_DECODE_FAILED'
              report['directLambda'].append({
                  'requestedSlateDateEt': slate,
                  'cliExitCode': completed.returncode,
                  'elapsedMs': elapsed_ms,
                  'stderr': completed.stderr,
                  'functionError': meta.get('FunctionError'),
                  'statusCode': envelope.get('statusCode') if isinstance(envelope, dict) else None,
                  'payloadSummary': summarize_payload(payload),
                  'body': payload if isinstance(payload, dict) else body or raw_response[:4000],
                  'logTail': log_tail,
              })

          Path('mlb_lock_status_live_diagnostic.json').write_text(
              json.dumps(report, indent=2, sort_keys=True, default=str) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, indent=2, sort_keys=True, default=str))
          PY

      - name: Publish sanitized diagnostic and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/diagnose_live_mlb_lock_status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record live MLB lock-status slate diagnostics"
          git push origin HEAD:agent/diagnose-mlb-lock-status-52b0ee85
