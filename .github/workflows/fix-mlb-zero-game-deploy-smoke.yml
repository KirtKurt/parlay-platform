name: Fix MLB Zero-Game Deploy Smoke

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-mlb-zero-game-deploy-smoke.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make live pull smoke off-slate safe
        run: |
          python - <<'PY'
          from pathlib import Path

          path=Path('.github/workflows/deploy.yml')
          text=path.read_text()
          old='''          canonical = payload.get("canonical_pull_history") or []
          if not canonical or not any(row.get("ok") and int(row.get("games") or 0) > 0 for row in canonical):
              raise SystemExit("MLB live pull did not store canonical pull history with games")
          winners = payload.get("game_winner_predictions") or []
          if not winners or not any(row.get("ok") for row in winners):
              raise SystemExit("MLB live pull did not run game-winner predictions")
'''
          new='''          count = int(payload.get("count") or 0)
          canonical = payload.get("canonical_pull_history") or []
          winners = payload.get("game_winner_predictions") or []
          if count == 0:
              print("MLB provider call succeeded with no active/upcoming games; canonical game storage and winner generation are not applicable in this off-slate window.")
          else:
              if not canonical or not any(row.get("ok") and int(row.get("games") or 0) > 0 for row in canonical):
                  raise SystemExit("MLB live pull returned games but did not store canonical pull history with games")
              if not winners or not any(row.get("ok") for row in winners):
                  raise SystemExit("MLB live pull returned games but did not run game-winner predictions")
'''
          if old not in text:
              raise SystemExit('target live-pull smoke block not found or already changed')
          path.write_text(text.replace(old,new,1))
          PY

      - name: Commit smoke correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy.yml
          git commit -m "Allow valid zero-game MLB off-slate deploy smoke" || true
          git pull --rebase --autostash origin main
          git push
