name: Audit MLB Reversal Sizes
on:
  push:
    branches: [agent/audit-mlb-reversal-size-20260723]
    paths:
      - 'scripts/audit_mlb_reversal_sizes.py'
      - '.github/workflows/audit-mlb-reversal-sizes.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/audit-mlb-reversal-size-20260723
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --quiet 'boto3>=1.34,<2'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Analyze all canonical MLB reversal amplitudes
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
        run: |
          python scripts/audit_mlb_reversal_sizes.py \
            --start-date 2026-06-01 \
            --end-date 2026-07-22 \
            --output /tmp/mlb-reversal-audit/mlb_reversal_sizes.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlb-reversal-size-audit-${{ github.run_id }}
          path: /tmp/mlb-reversal-audit/mlb_reversal_sizes.json
          if-no-files-found: error
