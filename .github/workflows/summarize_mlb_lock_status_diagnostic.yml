name: Summarize live MLB lock-status diagnostics

on:
  push:
    branches:
      - agent/diagnose-mlb-lock-status-52b0ee85
    paths:
      - .github/workflows/summarize_mlb_lock_status_diagnostic.yml

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-mlb-lock-status-52b0ee85
          fetch-depth: 0
      - name: Produce compact evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('mlb_lock_status_live_diagnostic.json').read_text(encoding='utf-8'))
          compact = {'readOnly': report.get('readOnly'), 'http': [], 'directLambda': []}
          for section in ('http', 'directLambda'):
              for item in report.get(section) or []:
                  body = item.get('body') if isinstance(item.get('body'), dict) else {}
                  compact[section].append({
                      'requestedSlateDateEt': item.get('requestedSlateDateEt'),
                      'statusCode': item.get('statusCode'),
                      'elapsedMs': item.get('elapsedMs'),
                      'error': item.get('error'),
                      'cliExitCode': item.get('cliExitCode'),
                      'functionError': item.get('functionError'),
                      'payloadSummary': item.get('payloadSummary') or {},
                      'bodyError': body.get('error'),
                      'bodyReason': body.get('reason'),
                      'bodyOk': body.get('ok'),
                      'bodySlateDateEt': body.get('slateDateEt'),
                      'bodyPullCount': body.get('pullCount'),
                      'bodyGameCount': body.get('gameCount'),
                      'bodyOperationalDefect': body.get('operationalDefect'),
                      'bodyOfficialScheduleBacked': body.get('officialScheduleBacked'),
                      'logTail': item.get('logTail'),
                      'stderr': item.get('stderr'),
                  })
          Path('mlb_lock_status_live_diagnostic_summary.json').write_text(
              json.dumps(compact, indent=2, sort_keys=True, default=str) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Commit summary and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/summarize_mlb_lock_status_diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Summarize live MLB lock-status diagnostics"
          git push origin HEAD:agent/diagnose-mlb-lock-status-52b0ee85
