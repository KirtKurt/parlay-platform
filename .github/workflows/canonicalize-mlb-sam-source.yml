name: Canonicalize MLB SAM source

on:
  push:
    branches: ["agent/stabilize-mlb-production"]
    paths:
      - "template.yaml"
      - "hello_world/api.py"
      - "scripts/patch_template_mlb_v1.py"
      - "scripts/patch_template_mlb_security.py"
      - "scripts/patch_template_mlb_results_routes.py"
      - ".github/workflows/canonicalize-mlb-sam-source.yml"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: canonicalize-mlb-sam-source
  cancel-in-progress: false

jobs:
  canonicalize:
    if: github.head_ref == 'agent/stabilize-mlb-production' || github.ref_name == 'agent/stabilize-mlb-production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v4
        with:
          ref: agent/stabilize-mlb-production
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render every deploy-mutated MLB source
        run: |
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py

      - name: Verify canonical MLB schedule invariants
        run: python scripts/verify_mlb_schedule_invariants.py

      - name: Commit canonical source when changed
        run: |
          if git diff --quiet -- template.yaml hello_world/api.py; then
            echo "MLB deployment source is already canonical."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add template.yaml hello_world/api.py
          git commit -m "Canonicalize MLB deployment source"
          git push origin HEAD:agent/stabilize-mlb-production
