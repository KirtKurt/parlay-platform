name: Canonicalize MLB SAM source

on:
  push:
    branches: ["agent/stabilize-mlb-production"]
    paths:
      - "template.yaml"
      - "hello_world/api.py"
      - "hello_world/mlb_manual_pull.py"
      - "scripts/patch_template_mlb_v1.py"
      - "scripts/patch_template_mlb_security.py"
      - "scripts/patch_template_mlb_results_routes.py"
      - "scripts/stabilize_mlb_deploy_source.py"
      - "scripts/verify_mlb_daily_pull_start_gate.py"
      - "scripts/verify_mlb_schedule_invariants.py"
      - "scripts/verify_mlb_deploy_identity.py"
      - ".github/workflows/canonicalize-mlb-sam-source.yml"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: canonicalize-mlb-sam-source
  cancel-in-progress: true

jobs:
  canonicalize:
    if: github.head_ref == 'agent/stabilize-mlb-production' || github.ref_name == 'agent/stabilize-mlb-production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v4
        with:
          ref: agent/stabilize-mlb-production
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2"

      - name: Apply deterministic deployment migration
        run: python scripts/stabilize_mlb_deploy_source.py

      - name: Render every deploy-mutated MLB source
        run: |
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py

      - name: Verify recurring 1 AM ET gate
        run: python scripts/verify_mlb_daily_pull_start_gate.py

      - name: Verify canonical MLB production invariants
        run: python scripts/verify_mlb_schedule_invariants.py

      - name: Compile stabilization tooling
        run: |
          python -m py_compile scripts/stabilize_mlb_deploy_source.py
          python -m py_compile scripts/verify_mlb_deploy_identity.py

      - name: Commit canonical application source when changed
        run: |
          git restore .github/workflows/deploy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            template.yaml \
            hello_world/api.py \
            hello_world/mlb_manual_pull.py \
            scripts/patch_template_mlb_v1.py \
            scripts/patch_template_mlb_security.py \
            scripts/patch_template_mlb_results_routes.py \
            scripts/verify_mlb_schedule_invariants.py
          if git diff --cached --quiet; then
            echo "MLB application source is already canonical."
            exit 0
          fi
          git commit -m "Canonicalize MLB application and schedule source"
          git pull --rebase --autostash origin agent/stabilize-mlb-production
          git push origin HEAD:agent/stabilize-mlb-production
