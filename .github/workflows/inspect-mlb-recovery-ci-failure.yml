name: Inspect MLB Recovery CI Failure

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-recovery-ci-failure.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract exact failed-step context
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '89133751410'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          repo = os.environ['GITHUB_REPOSITORY']
          job_id = os.environ['JOB_ID']
          url = f'https://api.github.com/repos/{repo}/actions/jobs/{job_id}/logs'
          request = urllib.request.Request(url, headers={
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'inqsi-mlb-recovery-ci-inspector/1.0',
          })
          with urllib.request.urlopen(request, timeout=90) as response:
              text = response.read().decode('utf-8-sig', errors='replace')
          lines = text.splitlines()
          pattern = re.compile(
              r'(##\[error\]|Traceback|AssertionError|ConstructorError|SystemExit|FAILED|Error:|error:|exit code|invalid|missing|mismatch)',
              re.IGNORECASE,
          )
          hits = []
          seen = set()
          for index, line in enumerate(lines):
              if pattern.search(line):
                  for position in range(max(0, index - 5), min(len(lines), index + 15)):
                      if position not in seen:
                          seen.add(position)
                          hits.append({'lineNumber': position + 1, 'text': lines[position]})
          hits.sort(key=lambda row: row['lineNumber'])
          out = {
              'ok': True,
              'readOnly': True,
              'jobId': int(job_id),
              'lineCount': len(lines),
              'matchedContext': hits[-180:],
              'tail': [
                  {'lineNumber': len(lines) - len(lines[-100:]) + i + 1, 'text': line}
                  for i, line in enumerate(lines[-100:])
              ],
          }
          print(json.dumps(out, indent=2))
          PY
