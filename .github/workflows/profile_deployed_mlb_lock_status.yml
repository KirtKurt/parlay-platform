name: Profile exact deployed MLB lock-status handler

on:
  push:
    branches:
      - agent/profile-mlb-lock-status-52b0ee85
    paths:
      - .github/workflows/profile_deployed_mlb_lock_status.yml

permissions:
  contents: write

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact deployed source
        uses: actions/checkout@v4
        with:
          ref: agent/profile-mlb-lock-status-52b0ee85
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install runtime libraries
        run: python -m pip install --disable-pip-version-check --quiet boto3 requests

      - name: Profile exact protected GET handler
        env:
          AWS_MAX_ATTEMPTS: "1"
          TARGET_SHA: "52b0ee85c5d7e12f8f4e18406c961e6b71d04eb4"
        shell: bash
        run: |
          set -euo pipefail
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --logical-resource-id MLBDailyPickLockFunction \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)
          aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Environment.Variables' \
            --output json >/tmp/function_env.json
          python - <<'PY'
          from __future__ import annotations

          import collections
          import cProfile
          import functools
          import io
          import json
          import os
          import pstats
          import sys
          import time
          from pathlib import Path

          function_env = json.loads(Path('/tmp/function_env.json').read_text(encoding='utf-8'))
          for key, value in function_env.items():
              os.environ[str(key)] = str(value)
          sys.path.insert(0, str(Path('hello_world').resolve()))

          import inqsi_pull_history as history
          import mlb_daily_per_game_lock_patch as patch
          import mlb_daily_pick_lock as module
          import mlb_daily_pick_lock_protected as protected

          stats = collections.defaultdict(lambda: {'count': 0, 'totalMs': 0.0, 'maxMs': 0.0})

          def record(label: str, elapsed_ms: float) -> None:
              item = stats[label]
              item['count'] += 1
              item['totalMs'] += elapsed_ms
              item['maxMs'] = max(item['maxMs'], elapsed_ms)

          def wrap(obj, name: str, label: str | None = None) -> None:
              original = getattr(obj, name, None)
              if not callable(original):
                  return
              metric = label or f'{getattr(obj, "__name__", type(obj).__name__)}.{name}'

              @functools.wraps(original)
              def measured(*args, **kwargs):
                  started = time.perf_counter()
                  try:
                      return original(*args, **kwargs)
                  finally:
                      record(metric, (time.perf_counter() - started) * 1000.0)

              setattr(obj, name, measured)

          for name in (
              '_pulls_for_date', '_latest_games_for_date', '_get_lock_item',
              '_status_payload', 'lambda_handler',
          ):
              wrap(module, name, f'module.{name}')
          wrap(protected, 'lambda_handler', 'protected.lambda_handler')

          for name in (
              '_query_pull_items', 'query_pulls_raw', 'query_pulls',
              'canonicalize_pull_slots', 'pull_payload_fingerprint',
              'canonical_payload_fingerprint', 'provider_manifest_fingerprint',
              'verified_full_slate_manifest',
          ):
              wrap(history, name, f'history.{name}')

          for name in (
              '_status_query_pulls', '_prime_status_exact_items',
              '_prime_status_manifest_items', '_status_authority_reference_keys',
              '_progress', '_scoring_pulls', '_validate_stage',
              '_provider_manifest_authority_errors',
              '_candidate_snapshot_authority_errors',
              '_source_window_authority_errors',
              '_status_pull_payload_fingerprint', '_canonical_readback',
              '_game_snapshot_fingerprint', '_matching_game',
              '_resolved_playability_lifecycle', '_readiness_status',
              '_daily_authority_errors', '_diagnostic_history',
          ):
              wrap(patch, name, f'patch.{name}')

          seen_tables = set()
          for table_label, table in (
              ('module.TABLE', module.TABLE),
              ('history.PULLS', history.PULLS),
          ):
              if table is None or id(table) in seen_tables:
                  continue
              seen_tables.add(id(table))
              wrap(table, 'get_item', f'{table_label}.get_item')
              wrap(table, 'query', f'{table_label}.query')
              wrap(table, 'batch_writer', f'{table_label}.batch_writer')
          wrap(history.DDB, 'batch_get_item', 'history.DDB.batch_get_item')

          event = {
              'httpMethod': 'GET',
              'path': '/v1/mlb/locks/status',
              'queryStringParameters': {'date': '2026-07-21'},
              'headers': {'accept': 'application/json'},
          }

          profiler = cProfile.Profile()
          started = time.perf_counter()
          error = None
          response = None
          profiler.enable()
          try:
              response = protected.lambda_handler(event, None)
          except BaseException as exc:
              error = f'{type(exc).__name__}:{exc}'
          finally:
              profiler.disable()
          elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)

          payload = None
          if isinstance(response, dict):
              body = response.get('body')
              try:
                  payload = json.loads(body) if isinstance(body, str) else body
              except Exception:
                  payload = None

          reason_counts = collections.Counter()
          if isinstance(payload, dict):
              for row in payload.get('perGameStatus') or []:
                  if isinstance(row, dict):
                      for reason in row.get('errors') or []:
                          reason_counts[str(reason).split(':', 1)[0]] += 1

          metrics = []
          for label, values in stats.items():
              metrics.append({
                  'label': label,
                  'count': int(values['count']),
                  'totalMs': round(values['totalMs'], 3),
                  'maxMs': round(values['maxMs'], 3),
                  'averageMs': round(values['totalMs'] / values['count'], 3)
                  if values['count'] else 0.0,
              })
          metrics.sort(key=lambda item: (-item['totalMs'], item['label']))

          stream = io.StringIO()
          pstats.Stats(profiler, stream=stream).strip_dirs().sort_stats('cumulative').print_stats(140)
          profile_text = stream.getvalue()
          Path('mlb_lock_status_exact_handler_cprofile.txt').write_text(profile_text, encoding='utf-8')

          summary_fields = (
              'ok', 'sport', 'slateDateEt', 'pullCount', 'gameCount',
              'stagedGameCount', 'canonicalImmutableGameRowCount',
              'lockedPredictionCount', 'lockedStatusCount',
              'noPredictionDataCount', 'playabilityValidationErrorCount',
              'playabilityLifecycleErrorCount', 'operationalDefect',
              'officialScheduleBacked',
          )
          report = {
              'targetSha': os.environ['TARGET_SHA'],
              'slateDateEt': '2026-07-21',
              'elapsedMs': elapsed_ms,
              'error': error,
              'responseStatusCode': response.get('statusCode') if isinstance(response, dict) else None,
              'payloadSummary': {
                  key: payload.get(key)
                  for key in summary_fields
                  if isinstance(payload, dict) and key in payload
              },
              'perGameErrorCategoryCounts': dict(sorted(reason_counts.items())),
              'metricsByInclusiveTotalMs': metrics,
              'cProfileTopCumulative': profile_text.splitlines()[:180],
          }
          Path('mlb_lock_status_exact_handler_profile.json').write_text(
              json.dumps(report, indent=2, sort_keys=True, default=str) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, indent=2, sort_keys=True, default=str))
          PY

      - name: Publish sanitized profile and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/profile_deployed_mlb_lock_status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record exact MLB lock-status handler profile"
          git push origin HEAD:agent/profile-mlb-lock-status-52b0ee85
