name: Monitor Immutable MLB Storage Deploy

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/monitor-immutable-mlb-deploy.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Capture immutable storage deployment result
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: '512a33b6d345bb6a49a37c529a04da36bb7a03e0'
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          RUN_ID=""
          for i in $(seq 1 60); do
            RUN_ID=$(gh api "/repos/${REPO}/actions/runs?head_sha=${TARGET_SHA}&per_page=100" --jq '.workflow_runs[] | select(.path == ".github/workflows/deploy.yml") | .id' | head -n1)
            [ -n "${RUN_ID:-}" ] && break
            sleep 10
          done
          if [ -z "${RUN_ID:-}" ]; then
            echo '{"ok":false,"error":"immutable storage deploy run not found"}' > runtime_reports/deploy_immutable_storage_latest.json
            exit 0
          fi
          for i in $(seq 1 120); do
            STATUS=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}" --jq '.status')
            [ "$STATUS" = "completed" ] && break
            sleep 10
          done
          gh api "/repos/${REPO}/actions/runs/${RUN_ID}" > /tmp/run.json
          gh api "/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" > /tmp/jobs.json
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          repo=os.environ['REPO']
          run=json.load(open('/tmp/run.json'))
          jobs=(json.load(open('/tmp/jobs.json')).get('jobs') or [])
          out={
              'ok': run.get('status')=='completed' and run.get('conclusion')=='success',
              'runId': run.get('id'), 'runNumber': run.get('run_number'),
              'status': run.get('status'), 'conclusion': run.get('conclusion'),
              'headSha': run.get('head_sha'), 'htmlUrl': run.get('html_url'),
              'jobs': [],
          }
          text=[]
          for job in jobs:
              entry={'id':job.get('id'),'name':job.get('name'),'status':job.get('status'),'conclusion':job.get('conclusion'),'steps':job.get('steps') or []}
              out['jobs'].append(entry)
              text.append(f"JOB {entry['name']} conclusion={entry['conclusion']} id={entry['id']}")
              for step in entry['steps']:
                  text.append(f"  STEP {step.get('number')}: {step.get('name')} conclusion={step.get('conclusion')}")
              if job.get('conclusion')=='failure':
                  p=Path(f"runtime_reports/deploy_immutable_storage_job_{job['id']}.log")
                  with p.open('wb') as fh:
                      subprocess.run(['gh','api',f"/repos/{repo}/actions/jobs/{job['id']}/logs"],stdout=fh,stderr=subprocess.STDOUT,check=False)
                  text.append('\nFAILED JOB LOG TAIL\n'+'\n'.join(p.read_text(errors='replace').splitlines()[-500:]))
          Path('runtime_reports/deploy_immutable_storage_latest.json').write_text(json.dumps(out,indent=2)+'\n')
          Path('runtime_reports/deploy_immutable_storage_latest.txt').write_text('\n'.join(text)+'\n')
          PY

      - name: Commit deployment proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/deploy_immutable_storage_* || true
          git commit -m "Persist immutable MLB storage deployment proof" || true
          git pull --rebase --autostash origin main || true
          git push || true
