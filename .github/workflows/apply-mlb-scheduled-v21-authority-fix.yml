name: Apply MLB Scheduled V21 Authority Fix

on:
  push:
    branches: [agent/fix-mlb-authoritative-persistence-20260723]
    paths:
      - 'scripts/apply_mlb_scheduled_v21_authority_fix.py'
      - '.github/workflows/apply-mlb-scheduled-v21-authority-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-scheduled-v21-authority-fix
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-authoritative-persistence-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply scoped production-writer repair
        run: python scripts/apply_mlb_scheduled_v21_authority_fix.py

      - name: Compile and run focused persistence tests
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_manual_pull_protected.py \
            scripts/apply_mlb_scheduled_v21_authority_fix.py \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py
          python -m pytest -q \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py \
            tests/unit/test_mlb_scheduled_persistence_source_order.py

      - name: Prove no shadow or recovery module gained prediction authority
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          target = Path('hello_world/mlb_manual_pull_protected.py').read_text(encoding='utf-8')
          assert 'MLB-SCHEDULED-V21-AUTHORITY-COMPAT-v1' in target
          assert 'MLB-SINGLE-GAME-ML-PROMOTION-v2.1' in target
          assert 'INQSI-MLB-SINGLE-GAME-ML-v2.1-aws-sam-production' in target
          for path in Path('hello_world').glob('*recovery*.py'):
              text = path.read_text(encoding='utf-8', errors='replace')
              assert 'MLB-SCHEDULED-V21-AUTHORITY-COMPAT-v1' not in text, path
          PY

      - name: Commit canonical source and tests
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_manual_pull_protected.py \
            tests/unit/test_mlb_scheduled_v21_authority_scope.py
          if git diff --cached --quiet; then
            echo 'Scoped MLB authority repair already applied.'
          else
            git commit -m 'Fix scheduled MLB v2.1 prediction persistence authority'
            git pull --rebase --autostash origin agent/fix-mlb-authoritative-persistence-20260723
            git push origin HEAD:agent/fix-mlb-authoritative-persistence-20260723
          fi
