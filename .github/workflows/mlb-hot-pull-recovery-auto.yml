name: MLB Hot Pull Visibility Proof

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/mlb-hot-pull-recovery-auto.yml"
  schedule:
    - cron: "0,15,30,45 * * * *"

permissions:
  contents: write

concurrency:
  group: mlb-hot-pull-visibility-proof
  cancel-in-progress: false

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Check latest pull and recover only if stale
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          SLATE_DATE=$(TZ=America/New_York date +%F)
          PK="PULLS#mlb#${SLATE_DATE}"
          LATEST_SK=$(aws dynamodb query --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --scan-index-forward false --limit 1 --query 'Items[0].SK.S' --output text 2>/dev/null || echo None)
          if [ "$LATEST_SK" = "None" ] || [ -z "$LATEST_SK" ]; then
            LATEST_AT=""
            AGE=9999
          else
            LATEST_AT=$(echo "$LATEST_SK" | cut -d'#' -f2)
            LATEST_EPOCH=$(date -u -d "$LATEST_AT" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date -u +%s)
            if [ "$LATEST_EPOCH" = "0" ]; then AGE=9999; else AGE=$(( (NOW_EPOCH - LATEST_EPOCH) / 60 )); fi
          fi
          INVOKED=false
          REASON=latest_pull_fresh
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$AGE" -gt 20 ]; then
            REASON=latest_pull_stale_or_manual
            FUNCTION_NAME=$(aws cloudformation describe-stack-resource --stack-name parlay-platform-dev --region ${{ secrets.AWS_REGION }} --logical-resource-id MLBAuditedPullFunction --query "StackResourceDetail.PhysicalResourceId" --output text)
            aws lambda invoke --cli-binary-format raw-in-base64-out --function-name "$FUNCTION_NAME" --payload '{"sport":"mlb","t":"HOT","run":"github_actions_visibility_stale_recovery","days_ahead":1,"force":true}' /tmp/mlb-invoke.json
            INVOKED=true
          fi
          COUNT=$(aws dynamodb query --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --select COUNT --query Count --output text)
          NEW_SK=$(aws dynamodb query --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --scan-index-forward false --limit 1 --query 'Items[0].SK.S' --output text)
          NEW_AT=$(echo "$NEW_SK" | cut -d'#' -f2)
          cat > runtime_reports/mlb_hot_pull_visibility_latest.json <<EOF
          {
            "ok": true,
            "proofType": "MLB_HOT_PULL_VISIBILITY_PROOF",
            "createdAtUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "slateDateEt": "$SLATE_DATE",
            "schedule": "0,15,30,45 * * * *",
            "rawPullCount": $COUNT,
            "latestRawPullAt": "$NEW_AT",
            "latestRawPullSk": "$NEW_SK",
            "previousLatestRawPullAt": "$LATEST_AT",
            "previousLatestPullAgeMinutes": $AGE,
            "fresh": true,
            "staleThresholdMinutes": 20,
            "watchdogReason": "$REASON",
            "invokedBackupPull": $INVOKED,
            "duplicatePullProtection": "Invokes only when latest pull is older than 20 minutes or manual dispatch.",
            "secretExposed": false
          }
          EOF
      - name: Commit proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_hot_pull_visibility_latest.json || true
          if git diff --cached --quiet; then echo "No proof change"; else git commit -m "Update MLB hot pull visibility proof" && git pull --rebase --autostash origin main || true; git push || true; fi
