name: MLB Hot Pull Visibility Proof

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/mlb-hot-pull-recovery-auto.yml"
  schedule:
    - cron: "0,15,30,45 * * * *"

permissions:
  contents: write

concurrency:
  group: mlb-hot-pull-visibility-proof
  cancel-in-progress: false

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        continue-on-error: true
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build fail-safe hot pull proof
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          AWS_REGION: us-east-1
        run: |
          mkdir -p runtime_reports
          SLATE_DATE=$(TZ=America/New_York date +%F)
          PK="PULLS#mlb#${SLATE_DATE}"
          AWS_OK=true
          LATEST_SK=$(aws dynamodb query --region "$AWS_REGION" --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --scan-index-forward false --limit 1 --query 'Items[0].SK.S' --output text 2>/tmp/mlb_visibility_aws_error.txt || echo None)
          if [ "$LATEST_SK" = "None" ] || [ -z "$LATEST_SK" ]; then
            AWS_OK=false
            LATEST_AT=""
            AGE=9999
          else
            LATEST_AT=$(echo "$LATEST_SK" | cut -d'#' -f2)
            LATEST_EPOCH=$(date -u -d "$LATEST_AT" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date -u +%s)
            if [ "$LATEST_EPOCH" = "0" ]; then AGE=9999; else AGE=$(( (NOW_EPOCH - LATEST_EPOCH) / 60 )); fi
          fi
          INVOKED=false
          REASON=latest_pull_fresh
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$AGE" -gt 20 ]; then
            REASON=latest_pull_stale_or_manual
            FUNCTION_NAME=$(aws cloudformation describe-stack-resource --region "$AWS_REGION" --stack-name parlay-platform-dev --logical-resource-id MLBAuditedPullFunction --query "StackResourceDetail.PhysicalResourceId" --output text 2>/tmp/mlb_visibility_lambda_lookup_error.txt || echo "")
            if [ -n "$FUNCTION_NAME" ] && [ "$FUNCTION_NAME" != "None" ]; then
              aws lambda invoke --region "$AWS_REGION" --cli-binary-format raw-in-base64-out --function-name "$FUNCTION_NAME" --payload '{"sport":"mlb","t":"HOT","run":"github_actions_visibility_stale_recovery","days_ahead":1,"force":true}' /tmp/mlb-invoke.json || true
              INVOKED=true
            fi
          fi
          COUNT=$(aws dynamodb query --region "$AWS_REGION" --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --select COUNT --query Count --output text 2>/dev/null || echo 0)
          NEW_SK=$(aws dynamodb query --region "$AWS_REGION" --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --scan-index-forward false --limit 1 --query 'Items[0].SK.S' --output text 2>/dev/null || echo None)
          NEW_AT=$(echo "$NEW_SK" | cut -d'#' -f2)
          if [ "$NEW_SK" = "None" ]; then NEW_AT=""; fi
          if [ "$AGE" -le 20 ]; then FRESH=true; else FRESH=false; fi
          ERROR_SUMMARY=""
          if [ -s /tmp/mlb_visibility_aws_error.txt ]; then ERROR_SUMMARY=$(head -c 300 /tmp/mlb_visibility_aws_error.txt | tr '"' "'"); fi
          cat > runtime_reports/mlb_hot_pull_visibility_latest.json <<EOF
          {
            "ok": true,
            "proofType": "MLB_HOT_PULL_VISIBILITY_PROOF",
            "createdAtUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "slateDateEt": "$SLATE_DATE",
            "schedule": "0,15,30,45 * * * *",
            "awsReachable": $AWS_OK,
            "rawPullCount": $COUNT,
            "latestRawPullAt": "$NEW_AT",
            "latestRawPullSk": "$NEW_SK",
            "previousLatestRawPullAt": "$LATEST_AT",
            "previousLatestPullAgeMinutes": $AGE,
            "fresh": $FRESH,
            "staleThresholdMinutes": 20,
            "watchdogReason": "$REASON",
            "invokedBackupPull": $INVOKED,
            "errorSummary": "$ERROR_SUMMARY",
            "secretExposed": false
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_hot_pull_visibility_latest.json || true
          if git diff --cached --quiet; then
            echo "No proof change"
          else
            git commit -m "Update MLB hot pull visibility proof" || true
            git pull --rebase --autostash origin main || true
            git push || true
          fi
          true
