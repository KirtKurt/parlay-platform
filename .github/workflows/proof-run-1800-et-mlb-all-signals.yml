name: MLB All-Games Signal Proof

on:
  schedule:
    # Runs every 15 minutes as a read-only proof/audit. Production pull history
    # is generated by AWS EventBridge, not by GitHub Actions.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate MLB all-games signal proof
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: us
          ODDS_MARKETS: h2h,spreads,totals
          ODDS_FORMAT: american
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INQSI_AUTO_BUILD_SPORTS: mlb,wnba,nfl,cfb,nba,ncaam,nhl,soccer,tennis
        run: |
          set -uo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          python - <<'PY'
          import json
          import traceback
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          def now_utc():
              return datetime.now(timezone.utc).isoformat()

          def now_et():
              return datetime.now(ZoneInfo('America/New_York')).isoformat()

          proof = {
              'ok': False,
              'proofRun': 'recurring_mlb_all_games_signal_proof_read_only_every_15_min',
              'createdAtUtc': now_utc(),
              'createdAtEt': now_et(),
              'question': 'Show every MLB game scored before the qualifying-leg filter was applied.',
              'error': None,
              'mlbAllGamesSignalRows': [],
          }

          try:
              import mlb_all_games_signal_proof
              import mlb_game_winner_engine
              import mlb_b10_engine
              import auto_build_runner

              pull = {
                  'ok': True,
                  'source': 'aws_eventbridge_primary_pull_history',
                  'storageMode': 'read_only_proof_no_snapshot_created',
                  'message': 'This GitHub proof does not create PULLS snapshots. It reads AWS EventBridge-generated 15-minute pull history from DynamoDB.',
              }
              mlb_winners = mlb_game_winner_engine.predict_all(store=True, limit=500)
              all_games = mlb_all_games_signal_proof.build(store=True, write_file=True)
              b10 = mlb_b10_engine.build()
              auto_build_runner.main()
              try:
                  parlay_report = json.load(open('runtime_reports/parlay_latest.json', encoding='utf-8'))
              except Exception:
                  parlay_report = {'ok': False, 'error': 'parlay_latest_missing_after_auto_build'}

              proof.update({
                  'ok': True,
                  'pull': pull,
                  'mlbGameWinnerPredictions': mlb_winners,
                  'mlbB10Build': b10,
                  'mlbAllGamesSignalProofPath': 'runtime_reports/mlb_all_games_signal_proof_latest.json',
                  'mlbAllGamesSignalProofSummary': all_games.get('summary'),
                  'mlbAllGamesSignalRows': all_games.get('rows') or [],
                  'parlayProof': parlay_report,
              })
              live = {
                  'ok': True,
                  'createdAtUtc': proof['createdAtUtc'],
                  'createdAtEt': proof['createdAtEt'],
                  'sportsRequested': ['mlb'],
                  'pullMode': pull,
                  'mlbGameWinnerPredictions': mlb_winners,
                  'mlbAllGamesSignalProofPath': proof['mlbAllGamesSignalProofPath'],
                  'mlbAllGamesSignalProofSummary': proof['mlbAllGamesSignalProofSummary'],
                  'mlbParlayBuilt': bool(parlay_report.get('mlbBuilt')),
                  'builtSports': parlay_report.get('builtSports') or [],
                  'parlayProof': parlay_report,
              }
          except Exception as exc:
              proof['error'] = {'type': type(exc).__name__, 'message': str(exc), 'traceback': traceback.format_exc()}
              live = {
                  'ok': False,
                  'createdAtUtc': proof['createdAtUtc'],
                  'createdAtEt': proof['createdAtEt'],
                  'sportsRequested': ['mlb'],
                  'mlbAllGamesSignalProofPath': 'runtime_reports/mlb_all_games_signal_proof_latest.json',
                  'mlbAllGamesSignalProofSummary': None,
                  'error': proof['error'],
              }
              # Write a failure proof too, so absence of a proof file never hides the failure.
              open('runtime_reports/mlb_all_games_signal_proof_latest.json','w',encoding='utf-8').write(json.dumps(proof, indent=2, default=str)+'\n')

          open('runtime_reports/proof_1800_et_mlb_all_signals_latest.json','w',encoding='utf-8').write(json.dumps(proof, indent=2, default=str)+'\n')
          open('runtime_reports/live_odds_latest.json','w',encoding='utf-8').write(json.dumps(live, indent=2, default=str)+'\n')
          print(json.dumps({
              'ok': proof.get('ok'),
              'createdAtEt': proof.get('createdAtEt'),
              'mlbAllGamesRows': len(proof.get('mlbAllGamesSignalRows') or []),
              'summary': proof.get('mlbAllGamesSignalProofSummary'),
              'error': proof.get('error'),
          }, indent=2, default=str))
          PY

      - name: Commit MLB all-games proof reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_all_games_signal_proof_latest.json runtime_reports/proof_1800_et_mlb_all_signals_latest.json runtime_reports/live_odds_latest.json runtime_reports/parlay_latest.json runtime_reports/pull_health_latest.json || true
          git commit -m "Run recurring MLB all-games signal proof" || true
          git pull --rebase --autostash origin main || true
          git push || true
