name: Inqis Live Odds Pulls

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/live-odds-pulls.yml'
      - 'hello_world/odds_live_ingestion.py'
      - 'hello_world/market_board.py'
      - 'hello_world/inqsi_pull_history.py'
      - 'hello_world/auto_build_runner.py'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'mlb,soccer,tennis,nfl,cfb,nba,wnba,ncaam,nhl'
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

permissions:
  contents: write

jobs:
  pull:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run backend odds pull and official build proof
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: us
          ODDS_MARKETS: h2h,spreads,totals
          ODDS_FORMAT: american
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
          INQSI_AUTO_BUILD_SPORTS: mlb,wnba,nfl,cfb,nba,ncaam,nhl,soccer,tennis
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          import odds_live_ingestion
          import market_board
          import auto_build_runner

          sports = [s.strip() for s in os.environ.get('INPUT_SPORTS', '').split(',') if s.strip()]
          if not sports:
              sports = ['mlb','soccer','tennis','nfl','cfb','nba','wnba','ncaam','nhl']

          pull = odds_live_ingestion.pull_many(sports)
          board = market_board.board_all({'sports': ','.join(sports)})
          auto_build_runner.main()

          parlay_report = json.load(open('runtime_reports/parlay_latest.json', encoding='utf-8'))
          report = {
              'ok': bool(pull.get('ok') and board.get('ok')),
              'createdAt': datetime.now(timezone.utc).isoformat(),
              'sportsRequested': sports,
              'sportsCanonical': pull.get('sportsCanonical'),
              'pullOk': pull.get('ok'),
              'marketBoardOk': board.get('ok'),
              'sportsWithStoredGamesFromPull': [r.get('appSport') for r in pull.get('results', []) if int(r.get('gamesStored') or 0) > 0],
              'sportsVisibleOnMarketBoard': [b.get('sport') for b in board.get('boards', []) if int(b.get('gameCount') or 0) > 0],
              'totalGamesVisibleOnMarketBoard': sum(int(b.get('gameCount') or 0) for b in board.get('boards', [])),
              'mlbParlayBuilt': bool(parlay_report.get('mlbBuilt')),
              'parlayProof': parlay_report,
          }
          open('runtime_reports/live_odds_latest.json','w',encoding='utf-8').write(json.dumps(report, indent=2, default=str)+'\n')
          print(json.dumps({'ok': report['ok'], 'mlbParlayBuilt': report['mlbParlayBuilt']}, indent=2))
          PY

      - name: Commit runtime proof reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/live_odds_latest.json runtime_reports/parlay_latest.json || true
          git commit -m "Update live odds and build proof reports" || true
          git pull --rebase --autostash origin main || true
          git push || true
