name: Inqis Live Odds Pulls

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'mlb,soccer,tennis,nfl,cfb,college_baseball_men,nba,wnba,ncaam,nhl'
      all:
        description: 'Pull all listed sports'
        required: false
        default: 'true'
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

jobs:
  pull:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read API URL
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Pull live odds into Inqis pull history and confirm stored rows
        env:
          ADMIN_TOKEN: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
          INPUT_ALL: ${{ github.event.inputs.all }}
        run: |
          set -euo pipefail
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          SPORTS="${INPUT_SPORTS:-mlb,soccer,tennis,nfl,cfb,college_baseball_men,nba,wnba,ncaam,nhl}"
          ALL_FLAG="${INPUT_ALL:-true}"
          test -n "$ADMIN_TOKEN"

          print_body () {
            FILE="$1"
            python - "$FILE" <<'PY'
          import json, sys
          path = sys.argv[1]
          raw = open(path, 'r', encoding='utf-8', errors='replace').read()
          try:
              print(json.dumps(json.loads(raw), indent=2))
          except Exception:
              print(raw)
          PY
          }

          call_api () {
            LABEL="$1"
            URL="$2"
            OUT="$3"
            shift 3
            echo "$LABEL"
            HTTP_CODE=$(curl --silent --show-error --output "$OUT" --write-out "%{http_code}" "$@" "$URL")
            echo "HTTP status: $HTTP_CODE"
            print_body "$OUT"
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "$LABEL failed with HTTP $HTTP_CODE"
              exit 1
            fi
          }

          call_api "Provider status" \
            "${API_URL}v1/inqsi/odds/provider-status?probe=true" \
            provider-status.json \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN"

          call_api "Pulling live odds for: $SPORTS" \
            "${API_URL}v1/inqsi/odds/pull?all=${ALL_FLAG}&sports=${SPORTS}" \
            pull-response.json \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN"

          call_api "Reading public market board for stored row confirmation" \
            "${API_URL}v1/inqsi/markets/board?sports=${SPORTS}" \
            market-board.json

          python - <<'PY'
          import json, sys
          pull = json.load(open('pull-response.json'))
          board = json.load(open('market-board.json'))
          pull_results = pull.get('results') or []
          stored = [r for r in pull_results if (r.get('gamesStored') or 0) > 0]
          board_rows = [b for b in (board.get('boards') or []) if (b.get('gameCount') or 0) > 0]
          summary = {
              'sportsWithStoredGamesFromPull': [r.get('appSport') for r in stored],
              'sportsVisibleOnMarketBoard': [b.get('sport') for b in board_rows],
              'totalGamesVisibleOnMarketBoard': sum(int(b.get('gameCount') or 0) for b in board_rows),
              'pullEndpointOk': pull.get('ok'),
              'marketBoardOk': board.get('ok'),
          }
          print('INQIS_LIVE_PULL_CONFIRMATION')
          print(json.dumps(summary, indent=2))
          if not stored:
              sys.exit('Live pull did not store any game rows. The response above contains the provider or storage reason.')
          if not board_rows:
              sys.exit('Market board does not show stored games. The response above contains the visibility reason.')
          PY
