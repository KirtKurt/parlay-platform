name: Inqis Live Odds Pulls

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/live-odds-pulls.yml'
      - 'hello_world/odds_live_ingestion.py'
      - 'hello_world/market_board.py'
      - 'hello_world/inqsi_pull_history.py'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'mlb,soccer,tennis,nfl,cfb,nba,wnba,ncaam,nhl'
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

jobs:
  pull:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull live odds directly into Inqis pull history and confirm stored rows
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: us
          ODDS_MARKETS: h2h,spreads,totals
          ODDS_FORMAT: american
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
        run: |
          set -euo pipefail
          test -n "$ODDS_API_KEY"
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:$PYTHONPATH"

          python - <<'PY'
          import json
          import os
          import sys

          import odds_live_ingestion
          import market_board

          sports = [s.strip() for s in os.environ.get('INPUT_SPORTS', '').split(',') if s.strip()]
          if not sports:
              sports = ['mlb', 'soccer', 'tennis', 'nfl', 'cfb', 'nba', 'wnba', 'ncaam', 'nhl']

          print('Pulling sports:', ','.join(sports))
          pull = odds_live_ingestion.pull_many(sports)
          print('PULL_RESPONSE')
          print(json.dumps(pull, indent=2, default=str))

          board = market_board.board_all({'sports': ','.join(sports)})
          print('MARKET_BOARD_RESPONSE')
          print(json.dumps(board, indent=2, default=str))

          stored = [r for r in pull.get('results', []) if int(r.get('gamesStored') or 0) > 0]
          visible = [b for b in board.get('boards', []) if int(b.get('gameCount') or 0) > 0]
          summary = {
              'sportsRequested': sports,
              'sportsWithStoredGamesFromPull': [r.get('appSport') for r in stored],
              'sportsVisibleOnMarketBoard': [b.get('sport') for b in visible],
              'totalGamesVisibleOnMarketBoard': sum(int(b.get('gameCount') or 0) for b in visible),
              'pullOk': pull.get('ok'),
              'marketBoardOk': board.get('ok'),
          }
          print('INQIS_LIVE_PULL_CONFIRMATION')
          print(json.dumps(summary, indent=2))

          if not stored:
              sys.exit('No live odds rows were stored in DynamoDB. See PULL_RESPONSE above for provider/status reasons.')
          if not visible:
              sys.exit('Stored rows were not visible through the market board reader. See MARKET_BOARD_RESPONSE above.')
          PY
