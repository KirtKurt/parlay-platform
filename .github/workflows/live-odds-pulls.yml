name: Inqis Live Odds Pulls

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'nfl,cfb,mlb,college_baseball_men,nba,wnba,ncaam,nhl,tennis,soccer'
      all:
        description: 'Pull all listed sports'
        required: false
        default: 'true'

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read API URL
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Pull live odds into Inqis pull history
        env:
          ADMIN_TOKEN: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
          INPUT_ALL: ${{ github.event.inputs.all }}
        run: |
          set -euo pipefail
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          SPORTS="${INPUT_SPORTS:-nfl,cfb,mlb,college_baseball_men,nba,wnba,ncaam,nhl,tennis,soccer}"
          ALL_FLAG="${INPUT_ALL:-true}"
          test -n "$ADMIN_TOKEN"

          echo "Provider status"
          curl --silent --show-error \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN" \
            "${API_URL}v1/inqsi/odds/provider-status?probe=true" \
            | tee provider-status.json \
            | python -m json.tool

          echo "Pulling live odds for: $SPORTS"
          HTTP_CODE=$(curl --silent --show-error --output pull-response.json --write-out "%{http_code}" \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN" \
            "${API_URL}v1/inqsi/odds/pull?all=${ALL_FLAG}&sports=${SPORTS}")

          cat pull-response.json | python -m json.tool
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Live odds pull failed. Response body is printed above."
            exit 1
          fi

          python - <<'PY'
          import json, sys
          data = json.load(open('pull-response.json'))
          results = data.get('results') or []
          stored = [r for r in results if (r.get('gamesStored') or 0) > 0]
          print('sportsWithStoredGames=', [r.get('appSport') for r in stored])
          if not stored:
              print('No games were stored. This can be normal for inactive sports, but no first pull is confirmed.')
          PY
