name: Inqis Live Odds Pulls

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/live-odds-pulls.yml'
      - 'hello_world/odds_live_ingestion.py'
      - 'hello_world/market_board.py'
      - 'hello_world/inqsi_pull_history.py'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'mlb,soccer,tennis,nfl,cfb,nba,wnba,ncaam,nhl'
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

permissions:
  contents: write

jobs:
  pull:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull live odds directly into Inqis pull history and write proof report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: us
          ODDS_MARKETS: h2h,spreads,totals
          ODDS_FORMAT: american
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"

          python - <<'PY'
          import json
          import os
          import sys
          import traceback
          from datetime import datetime, timezone

          def safe_error(exc):
              return {"type": type(exc).__name__, "message": str(exc), "tracebackTail": traceback.format_exc().splitlines()[-8:]}

          def compact_pull_result(row):
              providers = []
              for provider in row.get('providerPulls') or []:
                  err = provider.get('error')
                  if isinstance(err, dict):
                      err = {k: v for k, v in err.items() if 'key' not in str(k).lower() and 'secret' not in str(k).lower() and 'token' not in str(k).lower()}
                  providers.append({
                      'ok': provider.get('ok'),
                      'providerSportKey': provider.get('providerSportKey'),
                      'rawGamesReturned': provider.get('rawGamesReturned'),
                      'rawGamesInWindow': provider.get('rawGamesInWindow'),
                      'gamesStored': provider.get('gamesStored'),
                      'activeWindowStart': provider.get('activeWindowStart'),
                      'activeWindowEnd': provider.get('activeWindowEnd'),
                      'slateWindowDays': provider.get('slateWindowDays'),
                      'stored': provider.get('stored'),
                      'error': err,
                  })
              return {
                  'ok': row.get('ok'),
                  'appSport': row.get('appSport'),
                  'rawGamesReturned': row.get('rawGamesReturned'),
                  'rawGamesInWindow': row.get('rawGamesInWindow'),
                  'gamesStored': row.get('gamesStored'),
                  'providerPulls': providers,
              }

          def compact_board(row):
              return {
                  'ok': row.get('ok'),
                  'sport': row.get('sport'),
                  'slate_date': row.get('slate_date'),
                  'pullCount': row.get('pullCount'),
                  'latestPulledAt': row.get('latestPulledAt'),
                  'source': row.get('source'),
                  'providerSportKey': row.get('providerSportKey'),
                  'gameCount': row.get('gameCount'),
                  'sampleGames': [
                      {
                          'gameId': g.get('gameId'),
                          'homeTeam': g.get('homeTeam'),
                          'awayTeam': g.get('awayTeam'),
                          'commenceTime': g.get('commenceTime'),
                          'bookCount': g.get('bookCount'),
                      }
                      for g in (row.get('games') or [])[:3]
                  ],
              }

          report = {
              'ok': False,
              'createdAt': datetime.now(timezone.utc).isoformat(),
              'repo': os.environ.get('GITHUB_REPOSITORY'),
              'workflow': os.environ.get('GITHUB_WORKFLOW'),
              'runId': os.environ.get('GITHUB_RUN_ID'),
              'runNumber': os.environ.get('GITHUB_RUN_NUMBER'),
              'eventName': os.environ.get('GITHUB_EVENT_NAME'),
              'oddsApiKeyPresent': bool(os.environ.get('ODDS_API_KEY')),
              'snapshotsTable': os.environ.get('SNAPSHOTS_TABLE'),
          }

          try:
              if not os.environ.get('ODDS_API_KEY'):
                  raise RuntimeError('ODDS_API_KEY secret is not available to this workflow')
              import odds_live_ingestion
              import market_board

              sports = [s.strip() for s in os.environ.get('INPUT_SPORTS', '').split(',') if s.strip()]
              if not sports:
                  sports = ['mlb', 'soccer', 'tennis', 'nfl', 'cfb', 'nba', 'wnba', 'ncaam', 'nhl']

              pull = odds_live_ingestion.pull_many(sports)
              board = market_board.board_all({'sports': ','.join(sports)})
              pull_rows = [compact_pull_result(r) for r in pull.get('results', [])]
              board_rows = [compact_board(b) for b in board.get('boards', [])]
              stored_sports = [r.get('appSport') for r in pull_rows if int(r.get('gamesStored') or 0) > 0]
              visible_sports = [b.get('sport') for b in board_rows if int(b.get('gameCount') or 0) > 0]
              total_visible = sum(int(b.get('gameCount') or 0) for b in board_rows)
              report.update({
                  'ok': bool(stored_sports and visible_sports and total_visible > 0),
                  'sportsRequested': sports,
                  'sportsCanonical': pull.get('sportsCanonical'),
                  'sportsWithStoredGamesFromPull': stored_sports,
                  'sportsVisibleOnMarketBoard': visible_sports,
                  'totalGamesVisibleOnMarketBoard': total_visible,
                  'pullOk': pull.get('ok'),
                  'marketBoardOk': board.get('ok'),
                  'pullResults': pull_rows,
                  'marketBoards': board_rows,
                  'activeSlatePolicy': {
                      'mlb': 'today_plus_tomorrow',
                      'college_baseball_men': 'today_plus_tomorrow',
                      'nba': 'today_plus_tomorrow',
                      'wnba': 'today_plus_tomorrow',
                      'ncaam': 'today_plus_tomorrow',
                      'ncaaw': 'today_plus_tomorrow',
                      'nhl': 'today_plus_tomorrow',
                      'nfl': 'next_7_days_only',
                      'cfb': 'next_7_days_only',
                      'soccer': 'next_14_days_only',
                      'tennis': 'next_7_days_only_when_provider_keys_are_valid',
                  },
                  'storageShape': {
                      'table': os.environ.get('SNAPSHOTS_TABLE'),
                      'partitionKeyPattern': 'PULLS#{sport}#{slate_date}',
                      'sortKeyPattern': 'PULL#{pulled_at}#{pull_id}',
                      'recordType': 'pull_run',
                      'siloedBySport': True,
                      'siloedByDay': True,
                      'timestamped': True,
                  },
              })
          except Exception as exc:
              report['error'] = safe_error(exc)

          print('INQIS_LIVE_PULL_CONFIRMATION')
          print(json.dumps({
              'ok': report.get('ok'),
              'sportsWithStoredGamesFromPull': report.get('sportsWithStoredGamesFromPull'),
              'sportsVisibleOnMarketBoard': report.get('sportsVisibleOnMarketBoard'),
              'totalGamesVisibleOnMarketBoard': report.get('totalGamesVisibleOnMarketBoard'),
              'error': report.get('error'),
          }, indent=2, default=str))

          with open('runtime_reports/live_odds_latest.json', 'w', encoding='utf-8') as f:
              json.dump(report, f, indent=2, default=str)
              f.write('\n')
          PY

      - name: Commit safe proof report
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f runtime_reports/live_odds_latest.json ]; then
            mkdir -p runtime_reports
            printf '{"ok":false,"error":{"type":"missing_proof_report","message":"runtime_reports/live_odds_latest.json was not created"}}\n' > runtime_reports/live_odds_latest.json
          fi
          git add runtime_reports/live_odds_latest.json
          if git diff --cached --quiet; then
            echo "No proof report changes to commit."
          else
            git commit -m "Update live odds pull proof report"
            git push
          fi

      - name: Enforce live odds storage proof
        run: |
          python - <<'PY'
          import json, sys
          report = json.load(open('runtime_reports/live_odds_latest.json', encoding='utf-8'))
          if not report.get('ok'):
              print(json.dumps(report, indent=2, default=str))
              sys.exit('Live odds proof failed. See runtime_reports/live_odds_latest.json for the exact reason.')
          print('Live odds proof passed.')
          PY
