name: Inqis Live Odds Pulls

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated Inqis sports to pull'
        required: false
        default: 'nfl,cfb,mlb,college_baseball_men,nba,wnba,ncaam,nhl,tennis,soccer'
      all:
        description: 'Pull all listed sports'
        required: false
        default: 'true'
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

jobs:
  pull:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read API URL
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Pull live odds into Inqis pull history and confirm stored rows
        env:
          ADMIN_TOKEN: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
          INPUT_SPORTS: ${{ github.event.inputs.sports }}
          INPUT_ALL: ${{ github.event.inputs.all }}
        run: |
          set -euo pipefail
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          SPORTS="${INPUT_SPORTS:-mlb,college_baseball_men,soccer,tennis,nfl,cfb,nba,wnba,ncaam,nhl}"
          ALL_FLAG="${INPUT_ALL:-true}"
          test -n "$ADMIN_TOKEN"

          echo "Provider status"
          curl --fail --silent --show-error \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN" \
            "${API_URL}v1/inqsi/odds/provider-status?probe=true" \
            | tee provider-status.json \
            | python -m json.tool

          echo "Pulling live odds for: $SPORTS"
          curl --fail --silent --show-error \
            -H "x-inqsi-admin-token: $ADMIN_TOKEN" \
            "${API_URL}v1/inqsi/odds/pull?all=${ALL_FLAG}&sports=${SPORTS}" \
            | tee pull-response.json \
            | python -m json.tool

          echo "Reading public market board for stored row confirmation"
          curl --fail --silent --show-error \
            "${API_URL}v1/inqsi/markets/board?sports=${SPORTS}" \
            | tee market-board.json \
            | python -m json.tool

          python - <<'PY'
          import json, sys
          pull = json.load(open('pull-response.json'))
          board = json.load(open('market-board.json'))
          pull_results = pull.get('results') or []
          stored = [r for r in pull_results if (r.get('gamesStored') or 0) > 0]
          board_rows = [b for b in (board.get('boards') or []) if (b.get('gameCount') or 0) > 0]
          summary = {
              'sportsWithStoredGamesFromPull': [r.get('appSport') for r in stored],
              'sportsVisibleOnMarketBoard': [b.get('sport') for b in board_rows],
              'totalGamesVisibleOnMarketBoard': sum(int(b.get('gameCount') or 0) for b in board_rows),
          }
          print('INQIS_LIVE_PULL_CONFIRMATION')
          print(json.dumps(summary, indent=2))
          if not stored:
              sys.exit('Live pull did not store any game rows. Green is not allowed until at least one sport stores data.')
          if not board_rows:
              sys.exit('Market board does not show stored games. Green is not allowed until front-end readable data exists.')
          PY
