name: Publish MLB retry deployment attestation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/publish-mlb-retry-success-attestation.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUCCESS_TAG: mlb-retry-deployed-success-20260722
      ATTESTATION_BRANCH: attestation/mlb-retry-deployed-20260722
      ATTESTATION_PATH: runtime_reports/mlb_retry_deployment_attestation_20260722.json
    steps:
      - name: Wait for immutable success tag and publish public attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, time, urllib.error, urllib.request
          repo=os.environ['GITHUB_REPOSITORY']; token=os.environ['GH_TOKEN']
          tag=os.environ['SUCCESS_TAG']; branch=os.environ['ATTESTATION_BRANCH']; path=os.environ['ATTESTATION_PATH']
          api='https://api.github.com'
          def call(method,route,payload=None):
              data=None if payload is None else json.dumps(payload).encode()
              req=urllib.request.Request(api+route,data=data,method=method,headers={
                  'Accept':'application/vnd.github+json','Authorization':f'Bearer {token}',
                  'X-GitHub-Api-Version':'2022-11-28','User-Agent':'mlb-attestation-publisher/1.0',
                  **({'Content-Type':'application/json'} if data is not None else {})})
              try:
                  with urllib.request.urlopen(req,timeout=120) as r: body=r.read(); status=r.getcode()
              except urllib.error.HTTPError as exc:
                  body=exc.read().decode('utf-8','replace')
                  raise RuntimeError(f'{method} {route} returned {exc.code}: {body[:1200]}') from exc
              return {} if status==204 or not body else json.loads(body.decode())
          deadline=time.monotonic()+85*60; success_sha=''
          while time.monotonic()<deadline:
              try:
                  ref=call('GET',f'/repos/{repo}/git/ref/tags/{tag}')
                  success_sha=str((ref.get('object') or {}).get('sha') or '')
              except RuntimeError as exc:
                  if 'returned 404' not in str(exc): raise
              if success_sha: break
              print('ATTESTATION_WAIT success_tag_not_present',flush=True); time.sleep(20)
          if not success_sha: raise SystemExit('success tag deadline exhausted')
          base=call('GET',f'/repos/{repo}/git/commits/{success_sha}')
          base_tree=str((base.get('tree') or {}).get('sha') or '')
          evidence={
              'ok':True,
              'proofType':'MLB_RETRY_DEPLOYMENT_SUCCESS_TAG_ATTESTATION_V1',
              'mergeGitSha':success_sha,
              'successTag':tag,
              'sourceContractRequired':True,
              'exactDeploymentIdentityRequired':True,
              'liveHealthLockStatusAndPredictionsRequired':True,
              'publishedByWorkflowRunId':os.environ.get('GITHUB_RUN_ID'),
          }
          blob=call('POST',f'/repos/{repo}/git/blobs',{'content':json.dumps(evidence,indent=2,sort_keys=True)+'\n','encoding':'utf-8'})
          tree=call('POST',f'/repos/{repo}/git/trees',{'base_tree':base_tree,'tree':[{'path':path,'mode':'100644','type':'blob','sha':blob['sha']}]})
          commit=call('POST',f'/repos/{repo}/git/commits',{'message':'Record MLB retry deployment attestation','tree':tree['sha'],'parents':[success_sha]})
          commit_sha=str(commit.get('sha') or '')
          try:
              call('POST',f'/repos/{repo}/git/refs',{'ref':f'refs/heads/{branch}','sha':commit_sha})
          except RuntimeError as exc:
              if 'returned 422' not in str(exc): raise
              call('PATCH',f'/repos/{repo}/git/refs/heads/{branch}',{'sha':commit_sha,'force':True})
          for number in (62,64,65):
              try:
                  pr=call('GET',f'/repos/{repo}/pulls/{number}')
                  if pr.get('state')=='open' and pr.get('merged_at') is None:
                      call('PATCH',f'/repos/{repo}/pulls/{number}',{'state':'closed'})
              except Exception as exc:
                  print(f'cleanup warning PR {number}: {exc}',flush=True)
          print('ATTESTATION_PUBLISHED '+json.dumps({'branch':branch,'commit':commit_sha,'evidence':evidence},sort_keys=True),flush=True)
          PY
