name: Inspect MLB Pull FunctionError 84b1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-pull-functionerror-84b1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only diagnostic runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read forced and normal scheduled pull results from CloudWatch
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3

          def epoch_ms(value: str) -> int:
              return int(datetime.fromisoformat(value.replace('Z', '+00:00')).timestamp() * 1000)

          region = os.environ.get('AWS_REGION') or 'us-east-1'
          cfn = boto3.client('cloudformation', region_name=region)
          detail = cfn.describe_stack_resource(
              StackName='parlay-platform-dev',
              LogicalResourceId='MLBAuditedPullFunction',
          )['StackResourceDetail']
          function_name = detail['PhysicalResourceId']
          log_group = f'/aws/lambda/{function_name}'
          logs = boto3.client('logs', region_name=region)
          window_start = '2026-07-23T02:13:30Z'
          window_end = '2026-07-23T02:25:30Z'
          events = []
          token = None
          while True:
              kwargs = {
                  'logGroupName': log_group,
                  'startTime': epoch_ms(window_start),
                  'endTime': epoch_ms(window_end),
                  'interleaved': True,
                  'limit': 10000,
              }
              if token:
                  kwargs['nextToken'] = token
              response = logs.filter_log_events(**kwargs)
              events.extend(response.get('events') or [])
              next_token = response.get('nextToken')
              if not next_token or next_token == token:
                  break
              token = next_token

          request_re = re.compile(r'(?:START|END|REPORT) RequestId:\s*([A-Za-z0-9-]+)')
          error_re = re.compile(
              r'(MLB_SCHEDULED_PULL_FAILED|MLB_SCHEDULED_PULL_PREREQUISITE_FAILED|Traceback|errorMessage|Runtime\.|FunctionError|prelock|winner_prediction|scoring_run|operationalDefect|candidatePersistenceFailures|Task timed out)',
              re.IGNORECASE,
          )
          selected = []
          request_ids = set()
          reports = []
          errors = []
          for event in events:
              message = str(event.get('message') or '')
              stamp = datetime.fromtimestamp(
                  int(event.get('timestamp') or 0) / 1000,
                  tz=timezone.utc,
              ).isoformat().replace('+00:00', 'Z')
              match = request_re.search(message)
              if match:
                  request_ids.add(match.group(1))
              if message.startswith('REPORT RequestId:'):
                  reports.append({'timestampUtc': stamp, 'message': message[:5000]})
              if error_re.search(message):
                  errors.append({'timestampUtc': stamp, 'message': message[:50000]})
              if match or error_re.search(message):
                  selected.append({
                      'timestampUtc': stamp,
                      'logStreamName': event.get('logStreamName'),
                      'message': message[:50000],
                  })

          out = {
              'ok': True,
              'readOnly': True,
              'functionName': function_name,
              'logGroup': log_group,
              'windowStartUtc': window_start,
              'windowEndUtc': window_end,
              'eventCount': len(events),
              'selectedCount': len(selected),
              'requestIds': sorted(request_ids),
              'reportCount': len(reports),
              'errorCount': len(errors),
              'reports': reports,
              'errors': errors,
              'selectedEvents': selected,
              'secretExposed': False,
          }
          path = Path('/tmp/mlb-pull-functionerror-84b1.json')
          path.write_text(json.dumps(out, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps({
              'ok': True,
              'functionName': function_name,
              'eventCount': len(events),
              'reportCount': len(reports),
              'errorCount': len(errors),
              'requestIds': sorted(request_ids),
              'output': str(path),
          }, indent=2))
          PY

      - name: Upload read-only CloudWatch evidence
        uses: actions/upload-artifact@v4
        with:
          name: mlb-pull-functionerror-84b1-${{ github.run_id }}
          path: /tmp/mlb-pull-functionerror-84b1.json
          if-no-files-found: error
