name: MLB Rolling 24h Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-rolling-24h-audit.yml'
      - 'hello_world/mlb_rolling_24h_audit.py'
      - 'hello_world/mlb_accuracy_target_patch.py'
      - 'hello_world/all_sports_live_scheduler.py'
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run rolling 24h MLB audit
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          python - <<'PY'
          import json
          import mlb_rolling_24h_audit
          report = mlb_rolling_24h_audit.build(store=True, write_file=True)
          print(json.dumps({
              'ok': report.get('ok'),
              'summary': report.get('summary'),
              'stored': report.get('stored'),
              'storeError': report.get('storeError'),
          }, indent=2, default=str))
          PY

      - name: Commit rolling audit proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_rolling_24h_audit_latest.json || true
          git commit -m "Update MLB rolling 24h audit proof" || true
          git pull --rebase --autostash origin main || true
          git push || true
