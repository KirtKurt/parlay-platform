name: MLB Rolling 24h Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-rolling-24h-audit.yml'
      - 'hello_world/mlb_rolling_24h_audit.py'
      - 'hello_world/mlb_accuracy_target_patch.py'
      - 'hello_world/mlb_audit_actionability_patch.py'
      - 'hello_world/mlb_learning_signal_filter_patch.py'
      - 'hello_world/mlb_locked_card_audit_v1.py'
      - 'hello_world/mlb_doubleheader_safe_audit_patch.py'
      - 'hello_world/mlb_slate_coverage_patch.py'
      - 'hello_world/mlb_real_world_accuracy_patch.py'
      - 'hello_world/mlb_real_world_accuracy_semantics_fix.py'
      - 'hello_world/mlb_ml_signal_layers.py'
      - 'hello_world/mlb_ml_feature_vector.py'
      - 'hello_world/mlb_ml_candidate_policy.py'
      - 'hello_world/mlb_ml_runtime_overlay.py'
      - 'hello_world/mlb_ml_runtime_safety_patch.py'
      - 'hello_world/mlb_ml_frozen_features.py'
      - 'hello_world/mlb_ml_audit_feature_bridge_v1.py'
      - 'hello_world/mlb_ml_clean_cohort_v1.py'
      - 'hello_world/mlb_ml_clean_cohort_hardening_v1.py'
      - 'hello_world/mlb_ml_dual_model_v1.py'
      - 'hello_world/mlb_ml_walk_forward_v1.py'
      - 'hello_world/mlb_fundamentals_snapshot_v1.py'
      - 'hello_world/mlb_ml_champion_challenger_v1.py'
      - 'hello_world/mlb_ml_manual_promotion_only_patch.py'
      - 'hello_world/mlb_ml_champion_runtime_v1.py'
      - 'hello_world/mlb_ml_runtime_install_v3.py'
      - 'hello_world/mlb_ml_optimization_v3.py'
      - 'hello_world/sitecustomize.py'
      - 'hello_world/usercustomize.py'
      - 'hello_world/all_sports_live_scheduler.py'
      - 'scripts/verify_mlb_official_prediction_semantics.py'
      - 'scripts/verify_mlb_complete_slate_coverage.py'
      - 'scripts/verify_mlb_ml_optimization_v3.py'
      - 'scripts/promote_mlb_ml_champion.py'
      - '.github/workflows/mlb-ml-promote-champion.yml'
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Validate official/playable accuracy semantics
        run: python scripts/verify_mlb_official_prediction_semantics.py

      - name: Validate complete-slate and doubleheader coverage
        run: python scripts/verify_mlb_complete_slate_coverage.py

      - name: Validate ML optimization v3 architecture
        run: python scripts/verify_mlb_ml_optimization_v3.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run rolling 24h MLB audit and train clean dual challenger
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INQSI_MLB_ML_AUTO_PROMOTE: 'false'
          INQSI_MLB_ALLOW_LOCAL_FILE_CHAMPION: 'false'
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          python - <<'PY'
          import json
          import mlb_rolling_24h_audit
          report = mlb_rolling_24h_audit.build(store=True, write_file=True)
          accuracy = report.get('realWorldAccuracy') or {}
          windows = accuracy.get('windows') or {}
          optimization = report.get('mlOptimizationV3') or {}
          authority = report.get('mlTrainingAuthority') or {}
          print(json.dumps({
              'ok': report.get('ok'),
              'summary': report.get('summary'),
              'realWorldAccuracyVersion': accuracy.get('version'),
              'current24h': windows.get('current24h'),
              'evidenceProgress': accuracy.get('evidenceProgress'),
              'accuracyLedger': report.get('accuracyLedger'),
              'mlOptimizationV3': optimization,
              'mlTrainingAuthority': authority,
              'stored': report.get('stored'),
              'storeError': report.get('storeError'),
          }, indent=2, default=str))
          if accuracy.get('applied') is not True:
              raise SystemExit('real-world accuracy scorecard was not applied')
          if report.get('accuracyLedger', {}).get('immutable') is not True:
              raise SystemExit('immutable settled-game accuracy ledger was not enabled')
          if optimization.get('applied') is not True:
              raise SystemExit('ML optimization v3 was not applied')
          if authority.get('authoritative') != 'mlOptimizationV3_clean_dual_model_only':
              raise SystemExit('legacy ML trainer still has production authority')
          if authority.get('automaticChampionPromotion') is not False:
              raise SystemExit('automatic champion promotion must remain disabled')
          if authority.get('productionAuthoritySource') != 'reviewed_DynamoDB_champion_bundle_only':
              raise SystemExit('DynamoDB reviewed champion is not the sole production authority')
          if optimization.get('automaticPromotionSupported') is not False:
              raise SystemExit('optimization output incorrectly allows automatic promotion')
          PY

      - name: Commit rolling audit proof and ML artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_rolling_24h_audit_latest.json || true
          git add runtime_reports/mlb_ml_training_dataset_latest.csv || true
          git add runtime_reports/mlb_ml_model_latest.json || true
          git add runtime_reports/mlb_ml_clean_cohort_latest.json || true
          git add runtime_reports/mlb_ml_outcome_challenger_latest.json || true
          git add runtime_reports/mlb_ml_reliability_challenger_latest.json || true
          git add runtime_reports/mlb_ml_challenger_bundle_latest.json || true
          git add runtime_reports/mlb_ml_optimization_status_latest.json || true
          git commit -m "Update MLB rolling audit and ML optimization artifacts" || true
          git pull --rebase --autostash origin main || true
          git push || true
