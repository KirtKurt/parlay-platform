name: MLB Rolling 24h Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-rolling-24h-audit.yml'
      # Broad contract paths prevent a new policy/validator module from bypassing
      # the authoritative AWS-backed audit simply because it was not enumerated.
      - 'hello_world/mlb_*.py'
      - 'scripts/*mlb*.py'
      - 'tests/unit/test_mlb_*.py'
      - 'template.yaml'
      - 'hello_world/mlb_rolling_24h_audit.py'
      - 'hello_world/mlb_accuracy_target_patch.py'
      - 'hello_world/mlb_audit_actionability_patch.py'
      - 'hello_world/mlb_learning_signal_filter_patch.py'
      - 'hello_world/mlb_locked_card_audit_v1.py'
      - 'hello_world/mlb_doubleheader_safe_audit_patch.py'
      - 'hello_world/mlb_daily_lock_audit_fallback_patch.py'
      - 'hello_world/mlb_daily_per_game_lock_patch.py'
      - 'hello_world/mlb_manual_pull.py'
      - 'hello_world/mlb_slate_coverage_patch.py'
      - 'hello_world/mlb_production_verifier.py'
      - 'hello_world/mlb_immutable_locked_storage_patch.py'
      - 'hello_world/mlb_real_world_accuracy_patch.py'
      - 'hello_world/mlb_real_world_accuracy_semantics_fix.py'
      - 'hello_world/mlb_ml_critical_blockers_patch.py'
      - 'hello_world/mlb_ml_signal_layers.py'
      - 'hello_world/mlb_ml_feature_vector.py'
      - 'hello_world/mlb_ml_candidate_policy.py'
      - 'hello_world/mlb_ml_runtime_overlay.py'
      - 'hello_world/mlb_ml_runtime_safety_patch.py'
      - 'hello_world/mlb_ml_frozen_features.py'
      - 'hello_world/mlb_ml_exact_lock_vector_patch.py'
      - 'hello_world/mlb_official_freeze_bridge.py'
      - 'hello_world/mlb_ml_audit_feature_bridge_v1.py'
      - 'hello_world/mlb_ml_clean_cohort_v1.py'
      - 'hello_world/mlb_ml_clean_cohort_hardening_v1.py'
      - 'hello_world/mlb_ml_dual_model_v1.py'
      - 'hello_world/mlb_temporal_features_v1.py'
      - 'hello_world/mlb_ml_feature_missingness_v1.py'
      - 'hello_world/mlb_ml_walk_forward_v1.py'
      - 'hello_world/mlb_fundamentals_snapshot_v1.py'
      - 'hello_world/mlb_ml_champion_challenger_v1.py'
      - 'hello_world/mlb_ml_champion_runtime_v1.py'
      - 'hello_world/mlb_ml_runtime_install_v3.py'
      - 'hello_world/mlb_ml_optimization_v3.py'
      - 'hello_world/sitecustomize.py'
      - 'hello_world/usercustomize.py'
      - 'hello_world/all_sports_live_scheduler.py'
      - 'scripts/verify_mlb_schedule_invariants.py'
      - 'scripts/verify_mlb_official_prediction_semantics.py'
      - 'scripts/verify_mlb_complete_slate_coverage.py'
      - 'scripts/verify_mlb_immutable_locked_storage.py'
      - 'scripts/verify_mlb_settlement_matching_v3.py'
      - 'scripts/verify_mlb_daily_lock_audit_fallback.py'
      - 'scripts/verify_mlb_postdeploy_settlement_integrity.py'
      - 'scripts/verify_mlb_selected_side_odds_coverage.py'
      - 'scripts/verify_mlb_ml_optimization_v3.py'
      - 'scripts/verify_mlb_ml_training_readiness.py'
      - 'scripts/verify_mlb_ml_feature_integrity.py'
      - 'scripts/verify_mlb_temporal_missingness_features.py'
      - 'scripts/verify_mlb_per_game_lock.py'
      - 'tests/unit/test_mlb_daily_per_game_lock.py'
      - 'scripts/mlb_ml_feature_test_fixtures.py'
      - 'scripts/verify_mlb_ml_installation_1_5.py'
      - 'scripts/extract_mlb_missing_settlement_diagnostics.py'
      - 'scripts/run_mlb_ml_v3_validation_report.py'
      - 'scripts/run_mlb_ml_v3_audit_report.py'
      - 'scripts/promote_mlb_ml_champion.py'
  schedule:
    - cron: '20,50 * * * *'
  workflow_dispatch:

concurrency:
  group: mlb-rolling-24h-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3 "pytest>=8,<9"

      - name: Verify settlement matching before AWS audit
        run: python scripts/verify_mlb_settlement_matching_v3.py

      - name: Verify immutable daily lock settlement fallback
        run: python scripts/verify_mlb_daily_lock_audit_fallback.py

      - name: Generate persistent ML v3 validation report
        run: python scripts/run_mlb_ml_v3_validation_report.py

      - name: Enforce ML v3 validation report
        run: |
          python - <<'PY'
          import json
          report = json.load(open('runtime_reports/mlb_ml_v3_validation_latest.json', encoding='utf-8'))
          if report.get('ok') is not True:
              failed = [item for item in report.get('results') or [] if item.get('ok') is not True]
              raise SystemExit('MLB ML v3 validation failed: ' + json.dumps(failed, default=str))
          installation = json.load(open('runtime_reports/mlb_ml_installation_1_5_latest.json', encoding='utf-8'))
          if installation.get('ok') is not True:
              raise SystemExit('MLB ML installation 1-5 failed: ' + json.dumps(installation, default=str))
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate persistent AWS-backed MLB audit report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          # Read-only monitoring only. EventBridge/AWS owns live learning.
          INQSI_MLB_ML_AUTO_PROMOTE: 'false'
          INQSI_MLB_ML_AUDIT_STORE: 'false'
          INQSI_MLB_ALLOW_LOCAL_FILE_CHAMPION: 'false'
          INQSI_MLB_GREEN_DEPLOYMENT_AT_UTC: '2026-07-13T00:20:03+00:00'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: python scripts/run_mlb_ml_v3_audit_report.py

      - name: Extract settlement mismatch diagnostics
        run: python scripts/extract_mlb_missing_settlement_diagnostics.py

      - name: Verify post-deploy final-label joins
        env:
          INQSI_MLB_GREEN_DEPLOYMENT_AT_UTC: '2026-07-13T00:20:03+00:00'
        run: python scripts/verify_mlb_postdeploy_settlement_integrity.py

      - name: Verify selected-side odds coverage
        env:
          INQSI_MLB_GREEN_DEPLOYMENT_AT_UTC: '2026-07-13T00:20:03+00:00'
        run: python scripts/verify_mlb_selected_side_odds_coverage.py

      - name: Enforce AWS-backed MLB audit and freshness
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path('runtime_reports/mlb_ml_v3_audit_execution_latest.json')
          report = json.loads(path.read_text(encoding='utf-8'))
          if report.get('ok') is not True:
              raise SystemExit('AWS-backed MLB ML v3 audit failed: ' + json.dumps(report, default=str))
          created = datetime.fromisoformat(str(report.get('createdAtUtc')).replace('Z', '+00:00')).astimezone(timezone.utc)
          age_minutes = (datetime.now(timezone.utc) - created).total_seconds() / 60.0
          freshness = {
              'ok': 0 <= age_minutes <= 15,
              'checkedAtUtc': datetime.now(timezone.utc).isoformat(),
              'auditCreatedAtUtc': created.isoformat(),
              'auditAgeMinutes': round(age_minutes, 2),
              'maximumAllowedAgeMinutes': 15,
              'schedule': 'primary_at_minute_20_backup_at_minute_50',
              'reportOk': report.get('ok'),
              'cleanRowCount': ((report.get('mlOptimizationV3') or {}).get('cleanRowCount')),
              'completedFinalGames': ((report.get('summary') or {}).get('completedFinalGames')),
              'gradedPredictionCount': ((report.get('summary') or {}).get('gradedPredictionCount')),
              'missingPredictionCount': ((report.get('summary') or {}).get('missingPredictionCount')),
          }
          Path('runtime_reports/mlb_audit_freshness_latest.json').write_text(json.dumps(freshness, indent=2) + '\n', encoding='utf-8')
          if freshness['ok'] is not True:
              raise SystemExit('MLB audit freshness failed: ' + json.dumps(freshness, default=str))
          PY

      - name: Upload read-only rolling audit proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-read-only-rolling-audit-${{ github.run_id }}
          path: runtime_reports/
          if-no-files-found: warn
          retention-days: 14
