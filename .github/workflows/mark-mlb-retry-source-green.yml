name: Mark MLB retry source contract green

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/mark-mlb-retry-source-green.yml"

permissions:
  actions: read
  contents: write
  pull-requests: read

jobs:
  mark:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      TARGET_HEAD: agent/mlb-deploy-heavy-read-retry-policy-final-v4
      TARGET_TITLE: Fix MLB deploy heavy-read retry policy
      SOURCE_WORKFLOW: MLB Production Source Contract
      READY_TAG: mlb-retry-source-contract-green-20260722
    steps:
      - name: Wait for exact source contract and publish immutable ready tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, time, urllib.error, urllib.parse, urllib.request
          repo=os.environ['GITHUB_REPOSITORY']; token=os.environ['GH_TOKEN']
          head_ref=os.environ['TARGET_HEAD']; title=os.environ['TARGET_TITLE']
          workflow=os.environ['SOURCE_WORKFLOW']; tag=os.environ['READY_TAG']
          api='https://api.github.com'
          def call(method,path,payload=None):
              data=None if payload is None else json.dumps(payload).encode()
              req=urllib.request.Request(api+path,data=data,method=method,headers={
                  'Accept':'application/vnd.github+json','Authorization':f'Bearer {token}',
                  'X-GitHub-Api-Version':'2022-11-28','User-Agent':'mlb-source-green-marker/1.0',
                  **({'Content-Type':'application/json'} if data is not None else {})})
              try:
                  with urllib.request.urlopen(req,timeout=120) as r: body=r.read(); status=r.getcode()
              except urllib.error.HTTPError as exc:
                  body=exc.read().decode('utf-8','replace')
                  raise RuntimeError(f'{method} {path} returned {exc.code}: {body[:1200]}') from exc
              return {} if status==204 or not body else json.loads(body.decode())
          q=urllib.parse.urlencode({'state':'open','head':f'KirtKurt:{head_ref}','base':'main','per_page':100})
          prs=call('GET',f'/repos/{repo}/pulls?{q}')
          matches=[p for p in prs if isinstance(p,dict) and p.get('title')==title]
          if len(matches)!=1: raise SystemExit(f'expected one exact open PR, found {len(matches)}')
          pr=matches[0]; number=int(pr['number']); head_sha=str(pr['head']['sha'])
          files=call('GET',f'/repos/{repo}/pulls/{number}/files?per_page=100')
          names=sorted(x.get('filename') for x in files if isinstance(x,dict))
          expected=sorted(['.github/workflows/deploy.yml','tests/unit/test_mlb_deploy_heavy_read_retry_policy.py'])
          if names!=expected: raise SystemExit(f'file scope mismatch: {names}')
          compare=call('GET',f'/repos/{repo}/compare/main...{head_sha}')
          if int(compare.get('ahead_by') or 0)!=1 or int(compare.get('behind_by') or 0)!=0:
              raise SystemExit(f'candidate is not one clean commit ahead: {compare.get("status")}')
          deadline=time.monotonic()+50*60; run=None
          while time.monotonic()<deadline:
              query=urllib.parse.urlencode({'head_sha':head_sha,'event':'pull_request','per_page':100})
              runs=call('GET',f'/repos/{repo}/actions/runs?{query}').get('workflow_runs') or []
              candidates=[r for r in runs if r.get('head_sha')==head_sha and r.get('name')==workflow]
              if candidates:
                  run=max(candidates,key=lambda r:int(r.get('run_number') or 0))
                  print('SOURCE_GREEN_POLL '+json.dumps({'id':run.get('id'),'status':run.get('status'),'conclusion':run.get('conclusion')},sort_keys=True),flush=True)
                  if run.get('status')=='completed': break
              time.sleep(15)
          if not run or run.get('status')!='completed': raise SystemExit('source contract deadline exhausted')
          if run.get('conclusion')!='success': raise SystemExit(f'source contract concluded {run.get("conclusion")}')
          try:
              call('POST',f'/repos/{repo}/git/refs',{'ref':f'refs/tags/{tag}','sha':head_sha})
          except RuntimeError as exc:
              if 'returned 422' not in str(exc): raise
              call('PATCH',f'/repos/{repo}/git/refs/tags/{tag}',{'sha':head_sha,'force':True})
          print('SOURCE_CONTRACT_GREEN '+json.dumps({'pr':number,'headSha':head_sha,'runId':run.get('id'),'tag':tag},sort_keys=True),flush=True)
          PY
