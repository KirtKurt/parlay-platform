name: Verify MLB Persistence Postdeploy 2026-07-23

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/verify-mlb-persistence-postdeploy-20260723.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only verifier runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build post-deploy pull, scoring, runtime, and identity proof
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          SIGNAL_LEDGER_TABLE: parlay_platform_signal_ledger
          PREDICTIONS_TABLE: parlay_platform_predictions
          OUTCOMES_TABLE: parlay_platform_outcomes
          TARGET_SHA: b8ee1012a0290f95e1ef3df4d38b864d93c21e1a
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-postdeploy-persistence
          SLATE_DATE=$(TZ=America/New_York date +%F)
          echo "$SLATE_DATE" > /tmp/mlb-postdeploy-persistence/slate_date.txt

          PK="PULLS#mlb#${SLATE_DATE}"
          AWS_OK=true
          aws dynamodb query \
            --region "$AWS_REGION" \
            --table-name "$SNAPSHOTS_TABLE" \
            --key-condition-expression "PK = :pk" \
            --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" \
            --consistent-read \
            --output json > /tmp/mlb-postdeploy-persistence/pulls.json \
            2>/tmp/mlb-postdeploy-persistence/pull_error.txt || AWS_OK=false
          if [ "$AWS_OK" = "false" ]; then echo '{"Items":[]}' > /tmp/mlb-postdeploy-persistence/pulls.json; fi

          python scripts/mlb_pull_guard_status.py \
            --slate-date "$SLATE_DATE" \
            --pulls-json /tmp/mlb-postdeploy-persistence/pulls.json \
            --aws-ok "$AWS_OK" \
            --aws-error-file /tmp/mlb-postdeploy-persistence/pull_error.txt \
            --output /tmp/mlb-postdeploy-persistence/pull_guard.json

          python scripts/mlb_scoring_guard_status.py \
            --slate-date "$SLATE_DATE" \
            --output /tmp/mlb-postdeploy-persistence/scoring_guard.json || true

          python scripts/diagnose_mlb_pull_lambda_runtime.py \
            --hours 1 \
            --output /tmp/mlb-postdeploy-persistence/runtime.json || true

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import boto3

          root = Path('/tmp/mlb-postdeploy-persistence')
          def load(name):
              try:
                  return json.loads((root / name).read_text(encoding='utf-8'))
              except Exception:
                  return {}

          pull = load('pull_guard.json')
          scoring = load('scoring_guard.json')
          runtime = load('runtime.json')
          region = os.environ['AWS_REGION']
          target = os.environ['TARGET_SHA']
          cfn = boto3.client('cloudformation', region_name=region)
          lamb = boto3.client('lambda', region_name=region)
          resource = cfn.describe_stack_resource(
              StackName='parlay-platform-dev',
              LogicalResourceId='MLBAuditedPullFunction',
          )['StackResourceDetail']
          config = lamb.get_function_configuration(FunctionName=resource['PhysicalResourceId'])
          deployed_sha = str(((config.get('Environment') or {}).get('Variables') or {}).get('INQSI_DEPLOY_GIT_SHA') or '')
          summary = scoring.get('summary') or {}
          recent_reports = runtime.get('recentReports') or []
          deployment_time = str(config.get('LastModified') or '')
          report = {
              'ok': bool(
                  deployed_sha == target
                  and pull.get('guardPassed') is True
                  and scoring.get('guardPassed') is True
                  and int(summary.get('officialGameCount') or 0) > 0
                  and int(summary.get('persistedPredictionGameCount') or 0)
                      == int(summary.get('officialGameCount') or -1)
                  and int(summary.get('missingPredictionCount') or -1) == 0
                  and int(summary.get('movementFeatureGameCount') or 0)
                      == int(summary.get('officialGameCount') or -1)
                  and int(summary.get('missingMovementCount') or -1) == 0
                  and not (runtime.get('timeouts') or [])
              ),
              'proofType': 'MLB_POSTDEPLOY_PERSISTENCE_READ_ONLY_PROOF',
              'createdAtUtc': datetime.now(timezone.utc).isoformat().replace('+00:00','Z'),
              'slateDateEt': (root / 'slate_date.txt').read_text().strip(),
              'targetDeploySha': target,
              'deployedGitSha': deployed_sha,
              'functionName': resource['PhysicalResourceId'],
              'functionLastModified': deployment_time,
              'timeoutSeconds': config.get('Timeout'),
              'memorySizeMb': config.get('MemorySize'),
              'pullGuardPassed': pull.get('guardPassed') is True,
              'scoringGuardPassed': scoring.get('guardPassed') is True,
              'scoringSummary': summary,
              'scoringBlockers': scoring.get('blockers') or [],
              'latestCanonicalPullAtUtc': summary.get('latestCanonicalPullAtUtc'),
              'runtimeTimeoutCount': len(runtime.get('timeouts') or []),
              'runtimeScheduledFailureCount': len(runtime.get('scheduledFailureDetails') or []),
              'runtimeClassifiedErrorCount': len(runtime.get('classifiedErrors') or []),
              'latestRuntimeReports': recent_reports[-8:],
              'readOnly': True,
              'productionWritesPerformed': False,
              'secretExposed': False,
          }
          (root / 'postdeploy_persistence_proof.json').write_text(
              json.dumps(report, indent=2, sort_keys=True, default=str) + '\n',
              encoding='utf-8',
          )
          print(json.dumps({
              'ok': report['ok'],
              'deployedGitSha': report['deployedGitSha'],
              'pullGuardPassed': report['pullGuardPassed'],
              'scoringGuardPassed': report['scoringGuardPassed'],
              'scoringSummary': report['scoringSummary'],
              'scoringBlockers': report['scoringBlockers'],
              'runtimeTimeoutCount': report['runtimeTimeoutCount'],
              'runtimeScheduledFailureCount': report['runtimeScheduledFailureCount'],
          }, indent=2, default=str))
          if not report['ok']:
              raise SystemExit('Post-deploy persistence proof is not green')
          PY

      - name: Upload post-deploy persistence proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-postdeploy-persistence-${{ github.run_id }}
          path: /tmp/mlb-postdeploy-persistence/
          if-no-files-found: error
