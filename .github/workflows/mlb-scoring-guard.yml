name: MLB Scoring Guard

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mlb-scoring-guard.yml'
      - 'scripts/mlb_scoring_guard_status.py'
      - 'tests/unit/test_mlb_scoring_guard_status.py'
  push:
    paths:
      - '.github/workflows/mlb-scoring-guard.yml'
      - 'scripts/mlb_scoring_guard_status.py'
      - 'tests/unit/test_mlb_scoring_guard_status.py'
  workflow_dispatch:
  schedule:
    - cron: '7/15 * * * *'

permissions:
  contents: write

concurrency:
  group: mlb-scoring-guard-read-only
  cancel-in-progress: false

jobs:
  scoring-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only guard runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Verify scoring guard semantics
        run: python -m pytest -q tests/unit/test_mlb_scoring_guard_status.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and enforce live MLB scoring proof
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          SIGNAL_LEDGER_TABLE: parlay_platform_signal_ledger
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          SLATE_DATE=$(TZ=America/New_York date +%F)
          python scripts/mlb_scoring_guard_status.py \
            --slate-date "$SLATE_DATE" \
            --output runtime_reports/mlb_scoring_guard_status_latest.json \
            --enforce

      - name: Upload scoring proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-scoring-guard-${{ github.run_id }}
          path: runtime_reports/mlb_scoring_guard_status_latest.json
          if-no-files-found: error

      - name: Publish latest proof on the current branch
        if: success() && (github.event_name == 'push' || github.event_name == 'schedule')
        run: |
          set -euo pipefail
          TARGET_BRANCH="${GITHUB_REF_NAME}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add runtime_reports/mlb_scoring_guard_status_latest.json
          if git diff --cached --quiet; then
            echo 'No scoring proof change'
          else
            git commit -m 'Update MLB scoring guard read-only proof'
            git pull --rebase --autostash origin "$TARGET_BRANCH"
            git push origin "HEAD:$TARGET_BRANCH"
          fi
