name: MLB Historical Daily Optimizer

"on":
  pull_request:
    paths:
      - 'hello_world/mlb_historical_*.py'
      - 'hello_world/mlb_ranked_primary_v15_10.py'
      - 'hello_world/mlb_ml_runtime_install_v3.py'
      - 'hello_world/mlb_v3_read_api.py'
      - 'tests/unit/test_mlb_historical_*.py'
      - 'mlb_historical_optimizer/**'
      - 'docs/MLB_HISTORICAL_DAILY_OPTIMIZER_V15_11.md'
      - '.github/workflows/mlb-historical-optimizer.yml'
  push:
    branches: [main]
    paths:
      - 'hello_world/mlb_historical_*.py'
      - 'hello_world/mlb_ranked_primary_v15_10.py'
      - 'hello_world/mlb_ml_runtime_install_v3.py'
      - 'hello_world/mlb_v3_read_api.py'
      - 'tests/unit/test_mlb_historical_*.py'
      - 'mlb_historical_optimizer/**'
      - 'docs/MLB_HISTORICAL_DAILY_OPTIMIZER_V15_11.md'
      - '.github/workflows/mlb-historical-optimizer.yml'
  workflow_dispatch:
    inputs:
      deploy_runtime_guard:
        description: Install the fail-closed historical authority loader in the production MLB Lambda
        type: boolean
        default: false
      runtime_guard_confirmation:
        description: Type INSTALL_FAIL_CLOSED_HISTORICAL_RUNTIME_GUARD
        type: string
        default: ''
      deploy_optimizer_stack:
        description: Deploy or update the separate historical optimizer stack and build its no-paid-call plan
        type: boolean
        default: false
      execute_paid_backfill:
        description: Authorize the exact passing plan and start The Odds API historical ingestion
        type: boolean
        default: false
      paid_authorization:
        description: Type AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS
        type: string
        default: ''
      production_cutover_confirmation:
        description: Type DESTROY_V15_10_PRODUCTION_AUTHORITY_AFTER_80_PERCENT_GATE
        type: string
        default: ''
      maximum_credits:
        description: Hard cap for this deployed historical program
        type: string
        default: '120000'
      maximum_candidates:
        description: Signal-weight combinations evaluated per optimization round
        type: string
        default: '25000'

permissions:
  contents: read

# Share the production deployment lock with the canonical SAM workflow. This
# prevents two CloudFormation updates from racing even though this workflow has
# a separate, explicitly authorized deployment path.
concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: false

env:
  HISTORICAL_TARGET_GAMES: '1600'
  HISTORICAL_START_DATE: '2025-04-01'
  HISTORICAL_END_DATE: '2025-08-31'
  HISTORICAL_MAX_CREDITS: ${{ inputs.maximum_credits || '120000' }}
  HISTORICAL_MAX_CANDIDATES: ${{ inputs.maximum_candidates || '25000' }}
  # A main-branch deployment is authorized only by the one-time tokens in the
  # merge commit message. Ordinary future main pushes validate but cannot spend
  # historical credits or mutate either production stack.
  MAIN_PUSH_DEPLOY_AUTHORIZED: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]') }}
  DEPLOY_RUNTIME_GUARD: ${{ (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_runtime_guard == true && inputs.runtime_guard_confirmation == 'INSTALL_FAIL_CLOSED_HISTORICAL_RUNTIME_GUARD') }}
  DEPLOY_OPTIMIZER_STACK: ${{ (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_optimizer_stack == true) }}
  EXECUTE_PAID_BACKFILL: ${{ (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]') && contains(github.event.head_commit.message, '[authorize-mlb-historical-backfill]')) || (github.event_name == 'workflow_dispatch' && inputs.execute_paid_backfill == true && inputs.paid_authorization == 'AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS' && inputs.production_cutover_confirmation == 'DESTROY_V15_10_PRODUCTION_AUTHORITY_AFTER_80_PERCENT_GATE') }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - name: Install validation dependencies
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9' 'cfn-lint>=1,<2'
      - name: Verify strict historical optimizer and runtime contracts
        run: |
          set -euo pipefail
          tests=(
            tests/unit/test_mlb_historical_policy_v1.py
            tests/unit/test_mlb_historical_daily_optimizer_v1.py
            tests/unit/test_mlb_historical_optimizer_handler.py
            tests/unit/test_mlb_historical_read_api_contract.py
          )
          [ ! -f tests/unit/test_mlb_ranked_primary_v15_10.py ] || tests+=(tests/unit/test_mlb_ranked_primary_v15_10.py)
          python -m pytest -q "${tests[@]}"
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py \
            hello_world/mlb_ranked_primary_v15_10.py \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_v3_read_api.py
          grep -Fq 'mlb_historical_policy_v1.apply_runtime_authority' \
            hello_world/mlb_ranked_primary_v15_10.py
          grep -Fq 'CHAMPION_PK = "MLB_HISTORICAL_CHAMPION#V1"' \
            hello_world/mlb_historical_policy_v1.py
          grep -Fq 'CUTOVER_PK = "MLB_HISTORICAL_PRODUCTION_CUTOVER#V1"' \
            hello_world/mlb_historical_policy_v1.py
          grep -Fq 'CUTOVER_SK = "PRODUCTION_CUTOVER"' \
            hello_world/mlb_historical_policy_v1.py
          grep -Fq 'DeleteLeaseOnlyFromOptimizerStatePartition' \
            mlb_historical_optimizer/template.yaml
          sam validate --lint --template-file mlb_historical_optimizer/template.yaml
          if [ -f template.yaml ]; then
            sam validate --template-file template.yaml
          fi
      - name: Build historical optimizer cleanly
        run: |
          set -euo pipefail
          rm -rf .aws-sam-historical
          sam build \
            --no-cached \
            --build-dir .aws-sam-historical \
            --template-file mlb_historical_optimizer/template.yaml

  deploy-gated-runtime-loader:
    if: (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_runtime_guard == true && inputs.runtime_guard_confirmation == 'INSTALL_FAIL_CLOSED_HISTORICAL_RUNTIME_GUARD')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Verify production deployment inputs
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}" || { echo '::error::Missing ODDS_API_KEY'; exit 1; }
          test -n "${BBS_API_KEY_VALUE:-}" || { echo '::error::Missing BBS_API_KEY'; exit 1; }
          test -n "${INQSI_ADMIN_API_TOKEN_VALUE:-}" || { echo '::error::Missing INQSI_ADMIN_API_TOKEN'; exit 1; }
      - name: Re-run authority regressions and build the complete production stack
        run: |
          set -euo pipefail
          python -m pip install --quiet 'pytest>=8,<9' 'boto3>=1.34,<2'
          tests=(
            tests/unit/test_mlb_historical_policy_v1.py
            tests/unit/test_mlb_historical_daily_optimizer_v1.py
            tests/unit/test_mlb_historical_optimizer_handler.py
            tests/unit/test_mlb_historical_read_api_contract.py
          )
          [ ! -f tests/unit/test_mlb_ranked_primary_v15_10.py ] || tests+=(tests/unit/test_mlb_ranked_primary_v15_10.py)
          python -m pytest -q "${tests[@]}"
          rm -rf .aws-sam-runtime
          sam build \
            --no-cached \
            --build-dir .aws-sam-runtime \
            --template-file template.yaml
          INQSI_MLB_LAMBDA_TASK_ROOT=.aws-sam-runtime/MLBV3ReadFunction \
            PYTHONDONTWRITEBYTECODE=1 \
            python scripts/verify_api_function_mlb_v3_import.py
      - name: Wait until the existing CloudFormation stack is updateable
        run: |
          set -euo pipefail
          for attempt in $(seq 1 80); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name parlay-platform-dev \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo STACK_NOT_FOUND)
            case "$STATUS" in
              STACK_NOT_FOUND|CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_COMPLETE|IMPORT_ROLLBACK_COMPLETE)
                echo "Stack is updateable: $STATUS"
                exit 0
                ;;
              *_IN_PROGRESS)
                sleep 15
                ;;
              *)
                echo "::error::Stack is not updateable: $STATUS"
                exit 1
                ;;
            esac
          done
          echo '::error::Timed out waiting for CloudFormation stack'
          exit 1
      - name: Deploy the fail-closed historical guard into the production MLB runtime
        id: deploy
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          TEMPLATE_SHA256=$(sha256sum template.yaml | awk '{print $1}')
          DEPLOY_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-mlb-historical-guard"
          echo "template_sha256=$TEMPLATE_SHA256" >> "$GITHUB_OUTPUT"
          echo "deploy_run_id=$DEPLOY_RUN_ID" >> "$GITHUB_OUTPUT"
          sam deploy \
            --template-file .aws-sam-runtime/template.yaml \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OddsApiKey=${ODDS_API_KEY_VALUE}" \
              "BbsApiKey=${BBS_API_KEY_VALUE}" \
              "InqsiAdminApiToken=${INQSI_ADMIN_API_TOKEN_VALUE}" \
              "DeployGitSha=${GITHUB_SHA}" \
              "DeployTemplateSha256=${TEMPLATE_SHA256}" \
              "DeployRunId=${DEPLOY_RUN_ID}"
      - name: Prove the deployed Lambda ZIP contains the gated outer authority
        run: |
          set -euo pipefail
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --logical-resource-id MLBV3ReadFunction \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)
          test -n "$FUNCTION_NAME"
          test "$FUNCTION_NAME" != "None"
          CODE_URL=$(aws lambda get-function \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Code.Location' \
            --output text)
          curl --fail --location --silent --show-error "$CODE_URL" -o /tmp/mlb-v3-read-deployed.zip
          unzip -p /tmp/mlb-v3-read-deployed.zip mlb_ranked_primary_v15_10.py \
            > /tmp/mlb-ranked-primary-deployed.py
          grep -Fq 'mlb_historical_policy_v1.apply_runtime_authority' \
            /tmp/mlb-ranked-primary-deployed.py
          unzip -l /tmp/mlb-v3-read-deployed.zip | grep -q 'mlb_historical_policy_v1.py'
          sha256sum /tmp/mlb-ranked-primary-deployed.py \
            | tee /tmp/mlb-historical-authority-deployed-sha256.txt
      - name: Smoke test a coherent pre-cutover or historical-only runtime
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          curl --fail --silent --show-error --max-time 60 \
            "${API_URL%/}/v1/mlb/model/version" \
            -o /tmp/mlb-model-version-after-historical-guard.json
          cat /tmp/mlb-model-version-after-historical-guard.json
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(Path('/tmp/mlb-model-version-after-historical-guard.json').read_text())
          if value.get('ok') is not True or value.get('engine_import_ok') is not True:
              raise SystemExit('deployed MLB runtime is unhealthy')
          if value.get('historicalAuthorityStateCoherent') is not True:
              raise SystemExit('historical authority state is not coherent')
          if value.get('historicalProductionCutoverActive') is True:
              if value.get('historicalDailyChampionActive') is not True:
                  raise SystemExit('cutover exists without a live champion')
              if value.get('productionAuthoritySource') != 'mlb_historical_daily_champion_only':
                  raise SystemExit('historical champion is not the sole authority')
              if value.get('incumbentProductionAuthorityDestroyed') is not True:
                  raise SystemExit('incumbent production authority was not destroyed')
          else:
              if value.get('historicalDailyChampionActive') is True:
                  raise SystemExit('champion is active without atomic cutover')
              if 'v15.10' not in str(value.get('primaryAlgorithm') or '').lower():
                  raise SystemExit('reviewed incumbent changed before the historical gate passed')
          if value.get('legacyFallbackAllowed') is not False:
              raise SystemExit('legacy fallback was unexpectedly enabled')
          if value.get('automaticWagerAllowed') is not False:
              raise SystemExit('automatic wagering was unexpectedly enabled')
          if value.get('predictionOnlyWagerSafetyInstalled') is not True:
              raise SystemExit('prediction-only wager safety is not installed')
          if value.get('rowLevelAutomaticWagerAllowed') is not False:
              raise SystemExit('row-level automatic wagering was unexpectedly enabled')
          PY
      - name: Upload production runtime deployment proof
        uses: actions/upload-artifact@v4
        with:
          name: mlb-historical-runtime-guard-${{ github.sha }}
          path: |
            /tmp/mlb-ranked-primary-deployed.py
            /tmp/mlb-historical-authority-deployed-sha256.txt
            /tmp/mlb-model-version-after-historical-guard.json
          retention-days: 90

  deploy-and-plan:
    if: (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy-mlb-v15.11]')) || (github.event_name == 'workflow_dispatch' && inputs.deploy_optimizer_stack == true && inputs.deploy_runtime_guard == true && inputs.runtime_guard_confirmation == 'INSTALL_FAIL_CLOSED_HISTORICAL_RUNTIME_GUARD')
    needs: [validate, deploy-gated-runtime-loader]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Verify deployment credentials and historical entitlement secret
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}" || { echo '::error::Missing ODDS_API_KEY'; exit 1; }
          [[ "${HISTORICAL_MAX_CREDITS}" =~ ^[0-9]+$ ]]
          [[ "${HISTORICAL_MAX_CANDIDATES}" =~ ^[0-9]+$ ]]
      - name: Test and build exact historical source
        run: |
          set -euo pipefail
          python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'
          python -m pytest -q \
            tests/unit/test_mlb_historical_policy_v1.py \
            tests/unit/test_mlb_historical_daily_optimizer_v1.py \
            tests/unit/test_mlb_historical_optimizer_handler.py \
            tests/unit/test_mlb_historical_read_api_contract.py
          rm -rf .aws-sam-historical
          sam build \
            --no-cached \
            --build-dir .aws-sam-historical \
            --template-file mlb_historical_optimizer/template.yaml
      - name: Deploy fail-closed historical optimizer
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          sam deploy \
            --template-file .aws-sam-historical/template.yaml \
            --stack-name parlay-platform-mlb-historical-optimizer \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OddsApiKey=${ODDS_API_KEY_VALUE}" \
              "TargetSnapshotsTable=parlay_platform_snapshots" \
              "HistoricalStartDate=${HISTORICAL_START_DATE}" \
              "HistoricalEndDate=${HISTORICAL_END_DATE}" \
              "HistoricalTargetGames=${HISTORICAL_TARGET_GAMES}" \
              "HistoricalMaxCredits=${HISTORICAL_MAX_CREDITS}" \
              "HistoricalRequestsPerRun=25" \
              "HistoricalMaxCandidates=${HISTORICAL_MAX_CANDIDATES}" \
              "HistoricalMaxOptimizationRounds=6" \
              "HistoricalFreshAuditIncrementGames=250" \
              "DeployGitSha=${GITHUB_SHA}"
      - name: Initialize or resume and build the no-paid-history credit plan
        id: plan
        run: |
          set -euo pipefail
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-mlb-historical-optimizer \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='HistoricalOptimizerFunctionName'].OutputValue" \
            --output text)
          test -n "$FUNCTION_NAME"
          test "$FUNCTION_NAME" != "None"
          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 \
            --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"initialize","run":"post_deploy_initialize_or_resume"}' \
            /tmp/mlb-historical-initialize.json
          cat /tmp/mlb-historical-initialize.json
          NEEDS_PLAN=$(python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path('/tmp/mlb-historical-initialize.json').read_text())
          state = value.get('state') or {}
          has_progress = bool(
              state.get('paidBackfillAuthorized') is True
              or int(state.get('networkRequestCount') or 0) > 0
              or state.get('completedSlates')
          )
          print('false' if has_progress and state.get('plan') else 'true')
          PY
          )
          if [ "$NEEDS_PLAN" = true ]; then
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --region "${{ secrets.AWS_REGION }}" \
              --cli-read-timeout 900 \
              --cli-binary-format raw-in-base64-out \
              --payload '{"mode":"plan","run":"post_deploy_no_paid_history_full_range_plan"}' \
              /tmp/mlb-historical-plan.json
          else
            cp /tmp/mlb-historical-initialize.json /tmp/mlb-historical-plan.json
          fi
          cat /tmp/mlb-historical-plan.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('/tmp/mlb-historical-plan.json').read_text())
          if payload.get('ok') is not True:
              raise SystemExit('historical optimizer planning/resume failed')
          state = payload.get('state') or {}
          plan = payload.get('plan') or state.get('plan') or {}
          required = {
              'targetSettledGames': 1600,
              'minimumTrainingGames': 1000,
              'minimumWalkForwardGames': 200,
              'minimumUntouchedAuditGames': 200,
              'snapshotStartAtEt': '01:00',
              'snapshotIntervalMinutes': 15,
              'dailyAccuracyRequirement': 0.80,
          }
          for key, expected in required.items():
              actual = state.get(key)
              if isinstance(expected, float):
                  if float(actual or 0) < expected:
                      raise SystemExit(f'{key} contract missing: {actual!r}')
              elif actual != expected:
                  raise SystemExit(f'{key} contract mismatch: {actual!r} != {expected!r}')
          if plan.get('paidHistoricalCallsMadeByPlan') != 0:
              raise SystemExit('credit plan unexpectedly made paid historical calls')
          if plan.get('completeDateRangeLedger') is not True:
              raise SystemExit('configured date range was not fully proven')
          if int(plan.get('planningErrorCount') or 0) != 0 or plan.get('rejectedDates'):
              raise SystemExit('credit plan contains unresolved official schedule dates')
          if plan.get('perGameFeatureCutoff') != 'each_game_t_minus_45':
              raise SystemExit('per-game T-45 clipping is not installed')
          if int(plan.get('maximumAuthorizedOfficialGames') or 0) < 1600:
              raise SystemExit('full-range authorized ledger is too small')
          if not plan.get('slateLedgerDigest') or not plan.get('fingerprint'):
              raise SystemExit('credit plan ledger digest/fingerprint missing')
          phase = str(state.get('phase') or '')
          authorizable = phase == 'READY_FOR_AUTHORIZATION'
          resumable = bool(
              state.get('paidBackfillAuthorized') is True
              and phase in {
                  'BACKFILLING', 'OPTIMIZING', 'PAUSED_QUOTA',
                  'CANDIDATE_REJECTED', 'DATA_RANGE_EXHAUSTED', 'PROMOTED'
              }
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"phase={phase}\n")
              handle.write(f"authorizable={'true' if authorizable else 'false'}\n")
              handle.write(f"resumable={'true' if resumable else 'false'}\n")
              handle.write(f"plan_fingerprint={plan.get('fingerprint') or ''}\n")
          print('PLAN_STATUS=' + phase)
          print('PLAN_FINGERPRINT=' + str(plan.get('fingerprint')))
          print('ESTIMATED_CREDITS=' + str(plan.get('estimatedCredits')))
          print('MAXIMUM_AUTHORIZED_GAMES=' + str(plan.get('maximumAuthorizedOfficialGames')))
          PY
      - name: Explicitly authorize the exact ledger and start or resume ingestion
        if: env.EXECUTE_PAID_BACKFILL == 'true' && (steps.plan.outputs.authorizable == 'true' || steps.plan.outputs.resumable == 'true')
        env:
          FUNCTION_NAME: ${{ steps.plan.outputs.function_name }}
          AUTHORIZABLE: ${{ steps.plan.outputs.authorizable }}
          PLAN_FINGERPRINT: ${{ steps.plan.outputs.plan_fingerprint }}
        run: |
          set -euo pipefail
          if [ "$AUTHORIZABLE" = true ]; then
            python - <<'PY' >/tmp/mlb-historical-authorize-payload.json
          import json
          import os
          print(json.dumps({
              'mode': 'authorize',
              'run': 'workflow_user_authorized_full_range_paid_backfill',
              'confirm': 'AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS',
              'planFingerprint': os.environ['PLAN_FINGERPRINT'],
          }))
          PY
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --region "${{ secrets.AWS_REGION }}" \
              --cli-read-timeout 900 \
              --cli-binary-format raw-in-base64-out \
              --payload fileb:///tmp/mlb-historical-authorize-payload.json \
              /tmp/mlb-historical-authorize.json
            cat /tmp/mlb-historical-authorize.json
          fi
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 \
            --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"orchestrate","run":"workflow_authorized_first_or_resume_batch"}' \
            /tmp/mlb-historical-first-batch.json
          cat /tmp/mlb-historical-first-batch.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/mlb-historical-first-batch.json').read_text())
          if payload.get('ok') is not True:
              raise SystemExit('authorized historical backfill batch failed')
          state = payload.get('state') or {}
          if state.get('paidBackfillAuthorized') is not True:
              raise SystemExit('paid backfill authority was not persisted')
          if state.get('phase') not in {
              'BACKFILLING', 'OPTIMIZING', 'PROMOTED', 'PAUSED_QUOTA',
              'CANDIDATE_REJECTED', 'DATA_RANGE_EXHAUSTED'
          }:
              raise SystemExit(f"unexpected optimizer phase: {state.get('phase')}")
          PY
      - name: Read final deployed optimizer status
        if: always()
        env:
          FUNCTION_NAME: ${{ steps.plan.outputs.function_name }}
        run: |
          set -euo pipefail
          if [ -z "${FUNCTION_NAME:-}" ]; then
            echo '{"ok":false,"status":"FUNCTION_NAME_UNAVAILABLE"}' \
              > /tmp/mlb-historical-status.json
            exit 0
          fi
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --cli-read-timeout 900 \
            --cli-binary-format raw-in-base64-out \
            --payload '{"mode":"status","run":"post_deploy_status"}' \
            /tmp/mlb-historical-status.json
          cat /tmp/mlb-historical-status.json
      - name: Verify cutover invariants immediately when promotion has occurred
        if: always()
        run: |
          set -euo pipefail
          [ -f /tmp/mlb-historical-status.json ] || exit 0
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(Path('/tmp/mlb-historical-status.json').read_text())
          state = value.get('state') or {}
          if state.get('phase') != 'PROMOTED':
              print('Optimizer has not promoted; runtime authority remains unchanged.')
              raise SystemExit(0)
          required = [
              (value.get('championValidation') or {}).get('ok') is True,
              (value.get('cutoverValidation') or {}).get('ok') is True,
              (value.get('historicalOnlyCutover') or {}).get('historicalOnly') is True,
              (value.get('historicalOnlyCutover') or {}).get('legacyFallbackAllowed') is False,
              (value.get('productionAuthority') or {}).get('historicalChampionOnly') is True,
              (value.get('productionAuthority') or {}).get('incumbentProductionAuthorityDestroyed') is True,
          ]
          if not all(required):
              raise SystemExit('PROMOTED state does not satisfy historical-only cutover invariants')
          PY
      - name: Upload immutable planning and deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-historical-optimizer-deployment-${{ github.sha }}
          path: |
            /tmp/mlb-historical-initialize.json
            /tmp/mlb-historical-plan.json
            /tmp/mlb-historical-authorize.json
            /tmp/mlb-historical-first-batch.json
            /tmp/mlb-historical-status.json
          if-no-files-found: warn
          retention-days: 90
