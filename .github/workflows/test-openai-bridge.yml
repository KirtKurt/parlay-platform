name: Test OpenAI Bridge

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/test-openai-bridge.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-openai-bridge:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      STACK_NAME: inqsi-openai-bridge
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read bridge outputs
        id: bridge
        run: |
          HEALTH_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='InqsiOpenAIBridgeHealthUrl'].OutputValue | [0]" \
            --output text)
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='InqsiOpenAIBridgeFunctionArn'].OutputValue | [0]" \
            --output text)
          echo "health_url=$HEALTH_URL" >> "$GITHUB_OUTPUT"
          echo "function_arn=$FUNCTION_ARN" >> "$GITHUB_OUTPUT"

      - name: Verify health route
        run: |
          curl -sS "${{ steps.bridge.outputs.health_url }}" | python -m json.tool

      - name: Run direct Lambda OpenAI smoke test
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          function_arn = os.environ.get("FUNCTION_ARN", "")
          region = os.environ.get("AWS_REGION", "us-east-1")
          if not function_arn:
              print("InqsiOpenAIBridgeFunctionArn output is missing")
              sys.exit(1)

          event = {
              "directSmokeTest": True,
              "prompt": "Confirm the InQsi OpenAI bridge is working. Keep the answer under 20 words."
          }
          subprocess.run(
              [
                  "aws", "lambda", "invoke",
                  "--region", region,
                  "--function-name", function_arn,
                  "--cli-binary-format", "raw-in-base64-out",
                  "--payload", json.dumps(event),
                  "response.json",
              ],
              check=True,
          )
          outer = json.load(open("response.json"))
          status = outer.get("statusCode")
          body = json.loads(outer.get("body") or "{}")
          print(f"statusCode: {status}")
          print(json.dumps({
              "ok": body.get("ok"),
              "model": body.get("model"),
              "reasoningEffort": body.get("reasoningEffort"),
              "text": body.get("text"),
              "error": body.get("error"),
              "status": body.get("status"),
          }, indent=2))
          if status != 200 or not body.get("ok"):
              sys.exit(1)
          PY
        env:
          FUNCTION_ARN: ${{ steps.bridge.outputs.function_arn }}
