name: Inspect Tennis V2.4 deployment failure

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/inspect-tennis-v24-run.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_JOB_ID: "89327146377"
    steps:
      - name: Download exact failing job log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/${TARGET_JOB_ID}/logs" > evidence/job.log
          python - <<'PY'
          from pathlib import Path
          data=Path('evidence/job.log').read_bytes()
          if data.startswith(b'PK\x03\x04'):
              import io,zipfile
              with zipfile.ZipFile(io.BytesIO(data)) as archive:
                  text='\n'.join(archive.read(name).decode('utf-8','replace') for name in archive.namelist())
          else:
              text=data.decode('utf-8','replace')
          Path('evidence/job-decoded.log').write_text(text)
          lines=text.splitlines()
          tail='\n'.join(lines[-350:])+'\n'
          Path('evidence/job-tail.log').write_text(tail)
          print(tail)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: tennis-v24-job-89327146377-log
          retention-days: 7
          if-no-files-found: error
          path: evidence/
