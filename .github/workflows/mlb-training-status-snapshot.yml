# trigger-generation: 3
name: MLB Training Status Snapshot

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT_ISSUE: "111"
    steps:
      - name: Publish exact workflow state and monitor terminal result
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          post() {
            local body="$1"
            jq -n --arg body "$body" '{body:$body}' >/tmp/body.json
            if [ -z "${COMMENT_ID:-}" ]; then
              curl --fail --silent --show-error -X POST "${headers[@]}" \
                "${api}/issues/${REPORT_ISSUE}/comments" --data-binary @/tmp/body.json >/tmp/comment.json
              COMMENT_ID=$(jq -r '.id' /tmp/comment.json)
            else
              curl --fail --silent --show-error -X PATCH "${headers[@]}" \
                "${api}/issues/comments/${COMMENT_ID}" --data-binary @/tmp/body.json >/tmp/comment.json
            fi
          }

          row() {
            local name="$1"
            jq -c --arg name "$name" '[.workflow_runs[] | select(.name == $name)] | sort_by(.created_at) | last // empty' /tmp/runs.json
          }

          line() {
            local label="$1" value="$2"
            if [ -z "$value" ]; then
              printf -- '- %s: **not located**\n' "$label"
            else
              printf -- '- %s: [run %s](%s) — **%s/%s**, event `%s`, SHA `%s`\n' \
                "$label" \
                "$(jq -r '.id' <<<"$value")" \
                "$(jq -r '.html_url' <<<"$value")" \
                "$(jq -r '.status' <<<"$value")" \
                "$(jq -r '.conclusion // "pending"' <<<"$value")" \
                "$(jq -r '.event' <<<"$value")" \
                "$(jq -r '.head_sha' <<<"$value")"
            fi
          }

          COMMENT_ID=""
          for attempt in $(seq 1 720); do
            curl --fail --silent --show-error "${headers[@]}" "${api}/actions/runs?per_page=100" >/tmp/runs.json
            trigger=$(row 'MLB V15.11.1 Accelerated Historical Training')
            recovery=$(row 'MLB Historical Recovery and Paid Dispatch')
            optimizer=$(row 'MLB Historical Daily Optimizer')
            accelerator=$(row 'MLB Historical Accelerated Training Driver')
            custom=$(row 'Dispatch Authorized MLB Historical Training')
            observer=$(row 'Observe MLB V15.11.1 Historical Training Chain')
            now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            body=$(cat <<EOF
          <!-- mlb-training-status-snapshot -->
          ## MLB V15.11.1 AWS training state

          $(line 'Guarded trigger' "$trigger")$(line 'Rollback recovery / paid dispatch' "$recovery")$(line 'Reviewed optimizer deploy, plan and authorization' "$optimizer")$(line '100-request accelerator, optimization, audit and cutover' "$accelerator")$(line 'Secondary authorized dispatcher' "$custom")$(line 'Primary chain observer' "$observer")
          - Last checked: `${now}`
          - Promotion remains blocked unless the 1,000/200/200 chronological evidence, exact full-slate coverage, and every-day 80% gates all pass.
          - Automatic wagering remains disabled.
          EOF
          )
            post "$body"

            terminal=""
            if [ -n "$accelerator" ] && [ "$(jq -r '.status' <<<"$accelerator")" = completed ]; then
              terminal=accelerator
            elif [ -n "$optimizer" ] && [ "$(jq -r '.status' <<<"$optimizer")" = completed ] && [ "$(jq -r '.conclusion // "failure"' <<<"$optimizer")" != success ]; then
              terminal=optimizer
            elif [ -n "$recovery" ] && [ "$(jq -r '.status' <<<"$recovery")" = completed ] && [ "$(jq -r '.conclusion // "failure"' <<<"$recovery")" != success ]; then
              terminal=recovery
            elif [ -n "$trigger" ] && [ "$(jq -r '.status' <<<"$trigger")" = completed ] && [ "$(jq -r '.conclusion // "failure"' <<<"$trigger")" != success ]; then
              terminal=trigger
            fi

            if [ -n "$terminal" ]; then
              selected="${!terminal}"
              run_id=$(jq -r '.id' <<<"$selected")
              curl --fail --silent --show-error "${headers[@]}" "${api}/actions/runs/${run_id}/jobs?per_page=100" >/tmp/jobs.json
              failure=$(jq -r '[.jobs[] | select(.conclusion != null and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "- Job `" + .name + "`: **" + (.conclusion // .status) + "**; failed step `" + (([.steps[]? | select(.conclusion == "failure") | .name][0]) // "unavailable") + "`"] | join("\n")' /tmp/jobs.json)
              post "${body}\n\n### Terminal stage: ${terminal}\n${failure}"
              exit 0
            fi
            sleep 30
          done
          post "${body}\n\n### Monitor timeout\nThe isolated monitor reached its bounded timeout before a terminal training stage was visible."
          exit 1
