name: MLB Training Failure Snapshot

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print exact optimizer deployment failure tail
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: "89424142807"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${TARGET_JOB_ID}/logs" \
            --output /tmp/optimizer-deploy.log
          echo MLB_OPTIMIZER_DEPLOY_ERROR_LINES_BEGIN
          grep -Eai 'error|failed|rollback|validation|resource handler|limit|exceed|already exists|CREATE_FAILED|UPDATE_FAILED' /tmp/optimizer-deploy.log | tail -n 80 || true
          echo MLB_OPTIMIZER_DEPLOY_ERROR_LINES_END
          echo MLB_OPTIMIZER_DEPLOY_LOG_TAIL_BEGIN
          tail -n 120 /tmp/optimizer-deploy.log
          echo MLB_OPTIMIZER_DEPLOY_LOG_TAIL_END
