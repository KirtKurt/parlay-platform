name: MLB Optimizer Lambda Failure Context

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print full Lambda create-failure context
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: "89424142807"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${TARGET_JOB_ID}/logs" \
            --output /tmp/optimizer-deploy.log
          echo MLB_LAMBDA_CREATE_FAILED_CONTEXT_BEGIN
          grep -A 24 -B 8 'CREATE_FAILED.*AWS::Lambda::Function' /tmp/optimizer-deploy.log || true
          echo MLB_LAMBDA_CREATE_FAILED_CONTEXT_END
