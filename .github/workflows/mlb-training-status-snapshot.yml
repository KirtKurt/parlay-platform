name: MLB Training Status Snapshot

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print latest MLB historical workflow runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
            | jq -c '[.workflow_runs[] | select(.name == "MLB V15.11.1 Accelerated Historical Training" or .name == "MLB Historical Recovery and Paid Dispatch" or .name == "MLB Historical Daily Optimizer" or .name == "MLB Historical Accelerated Training Driver" or .name == "Dispatch Authorized MLB Historical Training" or .name == "Observe MLB V15.11.1 Historical Training Chain") | {name,id,status,conclusion,event,head_sha,created_at,updated_at,html_url}] | sort_by(.created_at)'
