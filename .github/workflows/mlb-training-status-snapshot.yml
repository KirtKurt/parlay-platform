name: MLB Training Status Snapshot

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
      - scripts/mlb_training_state_snapshot.py
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
      - scripts/mlb_training_state_snapshot.py

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Print exact MLB historical training chain state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/mlb_training_state_snapshot.py
