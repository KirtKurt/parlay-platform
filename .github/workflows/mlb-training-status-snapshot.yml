name: MLB Historical Planning Failure Context

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print planning failure context
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: "89426541736"
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${TARGET_JOB_ID}/logs" \
            --output /tmp/historical-plan.log
          echo MLB_HISTORICAL_PLAN_FAILURE_BEGIN
          grep -Eai 'Lambda returned|FunctionError|Traceback|Exception|AccessDenied|ValidationException|ResourceNotFound|timed out|timeout|statusCode|planning|plan|error' /tmp/historical-plan.log | tail -n 120 || true
          echo MLB_HISTORICAL_PLAN_FAILURE_END
