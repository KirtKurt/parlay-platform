name: MLB Historical Second Retry Status

"on":
  push:
    branches:
      - agent/mlb-training-status-20260724
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mlb-training-status-snapshot.yml

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print latest recovery optimizer and accelerator runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 15
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
            | jq -c '[.workflow_runs[] | select(.name == "MLB Historical Recovery and Paid Dispatch" or .name == "MLB Historical Daily Optimizer" or .name == "MLB Historical Accelerated Training Driver") | {name,id,status,conclusion,event,head_sha,created_at,updated_at,html_url}] | group_by(.name) | map(max_by(.created_at)) | sort_by(.name)'
