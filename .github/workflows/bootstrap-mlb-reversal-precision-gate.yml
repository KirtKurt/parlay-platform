name: Bootstrap MLB reversal precision gate

on:
  push:
    branches:
      - agent/mlb-reversal-precision-gate-20260723

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/mlb-reversal-precision-gate-20260723
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Materialize final patch
        run: python scripts/bootstrap_mlb_reversal_precision_gate.py

      - name: Remove one-shot bootstrap files
        run: |
          rm -rf .bootstrap
          rm -f scripts/bootstrap_mlb_reversal_precision_gate.py
          rm -f .github/workflows/bootstrap-mlb-reversal-precision-gate.yml

      - name: Install targeted test dependency
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile changed Python modules
        run: |
          python -m py_compile \
            hello_world/mlb_temporal_features_v1.py \
            hello_world/mlb_reversal_similarity_v2.py \
            hello_world/mlb_precision_admission_gate_v1.py \
            hello_world/mlb_official_lock_quality_gate.py \
            hello_world/mlb_accuracy_target_policy_v1.py

      - name: Run targeted reversal and admission tests
        env:
          PYTHONPATH: hello_world
        run: |
          python -m pytest -q \
            tests/unit/test_mlb_temporal_features_v2.py \
            tests/unit/test_mlb_reversal_similarity_v2.py \
            tests/unit/test_mlb_precision_admission_gate_v1.py \
            tests/unit/test_mlb_official_lock_quality_gate.py \
            tests/unit/test_mlb_official_lock_quality_gate_v2.py
          python tests/unit/test_mlb_official_lock_quality_gate_july21.py

      - name: Commit final patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add MLB reversal precision admission gate"
          git pull --rebase origin agent/mlb-reversal-precision-gate-20260723
          git push origin HEAD:agent/mlb-reversal-precision-gate-20260723
