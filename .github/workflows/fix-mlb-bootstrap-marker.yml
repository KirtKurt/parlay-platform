name: Finalize MLB deploy heavy-read retry policy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/fix-mlb-bootstrap-marker.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Align with current main
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Construct exact deploy policy change
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          deploy_path = Path('.github/workflows/deploy.yml')
          source = deploy_path.read_text(encoding='utf-8')

          def block(template: str, spaces: int) -> str:
              return textwrap.indent(textwrap.dedent(template).strip('\n'), ' ' * spaces)

          def replace_once(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one preimage, found {count}')
              source = source.replace(old, new, 1)

          replace_once(
              "            tests/unit/test_mlb_deploy_http_probe.py\n"
              "            tests/unit/test_mlb_lambda_artifact_identity.py",
              "            tests/unit/test_mlb_deploy_http_probe.py\n"
              "            tests/unit/test_mlb_deploy_heavy_read_retry_policy.py\n"
              "            tests/unit/test_mlb_lambda_artifact_identity.py",
              'mandatory regression insertion',
          )

          replace_once(
              "          from scripts.mlb_deploy_http_probe import fetch_json_object\n\n"
              "          def fetch(url, timeout=45, deadline=None, max_attempts=None):",
              "          from scripts.mlb_deploy_http_probe import fetch_json_object\n"
              "          from scripts.mlb_deploy_http_probe import TransientHttpProbeExhausted\n\n"
              "          def fetch(url, timeout=45, deadline=None, max_attempts=None):",
              'transient exception import',
          )

          old_fetch = block('''
          def fetch(url, timeout=45, deadline=None, max_attempts=None):
              return fetch_json_object(
                  url,
                  deadline_monotonic=deadline,
                  max_wait_seconds=180,
                  request_timeout_seconds=timeout,
                  retry_delay_seconds=4,
                  max_attempts=max_attempts,
                  headers={
                      'accept': 'application/json',
                      'user-agent': 'inqsi-deploy-read-only-lock-lifecycle-smoke/2.0',
                  },
              )

          base_url = os.environ['API_URL'].rstrip('/')
          ''', 10)
          new_fetch = block('''
          def fetch(url, timeout=45, deadline=None, max_attempts=None):
              return fetch_json_object(
                  url,
                  deadline_monotonic=deadline,
                  max_wait_seconds=180,
                  request_timeout_seconds=timeout,
                  retry_delay_seconds=4,
                  max_attempts=max_attempts,
                  headers={
                      'accept': 'application/json',
                      'user-agent': 'inqsi-deploy-read-only-lock-lifecycle-smoke/2.0',
                  },
              )

          def transient_retry_delay(exc, remaining):
              reason = str(exc)
              lambda_may_still_be_running = any(
                  marker in reason
                  for marker in (
                      'HTTP 504',
                      'TimeoutError',
                      'URLError',
                      'ConnectionError',
                      'IncompleteRead',
                  )
              )
              delay = 330 if lambda_may_still_be_running else 30
              return min(delay, remaining), lambda_may_still_be_running

          base_url = os.environ['API_URL'].rstrip('/')
          ''', 10)
          replace_once(old_fetch, new_fetch, 'retry delay helper')

          old_status = block('''
          payload = fetch(
              status_url,
              timeout=max(1, min(45, remaining)),
              deadline=deadline,
              # One client delivery per outer attempt prevents a timed-out
              # API Gateway request from spawning an overlapping retry
              # herd against the shared lock Lambda.
              max_attempts=1,
          )
          ''', 14)
          new_status = block('''
          try:
              payload = fetch(
                  status_url,
                  timeout=max(1, min(45, remaining)),
                  deadline=deadline,
                  # One client delivery per outer attempt prevents a timed-out
                  # API Gateway request from spawning an overlapping retry
                  # herd against the shared lock Lambda.
                  max_attempts=1,
              )
          except TransientHttpProbeExhausted as exc:
              attempt += 1
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  raise SystemExit(
                      'No official-schedule-backed durable roster appeared within 20 minutes'
                  ) from exc
              delay, lambda_may_still_be_running = transient_retry_delay(
                  exc,
                  remaining,
              )
              if lambda_may_still_be_running:
                  print(
                      'Lock-status delivery may still be running; draining the admitted '
                      f'Lambda before attempt {attempt + 1}'
                  )
              else:
                  print(
                      'Lock-status authority is transiently unavailable; waiting for the '
                      f'next scheduled pull before attempt {attempt + 1}'
                  )
              time.sleep(delay)
              continue
          ''', 14)
          replace_once(old_status, new_status, 'lock-status outer retry')

          old_predictions = block('''
          prediction_deadline = time.monotonic() + 20 * 60
          while True:
              predictions = fetch(
                  prediction_url,
                  deadline=prediction_deadline,
                  max_attempts=1,
              )
          ''', 10)
          new_predictions = block('''
          prediction_deadline = time.monotonic() + 20 * 60
          prediction_attempt = 0
          while True:
              remaining = prediction_deadline - time.monotonic()
              if remaining <= 0:
                  raise SystemExit(
                      'No fresh persisted canonical probability-contract predictions '
                      'appeared within 20 minutes'
                  )
              try:
                  predictions = fetch(
                      prediction_url,
                      timeout=max(1, min(45, remaining)),
                      deadline=prediction_deadline,
                      max_attempts=1,
                  )
              except TransientHttpProbeExhausted as exc:
                  prediction_attempt += 1
                  remaining = prediction_deadline - time.monotonic()
                  if remaining <= 0:
                      raise SystemExit(
                          'No fresh persisted canonical probability-contract predictions '
                          'appeared within 20 minutes'
                      ) from exc
                  delay, lambda_may_still_be_running = transient_retry_delay(
                      exc,
                      remaining,
                  )
                  if lambda_may_still_be_running:
                      print(
                          'Predictions delivery may still be running; draining the admitted '
                          f'Lambda before attempt {prediction_attempt + 1}'
                      )
                  else:
                      print(
                          'Predictions authority is transiently unavailable; waiting before '
                          f'attempt {prediction_attempt + 1}'
                      )
                  time.sleep(delay)
                  continue
          ''', 10)
          replace_once(old_predictions, new_predictions, 'predictions outer retry')

          deploy_path.write_text(source, encoding='utf-8')
          PY

      - name: Create mandatory retry-policy regression
        run: |
          set -euo pipefail
          test ! -e tests/unit/test_mlb_deploy_heavy_read_retry_policy.py
          cat > tests/unit/test_mlb_deploy_heavy_read_retry_policy.py <<'PYTEST'
          from __future__ import annotations

          import ast
          import re
          import textwrap
          from pathlib import Path


          ROOT = Path(__file__).resolve().parents[2]
          DEPLOY = ROOT / ".github/workflows/deploy.yml"
          TEST_PATH = "tests/unit/test_mlb_deploy_heavy_read_retry_policy.py"


          def _status_script() -> str:
              source = DEPLOY.read_text(encoding="utf-8")
              matches = list(
                  re.finditer(
                      r"(?ms)^      - name: Smoke test read-only MLB lock status\s*$\n"
                      r"(?P<body>.*?)(?=^      - name: |\Z)",
                      source,
                  )
              )
              assert len(matches) == 1
              body = matches[0].group("body")
              start = body.index("          python - <<'PY'\n") + len("          python - <<'PY'\n")
              end = body.rindex("\n          PY")
              return textwrap.dedent(body[start:end])


          def _retry_function():
              tree = ast.parse(_status_script())
              functions = [
                  node
                  for node in tree.body
                  if isinstance(node, ast.FunctionDef) and node.name == "transient_retry_delay"
              ]
              assert len(functions) == 1
              namespace: dict[str, object] = {}
              exec(compile(ast.Module(body=functions, type_ignores=[]), "<deploy>", "exec"), namespace)
              return namespace["transient_retry_delay"]


          def test_heavy_read_probe_retries_structured_500_without_lambda_drain() -> None:
              retry = _retry_function()
              delay, drain = retry(
                  RuntimeError("JSON probe attempt limit exhausted after 1 attempts: HTTP 500"),
                  1200,
              )
              assert delay == 30
              assert drain is False


          def test_heavy_read_probe_drains_ambiguous_or_gateway_timeouts() -> None:
              retry = _retry_function()
              for reason in ("HTTP 504", "TimeoutError", "URLError", "ConnectionError", "IncompleteRead"):
                  delay, drain = retry(RuntimeError(f"probe failed: {reason}"), 1200)
                  assert delay == 330
                  assert drain is True
              assert retry(RuntimeError("probe failed: HTTP 504"), 17) == (17, True)


          def test_status_and_predictions_keep_one_delivery_per_outer_attempt() -> None:
              script = _status_script()
              compile(script, "<deploy-heavy-read-smoke>", "exec")
              assert script.count("except TransientHttpProbeExhausted as exc:") == 2
              assert script.count("transient_retry_delay(\n            exc,\n            remaining,") == 2
              assert script.count("max_attempts=1,") == 2
              assert "Lock-status authority is transiently unavailable" in script
              assert "Predictions authority is transiently unavailable" in script


          def test_retry_policy_is_mandatory_in_the_deploy_regression_gate() -> None:
              source = DEPLOY.read_text(encoding="utf-8")
              regression = re.search(
                  r"(?ms)^          regression_tests=\(\s*$\n(?P<body>.*?)(?=^          \)\s*$)",
                  source,
              )
              assert regression is not None
              assert regression.group("body").count(TEST_PATH) == 1
          PYTEST

      - name: Install focused verification runtime
        run: python -m pip install --quiet "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Verify retry policy and canonical source fixed point
        env:
          PYTHONPATH: "hello_world:."
        run: |
          set -euo pipefail
          python -m py_compile tests/unit/test_mlb_deploy_heavy_read_retry_policy.py
          python - <<'PY'
          from pathlib import Path
          import yaml
          yaml.safe_load(Path('.github/workflows/deploy.yml').read_text(encoding='utf-8'))
          print('deploy workflow YAML is valid')
          PY
          python -m pytest -q \
            tests/unit/test_mlb_deploy_heavy_read_retry_policy.py \
            tests/unit/test_mlb_deploy_http_probe.py \
            tests/unit/test_mlb_workflow_authority.py
          python scripts/verify_mlb_workflow_authority.py
          cp .github/workflows/deploy.yml /tmp/deploy.before
          python scripts/stabilize_mlb_deploy_source.py
          cmp /tmp/deploy.before .github/workflows/deploy.yml
          git diff --check
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/deploy.yml',
              'tests/unit/test_mlb_deploy_heavy_read_retry_policy.py',
          }
          lines = subprocess.check_output(
              ['git', 'status', '--porcelain=v1'], text=True
          ).splitlines()
          observed = {line[3:] for line in lines if line.strip()}
          if observed != expected:
              raise SystemExit(
                  f'unexpected candidate diff: expected={sorted(expected)} observed={sorted(observed)}'
              )
          PY

      - name: Commit validated two-file policy change only
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/apply-mlb-deploy-probe-policy.yml \
            .github/workflows/fix-mlb-bootstrap-marker.yml \
            .github/workflows/extract-bootstrap-failure.yml \
            scripts/.mlb_deploy_probe_policy.patch.b64.1 \
            scripts/.mlb_deploy_probe_policy.patch.b64.2 \
            scripts/.mlb_deploy_probe_policy.patch.b64.3
          git add \
            .github/workflows/deploy.yml \
            tests/unit/test_mlb_deploy_heavy_read_retry_policy.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Fix MLB deploy heavy-read retry policy"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
