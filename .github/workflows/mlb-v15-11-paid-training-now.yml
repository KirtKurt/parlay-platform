name: MLB V15.11.1 Accelerated Historical Training

"on":
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-v15-11-paid-training-now.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: mlb-v15-11-paid-training-trigger
  cancel-in-progress: false

jobs:
  dispatch-reviewed-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Dispatch exact guarded recovery, paid backfill, audit, and cutover chain
        run: |
          set -euo pipefail
          before=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow mlb-historical-recovery-dispatch.yml \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')
          gh workflow run mlb-historical-recovery-dispatch.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f paid_authorization=AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS \
            -f cutover_confirmation=DESTROY_V15_10_PRODUCTION_AUTHORITY_AFTER_80_PERCENT_GATE
          run_id=''
          for attempt in $(seq 1 60); do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow mlb-historical-recovery-dispatch.yml \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId \
              --jq "map(select(.databaseId != ${before})) | .[0].databaseId // empty")
            [ -n "$run_id" ] && break
            sleep 2
          done
          test -n "$run_id"
          echo "Guarded MLB historical recovery/training run dispatched: ${run_id}"
