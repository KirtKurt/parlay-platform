name: MLB V15.11.1 Accelerated Historical Training

"on":
  push:
    branches: [main]
    paths:
      - ".github/workflows/mlb-v15-11-paid-training-now.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: parlay-platform-mlb-historical-optimizer
  TARGET_GAMES: "1600"
  START_DATE: "2025-04-01"
  END_DATE: "2025-08-31"
  MAX_CREDITS: "120000"
  MAX_CANDIDATES: "25000"
  MAX_ORCHESTRATION_INVOCATIONS: "220"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact main source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify credentials and explicit training authority
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}" || {
            echo "::error::Missing ODDS_API_KEY"
            exit 1
          }
          [[ "$MAX_CREDITS" =~ ^[0-9]+$ ]]
          [[ "$MAX_CANDIDATES" =~ ^[0-9]+$ ]]
          test "$MAX_CREDITS" -le 120000
          printf '%s\n' \
            "User-authorized objective: train the MLB historical daily-slate optimizer." \
            "Paid historical calls remain bounded by MAX_CREDITS=${MAX_CREDITS}." \
            "Production remains fail-closed unless the real 1000/200/200 and every-day 80% gates pass."

      - name: Validate exact optimizer source and contracts
        run: |
          set -euo pipefail
          python -m pip install --quiet \
            "boto3>=1.34,<2" \
            "pytest>=8,<9" \
            "cfn-lint>=1,<2"
          tests=(
            tests/unit/test_mlb_historical_policy_v1.py
            tests/unit/test_mlb_historical_daily_optimizer_v1.py
            tests/unit/test_mlb_historical_optimizer_handler.py
            tests/unit/test_mlb_historical_read_api_contract.py
            tests/unit/test_mlb_historical_optimizer_template.py
          )
          python -m pytest -q "${tests[@]}"
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py
          sam validate --lint --template-file mlb_historical_optimizer/template.yaml
          rm -rf .aws-sam-historical
          sam build \
            --no-cached \
            --build-dir .aws-sam-historical \
            --template-file mlb_historical_optimizer/template.yaml

      - name: Recover a rolled-back optimizer stack, if necessary
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            status=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo STACK_NOT_FOUND)
            echo "Optimizer stack status: $status"
            case "$status" in
              STACK_NOT_FOUND|CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_COMPLETE|IMPORT_ROLLBACK_COMPLETE)
                exit 0
                ;;
              ROLLBACK_COMPLETE|CREATE_FAILED|ROLLBACK_FAILED|DELETE_FAILED)
                echo "Removing unrecoverable rolled-back optimizer stack: $status"
                aws cloudformation delete-stack \
                  --stack-name "$STACK_NAME" \
                  --region "$AWS_REGION"
                aws cloudformation wait stack-delete-complete \
                  --stack-name "$STACK_NAME" \
                  --region "$AWS_REGION"
                exit 0
                ;;
              *_IN_PROGRESS)
                sleep 15
                ;;
              *)
                echo "::error::Optimizer stack is not safely deployable: $status"
                exit 1
                ;;
            esac
          done
          echo "::error::Timed out waiting for optimizer stack"
          exit 1

      - name: Deploy accelerated fail-closed optimizer stack
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          sam deploy \
            --template-file .aws-sam-historical/template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OddsApiKey=${ODDS_API_KEY_VALUE}" \
              "TargetSnapshotsTable=parlay_platform_snapshots" \
              "HistoricalStartDate=${START_DATE}" \
              "HistoricalEndDate=${END_DATE}" \
              "HistoricalTargetGames=${TARGET_GAMES}" \
              "HistoricalMaxCredits=${MAX_CREDITS}" \
              "HistoricalRequestsPerRun=100" \
              "HistoricalMaxCandidates=${MAX_CANDIDATES}" \
              "HistoricalMaxOptimizationRounds=6" \
              "HistoricalFreshAuditIncrementGames=250" \
              "DeployGitSha=${GITHUB_SHA}"

      - name: Resolve deployed optimizer function
        id: function
        run: |
          set -euo pipefail
          function_name=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='HistoricalOptimizerFunctionName'].OutputValue" \
            --output text)
          test -n "$function_name"
          test "$function_name" != "None"
          echo "name=$function_name" >> "$GITHUB_OUTPUT"
          echo "Historical optimizer Lambda: $function_name"

      - name: Initialize and build the zero-paid-call ledger
        id: plan
        env:
          FUNCTION_NAME: ${{ steps.function.outputs.name }}
        run: |
          set -euo pipefail
          invoke() {
            local payload="$1"
            local output="$2"
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --region "$AWS_REGION" \
              --cli-read-timeout 900 \
              --cli-binary-format raw-in-base64-out \
              --payload "$payload" \
              "$output" >/tmp/invoke-metadata.json
            cat /tmp/invoke-metadata.json
            cat "$output"
            python - "$output" <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          value = json.loads(path.read_text())
          if isinstance(value, dict) and value.get("statusCode") and isinstance(value.get("body"), str):
              value = json.loads(value["body"])
              path.write_text(json.dumps(value))
          if value.get("ok") is not True:
              raise SystemExit(f"Lambda returned non-ok payload: {value}")
          PY
          }

          invoke '{"mode":"initialize","run":"accelerated_paid_training_initialize"}' \
            /tmp/mlb-historical-initialize.json

          needs_plan=$(python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path("/tmp/mlb-historical-initialize.json").read_text())
          state = value.get("state") or {}
          has_plan = isinstance(state.get("plan"), dict) and bool(state.get("plan"))
          has_progress = bool(
              state.get("paidBackfillAuthorized") is True
              or int(state.get("networkRequestCount") or 0) > 0
              or state.get("completedSlates")
              or state.get("phase") == "PROMOTED"
          )
          print("false" if has_plan and has_progress else "true")
          PY
          )
          if [ "$needs_plan" = "true" ]; then
            invoke '{"mode":"plan","run":"accelerated_paid_training_zero_call_plan"}' \
              /tmp/mlb-historical-plan.json
          else
            cp /tmp/mlb-historical-initialize.json /tmp/mlb-historical-plan.json
            echo "Reusing the existing fingerprinted plan and historical progress."
          fi

          python - <<'PY' >/tmp/mlb-historical-authorization.json
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("/tmp/mlb-historical-plan.json").read_text())
          state = payload.get("state") or {}
          plan = payload.get("plan") or state.get("plan") or {}

          required_state = {
              "targetSettledGames": 1600,
              "minimumTrainingGames": 1000,
              "minimumWalkForwardGames": 200,
              "minimumUntouchedAuditGames": 200,
              "snapshotStartAtEt": "01:00",
              "snapshotIntervalMinutes": 15,
              "dailyAccuracyRequirement": 0.80,
          }
          for key, expected in required_state.items():
              actual = state.get(key)
              if isinstance(expected, float):
                  if float(actual or 0.0) < expected:
                      raise SystemExit(f"{key} contract missing: {actual!r}")
              elif actual != expected:
                  raise SystemExit(f"{key} mismatch: {actual!r} != {expected!r}")

          if plan.get("paidHistoricalCallsMadeByPlan") != 0:
              raise SystemExit("planning made paid calls")
          if plan.get("completeDateRangeLedger") is not True:
              raise SystemExit("date-range ledger is incomplete")
          if int(plan.get("planningErrorCount") or 0) != 0 or plan.get("rejectedDates"):
              raise SystemExit("plan contains unresolved dates")
          if plan.get("perGameFeatureCutoff") != "each_game_t_minus_45":
              raise SystemExit("T-45 clipping contract missing")
          if int(plan.get("maximumAuthorizedOfficialGames") or 0) < 1600:
              raise SystemExit("authorized game ledger is too small")

          estimated = int(plan.get("estimatedCredits") or 0)
          maximum = int(os.environ["MAX_CREDITS"])
          if estimated <= 0:
              raise SystemExit("estimated credits missing")
          if estimated > maximum:
              raise SystemExit(
                  f"estimated historical cost {estimated} exceeds hard cap {maximum}"
              )

          fingerprint = str(plan.get("fingerprint") or "")
          digest = str(plan.get("slateLedgerDigest") or "")
          if not fingerprint or not digest:
              raise SystemExit("plan fingerprint or ledger digest missing")

          print(json.dumps({
              "mode": "authorize",
              "run": "user_authorized_accelerated_paid_backfill",
              "confirm": "AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS",
              "planFingerprint": fingerprint,
          }))
          Path("/tmp/mlb-historical-plan-summary.json").write_text(json.dumps({
              "phase": state.get("phase"),
              "estimatedCredits": estimated,
              "hardCreditCap": maximum,
              "maximumAuthorizedOfficialGames": plan.get("maximumAuthorizedOfficialGames"),
              "fingerprint": fingerprint,
              "slateLedgerDigest": digest,
              "paidHistoricalCallsMadeByPlan": plan.get("paidHistoricalCallsMadeByPlan"),
              "targetSettledGames": state.get("targetSettledGames"),
              "dailyAccuracyRequirement": state.get("dailyAccuracyRequirement"),
          }, indent=2, sort_keys=True))
          PY
          cat /tmp/mlb-historical-plan-summary.json
          fingerprint=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("/tmp/mlb-historical-plan-summary.json").read_text())["fingerprint"])
          PY
          )
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          value = json.loads(Path("/tmp/mlb-historical-plan.json").read_text())
          state = value.get("state") or {}
          print("needs_authorization=" + (
              "false" if state.get("paidBackfillAuthorized") is True or state.get("phase") == "PROMOTED"
              else "true"
          ))
          print("already_promoted=" + ("true" if state.get("phase") == "PROMOTED" else "false"))
          PY

      - name: Authorize the fingerprinted ledger
        if: steps.plan.outputs.needs_authorization == 'true'
        env:
          FUNCTION_NAME: ${{ steps.function.outputs.name }}
        run: |
          set -euo pipefail
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --cli-read-timeout 900 \
            --cli-binary-format raw-in-base64-out \
            --payload fileb:///tmp/mlb-historical-authorization.json \
            /tmp/mlb-historical-authorize.json \
            >/tmp/authorize-metadata.json
          cat /tmp/authorize-metadata.json
          cat /tmp/mlb-historical-authorize.json
          python - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path("/tmp/mlb-historical-authorize.json").read_text())
          if isinstance(value, dict) and value.get("statusCode") and isinstance(value.get("body"), str):
              value = json.loads(value["body"])
              Path("/tmp/mlb-historical-authorize.json").write_text(json.dumps(value))
          state = value.get("state") or {}
          if value.get("ok") is not True or state.get("paidBackfillAuthorized") is not True:
              raise SystemExit(f"paid-backfill authorization was not persisted: {value}")
          PY

      - name: Run accelerated ingestion, feature construction, search, and untouched audit
        id: training
        env:
          FUNCTION_NAME: ${{ steps.function.outputs.name }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-training-batches
          terminal_phase=""
          for attempt in $(seq 1 "$MAX_ORCHESTRATION_INVOCATIONS"); do
            output="/tmp/mlb-training-batches/batch-$(printf '%03d' "$attempt").json"
            echo "===== Historical optimizer orchestration ${attempt}/${MAX_ORCHESTRATION_INVOCATIONS} ====="
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --region "$AWS_REGION" \
              --cli-read-timeout 900 \
              --cli-binary-format raw-in-base64-out \
              --payload '{"mode":"orchestrate","run":"accelerated_training_loop"}' \
              "$output" >/tmp/orchestrate-metadata.json
            cat /tmp/orchestrate-metadata.json
            python - "$output" <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          value = json.loads(path.read_text())
          if isinstance(value, dict) and value.get("statusCode") and isinstance(value.get("body"), str):
              value = json.loads(value["body"])
              path.write_text(json.dumps(value))
          state = value.get("state") or {}
          summary = {
              "ok": value.get("ok"),
              "phase": state.get("phase"),
              "networkRequestCount": state.get("networkRequestCount"),
              "creditsConsumed": state.get("creditsConsumed"),
              "eligibleGameCount": state.get("eligibleGameCount"),
              "completedSlateCount": len(state.get("completedSlates") or []),
              "optimizationRound": state.get("optimizationRound"),
              "lastError": state.get("lastError"),
          }
          print(json.dumps(summary, sort_keys=True))
          if value.get("ok") is not True and state.get("phase") != "LEASE_HELD":
              raise SystemExit(f"orchestrator returned non-ok: {summary}")
          PY

            phase=$(python - "$output" <<'PY'
          import json
          import sys
          from pathlib import Path
          value = json.loads(Path(sys.argv[1]).read_text())
          print((value.get("state") or {}).get("phase") or "")
          PY
          )
            case "$phase" in
              PROMOTED|PAUSED_QUOTA|DATA_RANGE_EXHAUSTED|OPTIMIZATION_BLOCKED|FAILED)
                terminal_phase="$phase"
                cp "$output" /tmp/mlb-historical-terminal.json
                break
                ;;
              LEASE_HELD)
                sleep 5
                ;;
              READY_FOR_AUTHORIZATION)
                echo "::error::Optimizer lost persisted paid authorization"
                terminal_phase="$phase"
                cp "$output" /tmp/mlb-historical-terminal.json
                break
                ;;
              BACKFILLING|OPTIMIZING|CANDIDATE_REJECTED|"")
                ;;
              *)
                echo "Continuing from optimizer phase: $phase"
                ;;
            esac
          done
          echo "terminal_phase=$terminal_phase" >> "$GITHUB_OUTPUT"

      - name: Read final optimizer and production authority state
        if: always()
        env:
          FUNCTION_NAME: ${{ steps.function.outputs.name }}
        run: |
          set -euo pipefail
          if [ -n "${FUNCTION_NAME:-}" ]; then
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --region "$AWS_REGION" \
              --cli-read-timeout 900 \
              --cli-binary-format raw-in-base64-out \
              --payload '{"mode":"status","run":"accelerated_training_final_status"}' \
              /tmp/mlb-historical-final-status.json \
              >/tmp/final-status-metadata.json || true
            cat /tmp/final-status-metadata.json || true
            cat /tmp/mlb-historical-final-status.json || true
          fi

          api_url=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text 2>/dev/null || true)
          if [ -n "$api_url" ] && [ "$api_url" != "None" ]; then
            curl --fail --silent --show-error --max-time 60 \
              "${api_url%/}/v1/mlb/model/version" \
              -o /tmp/mlb-production-model-version.json || true
            cat /tmp/mlb-production-model-version.json || true
          fi

      - name: Persist immutable training result on main
        if: always()
        env:
          FUNCTION_NAME: ${{ steps.function.outputs.name }}
        run: |
          set -euo pipefail
          git pull --rebase origin main
          mkdir -p runtime_reports
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def load(path):
              p = Path(path)
              if not p.exists():
                  return None
              try:
                  value = json.loads(p.read_text())
                  if isinstance(value, dict) and value.get("statusCode") and isinstance(value.get("body"), str):
                      value = json.loads(value["body"])
                  return value
              except Exception as exc:
                  return {"parseError": f"{type(exc).__name__}:{exc}"}

          final = load("/tmp/mlb-historical-final-status.json") or load("/tmp/mlb-historical-terminal.json") or {}
          state = final.get("state") or {}
          production = load("/tmp/mlb-production-model-version.json") or {}
          plan = load("/tmp/mlb-historical-plan-summary.json") or {}
          phase = str(state.get("phase") or "UNKNOWN")
          promoted = phase == "PROMOTED"
          champion_validation = final.get("championValidation") or {}
          cutover_validation = final.get("cutoverValidation") or {}
          historical_only = final.get("historicalOnlyCutover") or {}
          authority = final.get("productionAuthority") or {}

          promotion_gate_passed = bool(
              promoted
              and champion_validation.get("ok") is True
              and cutover_validation.get("ok") is True
              and historical_only.get("historicalOnly") is True
              and historical_only.get("legacyFallbackAllowed") is False
              and authority.get("historicalChampionOnly") is True
              and authority.get("incumbentProductionAuthorityDestroyed") is True
          )

          report = {
              "proofType": "MLB_V15_11_1_ACCELERATED_HISTORICAL_TRAINING_RESULT",
              "createdAtUtc": datetime.now(timezone.utc).isoformat(),
              "sourceGitSha": os.environ.get("GITHUB_SHA"),
              "workflowRunId": os.environ.get("GITHUB_RUN_ID"),
              "workflowRunAttempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "optimizerFunctionName": os.environ.get("FUNCTION_NAME"),
              "configured": {
                  "targetGames": int(os.environ["TARGET_GAMES"]),
                  "startDate": os.environ["START_DATE"],
                  "endDate": os.environ["END_DATE"],
                  "maximumCredits": int(os.environ["MAX_CREDITS"]),
                  "maximumCandidatesPerRound": int(os.environ["MAX_CANDIDATES"]),
                  "requestsPerInvocation": 100,
                  "maximumOrchestrationInvocations": int(os.environ["MAX_ORCHESTRATION_INVOCATIONS"]),
                  "minimumTrainingGames": 1000,
                  "minimumWalkForwardGames": 200,
                  "minimumUntouchedAuditGames": 200,
                  "minimumDailyAccuracy": 0.80,
                  "stretchDailyAccuracy": 0.90,
                  "exactSlateCoverage": 1.0,
              },
              "plan": plan,
              "phase": phase,
              "promotionGatePassed": promotion_gate_passed,
              "productionCutoverAllowed": promotion_gate_passed,
              "state": state,
              "championValidation": champion_validation,
              "cutoverValidation": cutover_validation,
              "historicalOnlyCutover": historical_only,
              "productionAuthority": authority,
              "liveProductionModel": production,
              "automaticWagerAllowed": False,
              "honestStatus": (
                  "TRAINED_PROMOTED_AND_PRODUCTION_VERIFIED"
                  if promotion_gate_passed
                  else "NOT_PROMOTED_PRODUCTION_UNCHANGED"
              ),
          }

          output = Path("runtime_reports/mlb_v15_11_1_paid_training_latest.json")
          output.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")
          print(output.read_text())
          Path("/tmp/mlb-training-gate-passed").write_text("true" if promotion_gate_passed else "false")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_v15_11_1_paid_training_latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Record MLB V15.11.1 paid historical training result [skip ci]"
            git push origin main
          fi

      - name: Enforce the real release gate
        if: always()
        run: |
          set -euo pipefail
          passed=$(cat /tmp/mlb-training-gate-passed 2>/dev/null || echo false)
          if [ "$passed" != "true" ]; then
            echo "::error::Real MLB historical promotion gate did not pass; production was correctly left unchanged."
            exit 1
          fi
          echo "Real MLB historical promotion gate passed and production authority was verified."

# trigger-generation: 2
