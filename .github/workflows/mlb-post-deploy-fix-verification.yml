name: Verify MLB Scoring Fix After Deploy

on:
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mlb-post-deploy-fix-verification
  cancel-in-progress: true

jobs:
  verify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed main source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verification runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify deployed Lambda capacity and observe one fresh scheduled pull
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TARGET_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          SIGNAL_LEDGER_TABLE: parlay_platform_signal_ledger
          PREDICTIONS_TABLE: parlay_platform_predictions
          OUTCOMES_TABLE: parlay_platform_outcomes
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python scripts/verify_mlb_postdeploy_scheduled_pull.py \
            --target-deploy-sha "$TARGET_DEPLOY_SHA" \
            --region "$AWS_REGION" \
            --stack-name parlay-platform-dev \
            --snapshots-table "$SNAPSHOTS_TABLE" \
            --output /tmp/mlb-post-deploy-invocation.json

      - name: Build current full-slate scoring coverage proof
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          SIGNAL_LEDGER_TABLE: parlay_platform_signal_ledger
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          sleep 5
          SLATE_DATE=$(TZ=America/New_York date +%F)
          python scripts/mlb_scoring_guard_status.py \
            --slate-date "$SLATE_DATE" \
            --output runtime_reports/mlb_scoring_guard_status_latest.json

      - name: Check post-deploy Lambda runtime health
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python scripts/diagnose_mlb_pull_lambda_runtime.py \
            --hours 2 \
            --output runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json

      - name: Build immutable cutoff-aware post-deploy acceptance proof
        env:
          TARGET_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          invocation = json.loads(Path('/tmp/mlb-post-deploy-invocation.json').read_text(encoding='utf-8'))
          scoring = json.loads(Path('runtime_reports/mlb_scoring_guard_status_latest.json').read_text(encoding='utf-8'))
          runtime = json.loads(Path('runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json').read_text(encoding='utf-8'))

          deployed_at_raw = invocation.get('functionLastModified')
          deployed_at = datetime.fromisoformat(str(deployed_at_raw).replace('Z', '+00:00'))
          if deployed_at.tzinfo is None:
              deployed_at = deployed_at.replace(tzinfo=timezone.utc)

          post_deploy_timeouts = []
          for row in runtime.get('timeouts') or []:
              stamp = datetime.fromisoformat(str(row.get('timestampUtc')).replace('Z', '+00:00'))
              if stamp.tzinfo is None:
                  stamp = stamp.replace(tzinfo=timezone.utc)
              if stamp >= deployed_at:
                  post_deploy_timeouts.append(row)

          post_deploy_scheduled_failures = []
          for row in runtime.get('classifiedErrors') or []:
              stamp = datetime.fromisoformat(str(row.get('timestampUtc')).replace('Z', '+00:00'))
              if stamp.tzinfo is None:
                  stamp = stamp.replace(tzinfo=timezone.utc)
              classifications = set(row.get('classifications') or [])
              if stamp >= deployed_at and classifications & {
                  'SCHEDULED_PULL_FAILED',
                  'PRELOCK_STORAGE_INCOMPLETE',
                  'WINNER_COVERAGE_INCOMPLETE',
              }:
                  post_deploy_scheduled_failures.append(row)

          now = datetime.now(timezone.utc)
          game_cutoffs = []
          for game in scoring.get('games') or []:
              start_raw = game.get('commenceTime')
              if not start_raw:
                  continue
              start = datetime.fromisoformat(str(start_raw).replace('Z', '+00:00'))
              if start.tzinfo is None:
                  start = start.replace(tzinfo=timezone.utc)
              game_cutoffs.append(start - timedelta(minutes=45))
          all_cutoffs_passed = bool(game_cutoffs) and all(now >= cutoff for cutoff in game_cutoffs)

          winner_results = invocation.get('winnerResults') or []
          open_candidate_count = sum(int(row.get('preLockStorageCandidateCount') or 0) for row in winner_results)
          lifecycle_skipped_count = sum(int(row.get('preLockStorageLifecycleSkippedCount') or 0) for row in winner_results)
          lifecycle_disposition_complete = bool(winner_results) and all(
              row.get('preLockStorageLifecycleAware') is True
              and row.get('preLockStorageComplete') is True
              and row.get('preLockStorageDispositionComplete') is True
              and int(row.get('preLockStorageDispositionCount') or 0) == int(row.get('gameCount') or -1)
              and int(row.get('preLockStoredCount') or 0) == int(row.get('preLockStorageCandidateCount') or 0)
              for row in winner_results
          )
          historical_slate_cutoff_exception = bool(
              all_cutoffs_passed
              and open_candidate_count == 0
              and lifecycle_disposition_complete
          )

          blockers = []
          if scoring.get('guardPassed') is not True and not historical_slate_cutoff_exception:
              blockers.append('scoring_guard_failed')
          if invocation.get('timeoutSeconds', 0) < 600:
              blockers.append('timeout_not_600')
          if invocation.get('memorySizeMb', 0) < 2048:
              blockers.append('memory_not_2048')
          if invocation.get('deployedGitSha') != os.environ['TARGET_DEPLOY_SHA']:
              blockers.append('deploy_sha_mismatch')
          if not lifecycle_disposition_complete:
              blockers.append('lifecycle_storage_disposition_incomplete')
          if post_deploy_timeouts:
              blockers.append('new_timeout_after_deploy')
          if post_deploy_scheduled_failures:
              blockers.append('new_scheduled_scoring_failure_after_deploy')

          report = {
              'ok': not blockers,
              'proofType': 'MLB_SCORING_FIX_POST_DEPLOY_ACCEPTANCE',
              'version': 'MLB-SCORING-FIX-POST-DEPLOY-v2-cutoff-aware',
              'createdAtUtc': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'deployedCommit': os.environ['TARGET_DEPLOY_SHA'],
              'lambdaConfiguration': invocation,
              'scoringGuardPassed': scoring.get('guardPassed') is True,
              'scoringSummary': scoring.get('summary'),
              'scoringBlockers': scoring.get('blockers') or [],
              'allCurrentSlateCutoffsPassed': all_cutoffs_passed,
              'historicalSlateAcceptedWithoutLateBackfill': historical_slate_cutoff_exception,
              'openPreLockCandidateCount': open_candidate_count,
              'lifecycleSkippedCount': lifecycle_skipped_count,
              'lifecycleStorageDispositionComplete': lifecycle_disposition_complete,
              'postDeployTimeoutCount': len(post_deploy_timeouts),
              'postDeployTimeouts': post_deploy_timeouts,
              'postDeployScheduledFailureCount': len(post_deploy_scheduled_failures),
              'postDeployScheduledFailures': post_deploy_scheduled_failures,
              'blockers': blockers,
              'secretExposed': False,
          }
          path = Path('runtime_reports/mlb_scoring_fix_post_deploy_latest.json')
          path.write_text(json.dumps(report, indent=2, sort_keys=True, default=str) + '\n', encoding='utf-8')
          if blockers:
              raise SystemExit('MLB post-deploy acceptance failed: ' + json.dumps(blockers))
          PY

      - name: Upload post-deploy proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-scoring-fix-post-deploy-${{ github.run_id }}
          path: |
            runtime_reports/mlb_scoring_fix_post_deploy_latest.json
            runtime_reports/mlb_scoring_guard_status_latest.json
            runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json
          if-no-files-found: warn

      - name: Publish verified production proof
        if: success()
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            runtime_reports/mlb_scoring_fix_post_deploy_latest.json \
            runtime_reports/mlb_scoring_guard_status_latest.json \
            runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json
          if git diff --cached --quiet; then
            echo 'No post-deploy proof change'
          else
            git commit -m 'Publish MLB scoring fix post-deploy proof'
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi
