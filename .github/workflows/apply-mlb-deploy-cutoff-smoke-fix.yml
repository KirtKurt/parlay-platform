name: Apply MLB Cutoff-Aware Deploy Smoke

on:
  push:
    paths:
      - '.github/workflows/apply-mlb-deploy-cutoff-smoke-fix.yml'
      - 'scripts/apply_mlb_deploy_cutoff_smoke_fix.py'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-mlb-deploy-cutoff-smoke-fix.yml'
      - 'scripts/apply_mlb_deploy_cutoff_smoke_fix.py'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-cutoff-aware-deploy-smoke-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'agent/fix-mlb-deploy-historical-smoke') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/fix-mlb-deploy-historical-smoke')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply cutoff-aware smoke migration
        run: python scripts/apply_mlb_deploy_cutoff_smoke_fix.py

      - name: Verify cutoff policy and workflow patch
        run: |
          python -m pip install --quiet 'pytest>=8,<9'
          python -m pytest -q tests/unit/test_mlb_deploy_cutoff_smoke_policy.py
          python -m py_compile \
            scripts/apply_mlb_deploy_cutoff_smoke_fix.py \
            scripts/mlb_deploy_cutoff_smoke_policy.py

      - name: Upload validated generated deploy workflow
        uses: actions/upload-artifact@v4
        with:
          name: cutoff-aware-deploy-workflow-${{ github.run_id }}
          path: .github/workflows/deploy.yml
          if-no-files-found: error

      - name: Commit deploy workflow migration
        continue-on-error: true
        run: |
          set -euo pipefail
          TARGET_BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy.yml
          if git diff --cached --quiet; then
            echo 'Cutoff-aware MLB deploy smoke is already applied.'
          else
            git commit -m 'Make MLB deploy lifecycle smoke cutoff-aware'
            git pull --rebase --autostash origin "$TARGET_BRANCH"
            git push origin "HEAD:$TARGET_BRANCH"
          fi
