name: Apply MLB Cutoff-Aware Deploy Smoke

on:
  push:
    paths:
      - '.github/workflows/apply-mlb-deploy-cutoff-smoke-fix.yml'
      - 'scripts/apply_mlb_deploy_cutoff_smoke_fix.py'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-mlb-deploy-cutoff-smoke-fix.yml'
      - 'scripts/apply_mlb_deploy_cutoff_smoke_fix.py'
      - 'scripts/mlb_deploy_cutoff_smoke_policy.py'
      - 'tests/unit/test_mlb_deploy_cutoff_smoke_policy.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-cutoff-aware-deploy-smoke-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'agent/fix-mlb-deploy-historical-smoke') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/fix-mlb-deploy-historical-smoke')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply cutoff-aware smoke migration
        run: python scripts/apply_mlb_deploy_cutoff_smoke_fix.py

      - name: Verify cutoff policy and workflow patch
        run: |
          python -m pip install --quiet 'pytest>=8,<9'
          python -m pytest -q tests/unit/test_mlb_deploy_cutoff_smoke_policy.py
          python -m py_compile \
            scripts/apply_mlb_deploy_cutoff_smoke_fix.py \
            scripts/mlb_deploy_cutoff_smoke_policy.py

      - name: Upload validated generated deploy workflow
        uses: actions/upload-artifact@v4
        with:
          name: cutoff-aware-deploy-workflow-${{ github.run_id }}
          path: .github/workflows/deploy.yml
          if-no-files-found: error

      - name: Persist generated deploy workflow through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['TARGET_BRANCH']
          token = os.environ['GH_TOKEN']
          path = '.github/workflows/deploy.yml'
          generated = Path(path).read_bytes()
          encoded_path = urllib.parse.quote(path, safe='/')
          endpoint = f'https://api.github.com/repos/{repo}/contents/{encoded_path}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'inqsi-cutoff-aware-deploy-workflow-writer/1.0',
          }

          get_request = urllib.request.Request(
              endpoint + '?' + urllib.parse.urlencode({'ref': branch}),
              headers=headers,
          )
          with urllib.request.urlopen(get_request, timeout=45) as response:
              current = json.loads(response.read().decode('utf-8'))
          current_bytes = base64.b64decode(current.get('content') or '')
          if current_bytes == generated:
              print('Cutoff-aware MLB deploy smoke is already committed.')
              raise SystemExit(0)

          payload = json.dumps({
              'message': 'Make MLB deploy lifecycle smoke cutoff-aware',
              'content': base64.b64encode(generated).decode('ascii'),
              'sha': current['sha'],
              'branch': branch,
          }).encode('utf-8')
          put_request = urllib.request.Request(
              endpoint,
              data=payload,
              headers={**headers, 'Content-Type': 'application/json'},
              method='PUT',
          )
          with urllib.request.urlopen(put_request, timeout=60) as response:
              result = json.loads(response.read().decode('utf-8'))
          commit_sha = ((result.get('commit') or {}).get('sha'))
          if not commit_sha:
              raise SystemExit('GitHub Contents API did not return a commit SHA')
          print(json.dumps({'ok': True, 'branch': branch, 'commitSha': commit_sha}, indent=2))
          PY
