name: Deploy Odds API Only SAM to AWS

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "hello_world/mlb_manual_pull.py"
      - "hello_world/mlb_daily_pick_lock.py"
      - "scripts/patch_template_mlb_hot_start_v2.py"
      - "scripts/patch_template_mlb_hot_pull_recovery_permanent.py"
      - "scripts/patch_template_mlb_v1.py"
      - "scripts/patch_template_mlb_results_routes.py"
      - "docs/MLB_PREDICTIVE_PLATFORM_V1.md"
      - ".github/workflows/deploy-odds-only.yml"

concurrency:
  group: parlay-platform-odds-only-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Verify Odds API secret present
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "${ODDS_API_KEY_VALUE:-}" ]; then
            echo "::error::Missing ODDS_API_KEY GitHub secret. MLB V1 uses The Odds API line movement only."
            exit 1
          fi
          echo "ODDS_API_KEY secret is present."

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Patch SAM template for MLB v1 schedules and locks
        run: python scripts/patch_template_mlb_v1.py

      - name: Patch SAM template for MLB settlement routes
        run: python scripts/patch_template_mlb_results_routes.py

      - name: Validate
        run: sam validate

      - name: Build clean
        run: |
          rm -rf .aws-sam
          sam build --no-cached

      - name: Deploy odds-only stack update
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides OddsApiKey="${ODDS_API_KEY_VALUE}"

      - name: Read stack output API URL
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Confirm MLB audited pull function exists
        run: |
          aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id MLBAuditedPullFunction

      - name: Confirm MLB daily lock function exists
        run: |
          aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id MLBDailyPickLockFunction

      - name: Smoke test MLB lock status endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/mlb/locks/status"

      - name: Confirm deployed stack status
        run: |
          aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].StackStatus" \
            --output text
