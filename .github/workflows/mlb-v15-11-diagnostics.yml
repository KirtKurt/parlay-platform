name: MLB V15.11 Diagnostics

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'bootstrap/mlb-v15-11.tar.xz.b64.part*'
      - '.github/workflows/mlb-v15-11-bootstrap.yml'
      - '.github/workflows/mlb-v15-11-diagnostics.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Materialize exact V15.11 source
        shell: bash
        run: |
          set -euo pipefail
          test "$(find bootstrap -maxdepth 1 -type f -name 'mlb-v15-11.tar.xz.b64.part*' | wc -l)" -eq 5
          cat bootstrap/mlb-v15-11.tar.xz.b64.part* > /tmp/mlb-v15-11.tar.xz.b64
          base64 --decode /tmp/mlb-v15-11.tar.xz.b64 > /tmp/mlb-v15-11.tar.xz
          echo 'b73576b5d75def32612017bfb14b1c1768eef0ce91a608cc0c9c0cc4d66774a2  /tmp/mlb-v15-11.tar.xz' | sha256sum -c -
          tar -xJf /tmp/mlb-v15-11.tar.xz -C .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2

      - name: Install validation dependencies
        run: python -m pip install --quiet --disable-pip-version-check 'boto3>=1.34,<2' 'requests>=2.31,<3' 'pytest>=8,<9' 'cfn-lint>=1,<2'

      - name: New historical optimizer tests
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=hello_world python -m pytest -q \
            tests/unit/test_mlb_historical_policy_v1.py \
            tests/unit/test_mlb_historical_daily_optimizer_v1.py \
            tests/unit/test_mlb_historical_optimizer_handler.py \
            tests/unit/test_mlb_historical_read_api_contract.py

      - name: Existing V15.10 compatibility tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tests/unit/test_mlb_ranked_primary_v15_10.py ]; then
            PYTHONPATH=hello_world python -m pytest -q tests/unit/test_mlb_ranked_primary_v15_10.py
          fi

      - name: Compile and assert hard contracts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py \
            hello_world/mlb_ranked_primary_v15_10.py \
            hello_world/mlb_ml_runtime_install_v3.py \
            hello_world/mlb_v3_read_api.py
          grep -Fq 'mlb_historical_policy_v1.apply_runtime_authority' hello_world/mlb_ranked_primary_v15_10.py
          grep -Fq 'MIN_TRAINING_GAMES = 1000' hello_world/mlb_historical_daily_optimizer_v1.py
          grep -Fq 'MIN_DAILY_ACCURACY = 0.80' hello_world/mlb_historical_daily_optimizer_v1.py
          grep -Fq 'legacyFallbackAllowed' hello_world/mlb_historical_policy_v1.py

      - name: Lint optimizer SAM template
        run: sam validate --lint --template-file mlb_historical_optimizer/template.yaml

      - name: Validate runtime SAM template
        run: sam validate --template-file template.yaml

      - name: Build optimizer SAM package
        run: sam build --no-cached --build-dir .aws-sam-historical --template-file mlb_historical_optimizer/template.yaml

      - name: Build runtime SAM package
        run: sam build --no-cached --build-dir .aws-sam-runtime --template-file template.yaml

      - name: Verify packaged runtime import
        shell: bash
        run: |
          set -euo pipefail
          INQSI_MLB_LAMBDA_TASK_ROOT=.aws-sam-runtime/MLBV3ReadFunction \
            PYTHONDONTWRITEBYTECODE=1 \
            python scripts/verify_api_function_mlb_v3_import.py
