name: MLB V1 Pull Guard

on:
  workflow_dispatch:
  schedule:
    - cron: "0/15 * * * *"

permissions:
  actions: write

concurrency:
  group: mlb-v1-pull-guard-dispatcher
  cancel-in-progress: false

jobs:
  dispatch-visibility-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch MLB hot pull visibility proof
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'mlb-hot-pull-recovery-auto.yml',
              ref: 'main'
            });
            core.info('Dispatched MLB hot pull visibility proof.');
