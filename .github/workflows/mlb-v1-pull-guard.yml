name: MLB V1 Pull Guard

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/mlb-v1-pull-guard.yml"
  schedule:
    - cron: "0/15 * * * *"

permissions:
  contents: write

concurrency:
  group: mlb-v1-pull-guard
  cancel-in-progress: false

jobs:
  invoke-mlb-pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check latest MLB pull freshness
        id: freshness
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
        run: |
          set -euo pipefail
          SLATE_DATE=$(TZ=America/New_York date +%F)
          PK="PULLS#mlb#${SLATE_DATE}"
          aws dynamodb query \
            --table-name "${SNAPSHOTS_TABLE}" \
            --key-condition-expression "PK = :pk" \
            --expression-attribute-values "{\":pk\":{\"S\":\"${PK}\"}}" \
            --scan-index-forward false \
            --limit 1 \
            --output json > /tmp/latest-mlb-pull.json
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          threshold_minutes = 20.0
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          manual = event_name == "workflow_dispatch"
          with open('/tmp/latest-mlb-pull.json', 'r', encoding='utf-8') as f:
              payload = json.load(f)
          items = payload.get('Items') or []
          item = items[0] if items else {}
          latest = None
          if item:
              latest = (item.get('pulled_at') or {}).get('S')
              if not latest:
                  latest = (((item.get('data') or {}).get('M') or {}).get('pulled_at') or {}).get('S')
          age = None
          if latest:
              try:
                  dt = datetime.fromisoformat(str(latest).replace('Z', '+00:00'))
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  age = (datetime.now(timezone.utc) - dt.astimezone(timezone.utc)).total_seconds() / 60.0
              except Exception:
                  age = None
          should = bool(manual or age is None or age > threshold_minutes)
          reason = 'manual_dispatch' if manual else 'latest_pull_missing_or_unparseable' if age is None else 'latest_pull_stale' if age > threshold_minutes else 'recent_primary_pull_present'
          status = {
              'ok': True,
              'createdAtUtc': datetime.now(timezone.utc).isoformat(),
              'createdAtEt': datetime.now(timezone.utc).astimezone(ZoneInfo('America/New_York')).isoformat(),
              'workflow': 'mlb-v1-pull-guard',
              'mode': 'automatic_watchdog',
              'primaryProductionPath': 'AWS EventBridge -> MLBAuditedPullFunction',
              'guardAction': 'invoke_lambda_only_if_stale_or_manual',
              'shouldInvoke': should,
              'reason': reason,
              'slateDateEt': os.environ.get('SLATE_DATE_OVERRIDE') or datetime.now(timezone.utc).astimezone(ZoneInfo('America/New_York')).date().isoformat(),
              'latestPullAt': latest,
              'latestPullAgeMinutes': round(age, 2) if age is not None else None,
              'staleThresholdMinutes': threshold_minutes,
              'secretExposed': False,
          }
          os.makedirs('runtime_reports', exist_ok=True)
          with open('runtime_reports/mlb_pull_guard_status_latest.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, indent=2, default=str)
              f.write('\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"should_invoke={'true' if should else 'false'}\n")
              f.write(f"reason={reason}\n")
          print(json.dumps(status, indent=2, default=str))
          PY

      - name: Invoke MLB audited pull Lambda when needed
        if: steps.freshness.outputs.should_invoke == 'true'
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id MLBAuditedPullFunction \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          test -n "$FUNCTION_NAME"
          aws lambda invoke \
            --cli-binary-format raw-in-base64-out \
            --function-name "$FUNCTION_NAME" \
            --payload '{"sport":"mlb","t":"HOT","run":"github_actions_mlb_v1_pull_guard_auto_watchdog","days_ahead":1,"force":true}' \
            /tmp/mlb-pull-response.json
          cat /tmp/mlb-pull-response.json
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          with open('/tmp/mlb-pull-response.json', 'r', encoding='utf-8') as f:
              payload = json.load(f)
          body = payload
          if isinstance(payload, dict) and 'body' in payload:
              try:
                  body = json.loads(payload['body'])
              except Exception:
                  body = payload
          if not isinstance(body, dict) or not body.get('ok'):
              raise SystemExit(f"MLB pull guard failed: {body}")
          if body.get('skipped'):
              raise SystemExit(f"MLB pull guard skipped instead of pulling: {body}")
          if int(body.get('count') or 0) <= 0:
              raise SystemExit(f"MLB pull guard pulled zero games: {body}")

          winner_rows = [row for row in (body.get('game_winner_predictions') or []) if isinstance(row, dict)]
          primary_winners = next((row for row in winner_rows if row.get('ok')), winner_rows[0] if winner_rows else {})
          now_utc = datetime.now(timezone.utc)
          now_et = now_utc.astimezone(ZoneInfo('America/New_York'))
          report = {
              'ok': True,
              'createdAtUtc': now_utc.isoformat(),
              'createdAtEt': now_et.isoformat(),
              'sportsRequested': ['mlb'],
              'pullMode': {
                  'ok': True,
                  'source': 'github_actions_mlb_v1_pull_guard_auto_watchdog',
                  'storageMode': 'watchdog_live_lambda_pull_created_because_primary_was_stale_or_manual',
                  'message': 'This report was refreshed automatically by MLB V1 Pull Guard after stale-checking the primary MLBAuditedPullFunction path.'
              },
              'mlbPullResponseSummary': {
                  'ok': body.get('ok'),
                  'platformVersion': body.get('platformVersion'),
                  'pullDateEt': body.get('pull_date_et'),
                  'asof': body.get('asof'),
                  'gameDatesEt': body.get('game_dates_et'),
                  'count': body.get('count'),
                  'canonicalPullHistory': body.get('canonical_pull_history'),
              },
              'mlbGameWinnerPredictions': primary_winners,
          }
          os.makedirs('runtime_reports', exist_ok=True)
          with open('runtime_reports/live_odds_latest.json', 'w', encoding='utf-8') as f:
              json.dump(report, f, indent=2, default=str)
              f.write('\n')
          print(json.dumps({
              'ok': report['ok'],
              'createdAtUtc': report['createdAtUtc'],
              'pullCount': primary_winners.get('pullCount'),
              'latestPullAt': primary_winners.get('latestPullAt'),
              'gameCount': primary_winners.get('gameCount'),
              'predictionCount': primary_winners.get('count'),
          }, indent=2, default=str))
          PY

      - name: Report no pull needed
        if: steps.freshness.outputs.should_invoke != 'true'
        run: echo "Recent primary MLB pull exists; watchdog did not create a duplicate pull. Reason=${{ steps.freshness.outputs.reason }}"

      - name: Commit MLB guard reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_pull_guard_status_latest.json runtime_reports/live_odds_latest.json || true
          if git diff --cached --quiet; then
            echo "No MLB guard report changes to commit."
          else
            git commit -m "Update MLB V1 pull guard report"
            git pull --rebase --autostash origin main || true
            git push || true
          fi
