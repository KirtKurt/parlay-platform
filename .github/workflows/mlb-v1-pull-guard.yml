name: MLB V1 Pull Guard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-v1-pull-guard.yml'
      - 'scripts/mlb_pull_guard_status.py'
      - 'tests/unit/test_mlb_pull_guard_status.py'
  workflow_dispatch:
  schedule:
    - cron: "0/15 * * * *"

permissions:
  contents: write

concurrency:
  group: mlb-v1-pull-guard-read-only
  cancel-in-progress: false

jobs:
  read-only-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify schedule-aware pull guard policy
        run: python tests/unit/test_mlb_pull_guard_status.py

      - uses: aws-actions/configure-aws-credentials@v4
        continue-on-error: true
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Write read-only MLB pull proof
        env:
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          AWS_REGION: us-east-1
        run: |
          mkdir -p runtime_reports
          SLATE_DATE=$(TZ=America/New_York date +%F)
          PK="PULLS#mlb#${SLATE_DATE}"
          AWS_OK=true
          aws dynamodb query --region "$AWS_REGION" --table-name "$SNAPSHOTS_TABLE" --key-condition-expression "PK = :pk" --expression-attribute-values "{\":pk\":{\"S\":\"$PK\"}}" --consistent-read --output json > /tmp/mlb_pulls.json 2>/tmp/mlb_pull_guard_error.txt || AWS_OK=false
          if [ "$AWS_OK" = "false" ]; then echo '{"Items":[]}' > /tmp/mlb_pulls.json; fi
          python scripts/mlb_pull_guard_status.py \
            --slate-date "$SLATE_DATE" \
            --pulls-json /tmp/mlb_pulls.json \
            --aws-ok "$AWS_OK" \
            --aws-error-file /tmp/mlb_pull_guard_error.txt \
            --output runtime_reports/mlb_hot_pull_visibility_latest.json \
            --output runtime_reports/mlb_pull_guard_status_latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_hot_pull_visibility_latest.json runtime_reports/mlb_pull_guard_status_latest.json || true
          if git diff --cached --quiet; then
            echo "No proof change"
          else
            git commit -m "Update MLB pull guard read-only proof" || true
            git pull --rebase --autostash origin main || true
            git push || true
          fi
          true

      - name: Enforce MLB pull guard health
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          proof = json.loads(Path("runtime_reports/mlb_pull_guard_status_latest.json").read_text(encoding="utf-8"))
          if proof.get("guardPassed") is not True:
              raise SystemExit("MLB pull guard failed: " + json.dumps({
                  "cleanCountStatus": proof.get("cleanCountStatus"),
                  "watchdogReason": proof.get("watchdogReason"),
                  "awsReachable": proof.get("awsReachable"),
                  "officialScheduleVerified": proof.get("officialScheduleVerified"),
                  "officialGameCount": proof.get("officialGameCount"),
                  "pullsRequired": proof.get("pullsRequired"),
                  "fresh": proof.get("fresh"),
                  "missingCleanScheduledSlots": proof.get("missingCleanScheduledSlots"),
              }, default=str))
          PY
