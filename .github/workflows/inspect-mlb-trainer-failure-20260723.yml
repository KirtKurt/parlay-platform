name: Inspect MLB Source Contract Failure 2026-07-23

on:
  push:
    branches: [agent/inspect-mlb-trainer-failure-20260723]
    paths:
      - '.github/workflows/inspect-mlb-trainer-failure-20260723.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-trainer-failure-20260723.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract exact source-contract failure context
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30012212531'
          JOB_ID: '89222966270'
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-source-contract-failure
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-source-contract-failure/failed.log
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          path = Path('/tmp/mlb-source-contract-failure/failed.log')
          lines = path.read_text(encoding='utf-8-sig', errors='replace').splitlines()
          pattern = re.compile(
              r'(traceback|assertionerror|systemexit|runtimeerror|valueerror|keyerror|error:|failed|failure|stale|mismatch|missing|expected|actual|r3|r4|cutoff|experiment|release)',
              re.IGNORECASE,
          )
          selected = set()
          for index, line in enumerate(lines):
              if pattern.search(line):
                  selected.update(range(max(0, index - 10), min(len(lines), index + 28)))
          report = {
              'ok': True,
              'readOnly': True,
              'runId': int('30012212531'),
              'jobId': int('89222966270'),
              'lineCount': len(lines),
              'matchedContext': [
                  {'lineNumber': index + 1, 'text': lines[index]}
                  for index in sorted(selected)
              ][-600:],
              'tail': [
                  {'lineNumber': len(lines) - len(lines[-300:]) + index + 1, 'text': line}
                  for index, line in enumerate(lines[-300:])
              ],
          }
          Path('/tmp/mlb-source-contract-failure/inspection.json').write_text(
              json.dumps(report, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlb-source-contract-failure-${{ github.run_id }}
          path: /tmp/mlb-source-contract-failure/
          if-no-files-found: error
