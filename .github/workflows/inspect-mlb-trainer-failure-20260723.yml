name: Inspect MLB R4 Fixture Patch Workflow

on:
  push:
    branches: [agent/inspect-mlb-trainer-failure-20260723]
    paths:
      - '.github/workflows/inspect-mlb-trainer-failure-20260723.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-trainer-failure-20260723.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download complete fixture-patch run log
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30012869727'
        run: |
          set -euo pipefail
          mkdir -p /tmp/mlb-r4-fixture-workflow
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log \
            > /tmp/mlb-r4-fixture-workflow/run.log
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,event,headSha,jobs,url \
            > /tmp/mlb-r4-fixture-workflow/run.json
          cat /tmp/mlb-r4-fixture-workflow/run.json
          tail -300 /tmp/mlb-r4-fixture-workflow/run.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlb-r4-fixture-workflow-log-${{ github.run_id }}
          path: /tmp/mlb-r4-fixture-workflow/
          if-no-files-found: error
