name: Deploy SAM to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - "runtime_reports/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS and required secrets
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}" || { echo "::error::Missing ODDS_API_KEY"; exit 1; }
          test -n "${INQSI_ADMIN_API_TOKEN_VALUE:-}" || { echo "::error::Missing INQSI_ADMIN_API_TOKEN"; exit 1; }

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9"

      - name: Prove committed MLB source is canonical
        run: |
          set -euo pipefail
          python scripts/stabilize_mlb_deploy_source.py
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          git diff --exit-code -- \
            template.yaml \
            hello_world/api.py \
            hello_world/mlb_manual_pull.py \
            scripts/patch_template_mlb_v1.py \
            scripts/patch_template_mlb_security.py \
            scripts/patch_template_mlb_results_routes.py \
            scripts/verify_mlb_schedule_invariants.py \
            .github/workflows/deploy.yml

      - name: Validate MLB production contracts
        run: |
          set -euo pipefail
          python scripts/verify_mlb_daily_pull_start_gate.py
          python scripts/verify_mlb_schedule_invariants.py
          python scripts/verify_mlb_official_prediction_semantics.py
          python -m pytest -q tests/unit/test_mlb_production_acceptance.py
          python -m py_compile scripts/verify_mlb_deploy_identity.py

      - name: Enforce MLB published prediction and immutable lock regressions
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          regression_tests=(
            tests/unit/test_mlb_published_prediction_authority.py
            tests/unit/test_mlb_daily_per_game_lock.py
            tests/unit/test_mlb_storage_authority.py
            tests/unit/test_mlb_rolling_canonical_authority.py
            tests/unit/test_mlb_ml_runtime_install_explicit.py
          )

          # These contracts may be introduced by the same lock-status change.
          # Run each one when present without making an older source revision
          # fail merely because the optional regression file does not exist yet.
          optional_tests=(
            tests/unit/test_mlb_manual_pull_manifest.py
            tests/unit/test_mlb_official_prediction_semantics.py
            tests/unit/test_mlb_public_per_game_authority.py
            tests/unit/test_mlb_production_verifier_authority.py
            tests/unit/test_mlb_daily_pick_lock_runtime.py
          )
          shopt -s nullglob
          optional_tests+=(
            tests/unit/test_mlb_*lock*status*.py
            tests/unit/test_mlb_*status*lifecycle*.py
            tests/unit/test_mlb_*readiness*lifecycle*.py
          )
          shopt -u nullglob

          declare -A selected_tests=()
          for test_file in "${regression_tests[@]}"; do
            selected_tests["$test_file"]=1
          done
          for test_file in "${optional_tests[@]}"; do
            if [ -f "$test_file" ] && [ -z "${selected_tests[$test_file]+x}" ]; then
              regression_tests+=("$test_file")
              selected_tests["$test_file"]=1
            fi
          done

          python -m pytest -q "${regression_tests[@]}"

      - name: Validate SAM template
        run: sam validate --template-file template.yaml

      - name: Calculate canonical deployment identity
        id: identity
        run: |
          set -euo pipefail
          TEMPLATE_SHA256=$(sha256sum template.yaml | awk '{print $1}')
          test -n "$TEMPLATE_SHA256"
          echo "template_sha256=$TEMPLATE_SHA256" >> "$GITHUB_OUTPUT"
          echo "git_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploy Git SHA: $GITHUB_SHA"
          echo "Canonical template SHA-256: $TEMPLATE_SHA256"

      - name: Build clean
        run: |
          set -euo pipefail
          rm -rf .aws-sam
          sam build --no-cached --template-file template.yaml

      - name: Verify built MLB Lambda cold start
        env:
          INQSI_MLB_LAMBDA_TASK_ROOT: .aws-sam/build/MLBV3ReadFunction
        run: python scripts/verify_api_function_mlb_v3_import.py

      - name: Wait for CloudFormation updateability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name parlay-platform-dev \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo STACK_MISSING)
            echo "CloudFormation status: $STATUS"
            case "$STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|ROLLBACK_COMPLETE|STACK_MISSING)
                exit 0
                ;;
              *_IN_PROGRESS)
                sleep 30
                ;;
              *)
                echo "::error::Stack is not updateable: $STATUS"
                exit 1
                ;;
            esac
          done
          echo "::error::Timed out waiting for CloudFormation"
          exit 1

      - name: Deploy exact canonical source
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
          DEPLOY_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
        run: |
          set -euo pipefail
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              OddsApiKey="${ODDS_API_KEY_VALUE}" \
              InqsiAdminApiToken="${INQSI_ADMIN_API_TOKEN_VALUE}" \
              DeployGitSha="${GITHUB_SHA}" \
              DeployTemplateSha256="${DEPLOY_TEMPLATE_SHA256}"

      - name: Read stack outputs
        id: stack
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          test "$API_URL" != "None"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Prove exact deployed Lambda identity and schedules
        env:
          EXPECTED_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
        run: |
          set -euo pipefail
          python scripts/verify_mlb_deploy_identity.py \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --expected-git-sha "$GITHUB_SHA" \
            --expected-template-sha256 "$EXPECTED_TEMPLATE_SHA256" \
            --output runtime_reports/mlb_deploy_identity_latest.json

      - name: Smoke test health and MLB read runtime
        env:
          API_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${API_URL}v1/health" > /tmp/health.json
          python - <<'PY'
          import json
          import os
          import urllib.request

          base = os.environ['API_URL']
          with urllib.request.urlopen(base + 'v1/mlb/model/version', timeout=45) as response:
              payload = json.loads(response.read().decode('utf-8'))
          print(json.dumps(payload, indent=2, default=str))
          if payload.get('ok') is not True or payload.get('engine_import_ok') is not True:
              raise SystemExit('Live MLB v3 engine did not import')
          if payload.get('model_version') != 'INQSI-MLB-v3.1-90pct-rolling-slate-automatic-authority':
              raise SystemExit('Live MLB model version is stale')
          if payload.get('productionAuthoritySource') != 'gate_promoted_DynamoDB_champion_bundle_only':
              raise SystemExit('Live MLB authority source is stale')
          runtime = payload.get('ml_runtime_install') or {}
          if runtime.get('ok') is not True:
              raise SystemExit('Live MLB runtime installation is not healthy')
          policy = runtime.get('accuracyTargetPolicy') or {}
          for name in (
              'rolling24hAllGamesAuditTargetPct',
              'minimumRolling24hSlateAccuracyPct',
              'minimumOutcomeUntouchedAccuracyPct',
              'recommendationReliabilityThresholdPct',
              'selectedUntouchedTestPlayabilityAccuracyTargetPct',
              'minimumExactOddsCoveragePct',
          ):
              if policy.get(name) != 90.0:
                  raise SystemExit(f'Live MLB authority threshold is stale: {name}={policy.get(name)}')
          PY

      - name: Smoke test read-only MLB lock status
        env:
          API_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ['API_URL'].rstrip('/') + '/v1/mlb/locks/status'
          request = urllib.request.Request(
              url,
              headers={
                  'accept': 'application/json',
                  'user-agent': 'inqsi-deploy-read-only-lock-status-smoke/1.0',
              },
              method='GET',
          )
          with urllib.request.urlopen(request, timeout=45) as response:
              status = response.getcode()
              payload = json.loads(response.read().decode('utf-8'))

          print(json.dumps(payload, indent=2, default=str))
          if status != 200:
              raise SystemExit(f'Live MLB lock status returned HTTP {status}')
          if not isinstance(payload, dict):
              raise SystemExit('Live MLB lock status response was not an object')

          required = (
              'ok',
              'sport',
              'slateDateEt',
              'modelVersion',
              'lockPolicy',
              'lockMinutesBeforeEachGame',
              'gameCount',
              'perGameStatus',
          )
          missing = [name for name in required if name not in payload]
          if missing:
              raise SystemExit(f'Live MLB lock status is missing fields: {missing}')
          if payload.get('ok') is not True or payload.get('sport') != 'mlb':
              raise SystemExit('Live MLB lock status is unhealthy')
          if payload.get('lockMinutesBeforeEachGame') != 45:
              raise SystemExit('Live MLB lock status does not retain T-minus-45')
          if not isinstance(payload.get('perGameStatus'), list):
              raise SystemExit('Live MLB per-game lock status is not a list')
          PY

      - name: Verify The Odds API without writing an unscheduled pull
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          params = urllib.parse.urlencode({
              'apiKey': os.environ['ODDS_API_KEY_VALUE'],
              'regions': 'us',
              'markets': 'h2h,spreads,totals',
              'oddsFormat': 'american',
              'dateFormat': 'iso',
          })
          url = 'https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?' + params
          request = urllib.request.Request(url, headers={'accept': 'application/json', 'user-agent': 'inqsi-deploy-read-only-smoke/1.0'})
          with urllib.request.urlopen(request, timeout=45) as response:
              payload = json.loads(response.read().decode('utf-8'))
              remaining = response.headers.get('x-requests-remaining')
          if not isinstance(payload, list):
              raise SystemExit('The Odds API MLB response was not a list')
          for game in payload:
              if not isinstance(game, dict) or not game.get('id') or not game.get('home_team') or not game.get('away_team'):
                  raise SystemExit('The Odds API returned an invalid MLB game row')
          print(json.dumps({
              'ok': True,
              'provider': 'the_odds_api',
              'writePerformed': False,
              'returnedGameCount': len(payload),
              'requestsRemaining': remaining,
          }, indent=2))
          PY

      - name: Configure API WAF and throttling
        continue-on-error: true
        run: bash scripts/configure_api_protection.sh "${{ steps.stack.outputs.api_url }}" "${{ secrets.AWS_REGION }}"

      - name: Configure security alarms and budget guardrail
        continue-on-error: true
        run: bash scripts/configure_security_alarms.sh parlay-platform-dev "${{ secrets.AWS_REGION }}" 100

      - name: Upload exact deployment proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-deployment-identity-${{ github.run_id }}
          path: runtime_reports/mlb_deploy_identity_latest.json
          if-no-files-found: warn
