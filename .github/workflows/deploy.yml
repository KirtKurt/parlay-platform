name: Deploy SAM to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - "runtime_reports/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS and required secrets
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          test -n "${ODDS_API_KEY_VALUE:-}" || { echo "::error::Missing ODDS_API_KEY"; exit 1; }
          test -n "${BBS_API_KEY_VALUE:-}" || { echo "::error::Missing BBS_API_KEY"; exit 1; }
          test -n "${INQSI_ADMIN_API_TOKEN_VALUE:-}" || { echo "::error::Missing INQSI_ADMIN_API_TOKEN"; exit 1; }

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Verify Big Balls MLB shadow provider authentication and live schema
        env:
          BBS_API_KEY: ${{ secrets.BBS_API_KEY }}
        run: |
          set -euo pipefail
          verified=false
          for attempt in 1 2 3; do
            set +e
            output=$(python scripts/verify_bbs_api_live_contract.py \
              --output /tmp/bbs-mlb-provider-contract.json 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output"
            if [ "$status" -eq 0 ]; then
              verified=true
              break
            fi
            if ! printf '%s\n' "$output" | grep -Eq \
              'BBS_(RATE_LIMITED|NETWORK_UNAVAILABLE|HTTP_5[0-9]{2}|UNEXPECTED_HTTP_5[0-9]{2})'; then
              exit "$status"
            fi
            sleep $((attempt * 5))
          done
          [ "$verified" = true ] || exit 1

      - name: Prove committed MLB source is canonical
        run: |
          set -euo pipefail
          python scripts/stabilize_mlb_deploy_source.py
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          git diff --exit-code -- \
            template.yaml \
            hello_world/api.py \
            hello_world/mlb_manual_pull.py \
            scripts/patch_template_mlb_v1.py \
            scripts/patch_template_mlb_security.py \
            scripts/patch_template_mlb_results_routes.py \
            scripts/verify_mlb_schedule_invariants.py \
            .github/workflows/deploy.yml

      - name: Validate MLB production contracts
        run: |
          set -euo pipefail
          python scripts/verify_mlb_bbs_sam_wiring.py
          python scripts/verify_mlb_daily_pull_start_gate.py
          python scripts/verify_mlb_schedule_invariants.py
          python scripts/verify_mlb_workflow_authority.py
          python scripts/verify_mlb_official_prediction_semantics.py
          python -m pytest -q tests/unit/test_mlb_production_acceptance.py
          python -m py_compile scripts/mlb_deploy_http_probe.py
          python -m py_compile scripts/mlb_lambda_artifact_identity.py
          python -m py_compile scripts/create_mlb_lambda_build_manifest.py
          python -m py_compile scripts/verify_mlb_deploy_identity.py
          python -m py_compile scripts/invoke_mlb_trainer_with_retry.py
          python -m py_compile scripts/verify_mlb_release_activation_predeploy.py
          python -m py_compile scripts/verify_mlb_trainer_deploy_response.py

      - name: Enforce MLB published prediction and immutable lock regressions
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          regression_tests=(
            tests/unit/test_mlb_published_prediction_authority.py
            tests/unit/test_mlb_daily_per_game_lock.py
            tests/unit/test_mlb_lock_status_request_cache.py
            tests/unit/test_mlb_public_per_game_authority.py
            tests/unit/test_mlb_storage_authority.py
            tests/unit/test_mlb_rolling_canonical_authority.py
            tests/unit/test_mlb_official_schedule_authority.py
            tests/unit/test_mlb_schedule_revision_authority.py
            tests/unit/test_mlb_ml_runtime_install_explicit.py
            tests/unit/test_mlb_pull_guard_status.py
            tests/unit/test_mlb_advanced_context_travel_rest.py
            tests/unit/test_mlb_bbs_status.py
            tests/unit/test_mlb_fundamentals_snapshot_v2.py
            tests/unit/test_mlb_last_possible_prediction_gate_provider_neutral.py
            tests/unit/test_mlb_canonical_final_labels_v1.py
            tests/unit/test_mlb_prediction_probability_contract_v1.py
            tests/unit/test_mlb_ml_experiment_v2.py
            tests/unit/test_mlb_ml_dual_model_v2.py
            tests/unit/test_mlb_ml_promotion_policy_v2.py
            tests/unit/test_mlb_ml_aws_training_v1.py
            tests/unit/test_mlb_deploy_identity.py
            tests/unit/test_mlb_deploy_http_probe.py
            tests/unit/test_mlb_lambda_artifact_identity.py
            tests/unit/test_mlb_trainer_invoke_retry.py
            tests/unit/test_mlb_release_activation_predeploy.py
            tests/unit/test_mlb_trainer_deploy_response.py
            tests/unit/test_mlb_workflow_authority.py
            tests/unit/test_run_mlb_ml_v3_audit_report.py
          )

          # These contracts may be introduced by the same lock-status change.
          # Run each one when present without making an older source revision
          # fail merely because the optional regression file does not exist yet.
          optional_tests=(
            tests/unit/test_mlb_manual_pull_manifest.py
            tests/unit/test_mlb_official_prediction_semantics.py
            tests/unit/test_mlb_production_verifier_authority.py
            tests/unit/test_mlb_daily_pick_lock_runtime.py
          )
          shopt -s nullglob
          optional_tests+=(
            tests/unit/test_mlb_*lock*status*.py
            tests/unit/test_mlb_*status*lifecycle*.py
            tests/unit/test_mlb_*readiness*lifecycle*.py
          )
          shopt -u nullglob

          declare -A selected_tests=()
          for test_file in "${regression_tests[@]}"; do
            selected_tests["$test_file"]=1
          done
          for test_file in "${optional_tests[@]}"; do
            if [ -f "$test_file" ] && [ -z "${selected_tests[$test_file]+x}" ]; then
              regression_tests+=("$test_file")
              selected_tests["$test_file"]=1
            fi
          done

          python -m pytest -q "${regression_tests[@]}"

      - name: Validate SAM template
        run: sam validate --template-file template.yaml

      - name: Calculate canonical deployment identity
        id: identity
        run: |
          set -euo pipefail
          TEMPLATE_SHA256=$(sha256sum template.yaml | awk '{print $1}')
          test -n "$TEMPLATE_SHA256"
          echo "template_sha256=$TEMPLATE_SHA256" >> "$GITHUB_OUTPUT"
          echo "git_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploy Git SHA: $GITHUB_SHA"
          echo "Canonical template SHA-256: $TEMPLATE_SHA256"

      - name: Build clean
        run: |
          set -euo pipefail
          rm -rf .aws-sam
          sam build --no-cached --template-file template.yaml

      - name: Verify built MLB Lambda cold start
        env:
          INQSI_MLB_LAMBDA_TASK_ROOT: .aws-sam/build/MLBV3ReadFunction
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/verify_api_function_mlb_v3_import.py

      - name: Bind the verified clean SAM build to the deployment identity
        env:
          EXPECTED_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
        run: |
          set -euo pipefail
          python scripts/create_mlb_lambda_build_manifest.py \
            --build-root .aws-sam/build \
            --expected-git-sha "$GITHUB_SHA" \
            --expected-template-sha256 "$EXPECTED_TEMPLATE_SHA256" \
            --output runtime_reports/mlb_lambda_build_manifest_deploy.json

      - name: Preflight Lambda artifact attestation access
        run: |
          set -euo pipefail
          stack_id=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Stacks[0].StackId' \
            --output text 2>/dev/null || true)
          if [ -z "$stack_id" ] || [ "$stack_id" = "None" ]; then
            echo "Stack is not present; artifact access will be proved after creation."
            exit 0
          fi
          for logical_id in \
            MLBAuditedPullFunction \
            MLBDailyPickLockFunction \
            MLBMLTrainingFunction \
            MLBProductionVerifierFunction \
            MLBV3ReadFunction \
            MLBResultsSchedulerFunction \
            SoccerSchedulerFunction \
            InqsiAutopsySchedulerFunction; do
            function_name=$(aws cloudformation describe-stack-resource \
              --stack-name parlay-platform-dev \
              --logical-resource-id "$logical_id" \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'StackResourceDetail.PhysicalResourceId' \
              --output text)
            test -n "$function_name"
            test "$function_name" != "None"
            code_url=$(aws lambda get-function \
              --function-name "$function_name" \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'Code.Location' \
              --output text)
            test -n "$code_url"
            test "$code_url" != "None"
            LAMBDA_CODE_URL="$code_url" python - <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request

          for attempt in range(1, 4):
              request = urllib.request.Request(
                  os.environ['LAMBDA_CODE_URL'],
                  headers={'Range': 'bytes=0-0'},
                  method='GET',
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      if not response.read(1):
                          raise RuntimeError(
                              'Lambda deployment package preflight returned no bytes'
                          )
                  break
              except urllib.error.HTTPError as exc:
                  if exc.code != 429 and not 500 <= exc.code <= 599:
                      raise
                  if attempt == 3:
                      raise
              except (urllib.error.URLError, TimeoutError):
                  if attempt == 3:
                      raise
              time.sleep(2 ** (attempt - 1))
          PY
          done

      - name: Wait for CloudFormation updateability
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name parlay-platform-dev \
              --region "${{ secrets.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo STACK_MISSING)
            echo "CloudFormation status: $STATUS"
            case "$STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|IMPORT_COMPLETE|IMPORT_ROLLBACK_COMPLETE|STACK_MISSING)
                exit 0
                ;;
              *_IN_PROGRESS)
                sleep 30
                ;;
              *)
                echo "::error::Stack is not updateable: $STATUS"
                exit 1
                ;;
            esac
          done
          echo "::error::Timed out waiting for CloudFormation"
          exit 1

      - name: Enforce durable MLB r3 release activation before SAM deploy
        run: |
          set -euo pipefail
          python scripts/verify_mlb_release_activation_predeploy.py \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --output runtime_reports/mlb_release_activation_predeploy_latest.json

      - name: Deploy exact canonical source
        id: deploy
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          BBS_API_KEY_VALUE: ${{ secrets.BBS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
          DEPLOY_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
        run: |
          set -euo pipefail
          DEPLOY_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "run_id=$DEPLOY_RUN_ID" >> "$GITHUB_OUTPUT"
          parameter_overrides=(
            "OddsApiKey=${ODDS_API_KEY_VALUE}"
            "BbsApiKey=${BBS_API_KEY_VALUE}"
            "InqsiAdminApiToken=${INQSI_ADMIN_API_TOKEN_VALUE}"
            "DeployGitSha=${GITHUB_SHA}"
            "DeployTemplateSha256=${DEPLOY_TEMPLATE_SHA256}"
            "DeployRunId=${DEPLOY_RUN_ID}"
          )
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${parameter_overrides[@]}"

      - name: Read stack outputs
        id: stack
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          test "$API_URL" != "None"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Prove exact deployed Lambda identity and schedules
        env:
          EXPECTED_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
        run: |
          set -euo pipefail
          python scripts/verify_mlb_deploy_identity.py \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --expected-git-sha "$GITHUB_SHA" \
            --expected-template-sha256 "$EXPECTED_TEMPLATE_SHA256" \
            --expected-deploy-run-id "${{ steps.deploy.outputs.run_id }}" \
            --expected-code-manifest runtime_reports/mlb_lambda_build_manifest_deploy.json \
            --output runtime_reports/mlb_deploy_identity_latest.json

      - name: Prove shared Lambda capacity recovered before trainer initialization
        env:
          API_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          set -euo pipefail
          base_url="${API_URL%/}"
          success_streak=0
          capacity_deadline=$((SECONDS + 360))
          while true; do
            health_ok=false
            model_ok=false
            curl --fail --silent --show-error \
              --connect-timeout 2 --max-time 8 \
              "${base_url}/v1/health" >/tmp/mlb-capacity-health.json \
              && health_ok=true
            curl --fail --silent --show-error \
              --connect-timeout 2 --max-time 8 \
              "${base_url}/v1/mlb/model/version" >/tmp/mlb-capacity-model.json \
              && model_ok=true
            if [ "$health_ok" = true ] && [ "$model_ok" = true ]; then
              success_streak=$((success_streak + 1))
              if [ "$success_streak" -ge 3 ]; then
                echo "Shared Lambda capacity is stable across three consecutive probes."
                break
              fi
            else
              success_streak=0
            fi
            if (( SECONDS >= capacity_deadline )); then
              echo "::error::Shared Lambda capacity did not recover after schedule backpressure deployment"
              exit 1
            fi
            sleep 4
          done

      - name: Run AWS-native MLB trainer and verify fresh split health
        env:
          EXPECTED_TEMPLATE_SHA256: ${{ steps.identity.outputs.template_sha256 }}
          AWS_MAX_ATTEMPTS: "1"
        run: |
          set -euo pipefail
          TRAINER_ARN=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='MLBMLTrainingFunctionArn'].OutputValue" \
            --output text)
          test -n "$TRAINER_ARN"
          test "$TRAINER_ARN" != "None"
          RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python scripts/invoke_mlb_trainer_with_retry.py \
            --function-name "$TRAINER_ARN" \
            --region "${{ secrets.AWS_REGION }}" \
            --payload '{"sport":"mlb","mode":"scheduled","run":"aws_native_fixed_prospective_shadow_training"}' \
            --response /tmp/mlb-ml-v2-training.json \
            --invocation /tmp/mlb-ml-v2-training-invoke.json \
            --retry-execution-lease \
            --deadline-seconds 1200 \
            --retry-delay-seconds 20
          python scripts/invoke_mlb_trainer_with_retry.py \
            --function-name "$TRAINER_ARN" \
            --region "${{ secrets.AWS_REGION }}" \
            --payload '{"sport":"mlb","mode":"selection_capture","run":"aws_native_prospective_selection_capture"}' \
            --response /tmp/mlb-ml-v2-selection-capture.json \
            --invocation /tmp/mlb-ml-v2-selection-capture-invoke.json \
            --retry-execution-lease \
            --deadline-seconds 1200 \
            --retry-delay-seconds 20
          python scripts/invoke_mlb_trainer_with_retry.py \
            --function-name "$TRAINER_ARN" \
            --region "${{ secrets.AWS_REGION }}" \
            --status-training-result /tmp/mlb-ml-v2-training.json \
            --status-selection-capture-result /tmp/mlb-ml-v2-selection-capture.json \
            --response /tmp/mlb-ml-v2-status-after.json \
            --invocation /tmp/mlb-ml-v2-status-after-invoke.json
          # Fail closed unless trainingHealth and selectionCaptureHealth both
          # attest deploymentIdentityMatches for the exact runs above.
          python scripts/verify_mlb_trainer_deploy_response.py \
            --training /tmp/mlb-ml-v2-training.json \
            --selection-capture /tmp/mlb-ml-v2-selection-capture.json \
            --status-after /tmp/mlb-ml-v2-status-after.json \
            --training-invocation /tmp/mlb-ml-v2-training-invoke.json \
            --selection-capture-invocation /tmp/mlb-ml-v2-selection-capture-invoke.json \
            --status-after-invocation /tmp/mlb-ml-v2-status-after-invoke.json \
            --run-started-at "$RUN_STARTED_AT" \
            --expected-git-sha "$GITHUB_SHA" \
            --expected-template-sha256 "$EXPECTED_TEMPLATE_SHA256"

      - name: Smoke test health and MLB read runtime
        env:
          API_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          set -euo pipefail
          base_url="${API_URL%/}"
          python scripts/mlb_deploy_http_probe.py \
            "${base_url}/v1/health" \
            --output /tmp/health.json \
            --max-wait-seconds 180 \
            --request-timeout-seconds 8
          python scripts/mlb_deploy_http_probe.py \
            "${base_url}/v1/mlb/model/version" \
            --output /tmp/mlb-model-version.json \
            --max-wait-seconds 180 \
            --request-timeout-seconds 20
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path('/tmp/mlb-model-version.json').read_text(encoding='utf-8')
          )
          print(json.dumps(payload, indent=2, default=str))
          if payload.get('ok') is not True or payload.get('engine_import_ok') is not True:
              raise SystemExit('Live MLB v3 engine did not import')
          if payload.get('model_version') != 'INQSI-MLB-v4.0-canonical-probability-aws-v2-shadow-manual-first':
              raise SystemExit('Live MLB model version is stale')
          if payload.get('productionAuthoritySource') != 'persisted_canonical_rules_market_prediction_v2_shadow_only':
              raise SystemExit('Live MLB authority source is stale')
          if payload.get('automaticPromotionPolicy') != 'disabled_manual_review_creates_shadow_pointer_only':
              raise SystemExit('Live MLB promotion policy is stale')
          if payload.get('legacyV1AuthorityEnabled') is not False:
              raise SystemExit('Legacy V1 authority is not disabled')
          if payload.get('awsNativeTrainingInstalled') is not True:
              raise SystemExit('AWS-native V2 training is not installed')
          if payload.get('awsNativeTrainingAuthority') is not False:
              raise SystemExit('AWS-native V2 training incorrectly claims live authority')
          if payload.get('awsNativeTrainingHealthSource') != 'separate_mode_specific_status_contract':
              raise SystemExit('AWS-native V2 training health source is stale')
          if payload.get('firstPromotionRequiresManualReview') is not True:
              raise SystemExit('Manual-first V2 promotion is not enforced')
          if payload.get('manualReviewCreatesShadowApprovalOnly') is not True:
              raise SystemExit('Manual V2 review is not shadow-only')
          if payload.get('v2InferenceConsumerInstalled') is not False:
              raise SystemExit('Unreviewed V2 inference consumer is installed')
          if payload.get('runtimeAuthorityActivationAvailable') is not False:
              raise SystemExit('Unreviewed V2 runtime authority activation is available')
          runtime = payload.get('ml_runtime_install') or {}
          if runtime.get('ok') is not True:
              raise SystemExit('Live MLB runtime installation is not healthy')
          if runtime.get('version') != 'MLB-ML-RUNTIME-INSTALL-v4.1-verified-stage-promotion-authority-aws-v2-shadow-manual-first':
              raise SystemExit('Live MLB runtime contract is stale')
          steps = runtime.get('steps') or {}
          for name in (
              'legacyV1ChampionRuntimeInstalledForShadowDiagnostics',
              'legacyV1AuthorityDisabled',
              'v2ShadowManualFirst',
              'canonicalProbabilityAndPersistedPrelockAuthority',
              'providerNeutralCalibrationAndActionability',
              'sourceHonestFundamentalsV2',
          ):
              if steps.get(name) is not True:
                  raise SystemExit(f'Live MLB runtime step is missing: {name}')
          policy = runtime.get('accuracyTargetPolicy') or {}
          for name in (
              'rolling24hAllGamesAuditTargetPct',
              'minimumRolling24hSlateAccuracyPct',
              'minimumOutcomeUntouchedAccuracyPct',
              'recommendationReliabilityThresholdPct',
              'selectedUntouchedTestPlayabilityAccuracyTargetPct',
              'minimumExactOddsCoveragePct',
          ):
              if policy.get(name) != 90.0:
                  raise SystemExit(f'Live MLB dashboard metric is stale: {name}={policy.get(name)}')
          if policy.get('rolling24hAccuracyAffectsPromotion') is not False:
              raise SystemExit('Rolling 90% still affects promotion')
          if policy.get('automaticPromotionAfterApplicableGates') is not False:
              raise SystemExit('Automatic first promotion is still enabled')
          if policy.get('everyGameRetainsOfficialPick') is not True:
              raise SystemExit('Every-game winner contract is not active')
          PY

      - name: Smoke test read-only MLB lock status
        env:
          API_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          from datetime import datetime, timezone
          import urllib.parse
          from scripts.mlb_deploy_http_probe import fetch_json_object

          def fetch(url, timeout=45, deadline=None, retry_delay=4):
              return fetch_json_object(
                  url,
                  deadline_monotonic=deadline,
                  max_wait_seconds=180,
                  request_timeout_seconds=timeout,
                  retry_delay_seconds=retry_delay,
                  headers={
                      'accept': 'application/json',
                      'user-agent': 'inqsi-deploy-read-only-lock-lifecycle-smoke/2.0',
                  },
              )

          base_url = os.environ['API_URL'].rstrip('/')
          status_url = base_url + '/v1/mlb/locks/status'
          expected_schedule_version = 'MLB-OFFICIAL-SCHEDULE-AUTHORITY-v1-statsapi-exact-date'
          deadline = time.monotonic() + 20 * 60
          attempt = 0
          while True:
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  raise SystemExit('No official-schedule-backed durable roster appeared within 20 minutes')
              payload = fetch(
                  status_url,
                  timeout=max(1, min(45, remaining)),
                  deadline=deadline,
                  # API Gateway can end the client request while the shared
                  # 300-second lock Lambda is still completing its read-only
                  # status calculation. Do not create an overlapping herd of
                  # status invocations after a transport timeout.
                  retry_delay=300,
              )
              if (
                  payload.get('officialScheduleBacked') is True
                  and payload.get('officialScheduleAuthorityVersion') == expected_schedule_version
                  and payload.get('officialScheduleAuthoritativeStartTimes') is True
              ):
                  break
              attempt += 1
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  raise SystemExit('No official-schedule-backed durable roster appeared within 20 minutes')
              print(f'Waiting for the next scheduled official MLB roster pull (attempt {attempt})')
              time.sleep(min(30, remaining))

          print(json.dumps(payload, indent=2, default=str))

          required = (
              'ok',
              'sport',
              'slateDateEt',
              'modelVersion',
              'lockPolicy',
              'lockMinutesBeforeEachGame',
              'readinessCheckpointsMinutesBeforeGame',
              'playabilityCheckpointsMinutesBeforeGame',
              'gameCount',
              'officialScheduleBacked',
              'officialScheduleAuthorityVersion',
              'officialScheduleGameCount',
              'officialScheduleAuthoritativeStartTimes',
              'lockedPredictionCount',
              'lockedStatusCount',
              'noPredictionDataCount',
              'lockStatusComplete',
              'canonicalPredictionComplete',
              'operationalDefect',
              'perGameLockInstallation',
              'mlLockVectorPreservation',
              'perGameStatus',
          )
          missing = [name for name in required if name not in payload]
          if missing:
              raise SystemExit(f'Live MLB lock status is missing fields: {missing}')
          if payload.get('ok') is not True or payload.get('sport') != 'mlb':
              raise SystemExit('Live MLB lock status is unhealthy')
          if payload.get('modelVersion') != 'INQSI-MLB-DAILY-LOCK-v5-tminus45-readiness-release-status':
              raise SystemExit(f"Live MLB lock model is stale: {payload.get('modelVersion')}")
          if payload.get('lockMinutesBeforeEachGame') != 45:
              raise SystemExit('Live MLB lock status does not retain T-minus-45')
          if payload.get('readinessCheckpointsMinutesBeforeGame') != [60, 50]:
              raise SystemExit('Live MLB readiness checkpoints are not T-minus-60 and T-minus-50')
          if payload.get('playabilityCheckpointsMinutesBeforeGame') != [30, 15]:
              raise SystemExit('Live MLB playability checkpoints are not T-minus-30 and T-minus-15')
          installation = payload.get('perGameLockInstallation') or {}
          if installation.get('ok') is not True:
              raise SystemExit('Live MLB per-game lock installation is unhealthy')
          if installation.get('fixVersion') != 'MLB-LOCK-RUNTIME-FIX-v5-official-schedule-lifecycle-vector-separation':
              raise SystemExit(f"Live MLB lock fix is stale: {installation.get('fixVersion')}")
          if installation.get('officialScheduleAuthorityRequired') is not True:
              raise SystemExit('Live MLB lock runtime does not require official schedule authority')
          if installation.get('selectionLockIndependentOfTrainingVector') is not True:
              raise SystemExit('Live MLB selection lock still depends on training-vector eligibility')
          vector_installation = payload.get('mlLockVectorPreservation') or {}
          if vector_installation.get('selectionLockIndependentOfTrainingVector') is not True:
              raise SystemExit('Live MLB vector separation runtime is stale')
          if not isinstance(payload.get('perGameStatus'), list):
              raise SystemExit('Live MLB per-game lock status is not a list')
          game_count = int(payload.get('gameCount') or 0)
          if payload.get('officialScheduleBacked') is not True:
              raise SystemExit('Live MLB roster is not backed by the official exact-date schedule')
          if payload.get('officialScheduleAuthorityVersion') != expected_schedule_version:
              raise SystemExit('Live MLB official schedule authority version is stale')
          if payload.get('officialScheduleAuthoritativeStartTimes') is not True:
              raise SystemExit('Live MLB canonical start times are not official')
          if int(payload.get('officialScheduleGameCount') or 0) != game_count:
              raise SystemExit('Live MLB official schedule count differs from durable roster count')
          locked_predictions = int(payload.get('lockedPredictionCount') or 0)
          locked_statuses = int(payload.get('lockedStatusCount') or 0)
          terminal_no_data = int(payload.get('noPredictionDataCount') or 0)
          if locked_statuses != locked_predictions + terminal_no_data:
              raise SystemExit('Lock-status counts conflate canonical predictions and terminal outcomes')
          if not (0 <= locked_predictions <= locked_statuses <= game_count):
              raise SystemExit('Live MLB lock-status counts exceed the full-slate game count')
          if payload.get('canonicalPredictionComplete') != (bool(game_count) and locked_predictions == game_count):
              raise SystemExit('canonicalPredictionComplete does not match immutable winner coverage')
          if payload.get('lockStatusComplete') != (bool(game_count) and locked_statuses == game_count):
              raise SystemExit('lockStatusComplete does not match terminal status coverage')

          status_rows = payload.get('perGameStatus') or []
          if len(status_rows) != game_count:
              raise SystemExit('Per-game status does not cover the full durable slate manifest')
          status_by_game = {}
          official_schedule_query = urllib.parse.urlencode({
              'sportId': '1',
              'startDate': payload['slateDateEt'],
              'endDate': payload['slateDateEt'],
          })
          official_schedule = fetch('https://statsapi.mlb.com/api/v1/schedule?' + official_schedule_query)
          official_games = [
              game
              for date_row in official_schedule.get('dates') or []
              for game in date_row.get('games') or []
          ]
          official_by_pk = {str(game.get('gamePk')): game for game in official_games}
          current_schedule_drifts = []
          seen_official_pks = set()
          for row in status_rows:
              if not isinstance(row, dict):
                  raise SystemExit('Per-game lock status contains a non-object row')
              game_id = str(row.get('gameId') or row.get('gameIdentity') or '')
              if not game_id or game_id in status_by_game:
                  raise SystemExit('Per-game lock status has a missing or duplicate game identity')
              status_by_game[game_id] = row
              official_pk = str(row.get('officialGamePk') or '')
              if not official_pk or official_pk in seen_official_pks:
                  raise SystemExit(f'Per-game lock status has a missing or duplicate official game identity: {game_id}')
              seen_official_pks.add(official_pk)
              official_game = official_by_pk.get(official_pk)
              canonical_start = datetime.fromisoformat(str(row.get('commenceTime')).replace('Z', '+00:00')).astimezone(timezone.utc)
              if official_game is not None:
                  current_official_start = datetime.fromisoformat(str(official_game['gameDate']).replace('Z', '+00:00')).astimezone(timezone.utc)
                  if canonical_start != current_official_start:
                      current_schedule_drifts.append({
                          'gameId': game_id,
                          'officialGamePk': official_pk,
                          'durableAuthorityStart': canonical_start.isoformat(),
                          'currentStatsApiStart': current_official_start.isoformat(),
                      })
              if row.get('canonicalStartTimeSource') != 'MLB_STATS_API_EXACT_DATE':
                  raise SystemExit(f'Per-game start-time authority is stale for {game_id}')
              provider_event_id = row.get('providerEventId')
              if (
                  provider_event_id not in (None, '')
                  and not game_id.startswith('mlb_statsapi:')
                  and str(provider_event_id) != game_id
              ):
                  raise SystemExit(f'Provider event identity was not preserved for {game_id}')
              if provider_event_id in (None, '') and not game_id.startswith('mlb_statsapi:'):
                  raise SystemExit(f'Provider-missing official game lacks the Stats API fallback identity: {game_id}')
              if row.get('lockStatus') == 'LOCKED_NO_PREDICTION_DATA':
                  if row.get('lockedPrediction') is not False or row.get('predictedWinner') not in (None, ''):
                      raise SystemExit('Terminal no-data status was counted as a canonical winner')
                  if row.get('blocked') is not True or row.get('trainingEligible') is not False:
                      raise SystemExit('Terminal no-data status is not release/training ineligible')
          if len(seen_official_pks) != game_count:
              raise SystemExit('Official game identities do not cover the durable roster')
          if len(official_by_pk) != game_count or current_schedule_drifts:
              print(json.dumps({
                  'diagnostic': 'current_stats_api_differs_from_immutable_schedule_authority',
                  'durableGameCount': game_count,
                  'currentStatsApiGameCount': len(official_by_pk),
                  'startTimeDrifts': current_schedule_drifts,
              }, indent=2))

          prediction_query = urllib.parse.urlencode({'date': payload['slateDateEt']})
          prediction_url = base_url + '/v1/mlb/predictions?' + prediction_query
          prediction_deadline = time.monotonic() + 20 * 60
          while True:
              predictions = fetch(
                  prediction_url,
                  deadline=prediction_deadline,
              )
              winner_rows = [
                  row
                  for row in predictions.get('predictions') or []
                  if isinstance(row, dict) and row.get('predictedWinner') not in (None, '')
              ]
              prelock_winner_rows = [
                  row for row in winner_rows if row.get('lockedPrediction') is not True
              ]
              if winner_rows and not prelock_winner_rows:
                  # Immutable locks from an earlier runtime are never rewritten.
                  break
              if prelock_winner_rows and all(
                  row.get('probabilityContractVersion')
                  == 'MLB-PREDICTION-PROBABILITY-CONTRACT-v1-canonical-model-direction'
                  for row in prelock_winner_rows
              ):
                  break
              if time.monotonic() >= prediction_deadline:
                  raise SystemExit('No fresh persisted canonical probability-contract predictions appeared within 20 minutes')
              print('Waiting for the next protected MLB pull to persist the canonical probability contract')
              time.sleep(30)
          print(json.dumps(predictions, indent=2, default=str))
          prediction_required = (
              'gameCount',
              'lockedPredictionCount',
              'officialPredictionCount',
              'lockedStatusCount',
              'noPredictionDataCount',
              'lockStatusComplete',
              'canonicalPredictionComplete',
              'operationalDefect',
              'predictions',
          )
          prediction_missing = [name for name in prediction_required if name not in predictions]
          if prediction_missing:
              raise SystemExit(f'Live MLB predictions is missing lifecycle fields: {prediction_missing}')
          if predictions.get('sport') != 'mlb' or not isinstance(predictions.get('predictions'), list):
              raise SystemExit('Live MLB predictions lifecycle response is malformed')
          if int(predictions.get('gameCount') or 0) != game_count:
              raise SystemExit('Predictions and lock status disagree on durable game count')
          if len(predictions.get('predictions') or []) != game_count:
              raise SystemExit('Prediction lifecycle rows do not cover the full durable slate')
          if predictions.get('operationalDefect') is True:
              raise SystemExit('Prediction lifecycle reports an operational defect after deployment')
          prediction_locks = int(predictions.get('lockedPredictionCount') or 0)
          prediction_statuses = int(predictions.get('lockedStatusCount') or 0)
          prediction_terminal = int(predictions.get('noPredictionDataCount') or 0)
          if prediction_locks != int(predictions.get('officialPredictionCount') or 0):
              raise SystemExit('Official prediction count does not match canonical winner count')
          if prediction_statuses != prediction_locks + prediction_terminal:
              raise SystemExit('Prediction endpoint conflates canonical winners and terminal outcomes')

          prediction_by_game = {
              str(row.get('gameId') or row.get('gameIdentity') or ''): row
              for row in predictions.get('predictions') or []
              if isinstance(row, dict)
          }
          if len(prediction_by_game) != game_count or set(prediction_by_game) != set(status_by_game):
              raise SystemExit('Prediction and lock-status lifecycle identities are not one-to-one')
          for game_id, status_row in status_by_game.items():
              prediction_row = prediction_by_game[game_id]
              for field in (
                  'officialGamePk',
                  'officialGameId',
                  'providerEventId',
                  'canonicalStartTimeSource',
              ):
                  if prediction_row.get(field) != status_row.get(field):
                      raise SystemExit(f'Identity authority {field} differs between endpoints for {game_id}')
              if prediction_row.get('predictedWinner') not in (None, ''):
                  has_probability_contract = prediction_row.get('probabilityContractVersion') == 'MLB-PREDICTION-PROBABILITY-CONTRACT-v1-canonical-model-direction'
                  if not has_probability_contract and prediction_row.get('lockedPrediction') is not True:
                      raise SystemExit(f'Canonical probability contract is missing for {game_id}')
                  if has_probability_contract:
                      home_probability = float(prediction_row.get('homeModelWinProbability'))
                      away_probability = float(prediction_row.get('awayModelWinProbability'))
                      if abs(home_probability + away_probability - 1.0) > 1e-9:
                          raise SystemExit(f'Model probabilities are not complementary for {game_id}')
                      selected_side = prediction_row.get('predictedSide')
                      if selected_side not in {'home', 'away'}:
                          raise SystemExit(f'Predicted side is invalid for {game_id}')
                      expected_winner = prediction_row.get('homeTeam') if selected_side == 'home' else prediction_row.get('awayTeam')
                      selected_probability = home_probability if selected_side == 'home' else away_probability
                      if prediction_row.get('predictedWinner') != expected_winner or selected_probability < 0.5:
                          raise SystemExit(f'Winner, side, and model probability disagree for {game_id}')
                      for field in ('modelWinProbability', 'marketProbability', 'signalScore', 'pickReliability'):
                          if field not in prediction_row:
                              raise SystemExit(f'Probability semantics field {field} is missing for {game_id}')
                      if prediction_row.get('probabilityCorrectionApplied') is True:
                          if prediction_row.get('playable') is not False or prediction_row.get('trainingEligible') is not False:
                              raise SystemExit(f'Probability correction did not fail closed for {game_id}')
              if not (status_row.get('lockedPrediction') is True or status_row.get('lockStatus') == 'LOCKED_NO_PREDICTION_DATA'):
                  continue
              if status_row.get('lockStatus') == 'LOCKED_NO_PREDICTION_DATA':
                  if prediction_row.get('lockStatus') != 'LOCKED_NO_PREDICTION_DATA':
                      raise SystemExit(f'Terminal status mismatch between endpoints for {game_id}')
                  if prediction_row.get('predictedWinner') not in (None, ''):
                      raise SystemExit(f'Terminal prediction row exposes a winner for {game_id}')
                  continue
              for field in ('predictedWinner', 'predictedSide', 'selectionFingerprint'):
                  if prediction_row.get(field) != status_row.get(field):
                      raise SystemExit(f'Immutable {field} differs between endpoints for {game_id}')
              prediction_assessment = prediction_row.get('playabilityAssessment') or {}
              status_assessment = status_row.get('playabilityAssessment') or {}
              if (
                  prediction_row.get('requiredPlayabilityCheckpoint') == status_row.get('requiredPlayabilityCheckpoint')
                  and prediction_assessment.get('assessment_fingerprint') == status_assessment.get('assessment_fingerprint')
              ):
                  for field in ('playable', 'blocked', 'playabilityAssessmentValidationErrors'):
                      if prediction_row.get(field) != status_row.get(field):
                          raise SystemExit(f'Playability {field} differs between endpoints for {game_id}')
          PY

      - name: Verify The Odds API without writing an unscheduled pull
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          event_params = urllib.parse.urlencode({
              'apiKey': os.environ['ODDS_API_KEY_VALUE'],
              'dateFormat': 'iso',
          })
          event_url = 'https://api.the-odds-api.com/v4/sports/baseball_mlb/events?' + event_params
          event_request = urllib.request.Request(event_url, headers={'accept': 'application/json', 'user-agent': 'inqsi-deploy-read-only-events-smoke/1.0'})
          with urllib.request.urlopen(event_request, timeout=45) as response:
              events = json.loads(response.read().decode('utf-8'))
          if not isinstance(events, list):
              raise SystemExit('The Odds API MLB events response was not a list')
          event_ids = set()
          for game in events:
              if not isinstance(game, dict) or not game.get('id') or not game.get('home_team') or not game.get('away_team') or not game.get('commence_time'):
                  raise SystemExit('The Odds API returned an invalid MLB event row')
              event_ids.add(str(game['id']))

          params = urllib.parse.urlencode({
              'apiKey': os.environ['ODDS_API_KEY_VALUE'],
              'regions': 'us',
              'markets': 'h2h,spreads,totals',
              'oddsFormat': 'american',
              'dateFormat': 'iso',
          })
          url = 'https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?' + params
          request = urllib.request.Request(url, headers={'accept': 'application/json', 'user-agent': 'inqsi-deploy-read-only-smoke/1.0'})
          with urllib.request.urlopen(request, timeout=45) as response:
              payload = json.loads(response.read().decode('utf-8'))
              remaining = response.headers.get('x-requests-remaining')
          if not isinstance(payload, list):
              raise SystemExit('The Odds API MLB response was not a list')
          for game in payload:
              if not isinstance(game, dict) or not game.get('id') or not game.get('home_team') or not game.get('away_team'):
                  raise SystemExit('The Odds API returned an invalid MLB game row')
              if str(game['id']) not in event_ids:
                  raise SystemExit('The Odds API odds row is absent from the independent events roster')
          print(json.dumps({
              'ok': True,
              'provider': 'the_odds_api',
              'writePerformed': False,
              'returnedEventCount': len(events),
              'returnedGameCount': len(payload),
              'requestsRemaining': remaining,
          }, indent=2))
          PY

      - name: Configure API WAF and throttling
        continue-on-error: true
        run: bash scripts/configure_api_protection.sh "${{ steps.stack.outputs.api_url }}" "${{ secrets.AWS_REGION }}"

      - name: Configure security alarms and budget guardrail
        continue-on-error: true
        run: bash scripts/configure_security_alarms.sh parlay-platform-dev "${{ secrets.AWS_REGION }}" 100

      - name: Upload exact deployment proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-deployment-identity-${{ github.run_id }}
          path: |
            runtime_reports/mlb_lambda_build_manifest_deploy.json
            runtime_reports/mlb_deploy_identity_latest.json
          if-no-files-found: warn
