name: Deploy SAM to AWS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Patch SAM template for MLB v1
        run: python scripts/patch_template_mlb_v1.py

      - name: Patch SAM template for MLB settlement routes
        run: python scripts/patch_template_mlb_results_routes.py

      - name: Validate
        run: sam validate

      - name: Build clean
        run: |
          rm -rf .aws-sam
          sam build --no-cached

      - name: Deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides OddsApiKey=${{ secrets.ODDS_API_KEY }}

      - name: Grant image moderation Rekognition access
        run: |
          ROLE_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id ApiFunctionRole \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          test -n "$ROLE_NAME"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name InqsiImageModerationRekognitionAccess \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["rekognition:DetectModerationLabels","rekognition:DetectText"],"Resource":"*"}]}'

      - name: Configure admin API token
        env:
          INQSI_ADMIN_API_TOKEN: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id ApiFunction \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          test -n "$FUNCTION_NAME"
          aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query "Environment.Variables" \
            --output json > current-env.json
          python - <<'PY'
          import json, os
          with open('current-env.json') as f:
              variables = json.load(f) or {}
          value = os.environ.get('INQSI_ADMIN_API_TOKEN', '').strip()
          if value:
              variables['INQSI_ADMIN_API_TOKEN'] = value
          else:
              variables.pop('INQSI_ADMIN_API_TOKEN', None)
          with open('lambda-env.json', 'w') as f:
              json.dump({'Variables': variables}, f)
          PY
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --environment file://lambda-env.json >/tmp/lambda-update.json
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

      - name: Read stack outputs
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Configure API WAF and throttling
        continue-on-error: true
        run: bash scripts/configure_api_protection.sh "${{ steps.stack_outputs.outputs.api_url }}" "${{ secrets.AWS_REGION }}"

      - name: Configure security alarms and budget guardrail
        continue-on-error: true
        run: bash scripts/configure_security_alarms.sh "parlay-platform-dev" "${{ secrets.AWS_REGION }}" "100"

      - name: Smoke test live health endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          test -n "$API_URL"
          curl --fail --silent --show-error "${API_URL}v1/health"

      - name: Smoke test MLB v1 model version endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/mlb/model/version"

      - name: Smoke test MLB v1 today endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/mlb/today"

      - name: Smoke test MLB signal learning endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/results/mlb/signal-learning?fetch_scores=false"

      - name: Smoke test image moderation policy endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/inqsi/images/moderation-policy"

      - name: Admin auth smoke deferred
        run: echo "Admin auth smoke is deferred until the admin secret is set and verified manually."
