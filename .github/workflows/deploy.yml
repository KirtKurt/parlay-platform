name: Deploy SAM to AWS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Validate
        run: sam validate

      - name: Build clean
        run: |
          rm -rf .aws-sam
          sam build --no-cached

      - name: Deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides OddsApiKey=${{ secrets.ODDS_API_KEY }}

      - name: Grant image moderation Rekognition access
        run: |
          ROLE_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id ApiFunctionRole \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          test -n "$ROLE_NAME"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name InqsiImageModerationRekognitionAccess \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["rekognition:DetectModerationLabels","rekognition:DetectText"],"Resource":"*"}]}'

      - name: Read stack outputs
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Smoke test live health endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          test -n "$API_URL"
          curl --fail --silent --show-error "${API_URL}v1/health"

      - name: Smoke test image moderation policy endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/inqsi/images/moderation-policy"

      - name: Smoke test moderation queue workflow
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          test -n "$API_URL"
          python - <<'PY'
          import base64
          import json
          import time
          import urllib.error
          import urllib.request

          API_URL = "${{ steps.stack_outputs.outputs.api_url }}"
          MEMBER_ID = "smoke-member"
          ONE_BY_ONE_PNG = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+/p9sAAAAASUVORK5CYII="

          def request(method, path, payload=None):
              data = None
              headers = {}
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(API_URL + path, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read().decode("utf-8")
                      return resp.status, json.loads(body or "{}")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8")
                  raise AssertionError(f"{method} {path} failed {exc.code}: {body}")

          status, dashboard_before = request("GET", "v1/inqsi/moderation/dashboard")
          assert status == 200 and dashboard_before.get("ok") is True, dashboard_before
          before_total = int((dashboard_before.get("summary") or {}).get("total_uploads") or 0)

          stamp = str(int(time.time()))
          clean_id = f"smoke-clean-{stamp}"
          text_id = f"smoke-text-{stamp}"
          manual_id = f"smoke-manual-{stamp}"

          clean_payload = {
              "upload_id": clean_id,
              "member_id": MEMBER_ID,
              "filename": "clean-smoke.png",
              "image_role": "profile",
              "media_type": "image/png",
              "image_base64": ONE_BY_ONE_PNG,
              "external_scan_result": {"imageModeration": {"decision": "APPROVED", "reason": "passed_inqsi_image_policy", "manual_review_required": False}},
          }
          status, clean = request("POST", "v1/inqsi/member-images/upload", clean_payload)
          assert status == 200 and clean.get("ok") is True, clean
          assert clean["upload"]["moderation_status"] == "approved", clean
          assert clean["upload"]["is_visible"] is True, clean

          text_payload = {
              "upload_id": text_id,
              "member_id": MEMBER_ID,
              "filename": "text-smoke.png",
              "image_role": "post",
              "media_type": "image/png",
              "image_base64": ONE_BY_ONE_PNG,
              "external_scan_result": {"imageModeration": {"decision": "REJECTED", "reason": "reject_if_any_readable_text_detected", "manual_review_required": False}},
          }
          status, text = request("POST", "v1/inqsi/member-images/upload", text_payload)
          assert status == 200 and text.get("ok") is True, text
          assert text["upload"]["moderation_status"] == "rejected", text
          assert text["upload"]["is_visible"] is False, text

          manual_payload = {
              "upload_id": manual_id,
              "member_id": MEMBER_ID,
              "filename": "manual-smoke.png",
              "image_role": "banner",
              "media_type": "image/png",
              "image_base64": ONE_BY_ONE_PNG,
              "external_scan_result": {"imageModeration": {"decision": "MANUAL_REVIEW", "reason": "pending_admin_review", "manual_review_required": True}},
          }
          status, manual = request("POST", "v1/inqsi/member-images/upload", manual_payload)
          assert status == 200 and manual.get("ok") is True, manual
          assert manual["upload"]["moderation_status"] == "manual_review", manual

          status, queue = request("GET", "v1/inqsi/moderation/queue?status=manual_review&member_id=smoke-member")
          assert status == 200 and queue.get("ok") is True, queue
          assert any(item.get("upload_id") == manual_id for item in queue.get("items", [])), queue

          status, review = request("POST", f"v1/inqsi/moderation/review/{manual_id}", {"decision": "approved", "reviewer_id": "github-actions-smoke", "reason_code": "approved_by_smoke_test"})
          assert status == 200 and review.get("ok") is True, review
          assert review["upload"]["moderation_status"] == "approved", review
          assert review["upload"]["is_visible"] is True, review

          status, gallery = request("GET", "v1/inqsi/member-images/smoke-member")
          assert status == 200 and gallery.get("ok") is True, gallery
          ids = {item.get("upload_id") for item in gallery.get("items", [])}
          assert {clean_id, text_id, manual_id}.issubset(ids), gallery

          status, dashboard_after = request("GET", "v1/inqsi/moderation/dashboard")
          assert status == 200 and dashboard_after.get("ok") is True, dashboard_after
          after_total = int((dashboard_after.get("summary") or {}).get("total_uploads") or 0)
          assert after_total >= before_total + 3, {"before": before_total, "after": after_total, "dashboard": dashboard_after}

          print(json.dumps({
              "ok": True,
              "tested": [
                  "dashboard_opened",
                  "clean_image_uploaded_and_approved",
                  "text_image_uploaded_and_rejected",
                  "manual_review_queue_updated",
                  "manual_review_approved",
                  "dashboard_counts_updated",
              ],
              "upload_ids": [clean_id, text_id, manual_id],
              "before_total": before_total,
              "after_total": after_total,
          }, indent=2))
          PY
