name: Deploy SAM to AWS

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "runtime_reports/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: parlay-platform-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Verify Odds API secret present
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "${ODDS_API_KEY_VALUE:-}" ]; then
            echo "::error::Missing ODDS_API_KEY GitHub secret. MLB production pulls must use The Odds API only."
            exit 1
          fi
          echo "ODDS_API_KEY secret is present."

      - name: Verify admin token secret present
        env:
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          if [ -z "${INQSI_ADMIN_API_TOKEN_VALUE:-}" ]; then
            echo "::error::Missing INQSI_ADMIN_API_TOKEN GitHub secret. MLB ingest/lock write routes require it."
            exit 1
          fi
          echo "INQSI_ADMIN_API_TOKEN secret is present."

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Patch SAM template for MLB v1 schedules and locks
        run: python scripts/patch_template_mlb_v1.py

      - name: Patch SAM template for protected MLB write endpoints
        run: python scripts/patch_template_mlb_security.py

      - name: Patch SAM template for MLB settlement routes
        run: python scripts/patch_template_mlb_results_routes.py

      - name: Validate MLB production invariants
        run: python scripts/verify_mlb_schedule_invariants.py

      - name: Validate MLB official prediction semantics
        run: python scripts/verify_mlb_official_prediction_semantics.py

      - name: Validate SAM template
        run: sam validate

      - name: Build clean
        run: |
          rm -rf .aws-sam
          sam build --no-cached

      - name: Wait for existing CloudFormation update to finish
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name parlay-platform-dev \
              --region ${{ secrets.AWS_REGION }} \
              --query "Stacks[0].StackStatus" \
              --output text 2>/dev/null || echo "STACK_MISSING")
            echo "CloudFormation status: ${STATUS}"
            case "${STATUS}" in
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE|ROLLBACK_COMPLETE|STACK_MISSING)
                exit 0
                ;;
              *IN_PROGRESS)
                sleep 30
                ;;
              *)
                echo "Stack status is not safe for update: ${STATUS}"
                exit 1
                ;;
            esac
          done
          echo "Timed out waiting for CloudFormation stack to be updateable."
          exit 1

      - name: Deploy
        env:
          ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              OddsApiKey="${ODDS_API_KEY_VALUE}" \
              InqsiAdminApiToken="${INQSI_ADMIN_API_TOKEN_VALUE:-}"

      - name: Grant image moderation Rekognition access
        continue-on-error: true
        run: |
          ROLE_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --logical-resource-id ApiFunctionRole \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          test -n "$ROLE_NAME"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name InqsiImageModerationRekognitionAccess \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["rekognition:DetectModerationLabels","rekognition:DetectText"],"Resource":"*"}]}'

      - name: Read stack outputs
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "API_URL=$API_URL"

      - name: Configure API WAF and throttling
        continue-on-error: true
        run: bash scripts/configure_api_protection.sh "${{ steps.stack_outputs.outputs.api_url }}" "${{ secrets.AWS_REGION }}"

      - name: Configure security alarms and budget guardrail
        continue-on-error: true
        run: bash scripts/configure_security_alarms.sh "parlay-platform-dev" "${{ secrets.AWS_REGION }}" "100"

      - name: Smoke test live health endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          test -n "$API_URL"
          curl --fail --silent --show-error "${API_URL}v1/health"

      - name: Verify live MLB ML v3 model and runtime installation
        env:
          API_URL: ${{ steps.stack_outputs.outputs.api_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with urllib.request.urlopen(os.environ["API_URL"] + "v1/mlb/model/version", timeout=45) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
          print(json.dumps(payload, indent=2, default=str))
          if payload.get("ok") is not True or payload.get("engine_import_ok") is not True:
              raise SystemExit("MLB v3 engine did not import in live AWS Lambda")
          if not str(payload.get("model_version") or "").startswith("INQSI-MLB-v3.1"):
              raise SystemExit("live model version is not MLB v3.1 automatic authority")
          if payload.get("productionAuthoritySource") != "gate_promoted_DynamoDB_champion_bundle_only":
              raise SystemExit("live MLB authority source is stale or not gate-promoted")
          if payload.get("automaticPromotionPolicy") != "authoritative_AWS_audit_only_after_independent_90pct_authority_gates":
              raise SystemExit("live MLB automatic promotion policy is stale")
          if not str(payload.get("ml_optimization_version") or "").startswith("MLB-ML-OPTIMIZATION-v3"):
              raise SystemExit("live ML optimization v3 orchestrator is missing")
          runtime = payload.get("ml_runtime_install") or {}
          if runtime.get("ok") is not True:
              raise SystemExit(f"live MLB ML runtime install failed: {runtime}")
          expected_runtime = "MLB-ML-RUNTIME-INSTALL-v3.6-per-game-lock-temporal-90pct-auto-authority"
          if runtime.get("version") != expected_runtime:
              raise SystemExit(f"live MLB ML runtime is stale: expected {expected_runtime}, got {runtime.get('version')}")
          steps = runtime.get("steps") or {}
          required = [
              "accuracyTargetsSeparated",
              "legacyReliabilityOverlaySafety",
              "singleDdbChampionAuthority",
              "officialSemanticsFinalized",
              "immutableFeatureFreeze",
              "exactCleanCohortVectorPatch",
              "officialFreezeBridge",
              "canonicalLockedStorageFinalizer",
          ]
          missing = [name for name in required if steps.get(name) is not True]
          if missing:
              raise SystemExit(f"live MLB ML runtime steps missing: {missing}")
          PY

      - name: Smoke test live MLB Odds API pull and storage
        env:
          API_URL: ${{ steps.stack_outputs.outputs.api_url }}
          INQSI_ADMIN_API_TOKEN_VALUE: ${{ secrets.INQSI_ADMIN_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ.get("API_URL", "")
          admin_token = os.environ.get("INQSI_ADMIN_API_TOKEN_VALUE", "")
          body = json.dumps({"t":"HOT","run":"deploy_live_odds_smoke","days_ahead":0,"force":True}).encode("utf-8")
          req = urllib.request.Request(
              api_url + "v1/pull/mlb",
              data=body,
              headers={"content-type":"application/json", "x-inqsi-admin-token": admin_token},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=45) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
          print(json.dumps({
              "ok": payload.get("ok"),
              "live_pull_ok": payload.get("live_pull_ok"),
              "fallback_used": payload.get("fallback_used"),
              "count": payload.get("count"),
              "game_dates_et": payload.get("game_dates_et"),
              "canonical_pull_history": payload.get("canonical_pull_history"),
              "game_winner_predictions": payload.get("game_winner_predictions"),
          }, indent=2))
          if not payload.get("ok"):
              raise SystemExit("MLB live pull endpoint returned ok=false")
          if payload.get("live_pull_ok") is not True:
              raise SystemExit("MLB live pull did not use The Odds API successfully")
          if payload.get("fallback_used"):
              raise SystemExit("MLB live pull used fallback/cached data during deploy smoke")
          count = int(payload.get("count") or 0)
          canonical = payload.get("canonical_pull_history") or []
          winners = payload.get("game_winner_predictions") or []
          if count == 0:
              print("MLB provider call succeeded with no active/upcoming games; canonical game storage and winner generation are not applicable in this off-slate window.")
          else:
              if not canonical or not any(row.get("ok") and int(row.get("games") or 0) > 0 for row in canonical):
                  raise SystemExit("MLB live pull returned games but did not store canonical pull history with games")
              if not winners or not any(row.get("ok") for row in winners):
                  raise SystemExit("MLB live pull returned games but did not run game-winner predictions")
          PY

      - name: Smoke test MLB v1 today endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/mlb/today"

      - name: Smoke test MLB lock status endpoint
        env:
          API_URL: ${{ steps.stack_outputs.outputs.api_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with urllib.request.urlopen(os.environ["API_URL"] + "v1/mlb/locks/status", timeout=45) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
          print(json.dumps(payload, indent=2, default=str))
          preservation = payload.get("mlLockVectorPreservation") or {}
          if preservation.get("ok") is not True or preservation.get("failClosed") is not True:
              raise SystemExit(f"live exact-vector preservation is not fail-closed: {preservation}")
          expected_vector = "MLB-ML-FROZEN-FEATURE-SNAPSHOT-v2-lock-safe-temporal-missingness"
          if preservation.get("expectedVectorVersion") != expected_vector:
              raise SystemExit(f"live lock vector version is stale: {preservation}")
          per_game = payload.get("perGameLockInstallation") or {}
          expected_lock = "INQSI-MLB-DAILY-LOCK-v4-per-game-tminus45-staged-write-once"
          if per_game.get("ok") is not True or per_game.get("version") != expected_lock:
              raise SystemExit(f"live per-game T-minus-45 lock is not installed: {per_game}")
          if per_game.get("canonicalGameWriteAtOwnTMinus45") is not True or per_game.get("failClosed") is not True:
              raise SystemExit(f"live per-game lock contract is incomplete: {per_game}")
          PY

      - name: Smoke test MLB game-winner endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/mlb/game-winners?store=false"

      - name: Verify live official prediction, playability, and ML shadow/champion semantics
        env:
          API_URL: ${{ steps.stack_outputs.outputs.api_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with urllib.request.urlopen(os.environ["API_URL"] + "v1/mlb/game-winners?store=false", timeout=45) as resp:
              payload = json.loads(resp.read().decode("utf-8"))
          rows = payload.get("predictions") or payload.get("winner_predictions") or []
          locked = bool((payload.get("slatePredictionLock") or {}).get("locked"))
          semantics = payload.get("predictionSemantics") or {}
          optimization = payload.get("mlOptimizationRuntime") or {}
          freeze = payload.get("mlFeatureFreeze") or {}
          if semantics.get("applied") is not True:
              raise SystemExit("official prediction semantics guard was not applied")
          if optimization.get("applied") is not True:
              raise SystemExit("ML optimization runtime was not applied")
          if optimization.get("directionAuthorityEnabled") and not optimization.get("championAvailable"):
              raise SystemExit("direction authority enabled without a DDB champion")
          if optimization.get("playabilityAuthorityEnabled") and not optimization.get("championAvailable"):
              raise SystemExit("playability authority enabled without a DDB champion")
          if freeze.get("applied") is not True:
              raise SystemExit("immutable feature-freeze layer was not applied")
          if locked and rows:
              if not all(row.get("officialPrediction") is True and row.get("officialPick") is True for row in rows):
                  raise SystemExit("locked winner rows were not preserved as official predictions")
              official_count = int(payload.get("officialPredictionCount") or 0)
              if official_count != len(rows):
                  raise SystemExit(f"official prediction count {official_count} != locked row count {len(rows)}")
              playable_count = sum(row.get("playable") is True for row in rows)
              if playable_count != int(payload.get("playablePredictionCount") or 0):
                  raise SystemExit("playable prediction count is inconsistent")
              missing_vectors = [row.get("gameId") for row in rows if not ((row.get("frozenFeatureVector") or {}).get("fingerprint"))]
              if missing_vectors:
                  raise SystemExit(f"locked rows missing exact stored feature vectors: {missing_vectors}")
          print(json.dumps({
              "locked": locked,
              "rows": len(rows),
              "officialPredictionCount": payload.get("officialPredictionCount"),
              "playablePredictionCount": payload.get("playablePredictionCount"),
              "nonPlayableOfficialPredictionCount": payload.get("nonPlayableOfficialPredictionCount"),
              "semanticsVersion": semantics.get("version"),
              "mlOptimizationRuntime": optimization,
              "mlFeatureFreeze": freeze,
          }, indent=2))
          PY

      - name: Smoke test MLB signal learning endpoint
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          curl --fail --silent --show-error "${API_URL}v1/results/mlb/signal-learning?fetch_scores=false"

      - name: Smoke test image moderation policy endpoint
        continue-on-error: true
        run: |
          API_URL="${{ steps.stack_outputs.outputs.api_url }}"
          if ! curl --fail --silent --show-error "${API_URL}v1/moderation/policy"; then
            echo "::warning::Image moderation policy endpoint is returning an error. This is non-MLB and will not block MLB/runtime deploys."
          fi
