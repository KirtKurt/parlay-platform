name: Deploy SAM to AWS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::735707987003:role/GitHubDeployRole-parlay-platform
          aws-region: us-east-1

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Validate
        run: sam validate

      - name: Build (clean)
        run: |
          rm -rf .aws-sam
          sam build --no-cached

      - name: Deploy (force)
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name parlay-platform-dev \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --force-upload \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides OddsApiKey=${{ secrets.ODDS_API_KEY }}
