name: MLB Daily Yesterday Audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-daily-yesterday-audit.yml'
      - 'hello_world/mlb_yesterday_audit.py'
      - 'scripts/verify_mlb_yesterday_audit_immutable_source.py'
  schedule:
    # 5:00 AM ET during daylight saving time. Audits the completed prior ET slate.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      slate_date:
        description: 'Optional ET slate date to audit, YYYY-MM-DD. Defaults to yesterday ET.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: python -m pip install --upgrade boto3

      - name: Verify immutable historical-pick authority
        run: python scripts/verify_mlb_yesterday_audit_immutable_source.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Audit yesterday MLB slate
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          INPUT_SLATE_DATE: ${{ github.event.inputs.slate_date }}
        run: |
          set -euo pipefail
          mkdir -p runtime_reports
          export PYTHONPATH="$GITHUB_WORKSPACE/hello_world:${PYTHONPATH:-}"
          python - <<'PY'
          import json, os
          import mlb_yesterday_audit

          slate = (os.environ.get('INPUT_SLATE_DATE') or '').strip() or None
          report = mlb_yesterday_audit.build(slate_date=slate, days_from=3, store=True, write_file=True)
          print(json.dumps({
              'ok': report.get('ok'),
              'slate_date': report.get('slate_date'),
              'status': report.get('status'),
              'immutableLockAuthority': report.get('immutableLockAuthority'),
              'summary': report.get('summary'),
              'finalScoreCount': report.get('finalScoreCount'),
              'stored': report.get('stored'),
              'supersedes': report.get('supersedes'),
              'storeError': report.get('storeError'),
          }, indent=2, default=str))
          if report.get('ok') is not True:
              raise SystemExit('MLB yesterday immutable-lock audit failed closed: ' + json.dumps(report, default=str))
          PY

      - name: Commit MLB audit proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/mlb_yesterday_audit_latest.json || true
          git commit -m "Update MLB yesterday audit proof" || true
          git pull --rebase --autostash origin main || true
          git push || true
