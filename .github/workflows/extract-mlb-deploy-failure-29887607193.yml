name: Extract MLB deploy failure 29887607193

on:
  pull_request:
    paths:
      - ".github/workflows/extract-mlb-deploy-failure-29887607193.yml"

permissions:
  actions: read
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Print terminal failed-step evidence first
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/88821292056/logs" > /tmp/deploy.log
          python - <<'PY'
          import re
          from pathlib import Path
          lines = Path('/tmp/deploy.log').read_text(encoding='utf-8-sig', errors='replace').splitlines()
          start = max(0, len(lines) - 1200)
          pattern = re.compile(r'(?i)(traceback|transienthttpprobeexhausted|deadline exhausted|no official-schedule-backed|timeout(error)?|timed out|http 504|process completed with exit code|locks/status)')
          hits = [index for index in range(start, len(lines)) if pattern.search(lines[index])]
          printed = set()
          for hit in reversed(hits[-50:]):
              print(f'=== HIT {hit + 1}: {lines[hit]} ===')
              for index in range(max(start, hit - 4), min(len(lines), hit + 9)):
                  if index not in printed:
                      print(f'{index + 1}: {lines[index]}')
                      printed.add(index)
          print(f'=== LOG_LINES {len(lines)} HITS {len(hits)} ===')
          PY
