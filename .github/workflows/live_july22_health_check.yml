name: Verify live July 22 platform health

on:
  push:
    branches:
      - agent/live-july22-health-20260722-0143
    paths:
      - .github/workflows/live_july22_health_check.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-july22-health-20260722-0143
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install diagnostic runtime
        run: python -m pip install --disable-pip-version-check --quiet "boto3>=1.34,<2"

      - name: Verify current slate, endpoints, and direct Lambda
        env:
          TARGET_SHA: 52b0ee85c5d7e12f8f4e18406c961e6b71d04eb4
          STACK_NAME: parlay-platform-dev
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from decimal import Decimal
          from pathlib import Path
          from zoneinfo import ZoneInfo

          import boto3
          from boto3.dynamodb.conditions import Key

          region = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION") or "us-east-1"
          stack_name = os.environ["STACK_NAME"]
          target_sha = os.environ["TARGET_SHA"]
          eastern = ZoneInfo("America/New_York")
          now_utc = datetime.now(timezone.utc)
          now_et = now_utc.astimezone(eastern)
          slate = now_et.date().isoformat()

          cf = boto3.client("cloudformation", region_name=region)
          lam = boto3.client("lambda", region_name=region)
          ddb = boto3.resource("dynamodb", region_name=region)

          stack = cf.describe_stacks(StackName=stack_name)["Stacks"][0]
          outputs = {
              str(item.get("OutputKey") or ""): str(item.get("OutputValue") or "")
              for item in stack.get("Outputs") or []
          }

          def physical(logical_id: str) -> str:
              return str(
                  cf.describe_stack_resource(
                      StackName=stack_name,
                      LogicalResourceId=logical_id,
                  )["StackResourceDetail"]["PhysicalResourceId"]
              )

          lock_function = physical("MLBDailyPickLockFunction")
          lock_config = lam.get_function_configuration(FunctionName=lock_function)
          lock_env = (lock_config.get("Environment") or {}).get("Variables") or {}
          table_name = str(lock_env.get("SNAPSHOTS_TABLE") or "")

          def decode_json(raw: bytes | str) -> object:
              text = raw.decode("utf-8", errors="replace") if isinstance(raw, bytes) else str(raw)
              try:
                  return json.loads(text)
              except Exception:
                  return {"_raw": text[:2000]}

          def summarize_payload(payload: object) -> dict:
              if not isinstance(payload, dict):
                  return {"type": type(payload).__name__}
              fields = (
                  "ok",
                  "sport",
                  "slateDateEt",
                  "modelVersion",
                  "pullCount",
                  "gameCount",
                  "officialScheduleBacked",
                  "officialScheduleAuthorityVersion",
                  "officialScheduleGameCount",
                  "officialScheduleAuthoritativeStartTimes",
                  "lockedPredictionCount",
                  "lockedStatusCount",
                  "noPredictionDataCount",
                  "lockStatusComplete",
                  "canonicalPredictionComplete",
                  "operationalDefect",
                  "error",
                  "reason",
              )
              summary = {key: payload.get(key) for key in fields if key in payload}
              if isinstance(payload.get("predictions"), list):
                  summary["predictionCount"] = len(payload["predictions"])
                  summary["winnerCount"] = sum(
                      1
                      for row in payload["predictions"]
                      if isinstance(row, dict) and row.get("predictedWinner") not in (None, "")
                  )
              return summary

          def http_json(url: str, timeout: float = 35.0) -> dict:
              started = time.perf_counter()
              request = urllib.request.Request(
                  url,
                  headers={
                      "accept": "application/json",
                      "user-agent": "inqsi-live-july22-read-only-health/1.0",
                  },
              )
              status = None
              error = None
              raw = b""
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      status = int(response.status)
                      raw = response.read()
              except urllib.error.HTTPError as exc:
                  status = int(exc.code)
                  raw = exc.read()
                  error = f"HTTP {exc.code}"
              except Exception as exc:
                  error = f"{type(exc).__name__}:{exc}"
              elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)
              payload = decode_json(raw) if raw else {}
              return {
                  "statusCode": status,
                  "elapsedMs": elapsed_ms,
                  "error": error,
                  "payload": payload,
                  "payloadSummary": summarize_payload(payload),
              }

          api_candidates = []
          for key, value in outputs.items():
              if value.startswith("http") and ("api" in key.lower() or "url" in key.lower()):
                  api_candidates.append((key, value.rstrip("/")))
          api_candidates.sort(key=lambda item: (0 if item[0] == "ApiUrl" else 1, item[0]))

          selected_api_key = None
          selected_api_url = None
          health = {"statusCode": None, "elapsedMs": 0, "error": "No API URL output", "payload": {}, "payloadSummary": {}}
          for key, base in api_candidates:
              probe = http_json(base + "/v1/health", timeout=20)
              if probe.get("statusCode") == 200:
                  selected_api_key = key
                  selected_api_url = base
                  health = probe
                  break
              if selected_api_url is None:
                  selected_api_key = key
                  selected_api_url = base
                  health = probe

          pull_items = []
          if table_name:
              table = ddb.Table(table_name)
              start_key = None
              while True:
                  kwargs = {
                      "KeyConditionExpression": Key("PK").eq(f"PULLS#mlb#{slate}"),
                      "ConsistentRead": True,
                  }
                  if start_key:
                      kwargs["ExclusiveStartKey"] = start_key
                  response = table.query(**kwargs)
                  pull_items.extend(
                      item
                      for item in response.get("Items") or []
                      if isinstance(item, dict) and item.get("record_type") == "pull_run"
                  )
                  start_key = response.get("LastEvaluatedKey")
                  if not start_key:
                      break

          def parse_dt(value: object) -> datetime | None:
              if not value:
                  return None
              try:
                  parsed = datetime.fromisoformat(str(value).replace("Z", "+00:00"))
                  if parsed.tzinfo is None:
                      parsed = parsed.replace(tzinfo=timezone.utc)
                  return parsed.astimezone(timezone.utc)
              except Exception:
                  return None

          pull_items.sort(
              key=lambda item: parse_dt((item.get("data") or {}).get("pulled_at"))
              or datetime.min.replace(tzinfo=timezone.utc)
          )
          latest_item = pull_items[-1] if pull_items else {}
          latest_pull = latest_item.get("data") if isinstance(latest_item.get("data"), dict) else {}
          latest_at = parse_dt(latest_pull.get("pulled_at"))
          latest_age_minutes = (
              round(max((now_utc - latest_at).total_seconds() / 60.0, 0.0), 3)
              if latest_at
              else None
          )
          manifest = latest_pull.get("provider_schedule_manifest") if isinstance(latest_pull, dict) else {}
          manifest = manifest if isinstance(manifest, dict) else {}
          schedule_authority = manifest.get("scheduleAuthority")
          schedule_authority = schedule_authority if isinstance(schedule_authority, dict) else {}

          status = {}
          predictions = {}
          if selected_api_url:
              query = urllib.parse.urlencode({"date": slate})
              status = http_json(selected_api_url + "/v1/mlb/locks/status?" + query, timeout=35)
              predictions = http_json(selected_api_url + "/v1/mlb/predictions?" + query, timeout=35)

          direct_started = time.perf_counter()
          direct_error = None
          direct_outer = {}
          direct_body = {}
          try:
              invoke = lam.invoke(
                  FunctionName=lock_function,
                  InvocationType="RequestResponse",
                  Payload=json.dumps(
                      {
                          "httpMethod": "GET",
                          "path": "/v1/mlb/locks/status",
                          "queryStringParameters": {"date": slate},
                          "headers": {"accept": "application/json"},
                          "requestContext": {"identity": {}},
                      }
                  ).encode("utf-8"),
              )
              direct_outer = decode_json(invoke["Payload"].read())
              if isinstance(direct_outer, dict):
                  direct_body = decode_json(direct_outer.get("body") or "{}")
              if invoke.get("FunctionError"):
                  direct_error = str(invoke.get("FunctionError"))
          except Exception as exc:
              direct_error = f"{type(exc).__name__}:{exc}"
          direct_elapsed_ms = round((time.perf_counter() - direct_started) * 1000.0, 3)

          status_payload = status.get("payload") if isinstance(status, dict) else {}
          predictions_payload = predictions.get("payload") if isinstance(predictions, dict) else {}
          direct_status_code = direct_outer.get("statusCode") if isinstance(direct_outer, dict) else None

          checks = {
              "deployedFunctionActive": lock_config.get("State") == "Active" and lock_config.get("LastUpdateStatus") == "Successful",
              "currentSlateIsJuly22": slate == "2026-07-22",
              "scheduledPullPresent": len(pull_items) >= 1,
              "latestPullFresh": latest_age_minutes is not None and latest_age_minutes <= 25,
              "latestPullOfficialScheduleBacked": bool(schedule_authority) and schedule_authority.get("authoritativeRoster") is True,
              "healthHttpOk": health.get("statusCode") == 200 and isinstance(health.get("payload"), dict) and health["payload"].get("ok") is True,
              "statusHttpOk": status.get("statusCode") == 200 and isinstance(status_payload, dict) and status_payload.get("ok") is True,
              "statusCurrentSlate": isinstance(status_payload, dict) and status_payload.get("slateDateEt") == slate,
              "statusOfficialScheduleBacked": isinstance(status_payload, dict) and status_payload.get("officialScheduleBacked") is True,
              "statusWithinGatewayDeadline": isinstance(status, dict) and status.get("elapsedMs", 999999) < 29000,
              "predictionsHttpOk": predictions.get("statusCode") == 200 and isinstance(predictions_payload, dict) and predictions_payload.get("ok") is True,
              "directLambdaOk": direct_error is None and direct_status_code == 200 and isinstance(direct_body, dict) and direct_body.get("ok") is True,
          }

          report = {
              "checkedAtUtc": now_utc.isoformat(),
              "checkedAtEt": now_et.isoformat(),
              "slateDateEt": slate,
              "targetGitSha": target_sha,
              "stackName": stack_name,
              "region": region,
              "selectedApiOutputKey": selected_api_key,
              "lockFunction": {
                  "name": lock_function,
                  "state": lock_config.get("State"),
                  "lastUpdateStatus": lock_config.get("LastUpdateStatus"),
                  "lastModified": lock_config.get("LastModified"),
                  "codeSha256": lock_config.get("CodeSha256"),
              },
              "currentPullPipeline": {
                  "tableConfigured": bool(table_name),
                  "storedPullCount": len(pull_items),
                  "canonicalSlotKeyCount": sum(1 for item in pull_items if str(item.get("SK") or "").startswith("PULL#SLOT#")),
                  "latestPullAtUtc": latest_at.isoformat() if latest_at else None,
                  "latestPullAgeMinutes": latest_age_minutes,
                  "latestPullId": latest_pull.get("pull_id") if isinstance(latest_pull, dict) else None,
                  "manifestGameCount": manifest.get("gameCount"),
                  "officialScheduleAuthorityVersion": schedule_authority.get("version"),
                  "officialScheduleAuthoritySource": schedule_authority.get("source"),
                  "officialScheduleAuthoritativeRoster": schedule_authority.get("authoritativeRoster"),
                  "officialScheduleAuthoritativeStartTimes": schedule_authority.get("authoritativeStartTimes"),
              },
              "http": {
                  "health": {key: value for key, value in health.items() if key != "payload"},
                  "lockStatus": {key: value for key, value in status.items() if key != "payload"},
                  "predictions": {key: value for key, value in predictions.items() if key != "payload"},
              },
              "directLockStatus": {
                  "elapsedMs": direct_elapsed_ms,
                  "error": direct_error,
                  "statusCode": direct_status_code,
                  "payloadSummary": summarize_payload(direct_body),
              },
              "checks": checks,
              "allWorking": all(checks.values()),
          }
          Path("live_july22_health_report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True, default=str) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True, default=str))
          PY

      - name: Commit sanitized report and remove diagnostic workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/live_july22_health_check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record read-only July 22 production health"
          git push origin HEAD:agent/live-july22-health-20260722-0143
