name: Report MLB lock-status CloudWatch timing

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/report_mlb_lock_status_cloudwatch.yml

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read live integration and timing evidence
        shell: bash
        run: |
          set -euo pipefail
          region="${{ secrets.AWS_REGION }}"
          stack="parlay-platform-dev"
          api_id=$(aws cloudformation list-stack-resources \
            --stack-name "$stack" \
            --region "$region" \
            --query "StackResourceSummaries[?LogicalResourceId=='ServerlessRestApi'].PhysicalResourceId | [0]" \
            --output text)
          resource_id=$(aws apigateway get-resources \
            --rest-api-id "$api_id" \
            --region "$region" \
            --limit 500 \
            --query "items[?path=='/v1/mlb/locks/status'].id | [0]" \
            --output text)
          integration_uri=$(aws apigateway get-integration \
            --rest-api-id "$api_id" \
            --resource-id "$resource_id" \
            --http-method GET \
            --region "$region" \
            --query uri \
            --output text)
          FUNCTION_ARN="$integration_uri" python - <<'PY' >/tmp/function_name.txt
          import os
          import re
          import urllib.parse
          uri = urllib.parse.unquote(os.environ["FUNCTION_ARN"])
          match = re.search(r"/functions/(arn:[^/]+)/invocations$", uri)
          if not match:
              raise SystemExit("Unable to resolve lock-status Lambda")
          print(match.group(1).rsplit(":", 1)[-1])
          PY
          function_name=$(cat /tmp/function_name.txt)
          aws lambda get-function-configuration \
            --function-name "$function_name" \
            --region "$region" \
            --query '{FunctionName:FunctionName,Timeout:Timeout,MemorySize:MemorySize,LastModified:LastModified,RevisionId:RevisionId,Runtime:Runtime}' \
            --output json >/tmp/function_configuration.json
          start_ms=$((($(date +%s) - 2400) * 1000))
          aws logs filter-log-events \
            --log-group-name "/aws/lambda/$function_name" \
            --region "$region" \
            --start-time "$start_ms" \
            --limit 10000 \
            --output json >/tmp/log_events.json
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          config = json.loads(Path("/tmp/function_configuration.json").read_text(encoding="utf-8"))
          events = json.loads(Path("/tmp/log_events.json").read_text(encoding="utf-8")).get("events", [])
          selected = []
          for event in events:
              message = str(event.get("message") or "").strip()
              if any(token in message for token in ("REPORT RequestId:", "Task timed out", "status batch read", "ERROR")):
                  selected.append({
                      "timestamp": event.get("timestamp"),
                      "message": message[-4000:],
                      "logStreamName": event.get("logStreamName"),
                  })
          report = {
              "function": config,
              "selectedEventCount": len(selected),
              "events": selected[-80:],
          }
          Path("live_lock_status_cloudwatch.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish sanitized report and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          cp live_lock_status_cloudwatch.json /tmp/live_lock_status_cloudwatch.json
          git fetch origin agent/report-mlb-deploy-246daecb
          git checkout -B agent/report-mlb-deploy-246daecb origin/agent/report-mlb-deploy-246daecb
          cp /tmp/live_lock_status_cloudwatch.json live_lock_status_cloudwatch.json
          rm .github/workflows/report_mlb_lock_status_cloudwatch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record live MLB lock-status CloudWatch timing"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
