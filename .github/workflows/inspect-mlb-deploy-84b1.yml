name: Inspect MLB Deploy 84b1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-deploy-84b1.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Query exact-main workflow runs read-only
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 84b1d821d76bf9106a0708e84a19888c728c0cf9
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          sha = os.environ['TARGET_SHA']
          query = urllib.parse.urlencode({'head_sha': sha, 'per_page': 100})
          url = f'https://api.github.com/repos/{repo}/actions/runs?{query}'
          request = urllib.request.Request(url, headers={
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'inqsi-read-only-deploy-inspector/2.0',
          })
          with urllib.request.urlopen(request, timeout=45) as response:
              payload = json.loads(response.read().decode('utf-8'))

          runs = []
          for row in payload.get('workflow_runs') or []:
              runs.append({
                  key: row.get(key)
                  for key in (
                      'id', 'name', 'event', 'status', 'conclusion', 'head_sha',
                      'head_branch', 'run_number', 'run_attempt', 'created_at',
                      'updated_at', 'html_url', 'jobs_url', 'artifacts_url'
                  )
              })
          out = {
              'ok': True,
              'readOnly': True,
              'repository': repo,
              'targetSha': sha,
              'count': len(runs),
              'workflowRuns': runs,
          }
          path = Path('/tmp/mlb-deploy-runs-84b1.json')
          path.write_text(json.dumps(out, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(out, indent=2, sort_keys=True))
          PY

      - name: Upload read-only deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: mlb-deploy-runs-84b1-${{ github.run_id }}
          path: /tmp/mlb-deploy-runs-84b1.json
          if-no-files-found: error
