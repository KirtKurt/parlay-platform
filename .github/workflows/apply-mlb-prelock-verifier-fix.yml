name: Apply MLB Prelock Verifier Fix

on:
  push:
    branches: [agent/fix-mlb-prelock-verifier-20260723]
    paths:
      - '.github/workflows/apply-mlb-prelock-verifier-fix.yml'
      - 'scripts/apply_mlb_prelock_verifier_fix.py'
      - 'tests/unit/test_mlb_production_verifier_prelock_quiet.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-mlb-prelock-verifier-fix.yml'
      - 'scripts/apply_mlb_prelock_verifier_fix.py'
      - 'tests/unit/test_mlb_production_verifier_prelock_quiet.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-prelock-verifier-fix
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-prelock-verifier-20260723
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verification runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply deterministic verifier repair
        run: python scripts/apply_mlb_prelock_verifier_fix.py

      - name: Verify prelock and due-lock semantics
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
          PYTHONPATH: ${{ github.workspace }}/hello_world
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_production_verifier.py \
            scripts/apply_mlb_prelock_verifier_fix.py \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py
          python -m pytest -q \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py \
            tests/unit/test_mlb_production_verifier_per_game.py \
            tests/unit/test_mlb_production_verifier_authority.py

      - name: Commit canonical Python repair
        run: |
          set -euo pipefail
          # The connector will update the source-contract workflow separately;
          # GITHUB_TOKEN pushes must not modify workflow definitions.
          git restore .github/workflows/mlb-production-source-contract.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_production_verifier.py \
            tests/unit/test_mlb_production_verifier_prelock_quiet.py
          if git diff --cached --quiet; then
            echo 'Canonical pre-lock verifier Python repair already applied.'
          else
            git commit -m 'Make MLB verifier cutoff-aware before first lock'
            git pull --rebase --autostash origin agent/fix-mlb-prelock-verifier-20260723
            git push origin HEAD:agent/fix-mlb-prelock-verifier-20260723
          fi
