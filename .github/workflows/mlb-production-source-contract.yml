name: MLB Production Source Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'template.yaml'
      - 'hello_world/api.py'
      - 'hello_world/mlb_*.py'
      - 'scripts/patch_template_mlb_*.py'
      - 'scripts/verify_mlb_*.py'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/mlb-production-source-contract.yml'
  push:
    branches: [main]
    paths:
      - 'template.yaml'
      - 'hello_world/api.py'
      - 'hello_world/mlb_*.py'
      - 'scripts/patch_template_mlb_*.py'
      - 'scripts/verify_mlb_*.py'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/mlb-production-source-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-production-source-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2"

      - name: Prove deploy patchers are source-idempotent
        run: |
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          git diff --exit-code -- template.yaml hello_world/api.py

      - name: Verify MLB production invariants
        run: python scripts/verify_mlb_schedule_invariants.py

      - name: Verify recurring 1 AM ET pull gate
        run: python scripts/verify_mlb_daily_pull_start_gate.py

      - name: Compile deployment verification tooling
        run: python -m py_compile scripts/verify_mlb_deploy_identity.py
