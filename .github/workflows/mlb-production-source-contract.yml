name: MLB Production Source Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'template.yaml'
      - 'hello_world/api.py'
      - 'hello_world/mlb_*.py'
      - 'hello_world/bigballsdata_client.py'
      - 'hello_world/pull_dedupe_guard.py'
      - 'hello_world/sitecustomize.py'
      - 'hello_world/requirements.txt'
      - 'scripts/*mlb*.py'
      - 'scripts/verify_bbs_api_live_contract.py'
      - 'scripts/patch_template_sportsdataio.py'
      - 'scripts/verify_mlb_sportsdataio_sam_wiring.py'
      - 'tests/unit/test_mlb_*.py'
      - 'tests/unit/test_bigballsdata_client.py'
      - 'tests/unit/test_verify_bbs_api_live_contract.py'
      - 'tests/unit/test_run_mlb_ml_v3_audit_report.py'
      - 'tests/unit/test_mlb_sportsdataio_sam_wiring.py'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/enable-sportsdataio.yml'
      - '.github/workflows/mlb-ml-promote-champion.yml'
      - '.github/workflows/mlb-production-source-contract.yml'
      - '.github/workflows/mlb-production-acceptance.yml'
      - '.github/workflows/mlb-rolling-24h-audit.yml'
      - '.github/workflows/install-dedicated-mlb-v3-read.yml'
      - '.github/workflows/install-pull-history-contract.yml'
      - '.github/workflows/mlb-v1-direct-lambda-hotfix.yml'
      - '.github/workflows/mlb-v1-emergency-deploy.yml'
      - '.github/workflows/mlb-v1-pull-guard.yml'
      - '.github/workflows/proof-run-1800-et-mlb-all-signals.yml'
      - '.github/workflows/mlb-hot-pull-recovery.yml'
      - '.github/workflows/manual-mlb-force-run.yml'
      - '.github/workflows/diagnose-mlb-live-pull-500.yml'
      - '.github/workflows/proof-run-0400-et.yml'
      - '.github/workflows/proof-run-1215-et.yml'
      - '.github/workflows/proof-run-1250-et.yml'
  push:
    branches: [main]
    paths:
      - 'template.yaml'
      - 'hello_world/api.py'
      - 'hello_world/mlb_*.py'
      - 'hello_world/bigballsdata_client.py'
      - 'hello_world/pull_dedupe_guard.py'
      - 'hello_world/sitecustomize.py'
      - 'hello_world/requirements.txt'
      - 'scripts/*mlb*.py'
      - 'scripts/verify_bbs_api_live_contract.py'
      - 'scripts/patch_template_sportsdataio.py'
      - 'scripts/verify_mlb_sportsdataio_sam_wiring.py'
      - 'tests/unit/test_mlb_*.py'
      - 'tests/unit/test_bigballsdata_client.py'
      - 'tests/unit/test_verify_bbs_api_live_contract.py'
      - 'tests/unit/test_run_mlb_ml_v3_audit_report.py'
      - 'tests/unit/test_mlb_sportsdataio_sam_wiring.py'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/enable-sportsdataio.yml'
      - '.github/workflows/mlb-ml-promote-champion.yml'
      - '.github/workflows/mlb-production-source-contract.yml'
      - '.github/workflows/mlb-production-acceptance.yml'
      - '.github/workflows/mlb-rolling-24h-audit.yml'
      - '.github/workflows/install-dedicated-mlb-v3-read.yml'
      - '.github/workflows/install-pull-history-contract.yml'
      - '.github/workflows/mlb-v1-direct-lambda-hotfix.yml'
      - '.github/workflows/mlb-v1-emergency-deploy.yml'
      - '.github/workflows/mlb-v1-pull-guard.yml'
      - '.github/workflows/proof-run-1800-et-mlb-all-signals.yml'
      - '.github/workflows/mlb-hot-pull-recovery.yml'
      - '.github/workflows/manual-mlb-force-run.yml'
      - '.github/workflows/diagnose-mlb-live-pull-500.yml'
      - '.github/workflows/proof-run-0400-et.yml'
      - '.github/workflows/proof-run-1215-et.yml'
      - '.github/workflows/proof-run-1250-et.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-production-source-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: aws-actions/setup-sam@v2

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Validate SAM template before contract tests
        run: sam validate --template-file template.yaml

      - name: Prove all deployment transforms are source-idempotent
        run: |
          set -euo pipefail
          python scripts/stabilize_mlb_deploy_source.py
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          git diff --exit-code -- \
            template.yaml \
            hello_world/api.py \
            hello_world/mlb_manual_pull.py \
            scripts/patch_template_mlb_v1.py \
            scripts/patch_template_mlb_security.py \
            scripts/patch_template_mlb_results_routes.py \
            scripts/verify_mlb_schedule_invariants.py \
            .github/workflows/deploy.yml

      - name: Build and fingerprint the exact SAM Lambda artifacts
        run: |
          set -euo pipefail
          sam build --no-cached --template-file template.yaml
          TEMPLATE_SHA256=$(sha256sum template.yaml | awk '{print $1}')
          python scripts/create_mlb_lambda_build_manifest.py \
            --build-root .aws-sam/build \
            --expected-git-sha "$GITHUB_SHA" \
            --expected-template-sha256 "$TEMPLATE_SHA256" \
            --output /tmp/mlb-lambda-build-manifest.json

      - name: Verify MLB production invariants
        run: |
          python scripts/verify_mlb_schedule_invariants.py
          python scripts/verify_mlb_workflow_authority.py

      - name: Verify BBS shadow-only provider boundary
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          python scripts/verify_mlb_bbs_sam_wiring.py
          python -m pytest -q \
            tests/unit/test_bigballsdata_client.py \
            tests/unit/test_mlb_bbs_context_v1.py \
            tests/unit/test_mlb_bbs_sam_wiring.py \
            tests/unit/test_verify_bbs_api_live_contract.py

      - name: Verify recurring 1 AM ET pull gate
        run: python scripts/verify_mlb_daily_pull_start_gate.py

      - name: Verify official-lock and pull-slot quality gates
        run: |
          python tests/unit/test_mlb_official_lock_quality_gate.py
          python tests/unit/test_mlb_pull_dedupe_guard.py

      - name: Verify slate-level production acceptance semantics
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: python -m pytest -q tests/unit/test_mlb_production_acceptance.py

      - name: Verify MLB ML V2, final-label, and probability contracts
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          python -m pytest -q \
            tests/unit/test_mlb_pull_guard_status.py \
            tests/unit/test_mlb_probability_actionability_guard.py \
            tests/unit/test_mlb_production_verifier_authority.py \
            tests/unit/test_mlb_production_verifier_per_game.py \
            tests/unit/test_mlb_advanced_context_travel_rest.py \
            tests/unit/test_mlb_bbs_status.py \
            tests/unit/test_mlb_fundamentals_snapshot_v2.py \
            tests/unit/test_mlb_last_possible_prediction_gate_provider_neutral.py \
            tests/unit/test_mlb_canonical_final_labels_v1.py \
            tests/unit/test_mlb_prediction_probability_contract_v1.py \
            tests/unit/test_mlb_ml_experiment_v2.py \
            tests/unit/test_mlb_ml_dual_model_v2.py \
            tests/unit/test_mlb_ml_promotion_policy_v2.py \
            tests/unit/test_mlb_ml_aws_training_v1.py \
            tests/unit/test_mlb_daily_pick_lock_runtime.py \
            tests/unit/test_mlb_daily_per_game_lock.py \
            tests/unit/test_mlb_lock_status_request_cache.py \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_deploy_identity.py \
            tests/unit/test_mlb_deploy_http_probe.py \
            tests/unit/test_mlb_lambda_artifact_identity.py \
            tests/unit/test_mlb_trainer_invoke_retry.py \
            tests/unit/test_mlb_trainer_deploy_response.py \
            tests/unit/test_mlb_workflow_authority.py \
            tests/unit/test_run_mlb_ml_v3_audit_report.py

      - name: Compile deployment and acceptance tooling
        run: |
          python -m py_compile scripts/stabilize_mlb_deploy_source.py
          python -m py_compile scripts/verify_mlb_deploy_identity.py
          python -m py_compile scripts/mlb_deploy_http_probe.py
          python -m py_compile scripts/mlb_lambda_artifact_identity.py
          python -m py_compile scripts/create_mlb_lambda_build_manifest.py
          python -m py_compile scripts/invoke_mlb_trainer_with_retry.py
          python -m py_compile scripts/verify_mlb_trainer_deploy_response.py
          python -m py_compile scripts/verify_mlb_workflow_authority.py
          python -m py_compile scripts/enforce_mlb_production_acceptance.py
          python -m py_compile hello_world/mlb_official_lock_quality_gate.py
          python -m py_compile hello_world/pull_dedupe_guard.py
          python -m py_compile hello_world/bigballsdata_client.py
          python -m py_compile hello_world/mlb_bbs_context_v1.py
          python -m py_compile hello_world/mlb_probability_actionability_guard.py
          python -m py_compile scripts/verify_bbs_api_live_contract.py
          python -m py_compile scripts/verify_mlb_bbs_sam_wiring.py
