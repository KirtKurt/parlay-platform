name: Inspect MLB Deploy 30008592185

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-fix-ci-30007440962.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract exact trainer failure context
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30008592185'
          JOB_ID: '89210644434'
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-deploy-failed.log
          python - <<'PY'
          import re
          from pathlib import Path
          lines = Path('/tmp/mlb-deploy-failed.log').read_text(encoding='utf-8', errors='replace').splitlines()
          pattern = re.compile(
              r'(trainer|training|fresh split|Traceback|AssertionError|FAILED|error:|Process completed|SystemExit|invalid|mismatch|blocked)',
              re.I,
          )
          positions = sorted({i for i, line in enumerate(lines) if pattern.search(line)})
          selected = set()
          for i in positions:
              selected.update(range(max(0, i - 8), min(len(lines), i + 24)))
          for i in sorted(selected)[-240:]:
              print(f'{i + 1}: {lines[i]}')
          PY
