name: Inspect MLB R4 Materialization Push Failure

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-fix-ci-30007440962.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print r4 materialization push failure
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30011582957'
          JOB_ID: '89220775993'
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-r4-failed.log
          tail -120 /tmp/mlb-r4-failed.log
