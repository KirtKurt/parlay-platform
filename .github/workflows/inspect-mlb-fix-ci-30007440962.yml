name: Inspect MLB Fix CI 30007855104

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-fix-ci-30007440962.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract exact failed regression context
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30007855104'
          JOB_ID: '89208167758'
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-fix-failed.log
          python - <<'PY'
          import re
          from pathlib import Path
          lines = Path('/tmp/mlb-fix-failed.log').read_text(encoding='utf-8', errors='replace').splitlines()
          pattern = re.compile(r'(FAILURES|FAILED |AssertionError|E\s+assert|short test summary|error:|Process completed)', re.I)
          positions = sorted({i for i, line in enumerate(lines) if pattern.search(line)})
          selected = set()
          for i in positions:
              selected.update(range(max(0, i - 5), min(len(lines), i + 16)))
          for i in sorted(selected):
              print(f'{i + 1}: {lines[i]}')
          PY
