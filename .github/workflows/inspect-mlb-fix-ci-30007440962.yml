name: Inspect MLB Deploy 30008592185

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-fix-ci-30007440962.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print final trainer failure lines
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30008592185'
          JOB_ID: '89210644434'
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-deploy-failed.log
          tail -45 /tmp/mlb-deploy-failed.log
