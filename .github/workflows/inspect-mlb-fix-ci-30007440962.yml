name: Inspect MLB Fix CI 30007440962

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/inspect-mlb-fix-ci-30007440962.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Print final failed-step lines
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: '30007440962'
          JOB_ID: '89206763247'
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$JOB_ID" \
            --log-failed > /tmp/mlb-fix-failed.log
          tail -20 /tmp/mlb-fix-failed.log
