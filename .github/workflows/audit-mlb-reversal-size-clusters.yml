name: Audit MLB Reversal Size Clusters

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/audit-mlb-reversal-size-clusters.yml'
      - 'scripts/audit_mlb_reversal_sizes.py'
      - 'scripts/audit_mlb_reversal_sizes_v2.py'
  push:
    branches: [agent/audit-mlb-reversal-size-clusters-20260723]
    paths:
      - '.github/workflows/audit-mlb-reversal-size-clusters.yml'
      - 'scripts/audit_mlb_reversal_sizes.py'
      - 'scripts/audit_mlb_reversal_sizes_v2.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/audit-mlb-reversal-size-clusters-20260723

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install read-only audit runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Compile and audit every recorded completed game
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNAPSHOTS_TABLE: parlay_platform_snapshots
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          set -euo pipefail
          python -m py_compile scripts/audit_mlb_reversal_sizes.py scripts/audit_mlb_reversal_sizes_v2.py
          python scripts/audit_mlb_reversal_sizes_v2.py \
            --start-date 2026-06-28 \
            --end-date 2026-07-22 \
            --output /tmp/mlb-reversal-audit/mlb_reversal_size_audit.json

      - name: Upload reversal-size proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-reversal-size-audit-${{ github.run_id }}
          path: /tmp/mlb-reversal-audit/mlb_reversal_size_audit.json
          if-no-files-found: error
