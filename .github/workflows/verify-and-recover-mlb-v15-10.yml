name: Verify MLB production authority contracts

"on":
  pull_request:
    branches: [main]
    paths:
      - "hello_world/mlb_ranked_primary_v15_10.py"
      - "hello_world/mlb_ranked_primary_v15_10_impl.py.gz.b64"
      - "hello_world/mlb_historical_*"
      - "hello_world/mlb_v15_4_catboost_model.py"
      - "hello_world/mlb_v15_4_catboost_model_impl.py.gz.b64"
      - "hello_world/mlb_ml_runtime_install_v3*"
      - "hello_world/mlb_v3_read_api*"
      - "hello_world/inqsi_mlb_v1_core.py"
      - "scripts/verify_api_function_mlb_v3_import.py"
      - "tests/unit/test_mlb_ranked_primary_v15_10.py"
      - "tests/unit/test_mlb_ml_runtime_install_explicit.py"
      - "tests/unit/test_mlb_signal_policy_prelock_persistence.py"
      - "tests/unit/test_mlb_historical_*"
      - ".github/workflows/verify-and-recover-mlb-v15-10.yml"
  push:
    branches: [main]
    paths:
      - "hello_world/mlb_ranked_primary_v15_10.py"
      - "hello_world/mlb_historical_*"
      - "hello_world/mlb_ml_runtime_install_v3*"
      - "hello_world/mlb_v3_read_api*"
      - "tests/unit/test_mlb_historical_*"
      - ".github/workflows/verify-and-recover-mlb-v15-10.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  SAM_CLI_TELEMETRY: "0"

jobs:
  verify-source-authority-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/setup-sam@v2
      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<10" "PyYAML>=6,<7"
      - name: Verify incumbent behavior before historical promotion
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/unit/test_mlb_ranked_primary_v15_10.py \
            tests/unit/test_mlb_ml_runtime_install_explicit.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_prediction_probability_contract_v1.py \
            tests/unit/test_mlb_probability_actionability_guard.py
      - name: Verify historical-only cutover and fail-closed behavior
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/unit/test_mlb_historical_policy_v1.py \
            tests/unit/test_mlb_historical_daily_optimizer_v1.py \
            tests/unit/test_mlb_historical_optimizer_handler.py \
            tests/unit/test_mlb_historical_read_api_contract.py
      - name: Verify production template remains reproducible
        run: |
          set -euo pipefail
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          git diff --exit-code -- template.yaml hello_world tests scripts
          sam validate --template-file template.yaml
          rm -rf .aws-sam
          sam build --no-cached --template-file template.yaml
          INQSI_MLB_LAMBDA_TASK_ROOT=.aws-sam/build/MLBV3ReadFunction \
            PYTHONDONTWRITEBYTECODE=1 \
            python scripts/verify_api_function_mlb_v3_import.py
      - name: Prove automatic legacy recovery is retired
        run: |
          set -euo pipefail
          grep -Fq "mlb_historical_policy_v1.apply_runtime_authority" hello_world/mlb_ranked_primary_v15_10.py
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/verify-and-recover-mlb-v15-10.yml').read_text()
          forbidden = (
              'sam ' + 'deploy',
              'configure-' + 'aws-credentials',
          )
          found = [token for token in forbidden if token in workflow]
          if found:
              raise SystemExit(f'forbidden production mutation tokens in verification workflow: {found}')
          PY
          echo "V15.10 recovery is no longer automatic; controlled deployment and cutover live only in mlb-historical-optimizer.yml."
