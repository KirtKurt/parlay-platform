name: Validate MLB Optimizer Concurrency Fix

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'mlb_historical_optimizer/template.yaml'
      - 'tests/unit/test_mlb_historical_optimizer_template.py'
      - '.github/workflows/mlb-optimizer-concurrency-fix-validate-temp.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9' 'cfn-lint>=1,<2'
      - name: Run historical optimizer regression suite
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/unit/test_mlb_historical_optimizer_template.py \
            tests/unit/test_mlb_historical_policy_v1.py \
            tests/unit/test_mlb_historical_daily_optimizer_v1.py \
            tests/unit/test_mlb_historical_optimizer_handler.py \
            tests/unit/test_mlb_historical_read_api_contract.py
          python -m py_compile \
            hello_world/mlb_historical_policy_v1.py \
            hello_world/mlb_historical_daily_optimizer_v1.py \
            hello_world/mlb_historical_optimizer_handler.py
      - name: Validate and build deployable SAM template
        run: |
          set -euo pipefail
          grep -Fq 'ReservedConcurrentExecutions' mlb_historical_optimizer/template.yaml && exit 1 || true
          cfn-lint --ignore-checks W3002 mlb_historical_optimizer/template.yaml
          sam validate --lint --template-file mlb_historical_optimizer/template.yaml
          sam build --no-cached --build-dir .aws-sam-concurrency-fix --template-file mlb_historical_optimizer/template.yaml
