name: Report exact-main MLB deployment

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/report_exact_main_deploy.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Locate exact-main deployment run
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 246daecb3960518fb59bb69c6891989d50fb7308
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          target_sha = os.environ["TARGET_SHA"]
          api = os.environ["GITHUB_API_URL"].rstrip("/")

          def get(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "parlay-platform-exact-deploy-reporter/1.0",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          selected = None
          for _ in range(60):
              query = urllib.parse.urlencode(
                  {
                      "head_sha": target_sha,
                      "event": "push",
                      "per_page": 100,
                  }
              )
              payload = get(f"{api}/repos/{repo}/actions/runs?{query}")
              candidates = [
                  run
                  for run in payload.get("workflow_runs", [])
                  if run.get("head_sha") == target_sha
                  and run.get("event") == "push"
                  and run.get("name") == "Deploy SAM to AWS"
              ]
              if candidates:
                  selected = sorted(candidates, key=lambda run: int(run["id"]), reverse=True)[0]
                  break
              time.sleep(5)

          if selected is None:
              raise SystemExit("Exact-main Deploy SAM to AWS run was not found")

          jobs_payload = get(selected["jobs_url"] + "?per_page=100")
          report = {
              "targetSha": target_sha,
              "run": {
                  key: selected.get(key)
                  for key in (
                      "id",
                      "name",
                      "event",
                      "status",
                      "conclusion",
                      "head_branch",
                      "head_sha",
                      "run_number",
                      "run_attempt",
                      "html_url",
                      "created_at",
                      "updated_at",
                      "artifacts_url",
                      "jobs_url",
                  )
              },
              "jobs": [
                  {
                      "id": job.get("id"),
                      "name": job.get("name"),
                      "status": job.get("status"),
                      "conclusion": job.get("conclusion"),
                      "html_url": job.get("html_url"),
                      "steps": [
                          {
                              "number": step.get("number"),
                              "name": step.get("name"),
                              "status": step.get("status"),
                              "conclusion": step.get("conclusion"),
                          }
                          for step in job.get("steps", [])
                      ],
                  }
                  for job in jobs_payload.get("jobs", [])
              ],
          }
          with open("deployment_run_report.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY

      - name: Publish sanitized report and remove reporter
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/report_exact_main_deploy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record exact-main MLB deployment run"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
