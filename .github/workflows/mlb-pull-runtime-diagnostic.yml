name: MLB Pull Lambda Runtime Diagnostic
# One-time read-only production runtime proof trigger; this branch is not intended for merge.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mlb-pull-runtime-diagnostic.yml'
      - 'scripts/diagnose_mlb_pull_lambda_runtime.py'
  push:
    paths:
      - '.github/workflows/mlb-pull-runtime-diagnostic.yml'
      - 'scripts/diagnose_mlb_pull_lambda_runtime.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-pull-runtime-diagnostic-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install diagnostic runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2'

      - name: Compile diagnostic
        run: python -m py_compile scripts/diagnose_mlb_pull_lambda_runtime.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Inspect live Lambda and CloudWatch read-only
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python scripts/diagnose_mlb_pull_lambda_runtime.py \
            --hours 12 \
            --output runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: mlb-pull-runtime-diagnostic-${{ github.run_id }}
          path: runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json
          if-no-files-found: error
