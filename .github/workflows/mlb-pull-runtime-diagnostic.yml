name: MLB Pull Lambda Runtime Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/mlb-pull-runtime-diagnostic.yml'
      - 'scripts/diagnose_mlb_pull_lambda_runtime.py'
      - 'scripts/apply_mlb_scoring_runtime_fix.py'
      - 'tests/unit/test_mlb_scoring_runtime_capacity.py'
  push:
    paths:
      - '.github/workflows/mlb-pull-runtime-diagnostic.yml'
      - 'scripts/diagnose_mlb_pull_lambda_runtime.py'
      - 'scripts/apply_mlb_scoring_runtime_fix.py'
      - 'tests/unit/test_mlb_scoring_runtime_capacity.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mlb-pull-runtime-diagnostic-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || '' }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install diagnostic runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply canonical scoring runtime migration on the repair branch
        if: github.event_name == 'push' && github.ref_name == 'agent/mlb-scoring-run-proof'
        run: python scripts/apply_mlb_scoring_runtime_fix.py

      - name: Verify capacity and priority regressions
        if: github.event_name == 'push' && github.ref_name == 'agent/mlb-scoring-run-proof'
        run: python -m pytest -q tests/unit/test_mlb_scoring_runtime_capacity.py

      - name: Commit canonical source migration
        if: github.event_name == 'push' && github.ref_name == 'agent/mlb-scoring-run-proof'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add template.yaml hello_world/mlb_manual_pull.py
          if git diff --cached --quiet; then
            echo 'Canonical MLB scoring runtime fix is already applied.'
          else
            git commit -m 'Fix MLB scoring runtime timeout and priority'
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Compile diagnostic
        run: |
          python -m py_compile \
            scripts/diagnose_mlb_pull_lambda_runtime.py \
            scripts/apply_mlb_scoring_runtime_fix.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Inspect live Lambda and CloudWatch read-only
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          python scripts/diagnose_mlb_pull_lambda_runtime.py \
            --hours 12 \
            --output runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: mlb-pull-runtime-diagnostic-${{ github.run_id }}
          path: runtime_reports/mlb_pull_lambda_runtime_diagnostic_latest.json
          if-no-files-found: error
