name: Extract failed exact-main deploy tail

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/extract_failed_deploy_tail.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Extract failing step and artifact inventory
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: "29889451738"
          JOB_ID: "88826783347"
        shell: bash
        run: |
          set -euo pipefail
          api="${GITHUB_API_URL%/}"
          repo="$GITHUB_REPOSITORY"
          auth=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer $GH_TOKEN"
            -H "X-GitHub-Api-Version: 2022-11-28"
            -H "User-Agent: parlay-platform-deploy-tail-extractor/1.0"
          )
          curl -fsSL "${auth[@]}" \
            "$api/repos/$repo/actions/jobs/$JOB_ID/logs" \
            -o job_logs.bin
          if unzip -t job_logs.bin >/dev/null 2>&1; then
            unzip -p job_logs.bin > job_logs.txt
          else
            cp job_logs.bin job_logs.txt
          fi
          curl -fsSL "${auth[@]}" \
            "$api/repos/$repo/actions/runs/$RUN_ID/artifacts?per_page=100" \
            -o deployment_artifacts.json
          python - <<'PY'
          from pathlib import Path

          lines = Path("job_logs.txt").read_text(encoding="utf-8-sig", errors="replace").splitlines()
          marker = "Smoke test read-only MLB lock status"
          starts = [index for index, line in enumerate(lines) if marker in line]
          start = max(starts[-1] - 8, 0) if starts else max(len(lines) - 300, 0)
          selected = lines[start:]
          if len(selected) > 600:
              selected = selected[-600:]
          Path("deployment_failure_tail.txt").write_text(
              "\n".join(selected) + "\n",
              encoding="utf-8",
          )
          PY
          rm -f job_logs.bin job_logs.txt

      - name: Publish sanitized evidence and remove extractor
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extract_failed_deploy_tail.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record failed exact-main deployment evidence"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
