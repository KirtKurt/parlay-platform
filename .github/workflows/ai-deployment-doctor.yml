name: AI Deployment Doctor

on:
  workflow_run:
    workflows:
      - Deploy SAM to AWS
      - Deploy OpenAI Bridge
      - Test OpenAI Bridge
      - Backend Build Check
      - Deploy Silvers Backend
      - Deploy Bedrock Agent Actions
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional GitHub Actions run ID to diagnose. Leave blank to diagnose the latest failed run.
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deployment-doctor:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      STACK_NAME: inqsi-openai-bridge
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Choose run to diagnose
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
          elif [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          else
            RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --status failure --limit 1 --json databaseId --jq '.[0].databaseId')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No failed workflow run found to diagnose."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Diagnosing run: $RUN_ID"

      - name: Collect failed run logs
        run: |
          set +e
          gh run view "${{ steps.target.outputs.run_id }}" --repo "$GITHUB_REPOSITORY" --json name,conclusion,status,event,headSha,url,createdAt,updatedAt > run-meta.json
          gh run view "${{ steps.target.outputs.run_id }}" --repo "$GITHUB_REPOSITORY" --log > failed-run.log
          LOG_STATUS=$?
          if [ "$LOG_STATUS" -ne 0 ]; then
            echo "Could not fetch full logs. Capturing summary instead." > failed-run.log
            gh run view "${{ steps.target.outputs.run_id }}" --repo "$GITHUB_REPOSITORY" >> failed-run.log
          fi
          set -e
          wc -c failed-run.log || true

      - name: Read OpenAI bridge Lambda ARN
        id: bridge
        run: |
          FUNCTION_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='InqsiOpenAIBridgeFunctionArn'].OutputValue | [0]" \
            --output text)
          if [ -z "$FUNCTION_ARN" ] || [ "$FUNCTION_ARN" = "None" ]; then
            echo "Could not find InqsiOpenAIBridgeFunctionArn output."
            exit 1
          fi
          echo "function_arn=$FUNCTION_ARN" >> "$GITHUB_OUTPUT"

      - name: Run AI Deployment Doctor
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          run_meta = json.loads(Path('run-meta.json').read_text())
          log_text = Path('failed-run.log').read_text(errors='replace')
          max_chars = 28000
          if len(log_text) > max_chars:
              log_text = '[[LOG TRUNCATED TO LAST 28000 CHARACTERS]]\n' + log_text[-max_chars:]

          prompt = f"""
You are AI Deployment Doctor for InQsi.

Diagnose this failed GitHub/AWS deployment run.

Rules:
- Be direct and operational.
- Do not invent missing facts.
- If the logs are insufficient, say what is missing.
- Identify the most likely root cause.
- Give the exact next fix.
- Note whether this is safe to auto-fix or should require owner approval.
- Never expose secrets.

Run metadata:
{json.dumps(run_meta, indent=2)}

Failure logs:
{log_text}
""".strip()

          event = {
              'directSmokeTest': True,
              'prompt': prompt,
          }
          function_arn = os.environ['FUNCTION_ARN']
          region = os.environ.get('AWS_REGION', 'us-east-1')
          subprocess.run([
              'aws', 'lambda', 'invoke',
              '--region', region,
              '--function-name', function_arn,
              '--cli-binary-format', 'raw-in-base64-out',
              '--payload', json.dumps(event),
              'doctor-response.json',
          ], check=True)

          outer = json.loads(Path('doctor-response.json').read_text())
          body = json.loads(outer.get('body') or '{}')
          status = outer.get('statusCode')
          text = body.get('text') or ''
          ok = bool(body.get('ok')) and status == 200

          report = f"""# AI Deployment Doctor Report

## Run
- Name: {run_meta.get('name')}
- Conclusion: {run_meta.get('conclusion')}
- Status: {run_meta.get('status')}
- Event: {run_meta.get('event')}
- Commit: {run_meta.get('headSha')}
- URL: {run_meta.get('url')}

## Bridge
- Lambda statusCode: {status}
- OpenAI ok: {body.get('ok')}
- Model: {body.get('model')}
- Reasoning effort: {body.get('reasoningEffort')}

## Diagnosis

{text if text else json.dumps(body, indent=2)}
"""
          Path('ai-deployment-doctor-report.md').write_text(report)
          print(report)
          if not ok:
              sys.exit(1)
          PY
        env:
          FUNCTION_ARN: ${{ steps.bridge.outputs.function_arn }}

      - name: Upload diagnosis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-deployment-doctor-report
          path: |
            ai-deployment-doctor-report.md
            run-meta.json
            failed-run.log
            doctor-response.json
