name: Finalize validated MLB retry deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/finalize-mlb-retry-deployment.yml"

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TARGET_HEAD: agent/mlb-deploy-heavy-read-retry-policy-final-v4
      TARGET_TITLE: Fix MLB deploy heavy-read retry policy
      SOURCE_WORKFLOW: MLB Production Source Contract
      DEPLOY_WORKFLOW: Deploy SAM to AWS
      API_BASE: https://7nz8g8unyd.execute-api.us-east-1.amazonaws.com/Prod
    steps:
      - name: Gate exact PR, merge, dispatch, and verify deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import io
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import zipfile
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          target_head = os.environ['TARGET_HEAD']
          target_title = os.environ['TARGET_TITLE']
          source_workflow = os.environ['SOURCE_WORKFLOW']
          deploy_workflow = os.environ['DEPLOY_WORKFLOW']
          api_base = os.environ['API_BASE'].rstrip('/')
          api = 'https://api.github.com'
          evidence_path = Path('/tmp/mlb-retry-finalization.json')
          summary: dict[str, object] = {
              'ok': False,
              'repository': repo,
              'targetHead': target_head,
              'readOnlyVerification': True,
          }

          def emit(name: str, value: object) -> None:
              print(f'{name} {json.dumps(value, sort_keys=True, default=str)}', flush=True)

          def request(method: str, path: str, payload=None, *, raw: bool = False):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'parlay-platform-exact-deploy-finalizer/1.0',
                      **({'Content-Type': 'application/json'} if data is not None else {}),
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as response:
                      body = response.read()
                      status = response.getcode()
              except urllib.error.HTTPError as exc:
                  body = exc.read()
                  raise RuntimeError(
                      f'GitHub API {method} {path} returned {exc.code}: '
                      f'{body.decode("utf-8", "replace")[:2000]}'
                  ) from exc
              if raw:
                  return body
              if status == 204 or not body:
                  return {}
              return json.loads(body.decode('utf-8'))

          def list_open_target_prs() -> list[dict]:
              query = urllib.parse.urlencode({
                  'state': 'open',
                  'head': f'KirtKurt:{target_head}',
                  'base': 'main',
                  'per_page': 100,
              })
              result = request('GET', f'/repos/{repo}/pulls?{query}')
              if not isinstance(result, list):
                  raise RuntimeError('open-PR query returned a non-list')
              return [item for item in result if isinstance(item, dict)]

          def wait_for_source_contract(head_sha: str) -> dict:
              deadline = time.monotonic() + 45 * 60
              query = urllib.parse.urlencode({
                  'head_sha': head_sha,
                  'event': 'pull_request',
                  'per_page': 100,
              })
              latest = None
              while time.monotonic() < deadline:
                  payload = request('GET', f'/repos/{repo}/actions/runs?{query}')
                  matches = [
                      run for run in payload.get('workflow_runs') or []
                      if isinstance(run, dict)
                      and run.get('head_sha') == head_sha
                      and run.get('name') == source_workflow
                  ]
                  if matches:
                      latest = max(matches, key=lambda run: int(run.get('run_number') or 0))
                      emit('SOURCE_CONTRACT_POLL', {
                          'id': latest.get('id'),
                          'status': latest.get('status'),
                          'conclusion': latest.get('conclusion'),
                          'headSha': latest.get('head_sha'),
                      })
                      if latest.get('status') == 'completed':
                          if latest.get('conclusion') != 'success':
                              raise RuntimeError(
                                  f'source contract concluded {latest.get("conclusion")}'
                              )
                          return latest
                  else:
                      print('SOURCE_CONTRACT_POLL not_found_yet', flush=True)
                  time.sleep(15)
              raise RuntimeError('source contract did not complete within the gate deadline')

          def wait_for_mergeable(number: int) -> dict:
              deadline = time.monotonic() + 10 * 60
              latest = None
              while time.monotonic() < deadline:
                  latest = request('GET', f'/repos/{repo}/pulls/{number}')
                  emit('MERGEABLE_POLL', {
                      'number': number,
                      'mergeable': latest.get('mergeable'),
                      'mergeableState': latest.get('mergeable_state'),
                      'draft': latest.get('draft'),
                      'headSha': (latest.get('head') or {}).get('sha'),
                  })
                  if latest.get('mergeable') is True:
                      return latest
                  if latest.get('mergeable') is False:
                      raise RuntimeError(
                          f'PR is not mergeable: {latest.get("mergeable_state")}'
                      )
                  time.sleep(10)
              raise RuntimeError('PR mergeability remained unknown')

          def dispatch_and_wait_for_deploy(merge_sha: str) -> dict:
              request(
                  'POST',
                  f'/repos/{repo}/actions/workflows/deploy.yml/dispatches',
                  {'ref': 'main'},
              )
              deadline = time.monotonic() + 55 * 60
              latest = None
              while time.monotonic() < deadline:
                  query = urllib.parse.urlencode({
                      'head_sha': merge_sha,
                      'branch': 'main',
                      'per_page': 100,
                  })
                  payload = request('GET', f'/repos/{repo}/actions/runs?{query}')
                  matches = [
                      run for run in payload.get('workflow_runs') or []
                      if isinstance(run, dict)
                      and run.get('head_sha') == merge_sha
                      and run.get('head_branch') == 'main'
                      and run.get('name') == deploy_workflow
                      and run.get('event') in {'workflow_dispatch', 'push'}
                  ]
                  if matches:
                      latest = max(
                          matches,
                          key=lambda run: (
                              int(run.get('run_number') or 0),
                              int(run.get('run_attempt') or 0),
                          ),
                      )
                      emit('DEPLOYMENT_POLL', {
                          'id': latest.get('id'),
                          'event': latest.get('event'),
                          'status': latest.get('status'),
                          'conclusion': latest.get('conclusion'),
                          'headSha': latest.get('head_sha'),
                          'attempt': latest.get('run_attempt'),
                      })
                      if latest.get('status') == 'completed':
                          if latest.get('conclusion') != 'success':
                              raise RuntimeError(
                                  f'exact deployment concluded {latest.get("conclusion")}'
                              )
                          return latest
                  else:
                      print('DEPLOYMENT_POLL not_found_yet', flush=True)
                  time.sleep(20)
              raise RuntimeError('exact deployment did not complete within deadline')

          def verify_deployment(run: dict, merge_sha: str) -> dict:
              run_id = int(run['id'])
              attempt = int(run.get('run_attempt') or 1)
              jobs = request(
                  'GET',
                  f'/repos/{repo}/actions/runs/{run_id}/jobs?filter=latest&per_page=100',
              ).get('jobs') or []
              deploy_jobs = [job for job in jobs if job.get('name') == 'deploy']
              if len(deploy_jobs) != 1 or deploy_jobs[0].get('conclusion') != 'success':
                  raise RuntimeError('exact deployment job is not uniquely successful')

              artifacts = request(
                  'GET',
                  f'/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100',
              ).get('artifacts') or []
              expected_name = f'mlb-deployment-identity-{run_id}'
              candidates = [
                  artifact for artifact in artifacts
                  if artifact.get('name') == expected_name
                  and artifact.get('expired') is False
              ]
              if len(candidates) != 1:
                  raise RuntimeError(
                      f'expected one {expected_name} artifact; found {len(candidates)}'
                  )
              archive = request(
                  'GET',
                  f'/repos/{repo}/actions/artifacts/{candidates[0]["id"]}/zip',
                  raw=True,
              )
              with zipfile.ZipFile(io.BytesIO(archive)) as bundle:
                  names = sorted(bundle.namelist())
                  identity_names = [
                      name for name in names
                      if name.endswith('mlb_deploy_identity_latest.json')
                  ]
                  if len(identity_names) != 1:
                      raise RuntimeError('deployment identity file count is not one')
                  identity = json.loads(bundle.read(identity_names[0]).decode('utf-8'))
              expected_run = f'{run_id}-{attempt}'
              if identity.get('ok') is not True:
                  raise RuntimeError('deployment identity proof is unhealthy')
              if identity.get('expectedGitSha') != merge_sha:
                  raise RuntimeError('deployment identity Git SHA mismatch')
              if identity.get('expectedDeployRunId') != expected_run:
                  raise RuntimeError('deployment identity run mismatch')
              functions = identity.get('functions') or {}
              if not isinstance(functions, dict) or not functions:
                  raise RuntimeError('deployment identity has no functions')
              bad = {}
              for name, item in functions.items():
                  errors = []
                  if not isinstance(item, dict):
                      errors.append('non_object')
                  else:
                      if item.get('deployGitSha') != merge_sha:
                          errors.append('deploy_sha')
                      if item.get('deployRunId') != expected_run:
                          errors.append('deploy_run')
                      if item.get('identityMatches') is not True:
                          errors.append('identity')
                      if item.get('configurationMatches') is not True:
                          errors.append('configuration')
                      if item.get('codeArtifactMatchesCleanBuild') is not True:
                          errors.append('artifact')
                  if errors:
                      bad[name] = errors
              if bad:
                  raise RuntimeError('deployment identity mismatch: ' + json.dumps(bad))
              return {
                  'runId': run_id,
                  'runAttempt': attempt,
                  'event': run.get('event'),
                  'headSha': run.get('head_sha'),
                  'artifactId': candidates[0].get('id'),
                  'artifactDigest': candidates[0].get('digest'),
                  'functionCount': len(functions),
                  'expectedDeployRunId': expected_run,
                  'allFunctionArtifactsMatch': True,
              }

          def public_read(path: str, *, deadline_seconds: int = 1200) -> dict:
              deadline = time.monotonic() + deadline_seconds
              attempts = 0
              last = None
              while time.monotonic() < deadline:
                  attempts += 1
                  request_obj = urllib.request.Request(
                      api_base + path,
                      headers={
                          'Accept': 'application/json',
                          'User-Agent': 'parlay-platform-exact-deploy-finalizer/1.0',
                      },
                  )
                  started = time.monotonic()
                  ambiguous = False
                  try:
                      with urllib.request.urlopen(request_obj, timeout=60) as response:
                          status = int(response.getcode())
                          raw = response.read()
                  except urllib.error.HTTPError as exc:
                      status = int(exc.code)
                      raw = exc.read()
                      ambiguous = status == 504
                  except (
                      urllib.error.URLError,
                      TimeoutError,
                      ConnectionError,
                      OSError,
                  ) as exc:
                      status = None
                      raw = b''
                      ambiguous = True
                      last = {'error': type(exc).__name__}
                  elapsed = round(time.monotonic() - started, 3)
                  payload = None
                  if raw:
                      try:
                          payload = json.loads(raw.decode('utf-8'))
                      except Exception:
                          ambiguous = True
                  if status == 200 and isinstance(payload, dict):
                      if payload.get('ok') is not True:
                          raise RuntimeError(f'{path} reports ok={payload.get("ok")}')
                      if path != '/v1/health' and payload.get('sport') != 'mlb':
                          raise RuntimeError(f'{path} reports sport={payload.get("sport")}')
                      return {
                          'httpStatus': status,
                          'elapsedSeconds': elapsed,
                          'attempts': attempts,
                          'ok': payload.get('ok'),
                          'sport': payload.get('sport'),
                          'slateDateEt': payload.get('slateDateEt'),
                          'gameCount': payload.get('gameCount'),
                          'lockedPredictionCount': payload.get('lockedPredictionCount'),
                          'officialPredictionCount': payload.get('officialPredictionCount'),
                          'lockedStatusCount': payload.get('lockedStatusCount'),
                          'noPredictionDataCount': payload.get('noPredictionDataCount'),
                          'operationalDefect': payload.get('operationalDefect'),
                      }
                  last = {
                      'httpStatus': status,
                      'elapsedSeconds': elapsed,
                      'payload': payload,
                  }
                  remaining = deadline - time.monotonic()
                  if remaining <= 0:
                      break
                  time.sleep(min(330 if ambiguous else 30, remaining))
              raise RuntimeError(f'public read {path} exhausted: {last}')

          error: Exception | None = None
          try:
              pulls = list_open_target_prs()
              if len(pulls) != 1:
                  raise RuntimeError(f'expected one exact open PR; found {len(pulls)}')
              pr = pulls[0]
              number = int(pr['number'])
              head_sha = str((pr.get('head') or {}).get('sha') or '')
              if not head_sha or pr.get('title') != target_title:
                  raise RuntimeError('exact PR title/head identity mismatch')
              files = request(
                  'GET',
                  f'/repos/{repo}/pulls/{number}/files?per_page=100',
              )
              filenames = sorted(
                  item.get('filename') for item in files if isinstance(item, dict)
              )
              expected_files = sorted([
                  '.github/workflows/deploy.yml',
                  'tests/unit/test_mlb_deploy_heavy_read_retry_policy.py',
              ])
              if filenames != expected_files:
                  raise RuntimeError(
                      f'exact PR file scope mismatch: {filenames}'
                  )
              comparison = request(
                  'GET',
                  f'/repos/{repo}/compare/main...{urllib.parse.quote(head_sha, safe="")}',
              )
              if (
                  int(comparison.get('behind_by') or 0) != 0
                  or int(comparison.get('ahead_by') or 0) != 1
              ):
                  raise RuntimeError(
                      'candidate is not exactly one commit ahead of current main: '
                      + json.dumps({
                          'status': comparison.get('status'),
                          'aheadBy': comparison.get('ahead_by'),
                          'behindBy': comparison.get('behind_by'),
                      })
                  )
              summary['pullRequest'] = {
                  'number': number,
                  'url': pr.get('html_url'),
                  'headSha': head_sha,
                  'files': filenames,
              }
              source_run = wait_for_source_contract(head_sha)
              summary['sourceContract'] = {
                  'id': source_run.get('id'),
                  'conclusion': source_run.get('conclusion'),
                  'url': source_run.get('html_url'),
              }
              current = wait_for_mergeable(number)
              if current.get('draft') is True:
                  request('PATCH', f'/repos/{repo}/pulls/{number}', {'draft': False})
              merge = request(
                  'PUT',
                  f'/repos/{repo}/pulls/{number}/merge',
                  {
                      'sha': head_sha,
                      'merge_method': 'squash',
                      'commit_title': target_title,
                      'commit_message': (
                          'Retry completed transient heavy-read responses without '
                          'overlapping ambiguous Lambda deliveries.'
                      ),
                  },
              )
              if merge.get('merged') is not True:
                  raise RuntimeError('exact PR merge failed: ' + json.dumps(merge))
              merge_sha = str(merge.get('sha') or '')
              if not merge_sha:
                  raise RuntimeError('merge response omitted SHA')
              summary['merge'] = {
                  'merged': True,
                  'sha': merge_sha,
                  'message': merge.get('message'),
              }
              deploy_run = dispatch_and_wait_for_deploy(merge_sha)
              summary['deployment'] = verify_deployment(deploy_run, merge_sha)
              summary['livePublicReads'] = {
                  'health': public_read('/v1/health', deadline_seconds=180),
                  'lockStatus': public_read('/v1/mlb/locks/status'),
                  'predictions': public_read('/v1/mlb/predictions'),
              }
              summary['ok'] = True
              emit('FINALIZATION_OK', summary)
          except Exception as exc:
              error = exc
              summary['errorType'] = type(exc).__name__
              summary['error'] = str(exc)
              emit('FINALIZATION_FAILED', summary)
          finally:
              evidence_path.write_text(
                  json.dumps(summary, indent=2, sort_keys=True, default=str) + '\n',
                  encoding='utf-8',
              )
          if error is not None:
              raise error
          PY

      - name: Upload exact finalization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-retry-finalization-${{ github.run_id }}
          path: /tmp/mlb-retry-finalization.json
          if-no-files-found: error
          retention-days: 7
