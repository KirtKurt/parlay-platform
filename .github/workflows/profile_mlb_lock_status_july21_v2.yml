name: Profile MLB lock status for July 21 v2

on:
  push:
    branches:
      - agent/report-mlb-deploy-246daecb
    paths:
      - .github/workflows/profile_mlb_lock_status_july21_v2.yml

permissions:
  contents: write

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout reporting branch
        uses: actions/checkout@v4
        with:
          ref: agent/report-mlb-deploy-246daecb
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install runtime libraries
        shell: bash
        run: python -m pip install --disable-pip-version-check --quiet boto3 requests

      - name: Profile exact deployed source in isolated worktree
        env:
          AWS_MAX_ATTEMPTS: "1"
          FUNCTION_NAME: parlay-platform-dev-MLBDailyPickLockFunction-BQIhMFw1k5YP
          TARGET_SHA: 246daecb3960518fb59bb69c6891989d50fb7308
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/exact-source "$TARGET_SHA"
          aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Environment.Variables' \
            --output json >/tmp/function_env.json
          cd /tmp/exact-source
          python - <<'PY'
          from __future__ import annotations

          import collections
          import functools
          import json
          import os
          import sys
          import time
          from pathlib import Path

          function_env = json.loads(Path('/tmp/function_env.json').read_text(encoding='utf-8'))
          for key, value in function_env.items():
              os.environ[str(key)] = str(value)
          sys.path.insert(0, str(Path('hello_world').resolve()))

          import inqsi_pull_history as history
          import mlb_daily_per_game_lock_patch as patch
          import mlb_daily_pick_lock as module

          patch.apply(module)
          stats = collections.defaultdict(lambda: {'count': 0, 'totalMs': 0.0, 'maxMs': 0.0})

          def record(label: str, elapsed_ms: float) -> None:
              item = stats[label]
              item['count'] += 1
              item['totalMs'] += elapsed_ms
              item['maxMs'] = max(item['maxMs'], elapsed_ms)

          def wrap(obj, name: str, label: str) -> None:
              original = getattr(obj, name, None)
              if not callable(original):
                  return
              @functools.wraps(original)
              def measured(*args, **kwargs):
                  started = time.perf_counter()
                  try:
                      return original(*args, **kwargs)
                  finally:
                      record(label, (time.perf_counter() - started) * 1000.0)
              setattr(obj, name, measured)

          for name in ('_pulls_for_date', '_latest_games_for_date', '_get_lock_item'):
              wrap(module, name, f'module.{name}')
          for name in (
              'canonicalize_pull_slots', 'pull_payload_fingerprint',
              'provider_manifest_fingerprint', 'verified_full_slate_manifest',
              'query_pulls', 'canonical_payload_fingerprint',
          ):
              wrap(history, name, f'history.{name}')
          for name in (
              '_prime_status_exact_items', '_prime_status_manifest_items',
              '_status_authority_reference_keys', '_progress', '_scoring_pulls',
              '_validate_stage', '_provider_manifest_authority_errors',
              '_candidate_snapshot_authority_errors', '_source_window_authority_errors',
              '_canonical_readback', '_game_snapshot_fingerprint', '_matching_game',
              '_resolved_playability_lifecycle', '_readiness_status',
              '_daily_authority_errors', '_diagnostic_history', '_stage_fingerprint',
              '_payload_fingerprint',
          ):
              wrap(patch, name, f'patch.{name}')

          seen_tables = set()
          for table_label, table in (('module.TABLE', module.TABLE), ('history.PULLS', history.PULLS)):
              if table is None or id(table) in seen_tables:
                  continue
              seen_tables.add(id(table))
              wrap(table, 'get_item', f'{table_label}.get_item')
              wrap(table, 'query', f'{table_label}.query')
          wrap(history.DDB, 'batch_get_item', 'history.DDB.batch_get_item')

          started = time.perf_counter()
          payload = None
          error = None
          try:
              payload = module._status_payload('2026-07-21')
          except BaseException as exc:
              error = f'{type(exc).__name__}:{exc}'
          elapsed_ms = round((time.perf_counter() - started) * 1000.0, 3)

          metrics = [
              {
                  'label': label,
                  'count': int(values['count']),
                  'totalMs': round(values['totalMs'], 3),
                  'maxMs': round(values['maxMs'], 3),
                  'averageMs': round(values['totalMs'] / values['count'], 3) if values['count'] else 0.0,
              }
              for label, values in stats.items()
          ]
          metrics.sort(key=lambda item: (-item['totalMs'], item['label']))
          errors = collections.Counter()
          if isinstance(payload, dict):
              for row in payload.get('perGameStatus') or []:
                  if isinstance(row, dict):
                      for reason in row.get('errors') or []:
                          errors[str(reason).split(':', 1)[0]] += 1
          summary_fields = (
              'ok', 'sport', 'slateDateEt', 'pullCount', 'gameCount',
              'stagedGameCount', 'canonicalImmutableGameRowCount',
              'lockedPredictionCount', 'lockedStatusCount', 'noPredictionDataCount',
              'playabilityValidationErrorCount', 'playabilityLifecycleErrorCount',
              'operationalDefect', 'officialScheduleBacked',
          )
          report = {
              'targetSha': os.environ['TARGET_SHA'],
              'slateDateEt': '2026-07-21',
              'elapsedMs': elapsed_ms,
              'error': error,
              'payloadSummary': {
                  key: payload.get(key)
                  for key in summary_fields
                  if isinstance(payload, dict) and key in payload
              },
              'perGameErrorCategoryCounts': dict(sorted(errors.items())),
              'metricsByInclusiveTotalMs': metrics,
          }
          Path('/tmp/live_lock_status_july21_profile_v2.json').write_text(
              json.dumps(report, indent=2, sort_keys=True, default=str) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Publish sanitized profile and remove profiler workflows
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/live_lock_status_july21_profile_v2.json live_lock_status_july21_profile_v2.json
          rm -f \
            .github/workflows/profile_mlb_lock_status_july21.yml \
            .github/workflows/profile_mlb_lock_status_july21_v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record July 21 MLB lock-status production profile v2"
          git push origin HEAD:agent/report-mlb-deploy-246daecb
