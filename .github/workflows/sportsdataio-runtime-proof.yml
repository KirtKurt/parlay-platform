name: SportsDataIO Runtime Proof

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy SAM to AWS"]
    types: [completed]

permissions:
  contents: write

jobs:
  prove:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read deployed API URL
        id: api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name parlay-platform-dev \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          test -n "$API_URL"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build runtime proof report
        run: python scripts/prove_sportsdataio_runtime.py --api-url "${{ steps.api.outputs.api_url }}"

      - name: Commit runtime proof report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime_reports/sportsdataio_runtime_proof_latest.json
          if git diff --cached --quiet; then
            echo "No proof report changes to commit."
          else
            git commit -m "Update SportsDataIO runtime proof"
            git push
          fi
