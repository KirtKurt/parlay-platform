name: Apply MLB BatchGet progressive pages

on:
  push:
    branches:
      - agent/mlb-batchget-progress-pages
    paths:
      - .github/workflows/apply_mlb_batchget_progress_pages.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/mlb-batchget-progress-pages
          fetch-depth: 0

      - name: Apply exact reviewed correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object hello_world/mlb_daily_per_game_lock_patch.py)" = "2d9b10f45a6ccf309d4adf38d8632d523a5e6227"
          test "$(git hash-object tests/unit/test_mlb_lock_status_request_cache.py)" = "1f7d38b05fd1b294d0fec661c1d73a4929495808"
          git apply --check .github/patches/mlb_batchget_progress_pages.patch
          git apply .github/patches/mlb_batchget_progress_pages.patch
          test "$(git hash-object hello_world/mlb_daily_per_game_lock_patch.py)" = "734fa341ccb1dad03c1c0269f8b1008c7457ac70"
          test "$(git hash-object tests/unit/test_mlb_lock_status_request_cache.py)" = "1b92604fe44767f6100f2904ea381e4deb35c780"
          python -m py_compile \
            hello_world/mlb_daily_per_game_lock_patch.py \
            tests/unit/test_mlb_lock_status_request_cache.py
          git diff --check
          rm .github/patches/mlb_batchget_progress_pages.patch
          rm .github/workflows/apply_mlb_batchget_progress_pages.yml
          rmdir .github/patches 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Handle progressive MLB BatchGet pages"
          git push origin HEAD:agent/mlb-batchget-progress-pages
