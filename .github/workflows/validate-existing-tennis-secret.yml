name: Validate retained Tennis odds credential

on:
  workflow_dispatch:
  push:
    branches: [agent/tennis-ml-production-deploy]
    paths:
      - ".github/workflows/validate-existing-tennis-secret.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TENNIS_SECRET_ID: TennisOddsApiSecret-zVcKsllD952w
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Authenticate retained Tennis-only secret without exposing it
        env:
          MLB_ODDS_API_KEY_VALUE: ${{ secrets.ODDS_API_KEY }}
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value --secret-id "$TENNIS_SECRET_ID" --region us-east-1 --output json > /tmp/tennis-secret-envelope.json
          python - <<'PY'
          import hashlib, json, os, urllib.parse, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          envelope=json.load(open('/tmp/tennis-secret-envelope.json'))
          raw=str(envelope.get('SecretString') or '').strip()
          key=raw
          if raw.startswith('{'):
              obj=json.loads(raw)
              for name in ('TENNIS_ODDS_API_KEY','ODDS_API_KEY','apiKey','api_key','key'):
                  if str(obj.get(name) or '').strip():
                      key=str(obj[name]).strip(); break
          mlb=os.environ.get('MLB_ODDS_API_KEY_VALUE','').strip()
          present=bool(key)
          distinct=bool(key and (not mlb or hashlib.sha256(key.encode()).digest()!=hashlib.sha256(mlb.encode()).digest()))
          provider_ok=False; status=None; sports=[]; headers={}; error=None
          if present:
              url='https://api.the-odds-api.com/v4/sports/?'+urllib.parse.urlencode({'apiKey':key})
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'inqsi-tennis-secret-preflight/1.0'})
                  with urllib.request.urlopen(req,timeout=20) as resp:
                      status=resp.status
                      body=resp.read()
                      headers={k.lower():v for k,v in resp.headers.items()}
                  payload=json.loads(body)
                  sports=payload if isinstance(payload,list) else []
                  provider_ok=status==200 and isinstance(payload,list)
              except Exception as exc:
                  error=type(exc).__name__+':'+str(exc)[:240]
          tennis=[r for r in sports if isinstance(r,dict) and str(r.get('key') or '').lower().startswith('tennis_') and not r.get('has_outrights')]
          report={
            'schemaVersion':'TENNIS-RETAINED-SECRET-PREFLIGHT-v1',
            'recordedAtUtc':datetime.now(timezone.utc).isoformat(),
            'secretId':os.environ['TENNIS_SECRET_ID'],
            'secretPresent':present,
            'distinctFromMlbCredential':distinct,
            'providerAuthenticated':provider_ok,
            'providerHttpStatus':status,
            'activeNonOutrightTennisSportKeyCount':len(tennis),
            'activeNonOutrightTennisSportKeys':sorted(str(r.get('key')) for r in tennis),
            'quotaRemaining':headers.get('x-requests-remaining'),
            'quotaUsed':headers.get('x-requests-used'),
            'error':error,
          }
          Path('tennis_release/retained-tennis-secret-preflight.json').write_text(json.dumps(report,indent=2,sort_keys=True)+'\n')
          print(json.dumps(report,indent=2,sort_keys=True))
          if not present: raise SystemExit('retained Tennis secret is empty')
          if not distinct: raise SystemExit('retained Tennis secret equals MLB credential')
          if not provider_ok: raise SystemExit('retained Tennis secret failed provider authentication')
          PY
      - name: Publish non-secret preflight result
        if: always()
        run: |
          set -euo pipefail
          test -s tennis_release/retained-tennis-secret-preflight.json || exit 0
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tennis_release/retained-tennis-secret-preflight.json
          git commit -m "Record retained Tennis credential preflight"
          git push origin "HEAD:${GITHUB_REF_NAME}"
