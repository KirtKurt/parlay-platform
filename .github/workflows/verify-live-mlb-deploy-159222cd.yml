name: Verify live MLB deployment 159222cd

on:
  pull_request:
    paths:
      - ".github/workflows/verify-live-mlb-deploy-159222cd.yml"
      - "scripts/verify_live_mlb_deploy_159222cd.py"

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout diagnostic source
        uses: actions/checkout@v4
      - name: Verify exact deployment run, identity artifact, and public reads
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/verify_live_mlb_deploy_159222cd.py
