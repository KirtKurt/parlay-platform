name: Verify live MLB deployment 159222cd

on:
  pull_request:
    paths:
      - ".github/workflows/verify-live-mlb-deploy-159222cd.yml"

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TARGET_SHA: 159222cd145ae0ba727970775abda22f956fb97c
      TARGET_WORKFLOW: Deploy SAM to AWS
      API_BASE: https://7nz8g8unyd.execute-api.us-east-1.amazonaws.com/Prod
    steps:
      - name: Verify exact deployment run, identity artifact, and public reads
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import io
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import zipfile

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          target_sha = os.environ["TARGET_SHA"]
          target_workflow = os.environ["TARGET_WORKFLOW"]
          api_base = os.environ["API_BASE"].rstrip("/")
          github_api = "https://api.github.com"

          def github_json(path: str) -> dict:
              request = urllib.request.Request(
                  github_api + path,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "parlay-platform-read-only-deploy-verifier/1.0",
                  },
              )
              with urllib.request.urlopen(request, timeout=60) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              if not isinstance(payload, dict):
                  raise RuntimeError(f"GitHub API returned non-object for {path}")
              return payload

          query = urllib.parse.urlencode(
              {
                  "head_sha": target_sha,
                  "event": "push",
                  "branch": "main",
                  "per_page": 100,
              }
          )
          deployment_run = None
          deadline = time.monotonic() + 30 * 60
          while time.monotonic() < deadline:
              payload = github_json(
                  f"/repos/{repository}/actions/runs?{query}"
              )
              matches = [
                  run
                  for run in payload.get("workflow_runs") or []
                  if isinstance(run, dict)
                  and run.get("head_sha") == target_sha
                  and run.get("head_branch") == "main"
                  and run.get("event") == "push"
                  and run.get("name") == target_workflow
              ]
              if len(matches) > 1:
                  raise RuntimeError(
                      f"Multiple exact deployment runs found: "
                      f"{[run.get('id') for run in matches]}"
                  )
              if matches:
                  deployment_run = matches[0]
                  print(
                      "DEPLOYMENT_RUN_POLL "
                      + json.dumps(
                          {
                              "id": deployment_run.get("id"),
                              "status": deployment_run.get("status"),
                              "conclusion": deployment_run.get("conclusion"),
                              "headSha": deployment_run.get("head_sha"),
                              "attempt": deployment_run.get("run_attempt"),
                          },
                          sort_keys=True,
                      ),
                      flush=True,
                  )
                  if deployment_run.get("status") == "completed":
                      break
              else:
                  print("DEPLOYMENT_RUN_POLL not_found_yet", flush=True)
              time.sleep(15)
          else:
              raise RuntimeError("Exact deployment run did not complete within the verifier deadline")

          if not deployment_run:
              raise RuntimeError("Exact deployment run was not found")

          run_id = int(deployment_run["id"])
          run_attempt = int(deployment_run.get("run_attempt") or 1)
          run_summary = {
              "id": run_id,
              "attempt": run_attempt,
              "name": deployment_run.get("name"),
              "event": deployment_run.get("event"),
              "status": deployment_run.get("status"),
              "conclusion": deployment_run.get("conclusion"),
              "headBranch": deployment_run.get("head_branch"),
              "headSha": deployment_run.get("head_sha"),
              "createdAt": deployment_run.get("created_at"),
              "updatedAt": deployment_run.get("updated_at"),
              "url": deployment_run.get("html_url"),
          }
          print("DEPLOYMENT_RUN " + json.dumps(run_summary, sort_keys=True), flush=True)

          jobs_payload = github_json(
              f"/repos/{repository}/actions/runs/{run_id}/jobs?filter=latest&per_page=100"
          )
          jobs = [job for job in jobs_payload.get("jobs") or [] if isinstance(job, dict)]
          job_summary = [
              {
                  "id": job.get("id"),
                  "name": job.get("name"),
                  "status": job.get("status"),
                  "conclusion": job.get("conclusion"),
                  "startedAt": job.get("started_at"),
                  "completedAt": job.get("completed_at"),
                  "failedSteps": [
                      step.get("name")
                      for step in job.get("steps") or []
                      if isinstance(step, dict)
                      and step.get("conclusion") not in ("success", "skipped", None)
                  ],
              }
              for job in jobs
          ]
          print("DEPLOYMENT_JOBS " + json.dumps(job_summary, sort_keys=True), flush=True)

          if deployment_run.get("conclusion") != "success":
              raise RuntimeError(
                  f"Exact deployment run concluded {deployment_run.get('conclusion')}"
              )
          deploy_jobs = [job for job in jobs if job.get("name") == "deploy"]
          if len(deploy_jobs) != 1 or deploy_jobs[0].get("conclusion") != "success":
              raise RuntimeError("Exact deployment job is not uniquely successful")

          artifacts_payload = github_json(
              f"/repos/{repository}/actions/runs/{run_id}/artifacts?per_page=100"
          )
          expected_artifact_name = f"mlb-deployment-identity-{run_id}"
          artifacts = [
              artifact
              for artifact in artifacts_payload.get("artifacts") or []
              if isinstance(artifact, dict)
              and artifact.get("name") == expected_artifact_name
              and artifact.get("expired") is False
          ]
          if len(artifacts) != 1:
              raise RuntimeError(
                  f"Expected exactly one {expected_artifact_name} artifact; found {len(artifacts)}"
              )

          artifact_request = urllib.request.Request(
              artifacts[0]["archive_download_url"],
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "parlay-platform-read-only-deploy-verifier/1.0",
              },
          )
          with urllib.request.urlopen(artifact_request, timeout=120) as response:
              archive = response.read()
          with zipfile.ZipFile(io.BytesIO(archive)) as bundle:
              names = sorted(bundle.namelist())
              identity_names = [
                  name for name in names if name.endswith("mlb_deploy_identity_latest.json")
              ]
              if len(identity_names) != 1:
                  raise RuntimeError(
                      f"Deployment artifact identity file count is {len(identity_names)}"
                  )
              identity = json.loads(bundle.read(identity_names[0]).decode("utf-8"))

          if not isinstance(identity, dict) or identity.get("ok") is not True:
              raise RuntimeError("Deployment identity proof is not healthy")
          if identity.get("expectedGitSha") != target_sha:
              raise RuntimeError(
                  f"Deployment identity expected SHA is {identity.get('expectedGitSha')}"
              )
          expected_run_id = f"{run_id}-{run_attempt}"
          if identity.get("expectedDeployRunId") != expected_run_id:
              raise RuntimeError(
                  f"Deployment proof run identity is {identity.get('expectedDeployRunId')}"
              )
          functions = identity.get("functions") or {}
          if not isinstance(functions, dict) or not functions:
              raise RuntimeError("Deployment identity proof has no functions")
          bad_functions = {}
          for name, evidence in functions.items():
              if not isinstance(evidence, dict):
                  bad_functions[name] = ["non_object"]
                  continue
              errors = []
              if evidence.get("deployGitSha") != target_sha:
                  errors.append("deploy_sha")
              if evidence.get("deployRunId") != expected_run_id:
                  errors.append("deploy_run")
              if evidence.get("identityMatches") is not True:
                  errors.append("identity")
              if evidence.get("configurationMatches") is not True:
                  errors.append("configuration")
              if evidence.get("codeArtifactMatchesCleanBuild") is not True:
                  errors.append("artifact")
              if errors:
                  bad_functions[name] = errors
          if bad_functions:
              raise RuntimeError(
                  "Deployment identity mismatch: " + json.dumps(bad_functions, sort_keys=True)
              )
          identity_summary = {
              "ok": True,
              "proofType": identity.get("proofType"),
              "expectedGitSha": identity.get("expectedGitSha"),
              "expectedDeployRunId": identity.get("expectedDeployRunId"),
              "templateSha256": identity.get("expectedTemplateSha256"),
              "functionCount": len(functions),
              "allFunctionArtifactsMatch": True,
              "artifactId": artifacts[0].get("id"),
              "artifactDigest": artifacts[0].get("digest"),
              "files": names,
          }
          print(
              "DEPLOYMENT_IDENTITY " + json.dumps(identity_summary, sort_keys=True),
              flush=True,
          )

          def fetch_public_json(path: str) -> tuple[dict, float, int]:
              url = api_base + path
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "User-Agent": "parlay-platform-read-only-deploy-verifier/1.0",
                  },
              )
              started = time.monotonic()
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      status = int(response.getcode())
                      raw = response.read()
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", "replace")[:1000]
                  raise RuntimeError(
                      f"Public read {path} returned HTTP {exc.code}: {body}"
                  ) from exc
              elapsed = time.monotonic() - started
              payload = json.loads(raw.decode("utf-8"))
              if status != 200 or not isinstance(payload, dict):
                  raise RuntimeError(
                      f"Public read {path} returned status={status} type={type(payload).__name__}"
                  )
              return payload, elapsed, status

          live_summary = {}
          for path, label in (
              ("/v1/health", "health"),
              ("/v1/mlb/locks/status", "lockStatus"),
              ("/v1/mlb/predictions", "predictions"),
          ):
              payload, elapsed, status = fetch_public_json(path)
              if payload.get("ok") is not True:
                  raise RuntimeError(f"Public read {path} reports ok={payload.get('ok')}")
              if label != "health" and payload.get("sport") != "mlb":
                  raise RuntimeError(
                      f"Public read {path} reports sport={payload.get('sport')}"
                  )
              live_summary[label] = {
                  "httpStatus": status,
                  "elapsedSeconds": round(elapsed, 3),
                  "ok": payload.get("ok"),
                  "sport": payload.get("sport"),
                  "slateDateEt": payload.get("slateDateEt"),
                  "gameCount": payload.get("gameCount"),
                  "lockedPredictionCount": payload.get("lockedPredictionCount"),
                  "officialPredictionCount": payload.get("officialPredictionCount"),
                  "lockedStatusCount": payload.get("lockedStatusCount"),
                  "noPredictionDataCount": payload.get("noPredictionDataCount"),
                  "operationalDefect": payload.get("operationalDefect"),
              }
          print("LIVE_PUBLIC_READS " + json.dumps(live_summary, sort_keys=True), flush=True)
          print("VERIFICATION_OK", flush=True)
          PY
