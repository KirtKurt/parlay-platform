name: Dispatch Authorized MLB Historical Training

"on":
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-v15-11-authorized-dispatch.yml'

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: mlb-v15-11-authorized-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_WORKFLOW_FILE: mlb-historical-optimizer.yml
      TARGET_WORKFLOW_NAME: MLB Historical Daily Optimizer
      ACCELERATOR_WORKFLOW_NAME: MLB Historical Accelerated Training Driver
      REPORT_ISSUE: '111'
    steps:
      - name: Dispatch and monitor one fresh authorized historical run
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          h=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          list_runs() {
            local event="$1"
            curl -fsS "${h[@]}" "$api/actions/runs?branch=main&event=${event}&per_page=100"
          }

          update_comment() {
            local body="$1"
            jq -n --arg body "$body" '{body:$body}' >/tmp/comment.json
            if [ -z "${comment_id:-}" ]; then
              curl -fsS -X POST "${h[@]}" "$api/issues/${REPORT_ISSUE}/comments" \
                --data-binary @/tmp/comment.json > /tmp/comment-response.json
              comment_id=$(jq -r '.id' /tmp/comment-response.json)
              test -n "$comment_id"
              test "$comment_id" != null
            else
              curl -fsS -X PATCH "${h[@]}" "$api/issues/comments/${comment_id}" \
                --data-binary @/tmp/comment.json >/tmp/comment-response.json
            fi
          }

          active=$(list_runs workflow_dispatch | jq -c --arg name "$TARGET_WORKFLOW_NAME" '
            [.workflow_runs[] | select(.name == $name and .status != "completed")]
            | sort_by(.created_at) | last // empty
          ')

          if [ -n "$active" ]; then
            base_row="$active"
            echo 'Reusing the currently active historical optimizer run; no duplicate paid run was dispatched.'
          else
            before=$(list_runs workflow_dispatch | jq -r --arg name "$TARGET_WORKFLOW_NAME" '
              [.workflow_runs[] | select(.name == $name) | .id] | max // 0
            ')
            dispatched_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            cat >/tmp/dispatch.json <<'JSON'
          {
            "ref": "main",
            "inputs": {
              "deploy_runtime_guard": false,
              "runtime_guard_confirmation": "INSTALL_FAIL_CLOSED_HISTORICAL_RUNTIME_GUARD",
              "deploy_optimizer_stack": true,
              "execute_paid_backfill": true,
              "paid_authorization": "AUTHORIZE_THE_ODDS_API_HISTORICAL_CREDITS",
              "production_cutover_confirmation": "DESTROY_V15_10_PRODUCTION_AUTHORITY_AFTER_80_PERCENT_GATE",
              "maximum_credits": "120000",
              "maximum_candidates": "25000"
            }
          }
          JSON
            curl -fsS -X POST "${h[@]}" "$api/actions/workflows/${TARGET_WORKFLOW_FILE}/dispatches" \
              --data-binary @/tmp/dispatch.json
            base_row=''
            for attempt in $(seq 1 120); do
              base_row=$(list_runs workflow_dispatch | jq -c \
                --arg name "$TARGET_WORKFLOW_NAME" \
                --arg created "$dispatched_at" \
                --argjson before "$before" '
                  [.workflow_runs[]
                    | select(.name == $name and .id != $before and .created_at >= $created)]
                  | sort_by(.created_at) | last // empty
                ')
              [ -n "$base_row" ] && break
              sleep 5
            done
          fi

          [ -n "$base_row" ] || { echo '::error::Fresh historical optimizer run was not created'; exit 1; }
          base_id=$(jq -r '.id' <<<"$base_row")
          base_url=$(jq -r '.html_url' <<<"$base_row")
          base_created=$(jq -r '.created_at' <<<"$base_row")
          base_head=$(jq -r '.head_sha' <<<"$base_row")
          comment_id=''

          for attempt in $(seq 1 720); do
            curl -fsS "${h[@]}" "$api/actions/runs/${base_id}" >/tmp/base.json
            curl -fsS "${h[@]}" "$api/actions/runs/${base_id}/jobs?per_page=100" >/tmp/base-jobs.json
            base_status=$(jq -r '.status' /tmp/base.json)
            base_conclusion=$(jq -r '.conclusion // "pending"' /tmp/base.json)
            base_step=$(jq -r '[.jobs[].steps[]? | select(.status == "in_progress") | .name][0] // [.jobs[].steps[]? | select(.conclusion == "failure") | .name][0] // "waiting"' /tmp/base-jobs.json)
            observed=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            update_comment "<!-- mlb-v15-11-authorized-dispatch-live -->
          ## Authorized MLB V15.11.1 historical training

          - Fresh base workflow: [run ${base_id}](${base_url})
          - Base status: **${base_status} / ${base_conclusion}**
          - Base active step: \`${base_step}\`
          - Accelerator: **waiting for exact successful base run**
          - Last observed: ${observed}
          - Required evidence: **1,000 train + 200 walk-forward + 200 untouched audit; exact full slates; at least 80% on every held-out date**
          - Credit ceiling: **120,000**
          - Production remains fail-closed; automatic wagering is disabled."
            [ "$base_status" = completed ] && break
            sleep 15
          done

          base_conclusion=$(jq -r '.conclusion // "pending"' /tmp/base.json)
          if [ "$base_conclusion" != success ]; then
            jq -c '.jobs[] | {id,name,status,conclusion,failed_steps:[.steps[]?|select(.conclusion=="failure")|.name]}' /tmp/base-jobs.json
            echo "::error::Fresh historical optimizer run ${base_id} ended ${base_conclusion}"
            exit 1
          fi

          accelerator_row=''
          for attempt in $(seq 1 180); do
            accelerator_row=$(list_runs workflow_run | jq -c \
              --arg name "$ACCELERATOR_WORKFLOW_NAME" \
              --arg created "$base_created" \
              --arg head "$base_head" '
                [.workflow_runs[]
                  | select(.name == $name and .head_sha == $head and .created_at >= $created)]
                | sort_by(.created_at) | last // empty
              ')
            [ -n "$accelerator_row" ] && break
            sleep 10
          done
          [ -n "$accelerator_row" ] || { echo '::error::Exact accelerator run did not start'; exit 1; }

          accelerator_id=$(jq -r '.id' <<<"$accelerator_row")
          accelerator_url=$(jq -r '.html_url' <<<"$accelerator_row")
          for attempt in $(seq 1 720); do
            curl -fsS "${h[@]}" "$api/actions/runs/${accelerator_id}" >/tmp/accelerator.json
            curl -fsS "${h[@]}" "$api/actions/runs/${accelerator_id}/jobs?per_page=100" >/tmp/accelerator-jobs.json
            accelerator_status=$(jq -r '.status' /tmp/accelerator.json)
            accelerator_conclusion=$(jq -r '.conclusion // "pending"' /tmp/accelerator.json)
            accelerator_step=$(jq -r '[.jobs[].steps[]? | select(.status == "in_progress") | .name][0] // [.jobs[].steps[]? | select(.conclusion == "failure") | .name][0] // "waiting"' /tmp/accelerator-jobs.json)
            observed=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            update_comment "<!-- mlb-v15-11-authorized-dispatch-live -->
          ## Authorized MLB V15.11.1 historical training

          - Base workflow: [run ${base_id}](${base_url}) — **success**
          - Accelerator: [run ${accelerator_id}](${accelerator_url})
          - Accelerator status: **${accelerator_status} / ${accelerator_conclusion}**
          - Accelerator active step: \`${accelerator_step}\`
          - Last observed: ${observed}
          - Promotion is valid only after the immutable 1,000/200/200, full-slate, every-day-80% proofs and live historical-only cutover validation.
          - Automatic wagering is disabled."
            [ "$accelerator_status" = completed ] && break
            sleep 30
          done

          accelerator_conclusion=$(jq -r '.conclusion // "pending"' /tmp/accelerator.json)
          if [ "$accelerator_conclusion" != success ]; then
            jq -c '.jobs[] | {id,name,status,conclusion,failed_steps:[.steps[]?|select(.conclusion=="failure")|.name]}' /tmp/accelerator-jobs.json
            echo "::error::Accelerated historical training ended ${accelerator_conclusion}"
            exit 1
          fi
