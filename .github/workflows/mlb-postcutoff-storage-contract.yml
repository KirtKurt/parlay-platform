name: MLB Post-Cutoff Storage Contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'hello_world/mlb_locked_prediction_storage_finalizer_v1.py'
      - 'hello_world/mlb_manual_pull_protected.py'
      - 'tests/unit/test_mlb_postcutoff_storage_contract.py'
      - 'tests/unit/test_mlb_storage_authority.py'
      - 'tests/unit/test_mlb_manual_pull_protected_runtime.py'
      - '.github/workflows/mlb-postcutoff-storage-contract.yml'
  push:
    branches: [main]
    paths:
      - 'hello_world/mlb_locked_prediction_storage_finalizer_v1.py'
      - 'hello_world/mlb_manual_pull_protected.py'
      - 'tests/unit/test_mlb_postcutoff_storage_contract.py'
      - 'tests/unit/test_mlb_storage_authority.py'
      - 'tests/unit/test_mlb_manual_pull_protected_runtime.py'
      - '.github/workflows/mlb-postcutoff-storage-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlb-postcutoff-storage-contract-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Verify lifecycle-aware storage and scheduled-pull behavior
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
        run: |
          python -m pytest -q \
            tests/unit/test_mlb_postcutoff_storage_contract.py \
            tests/unit/test_mlb_storage_authority.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py
          python -m py_compile \
            hello_world/mlb_locked_prediction_storage_finalizer_v1.py \
            hello_world/mlb_manual_pull_protected.py
