name: Apply MLB Scoring Runtime Fix

on:
  push:
    paths:
      - '.github/workflows/apply-mlb-scoring-runtime-fix.yml'
      - 'scripts/apply_mlb_scoring_runtime_fix.py'
      - 'tests/unit/test_mlb_scoring_runtime_capacity.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-scoring-runtime-fix-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.ref_name == 'agent/mlb-scoring-run-proof'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply canonical source migration
        run: python scripts/apply_mlb_scoring_runtime_fix.py

      - name: Verify capacity and priority regressions
        run: python -m pytest -q tests/unit/test_mlb_scoring_runtime_capacity.py

      - name: Commit canonical source changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add template.yaml hello_world/mlb_manual_pull.py
          if git diff --cached --quiet; then
            echo 'Canonical MLB scoring runtime fix is already applied.'
          else
            git commit -m 'Fix MLB scoring runtime timeout and priority'
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
