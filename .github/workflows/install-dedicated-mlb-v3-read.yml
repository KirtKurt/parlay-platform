name: Install Dedicated MLB V3 Read Lambda

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-dedicated-mlb-v3-read.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2

      - name: Create dedicated v3 handler and SAM patch
        run: |
          set -euo pipefail
          cat > hello_world/mlb_v3_read_api.py <<'PY'
          from __future__ import annotations

          import json
          from datetime import datetime
          from decimal import Decimal
          from typing import Any, Dict
          from zoneinfo import ZoneInfo

          import mlb_ml_runtime_install_v3

          RUNTIME_INSTALL = mlb_ml_runtime_install_v3.install()

          try:
              import mlb_game_winner_engine as ENGINE
              ENGINE_IMPORT_OK = True
              ENGINE_IMPORT_ERROR = None
          except Exception as exc:
              ENGINE = None
              ENGINE_IMPORT_OK = False
              ENGINE_IMPORT_ERROR = str(exc)

          try:
              import mlb_ml_optimization_v3 as OPTIMIZATION
              OPTIMIZATION_VERSION = OPTIMIZATION.VERSION
          except Exception:
              OPTIMIZATION_VERSION = None

          MODEL_VERSION = "INQSI-MLB-v3.1-90pct-rolling-slate-automatic-authority"
          VERSION = "MLB-V3-READ-API-v2-automatic-gate-authority"


          def _json_default(value: Any) -> Any:
              if isinstance(value, Decimal):
                  return int(value) if value == value.to_integral_value() else float(value)
              return str(value)


          def _response(status: int, body: Dict[str, Any]) -> Dict[str, Any]:
              return {
                  "statusCode": status,
                  "headers": {
                      "content-type": "application/json",
                      "access-control-allow-origin": "*",
                      "access-control-allow-headers": "content-type,authorization,x-inqsi-admin-token",
                      "access-control-allow-methods": "GET,OPTIONS",
                      "cache-control": "no-store",
                  },
                  "body": json.dumps(body, default=_json_default),
              }


          def _path(event: Dict[str, Any]) -> str:
              return ((event or {}).get("rawPath") or (event or {}).get("path") or "/").rstrip("/") or "/"


          def _query(event: Dict[str, Any]) -> Dict[str, str]:
              return (event or {}).get("queryStringParameters") or {}


          def _today_et() -> str:
              return datetime.now(ZoneInfo("America/New_York")).date().isoformat()


          def _model_body() -> Dict[str, Any]:
              runtime = getattr(ENGINE, "MLB_ML_RUNTIME_INSTALL_V3", RUNTIME_INSTALL) if ENGINE is not None else RUNTIME_INSTALL
              return {
                  "ok": bool(ENGINE_IMPORT_OK and runtime.get("ok") is True),
                  "sport": "mlb",
                  "model_version": MODEL_VERSION,
                  "game_winner_model": getattr(ENGINE, "MODEL_VERSION", None) if ENGINE is not None else None,
                  "game_winner_engine": getattr(ENGINE, "ENGINE", None) if ENGINE is not None else None,
                  "ml_optimization_version": OPTIMIZATION_VERSION,
                  "ml_runtime_install": runtime,
                  "engine_import_ok": ENGINE_IMPORT_OK,
                  "engine_import_error": ENGINE_IMPORT_ERROR,
                  "apiRuntimeVersion": VERSION,
                  "pick_type": "individual_game_moneyline",
                  "requiredWinnerPickPolicy": "one_official_locked_winner_prediction_for_every_mlb_game",
                  "playablePolicy": "playability_is_separate_and_may_be_false_for_an_official_prediction",
                  "mlDirectionPolicy": "outcome_model_requires_90pct_untouched_accuracy_and_90pct_rolling_official_card_slate_accuracy_before_automatic_authority",
                  "mlReliabilityPolicy": "reliability_probability_is_never_team_win_probability",
                  "productionAuthoritySource": "gate_promoted_DynamoDB_champion_bundle_only",
                  "automaticPromotionPolicy": "authoritative_AWS_audit_only_after_independent_90pct_authority_gates",
                  "parlaysEnabled": False,
                  "sourcePolicy": "The Odds API pull history plus timestamped source-honest fundamentals snapshots.",
              }


          def lambda_handler(event: Dict[str, Any], context: Any) -> Dict[str, Any]:
              event = event or {}
              if str(event.get("httpMethod") or "GET").upper() == "OPTIONS":
                  return _response(200, {"ok": True})
              path = _path(event)
              params = _query(event)
              if path == "/v1/mlb/model/version":
                  return _response(200, _model_body())
              if path not in {"/v1/mlb/today", "/v1/mlb/games", "/v1/mlb/predictions", "/v1/mlb/game-winners"}:
                  return _response(404, {"ok": False, "error": "route_not_found", "path": path, "apiRuntimeVersion": VERSION})
              if ENGINE is None:
                  return _response(503, {**_model_body(), "ok": False, "winner_predictions": [], "predictions": [], "count": 0})
              date = params.get("game_date_et") or params.get("date") or _today_et()
              try:
                  result = ENGINE.predict_all(
                      date,
                      store=str(params.get("store") or "false").lower() == "true",
                      limit=min(max(int(params.get("limit") or 500), 1), 500),
                  )
              except Exception as exc:
                  return _response(500, {**_model_body(), "ok": False, "date": date, "error": str(exc), "winner_predictions": [], "predictions": [], "count": 0})
              result = dict(result or {})
              result.update({
                  "sport": "mlb",
                  "date": date,
                  "model_version": MODEL_VERSION,
                  "ml_runtime_install": _model_body().get("ml_runtime_install"),
                  "apiRuntimeVersion": VERSION,
                  "winner_predictions": result.get("predictions") or [],
                  "parlaysEnabled": False,
              })
              return _response(200, result)
          PY

          cat > scripts/patch_template_mlb_security.py <<'PY'
          from pathlib import Path

          TEMPLATE = Path("template.yaml")
          text = TEMPLATE.read_text()


          def insert_once(current: str, marker: str, block: str, contains: str) -> str:
              if contains in current:
                  return current
              if marker not in current:
                  raise RuntimeError(f"Template marker not found: {marker.strip()}")
              return current.replace(marker, block + marker, 1)


          def remove_child_event(current: str, name: str) -> str:
              lines = current.splitlines(keepends=True)
              out = []
              i = 0
              needle = f"        {name}:"
              while i < len(lines):
                  if lines[i].startswith(needle):
                      i += 1
                      while i < len(lines):
                          line = lines[i]
                          if ((line.startswith("        ") and not line.startswith("          ")) or (line.startswith("  ") and not line.startswith("    ")) or line.startswith("Outputs:")):
                              break
                          i += 1
                      continue
                  out.append(lines[i])
                  i += 1
              return "".join(out)


          admin_env = "        INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken\n"
          if admin_env not in text:
              marker = "        ODDS_API_KEY: !Ref OddsApiKey\n"
              if marker not in text:
                  raise RuntimeError("ODDS_API_KEY global env marker missing")
              text = text.replace(marker, marker + admin_env, 1)

          text = text.replace("Handler: inqsi_backend_api.lambda_handler", "Handler: inqsi_backend_api_wrapper.lambda_handler", 1)
          for name in [
              "InqsiMlbModelVersion", "InqsiMlbToday", "InqsiMlbGameWinners", "InqsiMlbPredictions", "InqsiMlbGames",
              "ApiMlbV3ModelVersion", "ApiMlbV3Today", "ApiMlbV3GameWinners", "ApiMlbV3Predictions", "ApiMlbV3Games",
          ]:
              text = remove_child_event(text, name)

          text = text.replace("Handler: mlb_manual_pull.lambda_handler", "Handler: mlb_manual_pull_protected.lambda_handler", 1)
          text = text.replace("Handler: mlb_daily_pick_lock.lambda_handler", "Handler: mlb_daily_pick_lock_protected.lambda_handler", 1)

          dedicated = """
          MLBV3ReadFunction:
            Type: AWS::Serverless::Function
            Properties:
              CodeUri: hello_world/
              Handler: mlb_v3_read_api.lambda_handler
              Timeout: 60
              MemorySize: 1024
              Policies:
                - DynamoDBCrudPolicy:
                    TableName: !Ref SnapshotsTable
              Events:
                MLBV3ModelVersion:
                  Type: Api
                  Properties:
                    Path: /v1/mlb/model/version
                    Method: GET
                MLBV3Today:
                  Type: Api
                  Properties:
                    Path: /v1/mlb/today
                    Method: GET
                MLBV3GameWinners:
                  Type: Api
                  Properties:
                    Path: /v1/mlb/game-winners
                    Method: GET
                MLBV3Predictions:
                  Type: Api
                  Properties:
                    Path: /v1/mlb/predictions
                    Method: GET
                MLBV3Games:
                  Type: Api
                  Properties:
                    Path: /v1/mlb/games
                    Method: GET

          """
          text = insert_once(text, "  ApiFunction:\n", dedicated, "  MLBV3ReadFunction:\n")

          verifier = """
          MLBProductionVerifierFunction:
            Type: AWS::Serverless::Function
            Properties:
              CodeUri: hello_world/
              Handler: mlb_production_verifier.lambda_handler
              Timeout: 60
              MemorySize: 1024
              Environment:
                Variables:
                  MLB_VERIFY_MAX_PULL_AGE_MINUTES: '20'
              Policies:
                - DynamoDBCrudPolicy:
                    TableName: !Ref SnapshotsTable
              Events:
                MLBProductionVerifierEvery5Min:
                  Type: Schedule
                  Properties:
                    Schedule: rate(5 minutes)
                    Input: '{"sport":"mlb","mode":"continuous","run":"aws_production_verifier_5m"}'
                MLBProductionIngestVerifyDaily435Et:
                  Type: Schedule
                  Properties:
                    Schedule: cron(35 20 * * ? *)
                    Input: '{"sport":"mlb","mode":"ingest","run":"daily_ingest_verify_1635_et"}'
                MLBProductionLockVerifyDaily556Et:
                  Type: Schedule
                  Properties:
                    Schedule: cron(56 21 * * ? *)
                    Input: '{"sport":"mlb","mode":"lock","run":"daily_lock_verify_1756_et"}'

          """
          text = insert_once(text, "  MLBResultsSchedulerFunction:\n", verifier, "MLBProductionVerifierFunction:")

          required = [
              "Handler: inqsi_backend_api_wrapper.lambda_handler",
              "MLBV3ReadFunction:", "Handler: mlb_v3_read_api.lambda_handler",
              "Path: /v1/mlb/model/version", "Path: /v1/mlb/today", "Path: /v1/mlb/game-winners", "Path: /v1/mlb/predictions", "Path: /v1/mlb/games",
              "Handler: mlb_manual_pull_protected.lambda_handler", "Handler: mlb_daily_pick_lock_protected.lambda_handler",
              "INQSI_ADMIN_API_TOKEN: !Ref InqsiAdminApiToken",
              "MLBProductionVerifierFunction:", "MLBProductionVerifierEvery5Min:", "MLBProductionIngestVerifyDaily435Et:", "MLBProductionLockVerifyDaily556Et:",
          ]
          missing = [value for value in required if value not in text]
          if missing:
              raise RuntimeError("MLB dedicated v3 route patch failed; missing: " + ", ".join(missing))
          TEMPLATE.write_text(text)
          print("Patched template.yaml with dedicated MLB v3 read Lambda, protected writes, and production verification schedules.")
          PY

          cat > scripts/verify_api_function_mlb_v3_import.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations

          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          HELLO_WORLD = ROOT / "hello_world"


          def main() -> int:
              env = dict(os.environ)
              env.update({
                  "AWS_DEFAULT_REGION": env.get("AWS_DEFAULT_REGION") or "us-east-1",
                  "AWS_REGION": env.get("AWS_REGION") or "us-east-1",
                  "AWS_EC2_METADATA_DISABLED": "true",
                  "SNAPSHOTS_TABLE": "",
                  "INQSI_MLB_ALLOW_LOCAL_FILE_CHAMPION": "false",
                  "INQSI_MLB_ML_AUTO_PROMOTE": "false",
                  "PYTHONPATH": str(HELLO_WORLD),
              })
              code = r'''
          import json
          import inqsi_pull_history
          import mlb_v3_read_api
          assert callable(inqsi_pull_history.handle_pull_history_route)
          event = {"path":"/v1/mlb/model/version","rawPath":"/v1/mlb/model/version","httpMethod":"GET","queryStringParameters":None}
          response = mlb_v3_read_api.lambda_handler(event, None)
          assert response.get("statusCode") == 200, response
          body = json.loads(response.get("body") or "{}")
          assert body.get("ok") is True, body
          assert body.get("engine_import_ok") is True, body
          assert str(body.get("model_version") or "").startswith("INQSI-MLB-v3.1"), body
          assert body.get("productionAuthoritySource") == "gate_promoted_DynamoDB_champion_bundle_only", body
          assert body.get("automaticPromotionPolicy") == "authoritative_AWS_audit_only_after_independent_90pct_authority_gates", body
          assert str(body.get("ml_optimization_version") or "").startswith("MLB-ML-OPTIMIZATION-v3"), body
          runtime = body.get("ml_runtime_install") or {}
          assert runtime.get("ok") is True, runtime
          assert runtime.get("version") == "MLB-ML-RUNTIME-INSTALL-v3.6-per-game-lock-temporal-90pct-auto-authority", runtime
          required = {"legacyReliabilityOverlaySafety","singleDdbChampionAuthority","officialSemanticsFinalized","immutableFeatureFreeze","exactCleanCohortVectorPatch","officialFreezeBridge"}
          missing = sorted(name for name in required if (runtime.get("steps") or {}).get(name) is not True)
          assert not missing, {"missingRuntimeSteps": missing, "runtime": runtime}
          print(json.dumps({"ok":True,"modelVersion":body.get("model_version"),"runtime":runtime}, indent=2))
          '''
              result = subprocess.run([sys.executable, "-c", code], cwd=str(ROOT), env=env, text=True, capture_output=True, timeout=90)
              if result.returncode:
                  sys.stderr.write(result.stdout); sys.stderr.write(result.stderr); return result.returncode
              print(result.stdout.strip())
              print("Dedicated MLB v3 Lambda cold import and runtime contract verified")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          chmod +x scripts/verify_api_function_mlb_v3_import.py

      - name: Validate exact deployment sequence
        run: |
          set -euo pipefail
          cp template.yaml /tmp/template.yaml.source
          trap 'cp /tmp/template.yaml.source template.yaml' EXIT
          python scripts/patch_template_mlb_v1.py
          python scripts/patch_template_mlb_security.py
          python scripts/patch_template_mlb_results_routes.py
          python scripts/verify_mlb_schedule_invariants.py
          sam validate
          sam build --no-cached

      - name: Commit dedicated v3 read Lambda
        run: |
          git checkout -- template.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hello_world/mlb_v3_read_api.py scripts/patch_template_mlb_security.py scripts/verify_api_function_mlb_v3_import.py
          git commit -m "Install dedicated MLB v3 read Lambda" || true
          git pull --rebase --autostash origin main
          git push
