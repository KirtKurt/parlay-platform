name: Observe MLB V15.11.1 deployment

"on":
  workflow_run:
    workflows: ["MLB Historical Daily Optimizer"]
    types: [completed]

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  report:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_sha == '8519da84cb3e1982fab89cd85d7b09be62ad604d'
    runs-on: ubuntu-latest
    steps:
      - name: Post exact deployment result to PR 111
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_STATUS: ${{ github.event.workflow_run.status }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          <!-- mlb-v15-11-deployment-observer -->
          MLB V15.11.1 deployment workflow completed.

          - Workflow: ${RUN_NAME}
          - Run ID: ${RUN_ID}
          - Status: ${RUN_STATUS}
          - Conclusion: ${RUN_CONCLUSION}
          - Head SHA: ${HEAD_SHA}
          - Run: ${RUN_URL}
          EOF
          )
          jq -n --arg body "$BODY" '{body: $body}' > /tmp/comment.json
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/111/comments \
            --data-binary @/tmp/comment.json
