name: Observe MLB V15.11.1 deployment

"on":
  push:
    branches: [main]
    paths:
      - '.github/workflows/mlb-v15-11-deployment-observer.yml'

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 8519da84cb3e1982fab89cd85d7b09be62ad604d
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Locate exact merged deployment run and jobs
        id: deployment
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&event=push&per_page=100"
          for attempt in $(seq 1 150); do
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API" > /tmp/runs.json
            ROW=$(jq -c '[.workflow_runs[] | select(.name == "MLB Historical Daily Optimizer")] | sort_by(.created_at) | last // empty' /tmp/runs.json)
            if [ -n "$ROW" ]; then
              STATUS=$(jq -r '.status' <<<"$ROW")
              if [ "$STATUS" = completed ]; then
                RUN_ID=$(jq -r '.id' <<<"$ROW")
                RUN_URL=$(jq -r '.html_url' <<<"$ROW")
                CONCLUSION=$(jq -r '.conclusion' <<<"$ROW")
                JOBS_URL=$(jq -r '.jobs_url' <<<"$ROW")
                curl --fail --silent --show-error \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${JOBS_URL}?per_page=100" > /tmp/jobs.json
                printf '%s' "$ROW" > /tmp/run.json
                echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
                echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
                echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            sleep 10
          done
          echo '::error::Timed out locating a completed merged MLB V15.11.1 deployment run'
          exit 1

      - name: Persist exact deployment evidence
        env:
          RUN_ID: ${{ steps.deployment.outputs.run_id }}
          RUN_URL: ${{ steps.deployment.outputs.run_url }}
          RUN_CONCLUSION: ${{ steps.deployment.outputs.conclusion }}
        run: |
          set -euo pipefail
          git pull --rebase origin main
          mkdir -p runtime_reports
          jq -n \
            --arg proofType 'MLB_V15_11_1_MERGED_DEPLOYMENT_RESULT' \
            --arg targetSha "$TARGET_SHA" \
            --arg observedAtUtc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile run /tmp/run.json \
            --slurpfile jobs /tmp/jobs.json \
            '{
              proofType: $proofType,
              targetSha: $targetSha,
              observedAtUtc: $observedAtUtc,
              workflow: {
                id: $run[0].id,
                name: $run[0].name,
                event: $run[0].event,
                status: $run[0].status,
                conclusion: $run[0].conclusion,
                runNumber: $run[0].run_number,
                runAttempt: $run[0].run_attempt,
                url: $run[0].html_url,
                createdAt: $run[0].created_at,
                updatedAt: $run[0].updated_at
              },
              jobs: [
                $jobs[0].jobs[] | {
                  id,
                  name,
                  status,
                  conclusion,
                  startedAt: .started_at,
                  completedAt: .completed_at,
                  url: .html_url,
                  steps: [(.steps // [])[] | {number, name, status, conclusion}]
                }
              ]
            }' > runtime_reports/mlb_v15_11_1_merged_deployment_latest.json
          cat runtime_reports/mlb_v15_11_1_merged_deployment_latest.json

          BODY=$(cat <<EOF
          <!-- mlb-v15-11-deployment-probe -->
          MLB V15.11.1 merged deployment workflow completed.

          - Workflow: MLB Historical Daily Optimizer
          - Run ID: ${RUN_ID}
          - Conclusion: ${RUN_CONCLUSION}
          - Head SHA: ${TARGET_SHA}
          - Run: ${RUN_URL}
          - Durable evidence: runtime_reports/mlb_v15_11_1_merged_deployment_latest.json
          EOF
          )
          jq -n --arg body "$BODY" '{body: $body}' > /tmp/comment.json
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/111/comments" \
            --data-binary @/tmp/comment.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add runtime_reports/mlb_v15_11_1_merged_deployment_latest.json
          git commit -m 'Record MLB V15.11.1 merged deployment result'
          git push origin main
