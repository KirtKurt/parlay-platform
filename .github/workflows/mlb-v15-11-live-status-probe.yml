name: Probe MLB V15.11.1 exact SAM failure

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89415006701'
    steps:
      - name: Print only the exact deployment failure messages
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          terms = re.compile(
              r'CREATE_FAILED|UPDATE_FAILED|ROLLBACK|ValidationError|AccessDenied|'
              r'AlreadyExists|already exists|Resource handler returned message|'
              r'Failed to create changeset|Failed to deploy|Error:|NoSuchBucket|'
              r'InsufficientCapabilities|No updates are to be performed',
              re.IGNORECASE,
          )
          hits = [i for i, line in enumerate(lines) if terms.search(line)]
          print('EXACT_MATCH_COUNT=' + str(len(hits)))
          for i in hits[-30:]:
              start = max(0, i - 2)
              end = min(len(lines), i + 4)
              print('---')
              for j in range(start, end):
                  print(f'{j + 1:05d}: {lines[j]}')
          print('=== FINAL 45 JOB LINES ===')
          for j, line in enumerate(lines[-45:], start=max(1, len(lines) - 44)):
              print(f'{j:05d}: {line}')
          if not hits:
              raise SystemExit('No recognized failure line found')
          PY
