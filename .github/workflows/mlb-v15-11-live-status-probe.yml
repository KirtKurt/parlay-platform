name: Print rejected MLB historical schedule dates

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89429118420'
    steps:
      - name: Print one-line planning summary
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          latest = None
          for line in raw.splitlines():
              line = ansi.sub('', line)
              marker = re.match(r'^.*?Z\s+(\{.*\})\s*$', line)
              if not marker:
                  continue
              try:
                  value = json.loads(marker.group(1))
              except Exception:
                  continue
              state = value.get('state') if isinstance(value, dict) else None
              if isinstance(state, dict) and isinstance(state.get('plan'), dict):
                  latest = value
          if latest is None:
              raise SystemExit('plan response not found')
          state = latest.get('state') or {}
          plan = state.get('plan') or {}
          rejected = plan.get('rejectedDates') or []
          summary = {
              'status': latest.get('status'),
              'phase': state.get('phase'),
              'plannedGames': plan.get('maximumAuthorizedOfficialGames'),
              'plannedDays': plan.get('plannedCompleteSlateDays'),
              'historicalRequests': plan.get('historicalRequestCount'),
              'estimatedCredits': plan.get('estimatedCredits'),
              'planningErrorCount': plan.get('planningErrorCount'),
              'rejectedDateCount': len(rejected),
              'rejectedDates': [
                  {
                      'date': row.get('slateDateEt'),
                      'reason': row.get('reason'),
                      'details': row.get('details'),
                  }
                  for row in rejected[:20]
              ],
              'fingerprint': plan.get('fingerprint'),
              'paidAuthorized': state.get('paidBackfillAuthorized'),
              'networkRequests': state.get('networkRequestCount'),
          }
          print('PLAN_SUMMARY=' + json.dumps(summary, sort_keys=True, separators=(',', ':')))
          PY
