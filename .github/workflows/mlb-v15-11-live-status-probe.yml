name: Print exact MLB planning response lines

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89426541736'
    steps:
      - name: Extract JSON responses and terminal assertion
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          keep = re.compile(
              r'^.*Z\s+\{.*(?:"ok"|"statusCode"|"FunctionError"|"errorMessage"|"phase"|"state"|"plan").*\}\s*$|'
              r'planning/resume failed|Process completed with exit code|PLAN_STATUS=|PLAN_FINGERPRINT=|'
              r'ESTIMATED_CREDITS=|MAXIMUM_AUTHORIZED_GAMES=|Unexpected optimizer phase|historical optimizer planning',
              re.IGNORECASE,
          )
          matches = [(index + 1, line) for index, line in enumerate(lines) if keep.search(line)]
          print('MATCH_COUNT=' + str(len(matches)))
          for number, line in matches[-50:]:
              print(f'{number:05d}: {line}')
          print('--- FIXED RANGE 940-1045 ---')
          for number in range(940, min(1046, len(lines) + 1)):
              line = lines[number - 1]
              if any(token in line for token in (
                  '/tmp/mlb-historical-', 'StatusCode', 'FunctionError', 'errorMessage',
                  'planning/resume failed', 'Process completed', '{"', "raise SystemExit",
                  'PLAN_', 'completeDateRangeLedger', 'planningErrorCount', 'rejectedDates'
              )):
                  print(f'{number:05d}: {line}')
          PY
