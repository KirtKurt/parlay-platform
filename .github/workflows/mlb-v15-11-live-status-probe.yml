name: Snapshot active MLB historical training chain

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print current MLB historical workflow runs and jobs
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}/actions/runs?per_page=100" > /tmp/runs.json
          jq '{
            workflows: [
              .workflow_runs[]
              | select(.name == "MLB V15.11.1 Accelerated Historical Training"
                    or .name == "Dispatch Authorized MLB Historical Training"
                    or .name == "MLB Historical Recovery and Paid Dispatch"
                    or .name == "MLB Historical Daily Optimizer"
                    or .name == "MLB Historical Accelerated Training Driver"
                    or .name == "Observe MLB V15.11.1 Historical Training Chain")
              | {id,name,event,status,conclusion,head_sha,created_at,updated_at,html_url}
            ] | sort_by(.created_at) | reverse
          }' /tmp/runs.json | tee /tmp/summary.json
          jq -r '.workflows[0:15][] | [.id,.name,.event,.status,(.conclusion // "pending"),.head_sha,.created_at] | @tsv' /tmp/summary.json
          ids=$(jq -r '.workflows[0:12][].id' /tmp/summary.json)
          for run_id in $ids; do
            echo "=== RUN ${run_id} ==="
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}/actions/runs/${run_id}/jobs?per_page=100" > "/tmp/jobs-${run_id}.json"
            jq '{jobs: [.jobs[] | {id,name,status,conclusion,steps:[(.steps // [])[] | {number,name,status,conclusion}]}]}' "/tmp/jobs-${run_id}.json"
          done
