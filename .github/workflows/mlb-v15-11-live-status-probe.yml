name: Snapshot corrected MLB V15.11.1 deployment

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 0fb502e1b5fcc9ecb6b4f1a543d7a59d6ca577cf
    steps:
      - name: Print exact workflow and job states
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&event=push&per_page=100" \
            > /tmp/runs.json
          jq '{
            targetSha: $sha,
            workflows: [
              .workflow_runs[]
              | select(.name == "MLB Historical Daily Optimizer" or .name == "Deploy SAM to AWS")
              | {
                  id,
                  name,
                  status,
                  conclusion,
                  createdAt: .created_at,
                  updatedAt: .updated_at,
                  url: .html_url
                }
            ]
          }' --arg sha "$TARGET_SHA" /tmp/runs.json | tee /tmp/status.json
          RUN_ID=$(jq -r '[.workflow_runs[] | select(.name == "MLB Historical Daily Optimizer")] | sort_by(.created_at) | last | .id // empty' /tmp/runs.json)
          test -n "$RUN_ID"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100" \
            > /tmp/jobs.json
          jq '{
            runId: $runId,
            jobs: [
              .jobs[] | {
                id,
                name,
                status,
                conclusion,
                startedAt: .started_at,
                completedAt: .completed_at,
                steps: [(.steps // [])[] | {number, name, status, conclusion}]
              }
            ]
          }' --argjson runId "$RUN_ID" /tmp/jobs.json
