name: Probe MLB V15.11.1 deployment failure logs

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89415006701'
    steps:
      - name: Download exact failed deploy-and-plan job log
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/deploy-and-plan.log
          test -s /tmp/deploy-and-plan.log
          wc -l /tmp/deploy-and-plan.log

      - name: Extract the SAM and CloudFormation failure context
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/deploy-and-plan.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          pattern = re.compile(
              r'CREATE_FAILED|UPDATE_FAILED|ROLLBACK|ValidationError|AccessDenied|'
              r'AlreadyExists|already exists|Resource handler returned message|'
              r'Error:|ERROR|Failed to create changeset|Failed to deploy|'
              r'NoSuchBucket|InsufficientCapabilities|Parameter.*invalid',
              re.IGNORECASE,
          )
          hits = [index for index, line in enumerate(lines) if pattern.search(line)]
          selected = set()
          for index in hits:
              selected.update(range(max(0, index - 8), min(len(lines), index + 18)))
          # Include the final SAM output even when the provider message does not
          # contain one of the common failure tokens.
          selected.update(range(max(0, len(lines) - 140), len(lines)))
          print('=== EXTRACTED FAILURE CONTEXT ===')
          last = None
          for index in sorted(selected):
              if last is not None and index > last + 1:
                  print('...')
              print(f'{index + 1:05d}: {lines[index]}')
              last = index
          if not hits:
              raise SystemExit('No recognized deployment failure token found')
          PY
