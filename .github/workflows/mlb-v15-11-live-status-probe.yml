name: Snapshot paid MLB training retry

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      RETRY_SHA: cc6056182dfe093a8624e454726c8f17b2602a1e
    steps:
      - name: Print current paid training chain
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}/actions/runs?per_page=100" > /tmp/runs.json
          jq --arg sha "$RETRY_SHA" '{
            workflows: [
              .workflow_runs[]
              | select(.head_sha == $sha
                    or .name == "MLB Historical Recovery and Paid Dispatch"
                    or .name == "MLB Historical Daily Optimizer"
                    or .name == "MLB Historical Accelerated Training Driver"
                    or .name == "MLB V15.11.1 Accelerated Historical Training"
                    or .name == "Dispatch Authorized MLB Historical Training")
              | {id,name,event,status,conclusion,head_sha,created_at,updated_at,html_url}
            ] | sort_by(.created_at) | reverse | .[0:12]
          }' /tmp/runs.json > /tmp/summary.json
          jq -r '.workflows[] | [.id,.name,.event,.status,(.conclusion // "pending"),.head_sha,.created_at] | @tsv' /tmp/summary.json
          ids=$(jq -r '.workflows[].id' /tmp/summary.json)
          for id in $ids; do
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}/actions/runs/${id}/jobs?per_page=100" > "/tmp/jobs-${id}.json"
            jq -r --arg id "$id" '
              .jobs[]
              | [$id,.id,.name,.status,(.conclusion // "pending"),
                 (([.steps[]? | select(.status == "in_progress") | .name][0])
                  // ([.steps[]? | select(.conclusion == "failure") | .name][0])
                  // "waiting")]
              | @tsv
            ' "/tmp/jobs-${id}.json"
          done
