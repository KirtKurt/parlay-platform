name: Print terminal MLB optimizer failure block

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89424142807'
    steps:
      - name: Print terminal provider block only
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re
          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          terms = re.compile(
              r'CREATE_FAILED|UPDATE_FAILED|ROLLBACK_IN_PROGRESS|Resource handler returned message|'
              r'Failed to create changeset|Failed to deploy|ValidationError|AccessDenied|'
              r'InvalidRequest|LimitExceeded|ConflictException|Process completed with exit code|'
              r'NoSuchBucket|AlreadyExists',
              re.IGNORECASE,
          )
          hits = [i for i, line in enumerate(lines) if i > 600 and terms.search(line)]
          print('TERMINAL_MATCHES=' + str(len(hits)))
          if not hits:
              start = max(0, len(lines) - 60)
              end = len(lines)
          else:
              focus = hits[-1]
              start = max(0, focus - 35)
              end = min(len(lines), focus + 30)
          print(f'RANGE={start + 1}-{end}')
          for index in range(start, end):
              print(f'{index + 1:05d}: {lines[index]}')
          PY
