name: Extract MLB historical planning failure

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89426541736'
    steps:
      - name: Print only planning and Lambda response failure context
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          terms = re.compile(
              r'Initialize or resume|no-paid-history|historical-plan|historical-initialize|'
              r'planning/resume failed|PLAN_|READY_FOR_AUTHORIZATION|Traceback|Exception|'
              r'FunctionError|Unhandled|errorMessage|errorType|StatusCode|ExecutedVersion|'
              r'Process completed with exit code|maximumAuthorizedOfficialGames|'
              r'planningErrorCount|rejectedDates|completeDateRangeLedger|paidHistoricalCallsMadeByPlan',
              re.IGNORECASE,
          )
          hits = [i for i, line in enumerate(lines) if terms.search(line)]
          selected = set()
          for index in hits:
              selected.update(range(max(0, index - 3), min(len(lines), index + 8)))
          selected.update(range(max(0, len(lines) - 80), len(lines)))
          print('LOG_LINE_COUNT=' + str(len(lines)))
          print('MATCH_COUNT=' + str(len(hits)))
          last = None
          for index in sorted(selected):
              if last is not None and index > last + 1:
                  print('...')
              print(f'{index + 1:05d}: {lines[index]}')
              last = index
          PY
