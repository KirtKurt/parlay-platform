name: Compress MLB schedule exception provenance

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths: ['.github/workflows/mlb-v15-11-live-status-probe.yml']

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89429118420'
    steps:
      - name: Print compact schedule exception report
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" > /tmp/job.log
          python - <<'PY'
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen
          from zoneinfo import ZoneInfo
          import json, re

          et = ZoneInfo('America/New_York')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          plan = None
          for raw in Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace').splitlines():
              line = ansi.sub('', raw)
              match = re.match(r'^.*?Z\s+(\{.*\})\s*$', line)
              if not match: continue
              try: value = json.loads(match.group(1))
              except Exception: continue
              state = value.get('state') if isinstance(value, dict) else None
              if isinstance(state, dict) and isinstance(state.get('plan'), dict): plan = state['plan']
          if plan is None: raise SystemExit('plan response missing')
          dates = [str(x['slateDateEt']) for x in plan.get('rejectedDates') or []]
          out = []
          for day in dates:
              url = 'https://statsapi.mlb.com/api/v1/schedule?' + urlencode({'sportId':1,'startDate':day,'endDate':day,'hydrate':'linescore,gameInfo'})
              with urlopen(Request(url, headers={'accept':'application/json','user-agent':'inqsi-date-inspector/1.0'}), timeout=30) as response:
                  payload = json.loads(response.read())
              for date_row in payload.get('dates') or []:
                  for game in date_row.get('games') or []:
                      official = str(game.get('officialDate') or '')
                      if official == day: continue
                      game_utc = str(game.get('gameDate') or '')
                      try: game_et = datetime.fromisoformat(game_utc.replace('Z','+00:00')).astimezone(et).date().isoformat()
                      except Exception: game_et = None
                      status = game.get('status') or {}; teams = game.get('teams') or {}
                      out.append({
                          'day':day,'row':date_row.get('date'),'pk':game.get('gamePk'),'official':official,
                          'gameUtc':game_utc,'gameEt':game_et,'resume':game.get('resumeDate'),
                          'resumedFrom':game.get('resumedFromDate'),'reschedule':game.get('rescheduleDate'),
                          'rescheduledFrom':game.get('rescheduledFromDate'),'abstract':status.get('abstractGameState'),
                          'detail':status.get('detailedState'),'code':status.get('statusCode'),
                          'away':(((teams.get('away') or {}).get('team') or {}).get('name')),
                          'home':(((teams.get('home') or {}).get('team') or {}).get('name')),
                          'awayScore':(teams.get('away') or {}).get('score'),'homeScore':(teams.get('home') or {}).get('score'),
                          'doubleHeader':game.get('doubleHeader'),'gameNumber':game.get('gameNumber'),
                          'seriesGame':game.get('seriesGameNumber'),'gameType':game.get('gameType')
                      })
          classes = {}
          for row in out:
              key = '|'.join([str(row['abstract']),str(bool(row['resume'] or row['resumedFrom'])),str(bool(row['reschedule'] or row['rescheduledFrom'])),str(row['gameEt']==row['day'])])
              classes[key] = classes.get(key,0)+1
          print('EXCEPTION_REPORT=' + json.dumps({'count':len(out),'classes':classes,'rows':out}, sort_keys=True, separators=(',',':')))
          PY
