name: Probe second MLB V15.11.1 stack failure

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_JOB_ID: '89418153271'
    steps:
      - name: Print exact AWS failure messages
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          terms = re.compile(
              r'CREATE_FAILED|UPDATE_FAILED|ROLLBACK|ValidationError|AccessDenied|'
              r'AlreadyExists|already exists|Resource handler returned message|'
              r'Failed to create changeset|Failed to deploy|Error:|NoSuchBucket|'
              r'InsufficientCapabilities|InvalidRequest|LimitExceeded|ConflictException|'
              r'Process completed with exit code',
              re.IGNORECASE,
          )
          hits = [i for i, line in enumerate(lines) if terms.search(line)]
          print('EXACT_MATCH_COUNT=' + str(len(hits)))
          selected = set()
          for index in hits[-25:]:
              selected.update(range(max(0, index - 4), min(len(lines), index + 10)))
          selected.update(range(max(0, len(lines) - 35), len(lines)))
          last = None
          for index in sorted(selected):
              if last is not None and index > last + 1:
                  print('...')
              print(f'{index + 1:05d}: {lines[index]}')
              last = index
          if not hits:
              raise SystemExit('No recognized AWS failure token found')
          PY
