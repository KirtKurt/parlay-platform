name: Inspect isolated MLB V15.11.1 deployment failure

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/mlb-v15-11-live-status-probe.yml'

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/observe-mlb-v15-11-live-status'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      WORKFLOW_FILE: mlb-historical-optimizer.yml
    steps:
      - name: Fetch latest isolated run and exact failure
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs?event=workflow_dispatch&per_page=20" \
            > /tmp/runs.json
          jq '{latest: (.workflow_runs | sort_by(.created_at) | last | {id,status,conclusion,created_at,updated_at,html_url,head_sha})}' /tmp/runs.json
          run_id=$(jq -r '.workflow_runs | sort_by(.created_at) | last | .id' /tmp/runs.json)
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
            > /tmp/jobs.json
          jq '{jobs: [.jobs[] | {id,name,status,conclusion,steps:[(.steps // [])[] | {number,name,status,conclusion}]}]}' /tmp/jobs.json
          job_id=$(jq -r '[.jobs[] | select(.name == "deploy-and-plan")] | last | .id // empty' /tmp/jobs.json)
          test -n "$job_id"
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
            > /tmp/job.log
          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/job.log').read_text(encoding='utf-8-sig', errors='replace')
          ansi = re.compile(r'\x1b\[[0-9;?]*[ -/]*[@-~]')
          lines = [ansi.sub('', line) for line in raw.splitlines()]
          terms = re.compile(
              r'CREATE_FAILED|UPDATE_FAILED|ROLLBACK|Resource handler returned message|'
              r'Failed to create changeset|Failed to deploy|ValidationError|AccessDenied|'
              r'InvalidRequest|LimitExceeded|ConflictException|Process completed with exit code|'
              r'PLAN_BLOCKED|planning failed|Traceback|Exception|error',
              re.IGNORECASE,
          )
          hits = [i for i, line in enumerate(lines) if terms.search(line)]
          print('MATCH_COUNT=' + str(len(hits)))
          selected = set(range(max(0, len(lines) - 60), len(lines)))
          for index in hits[-25:]:
              selected.update(range(max(0, index - 3), min(len(lines), index + 10)))
          last = None
          for index in sorted(selected):
              if last is not None and index > last + 1:
                  print('...')
              print(f'{index + 1:05d}: {lines[index]}')
              last = index
          PY
