name: Apply MLB Effective Schedule Authority Fix

on:
  push:
    branches: [agent/fix-mlb-effective-schedule-authority]
    paths:
      - '.github/workflows/apply-mlb-effective-schedule-authority-fix.yml'
      - 'scripts/apply_mlb_effective_schedule_authority_fix.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-mlb-effective-schedule-authority-fix
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mlb-effective-schedule-authority
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test runtime
        run: python -m pip install --quiet 'boto3>=1.34,<2' 'pytest>=8,<9'

      - name: Apply canonical source migration
        run: python scripts/apply_mlb_effective_schedule_authority_fix.py

      - name: Validate effective schedule and lifecycle contracts
        env:
          PYTHONPATH: ${{ github.workspace }}/hello_world
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: 'true'
        run: |
          set -euo pipefail
          python -m py_compile \
            hello_world/mlb_slate_coverage_patch.py \
            hello_world/mlb_locked_prediction_storage_finalizer_v1.py \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_postcutoff_storage_contract.py
          python -m pytest -q \
            tests/unit/test_mlb_official_schedule_authority.py \
            tests/unit/test_mlb_schedule_revision_authority.py \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_postcutoff_storage_contract.py \
            tests/unit/test_mlb_storage_authority.py \
            tests/unit/test_mlb_manual_pull_protected_runtime.py \
            tests/unit/test_mlb_daily_per_game_lock.py \
            tests/unit/test_mlb_lock_status_request_cache.py

      - name: Commit canonical source and regression changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            hello_world/mlb_slate_coverage_patch.py \
            hello_world/mlb_locked_prediction_storage_finalizer_v1.py \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_postcutoff_storage_contract.py
          if git diff --cached --quiet; then
            echo 'Canonical MLB effective-schedule fix is already applied.'
          else
            git commit -m 'Fix MLB effective schedule authority lifecycle'
            git pull --rebase --autostash origin agent/fix-mlb-effective-schedule-authority
            git push origin HEAD:agent/fix-mlb-effective-schedule-authority
          fi
