name: Diagnose and build MLB V15.10 canonical contract objects

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-mlb-v15-10-acceptance.yml"
      - "scripts/build_mlb_v15_10_canonical_objects.py"
      - ".github/workflows/deploy.yml"
      - "scripts/verify_api_function_mlb_v3_import.py"
      - "scripts/verify_mlb_workflow_authority.py"
      - "tests/unit/test_mlb_workflow_authority.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: diagnose-build-mlb-v15-10-canonical-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-objects:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verification runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Apply exact four-file migration in the runner
        run: |
          set -euo pipefail
          sed -i \
            's/Live MLB training health source is stale/AWS-native V2 training health source is stale/' \
            scripts/build_mlb_v15_10_canonical_objects.py
          python scripts/build_mlb_v15_10_canonical_objects.py --apply

      - name: Validate complete migration
        run: |
          set -euo pipefail
          python scripts/verify_mlb_schedule_invariants.py
          python scripts/verify_mlb_workflow_authority.py
          python -m pytest -q \
            tests/unit/test_mlb_production_acceptance.py \
            tests/unit/test_mlb_workflow_authority.py \
            tests/unit/test_mlb_public_per_game_authority.py \
            tests/unit/test_mlb_ranked_primary_v15_10.py \
            tests/unit/test_mlb_ml_runtime_install_explicit.py \
            tests/unit/test_mlb_signal_policy_prelock_persistence.py \
            tests/unit/test_mlb_prediction_probability_contract_v1.py \
            tests/unit/test_mlb_probability_actionability_guard.py
          python -m py_compile \
            scripts/build_mlb_v15_10_canonical_objects.py \
            scripts/verify_api_function_mlb_v3_import.py \
            scripts/verify_mlb_workflow_authority.py
          git diff --check

      - name: Publish validated Git blobs without moving the branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/build_mlb_v15_10_canonical_objects.py \
            --publish \
            --output /tmp/mlb-v15-10-canonical-git-objects.json

      - name: Upload validated object manifest
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-10-canonical-git-objects-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: error
          path: /tmp/mlb-v15-10-canonical-git-objects.json
