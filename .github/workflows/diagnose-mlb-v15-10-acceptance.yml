name: Diagnose MLB V15.10 production acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-mlb-v15-10-acceptance.yml"
      - "tests/unit/test_mlb_production_acceptance.py"
      - "hello_world/mlb_ranked_primary_v15_10.py"
      - "hello_world/mlb_ml_runtime_install_v3.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-mlb-v15-10-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runtime
        run: python -m pip install --quiet "boto3>=1.34,<2" "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Capture exact PR source for local reproduction
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.aws-sam \
            --exclude=.pytest_cache \
            --exclude='**/__pycache__' \
            -czf /tmp/mlb-v15-10-pr-source.tar.gz .

      - name: Run production-acceptance suite with full diagnostics
        run: |
          set -o pipefail
          python -m pytest -vv --tb=long --showlocals \
            tests/unit/test_mlb_production_acceptance.py \
            2>&1 | tee /tmp/mlb-v15-10-production-acceptance.log

      - name: Upload diagnostic evidence and exact source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-v15-10-production-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: error
          path: |
            /tmp/mlb-v15-10-production-acceptance.log
            /tmp/mlb-v15-10-pr-source.tar.gz
